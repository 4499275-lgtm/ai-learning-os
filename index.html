, "path": "10-Concepts/Multi-Agent.md", "updated": "2026-06-20", "tags": ["AI", "Agent", "Multi-Agent", "DigitalWorkforce"], "body": "# Multi-Agent全景图\n\n## 目录\n\n- [[#学习定位]]\n- [[#一句话定义]]\n- [[#为什么会出现 Multi-Agent]]\n- [[#一个 Agent 的问题]]\n- [[#Multi-Agent 工作方式]]\n- [[#四种协作模式]]\n- [[#核心组件]]\n- [[#为什么 Multi-Agent 重要]]\n- [[#代表产品与平台]]\n- [[#Multi-Agent 与 Workflow 的区别]]\n- [[#产业位置与未来路线]]\n- [[#关联节点]]\n- [[#核心结论]]\n\n## 学习定位\n\n学完 [[Agent]]、[[Workflow]]、[[Coze]]、[[Dify]] 和 [[LangGraph]] 后，一个关键问题是：为什么 Agent 越来越像公司？\n\n[[Manus]]、OpenAI 的 Agent 体系和 Anthropic 的 Agent 路线都在走向角色分工与团队协作。\n\n原因很简单：现实世界中一个人很难完成所有工作，AI 也一样。\n\n---\n\n# 一句话定义\n\nMulti-Agent 是多个 Agent 通过角色分工、通信和协调共同完成任务的系统，也可以理解为数字员工团队。\n\n---\n\n# 为什么会出现 Multi-Agent\n\nAI 产品的执行模式不断演进：\n\n```text\n第一代：问题 → 回答\n第二代：任务 → 单 Agent 执行\n第三代：复杂任务 → Agent 团队协作\n```\n\n当任务同时包含搜索、分析、创作、开发和审核时，单 Agent 容易出现上下文混乱、角色冲突和质量下降。Multi-Agent 通过专业化分工降低复杂度。\n\n---\n\n# 一个 Agent 的问题\n\n假设用户要求：\n\n```text\n分析 AI 产业\n并生成报告\n并制作 PPT\n```\n\n单 Agent 需要同时完成：\n\n- 搜索\n- 阅读\n- 分析\n- 写作\n- 演示设计\n- 质量检查\n\n全部塞给一个 Agent，容易导致上下文过长、注意力分散、工具选择混乱和错误累积。\n\n更合理的方式是把任务拆给不同专业角色。\n\n---\n\n# Multi-Agent 工作方式\n\n典型团队：\n\n```text\n项目经理 Agent\n↓\n研究 Agent\n↓\n分析 Agent\n↓\n写作 Agent\n↓\n审核 Agent\n```\n\n每个 Agent 负责一类任务，并通过明确的输入、输出和质量标准进行交接。\n\n现实公司采用 CEO、经理和员工的组织结构，也是因为复杂工作需要分工与协调。Multi-Agent 将这一组织逻辑应用于数字执行系统。\n\n---\n\n# Multi-Agent 核心思想\n\n核心是分工：\n\n- 研究 Agent 负责搜索和资料收集\n- 分析 Agent 负责推理和形成结论\n- 写作 Agent 负责结构与表达\n- 审核 Agent 负责检查事实、格式和质量\n- 主管 Agent 负责目标、分配和验收\n\nMulti-Agent 的价值不在 Agent 数量，而在角色边界、交付协议和协调机制是否清晰。\n\n---\n\n# 四种协作模式\n\n## 第一种：Supervisor 模式\n\n```text\n主管 Agent\n├── Research Agent\n├── Writer Agent\n└── Reviewer Agent\n```\n\n主管负责拆分任务、选择执行者和汇总结果，是最常见的组织方式。\n\n## 第二种：Pipeline 模式\n\n```text\nAgent A → Agent B → Agent C\n```\n\n类似流水线，例如搜索、分析、写作依次交付。结构稳定，但对动态变化的适应能力较弱。\n\n## 第三种：Team 模式\n\n```text\nAgent A ↔ Agent B ↔ Agent C\n```\n\n多个 Agent 通过消息或共享状态协作，适合需要讨论、互评和迭代的任务。\n\n## 第四种：Hierarchical 模式\n\n```text\nCEO Agent\n↓\nManager Agent\n↓\nWorker Agent\n```\n\n适合大型任务和多层级组织，但协调成本、延迟和错误传播风险也更高。\n\n---\n\n# 核心组件\n\n## 角色 Role\n\n定义研究员、分析师、程序员、审计员等职责、工具和权限。\n\n## 记忆 Memory\n\n保存团队共享上下文、角色私有上下文和长期知识。\n\n## 通信 Communication\n\n规定 Agent 之间传递消息、结构化结果和任务请求的方式。\n\n## 状态 State\n\n记录任务进度、中间产物、失败信息和验收结果。\n\n## 协调 Coordinator\n\n负责拆解任务、分配角色、控制预算、终止循环和汇总结果。\n\n## 运行时 Runtime\n\n[[Agent Runtime]] 负责节点调度、状态持久化、重试、错误恢复和人工介入。\n\n---\n\n# 为什么 Multi-Agent 重要\n\n未来任务会越来越复杂。例如开发一个 App，可能同时需要：\n\n- 产品设计\n- 前端开发\n- 后端开发\n- 测试\n- 安全审查\n- 发布与运维\n\n单 Agent 可以尝试覆盖全部角色，但专业团队通常更容易建立清晰的责任边界和质量检查。\n\n同时，Multi-Agent 并不天然优于单 Agent。简单任务使用多个 Agent 会增加 Token、延迟、协调和调试成本。\n\n---\n\n# Manus 为什么重要\n\n课程将 [[Manus]] 理解为从单一助手走向数字项目团队的产品案例。其价值不只在模型，也在任务拆解、工具组织和结果交付。\n\n需要注意：是否采用多个独立 Agent，应以具体产品架构为准。“像团队”是一种产品和架构分析，不等于内部实现一定是 Multi-Agent。\n\n---\n\n# OpenAI 为什么会走向 Multi-Agent\n\nOpenAI 的产品路线可以抽象为：\n\n```text\nGPT → ChatGPT → Agent → Multi-Agent\n```\n\n随着任务从问答扩展到研究、编码和现实操作，单 Agent 需要与专业子 Agent、工具和审核环节协同。\n\n---\n\n# Anthropic 为什么重视 Multi-Agent\n\nAnthropic 的路线可以抽象为：\n\n```text\nClaude → MCP → Agent → Multi-Agent\n```\n\n[[MCP]] 主要统一 Agent 与工具、数据源和外部系统的连接方式。它可以为 Multi-Agent 团队提供共享工具基础设施，但不直接定义 Agent 之间的通信协议。\n\n---\n\n# LangGraph 为什么重要\n\nMulti-Agent 需要：\n\n- 状态管理\n- 节点和角色管理\n- 条件路由\n- 协调机制\n- 错误恢复\n- 人工介入\n\n[[LangGraph]] 的图、状态和运行时模型适合表达这类系统。\n\n许多 Multi-Agent 产品具有类似架构思想，但不一定直接使用 LangGraph。\n\n---\n\n# 代表产品与平台\n\n## CrewAI\n\n[[CrewAI]] 强调组建角色化 Agent 团队，例如研究员、分析师和写作 Agent 协同完成任务。\n\n## AutoGen\n\n[[AutoGen]] 是微软推动的多 Agent 框架路线，强调多个 Agent 通过消息和对话协作。\n\n## LangGraph\n\n[[LangGraph]] 通过 State、Node 和 Edge 表达 Agent 分工、路由、循环和检查点。\n\n---\n\n# Multi-Agent 与 Workflow 的区别\n\n```text\nWorkflow    = 预定义流程\nMulti-Agent = 多角色协作系统\n```\n\n传统 Workflow：\n\n```text\nA → B → C\n```\n\nMulti-Agent：\n\n```text\nA ↔ B ↔ C\n```\n\n但二者可以结合：Workflow 提供确定性边界，Multi-Agent 在局部任务中动态协作。这通常比完全自由的 Agent 对话更可控。\n\n---\n\n# Multi-Agent 与公司组织\n\n公司与 Multi-Agent 具有相似抽象：\n\n```text\n组织 → 分工 → 协作 → 管理 → 交付\n```\n\n因此，Multi-Agent 不只是模型调用问题，也涉及组织设计、管理学、权限、激励、质量和成本控制。\n\n---\n\n# 产业位置与未来路线\n\nMulti-Agent 位于 Single Agent 与 [[Digital Workforce]] 之间：\n\n```text\n模型\n↓\nAgent Runtime\n↓\nSingle Agent\n↓\nMulti-Agent\n↓\nDigital Workforce\n```\n\n未来路线可以概括为：\n\n```text\nChatBot → Copilot → Agent → Multi-Agent → Digital Workforce → AI Native Organization\n```\n\n---\n\n# Digital Workforce\n\n数字劳动力由数字销售、数字客服、数字程序员、数字分析师等专业 Agent 组成，并通过运行时、治理和组织结构协同工作。\n\n```text\nChatGPT          = 数字助手\nClaude Code      = 数字程序员\nManus            = 数字项目经理\nMulti-Agent      = 数字团队\nDigital Workforce = 数字公司能力层\n```\n\n---\n\n# 知识图谱位置\n\n```text\n10-Concepts\n├── Agent\n├── Workflow\n├── Agent Runtime\n├── Multi-Agent\n└── Digital Workforce\n```\n\n---\n\n# 关联节点\n\n- [[Agent]]\n- [[Workflow]]\n- [[LangGraph]]\n- [[Manus]]\n- [[Claude Code]]\n- [[OpenAI_Anthropic_智谱三条路线演化对比#OpenAI 路线|OpenAI路线]]\n- [[OpenAI_Anthropic_智谱三条路线演化对比#Anthropic 路线|Anthropic路线]]\n- [[CrewAI]]\n- [[AutoGen]]\n- [[Digital Workforce]]\n- [[Agent Runtime]]\n- [[Multi_Agent|Multi-Agent 主文件]]\n\n---\n\n# 核心结论\n\nAgent 不是终点。单 Agent 是数字员工，Multi-Agent 是数字团队。\n\nMulti-Agent 本质上是组织学、管理学和人工智能的结合。未来 AI 产业的重要变化，可能不是单纯出现更强的模型，而是出现能够自主协作、接受治理并交付结果的数字组织。\n\n", "excerpt": "Multi-Agent全景图 目录 #学习定位 #一句话定义 #为什么会出现 Multi-Agent #一个 Agent 的问题 #Multi-Agent 工作方式 #四种协作模式 #核心组件 #为什么 Multi-Agent 重要 #代表产品与平台 #Multi-Agent 与 Workflow 的区别 #产业位置与未来路线 #关联节点 #核心结论 学习定...", "links": ["10-Concepts-Agent", "03-Agent-Workflow", "04-Platforms-Coze", "04-Platforms-Dify", "04-Platforms-LangGraph", "05-Agent-Runners-Manus", "10-Concepts-Agent-Runtime", "03-Agent-MCP", "04-Platforms-CrewAI", "04-Platforms-AutoGen", "10-Concepts-Digital-Workforce", "02-Model-Companies-OpenAI_Anthropic_智谱三条路线演化对比", "03-Agent-Multi_Agent"]}, {"id": "10-Concepts-Outcome-Pricing", "title": "Outcome Pricing", "fileTitle": "Outcome Pricing", "category": "10-Concepts", "categoryLabel": "核心概念", "path": "10-Concepts/Outcome Pricing.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "concept"], "body": "# Outcome Pricing\n\n## 一句话定义\n\n> Outcome Pricing 是按完成的业务结果而非 Token、工时或软件席位收费的定价方式。\n\n## 定位\n\n- Agent 时代从卖调用转向卖结果的核心商业概念。\n- 需要可验证的结果定义、基线、归因和风险分担。\n\n## 时间轴\n\n| 阶段 | 关键变化 | 意义 |\n|---|---|---|\n| 概念形成 | 从单一模型能力中抽象出通用方法 | 建立可复用的 AI 系统组件 |\n| 工程化 | 引入 API、评测、观测和治理 | 从演示走向生产应用 |\n| Agent 阶段 | 与知识、工具和流程协同 | 成为端到端任务的组成部分 |\n\n## 产品矩阵\n\n| 产品 / 能力 | 定位 | 核心价值 |\n|---|---|---|\n| 核心机制 | Outcome Pricing | 提供该概念的基础能力 |\n| 应用层 | RAG / Workflow / Agent | 把概念组合进可用系统 |\n| 治理层 | 评测、安全、成本 | 管理质量与生产风险 |\n\n## 商业模式\n\n- 概念本身通常不独立收费，而是通过 API、SaaS、企业平台或 Agent 产品变现。\n- 成本与模型推理、数据、存储、工具或工程维护相关。\n\n## 竞争格局\n\n- 竞争重点是质量、成本、开放性、工具生态和企业可治理性。\n- 在模型商品化背景下，工程可靠性与应用数据更重要。\n\n## 关联节点\n\n- [[Agent经济学]]\n- [[Agent_Business_Model]]\n- [[Coding Plan经济学]]\n- [[Token经济学]]\n\n## 延伸阅读\n\n- [[Agent地图]]\n- [[论文索引]]\n- [[官网索引]]\n", "excerpt": "Outcome Pricing 一句话定义 Outcome Pricing 是按完成的业务结果而非 Token、工时或软件席位收费的定价方式。 定位 Agent 时代从卖调用转向卖结果的核心商业概念。 需要可验证的结果定义、基线、归因和风险分担。 时间轴 产品矩阵 商业模式 概念本身通常不独立收费，而是通过 API、SaaS、企业平台或 Agent 产品变现...", "links": ["07-Business-Agent经济学", "07-Business-Agent_Business_Model", "07-Business-Coding-Plan经济学", "07-Business-Token经济学", "00-MOC-Agent地图", "99-Resources-论文索引", "99-Resources-官网索引"]}, {"id": "10-Concepts-Prompt-Engineering", "title": "Prompt Engineering", "fileTitle": "Prompt Engineering", "category": "10-Concepts", "categoryLabel": "核心概念", "path": "10-Concepts/Prompt Engineering.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "concept"], "body": "# Prompt Engineering\n\n## 一句话定义\n\n> Prompt Engineering 是通过明确指令、上下文、示例、约束和输出格式来提高模型任务表现的方法。\n\n## 定位\n\n- LLM 应用的交互设计与可靠性工程。\n- 生产环境需与评测、结构化输出和安全护栏结合。\n\n## 时间轴\n\n| 阶段 | 关键变化 | 意义 |\n|---|---|---|\n| 概念形成 | 从单一模型能力中抽象出通用方法 | 建立可复用的 AI 系统组件 |\n| 工程化 | 引入 API、评测、观测和治理 | 从演示走向生产应用 |\n| Agent 阶段 | 与知识、工具和流程协同 | 成为端到端任务的组成部分 |\n\n## 产品矩阵\n\n| 产品 / 能力 | 定位 | 核心价值 |\n|---|---|---|\n| 核心机制 | Prompt Engineering | 提供该概念的基础能力 |\n| 应用层 | RAG / Workflow / Agent | 把概念组合进可用系统 |\n| 治理层 | 评测、安全、成本 | 管理质量与生产风险 |\n\n## 商业模式\n\n- 概念本身通常不独立收费，而是通过 API、SaaS、企业平台或 Agent 产品变现。\n- 成本与模型推理、数据、存储、工具或工程维护相关。\n\n## 竞争格局\n\n- 竞争重点 据 | 商业化、客户与竞争格局 |\n\n## 商业模式\n\n- 资料索引不直接变现，但能降低研究成本、减少事实错误并加快内容交付。\n- 付费数据库或资讯只在一手资料无法满足决策精度时引入。\n\n## 竞争格局\n\n- 信息优势不来自收藏数量，而来自来源权威性、更新频率、可追溯性和与知识节点的连接。\n- 应区分官方事实、公司宣传、独立评测和分析者判断。\n\n## 关联节点\n\n- [[官网索引]]\n- [[论文索引]]\n- [[Github索引]]\n- [[AI_OS_总导航]]\n\n## 延伸阅读\n\n- [OpenAI News](https://openai.com/news/)\n- [Anthropic News](https://www.anthropic.com/news)\n- [Google DeepMind News](https://deepmind.google/discover/blog/)\n- [Meta AI Blog](https://ai.meta.com/blog/)\n- [Microsoft Research](https://www.microsoft.com/en-us/research/blog/)\n- [Hugging Face Blog](https://huggingface.co/blog)\n- [arXiv AI](https://arxiv.org/list/cs.AI/recent)\n", "excerpt": "AI资讯来源 一句话定义 AI 资讯来源索引按官方发布、研究论文、开发者更新和行业分析组织信息源。 定位 优先使用官方一手资料，再用二手分析补充背景。 记录发布日期、访问日期、版本与原始链接。 时间轴 产品矩阵 商业模式 资料索引不直接变现，但能降低研究成本、减少事实错误并加快内容交付。 付费数据库或资讯只在一手资料无法满足决策精度时引入。 竞争格局 信息优...", "links": ["99-Resources-官网索引", "99-Resources-论文索引", "99-Resources-Github索引", "00-MOC-AI_OS_总导航"]}, {"id": "99-Resources-Github索引", "title": "Github索引", "fileTitle": "Github索引", "category": "99-Resources", "categoryLabel": "资料索引", "path": "99-Resources/Github索引.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "resources"], "body": "# Github索引\n\n## 一句话定义\n\n> GitHub 索引集中维护模型、Agent 框架、RAG、Coding Agent 和 MCP 的开源实现。\n\n## 定位\n\n- 优先使用官方一手资料，再用二手分析补充背景。\n- 记录发布日期、访问日期、版本与原始链接。\n\n## 时间轴\n\n| 阶段 | 关键变化 | 意义 |\n|---|---|---|\n| 日常 | 追踪官方更新与发布说明 | 及时发现产品与 API 变化 |\n| 每周 | 归档重要论文、仓库和行业事件 | 将信息转为可检索索引 |\n| 每月 | 回顾来源质量与失效链接 | 保持知识库可维护性 |\n\n## 产品矩阵\n\n| 产品 / 能力 | 定位 | 核心价值 |\n|---|---|---|\n| Agent 框架 | LangGraph、CrewAI、AutoGen、OpenAI Agent SDK | 编排状态、角色和工具 |\n| Coding Agent | Cline、Roo Code、OpenHands | 代码库操作与沙箱执行 |\n| RAG / 平台 | Dify、Qdrant、Milvus、GraphRAG | 知识检索、向量数据库与应用构建 |\n\n## 商业模式\n\n- 资料索引不直接变现，但能降低研究成本、减少事实错误并加快内容交付。\n- 付费数据库或资讯只在一手资料无法满足决策精度时引入。\n\n## 竞争格局\n\n- 信息优势不来自收藏数量，而来自来源权威性、更新频率、可追溯性和与知识节点的连接。\n- 应区分官方事实、公司宣传、独立评测和分析者判断。\n\n## 关联节点\n\n- [[官网索引]]\n- [[论文索引]]\n- [[AI资讯来源]]\n- [[AI_OS_总导航]]\n\n## 延伸阅读\n\n- [LangGraph](htt   <script>
    const pages = JSON.parse(document.getElementById('site-data').textContent);
    const pageById = new Map(pages.map(page => [page.id, page]));
    const titleToId = new Map();
    pages.forEach(page => {
      titleToId.set(page.fileTitle, page.id);
      titleToId.set(page.title, page.id);
    });
    const categories = [...new Map(pages.map(page => [page.category, page.categoryLabel])).entries()];
    const categoryCounts = new Map(categories.map(([key]) => [key, pages.filter(page => page.category === key).length]));
    const getHashPageId = () => {
      const raw = location.hash.replace(/^#\/?/, '');
      try { return decodeURIComponent(raw); } catch { return raw; }
    };
    const setPageHash = id => {
      location.hash = `/${encodeURIComponent(id)}`;
    };
    let state = { query: '', category: '', pageId: getHashPageId() };

    const escapeHtml = value => String(value ?? '').replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
    const inline = value => escapeHtml(value)
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/\*([^*]+)\*/g, '<em>$1</em>')
      .replace(/\[\[([^\]|#]+)(?:#[^\]|]+)?\|([^\]]+)\]\]/g, (_, target, label) => wikiLink(target, label))
      .replace(/\[\[([^\]|#]+)(?:#[^\]]+)?\]\]/g, (_, target) => wikiLink(target, target))
      .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>');

    function wikiLink(target, label) {
      const id = titleToId.get(target.trim());
      return id ? `<a href="#/${id}">${escapeHtml(label)}</a>` : `<span>${escapeHtml(label)}</span>`;
    }

    function renderMarkdown(markdown) {
      const lines = markdown.split(/\r?\n/);
      const out = [];
      let paragraph = [];
      let list = null;
      let code = null;
      let table = null;

      const flushParagraph = () => {
        if (paragraph.length) {
          out.push(`<p>${inline(paragraph.join(' '))}</p>`);
          paragraph = [];
        }
      };
      const flushList = () => {
        if (list) {
          out.push(`<${list.type}>${list.items.map(item => `<li>${inline(item)}</li>`).join('')}</${list.type}>`);
          list = null;
        }
      };
      const flushTable = () => {
        if (table && table.length) {
          const [head, ...rows] = table;
          const header = `<thead><tr>${head.map(cell => `<th>${inline(cell)}</th>`).join('')}</tr></thead>`;
          const body = rows.length ? `<tbody>${rows.map(row => `<tr>${row.map(cell => `<td>${inline(cell)}</td>`).join('')}</tr>`).join('')}</tbody>` : '';
          out.push(`<table>${header}${body}</table>`);
        }
        table = null;
      };

      for (const raw of lines) {
        const line = raw.replace(/\s+$/, '');
        if (line.startsWith('```')) {
          flushParagraph(); flushList(); flushTable();
          if (code) {
            out.push(`<pre><code>${escapeHtml(code.lines.join('\n'))}</code></pre>`);
            code = null;
          } else {
            code = { lines: [] };
          }
          continue;
        }
        if (code) { code.lines.push(line); continue; }
        if (!line.trim()) { flushParagraph(); flushList(); flushTable(); continue; }
        if (/^\|.+\|$/.test(line)) {
          flushParagraph(); flushList();
          const cells = line.split('|').slice(1, -1).map(cell => cell.trim());
          const isSep = cells.every(cell => /^:?-{3,}:?$/.test(cell));
          if (!isSep) {
            if (!table) table = [];
            table.push(cells);
          }
          continue;
        }
        flushTable();
        const heading = line.match(/^(#(1, 6))\s+(.+)$/);
        if (heading) {
          flushParagraph(); flushList();
          const level = Math.min(6, heading[1].length + 1);
          out.push(`<h${level}>${inline(heading[2])}</h${level}>`);
          continue;
        }
        if (/^>\s?/.test(line)) {
          flushParagraph(); flushList();
          out.push(`<blockquote>${inline(line.replace(/^>\s?/, '').replace(/^\[!\w+\]\s*/, ''))}</blockquote>`);
          continue;
        }
        const unordered = line.match(/^\s*[-*+]\s+(.+)$/);
        const ordered = line.match(/^\s*\d+\.\s+(.+)$/);
        if (unordered || ordered) {
          flushParagraph();
          const type = unordered ? 'ul' : 'ol';
          if (!list || list.type !== type) flushList();
          if (!list) list = { type, items: [] };
          list.items.push((unordered || ordered)[1]);
          continue;
        }
        paragraph.push(line);
      }
      flushParagraph(); flushList(); flushTable();
      return out.join('\n');
    }

    function filteredPages() {
      const q = state.query.trim().toLowerCase();
      return pages.filter(page => {
        const inCategory = !state.category || page.category === state.category;
        const haystack = `${page.title} ${page.categoryLabel} ${page.tags.join(' ')} ${page.excerpt} ${page.body}`.toLowerCase();
        return inCategory && (!q || haystack.includes(q));
      });
    }

    function renderShell() {
      document.getElementById('categoryNav').innerHTML = [
        `<button class="nav-item ${!state.category ? 'active' : ''}" data-category="">全部内容</button>`,
        ...categories.map(([key, label]) => `<button class="nav-item ${state.category === key ? 'active' : ''}" data-category="${key}"><strong>${escapeHtml(key)}</strong><span class="nav-file-path">${escapeHtml(label)} · ${categoryCounts.get(key)} 篇</span></button>`)
      ].join('');
      const groups = categories.map(([key, label]) => {
        const items = filteredPages().filter(page => page.category === key);
        if (!items.length) return '';
        return `<div class="nav-folder"><strong>${escapeHtml(key)}</strong><span>${escapeHtml(label)} · ${items.length} 篇</span></div>` +
          items.map(page => `<button class="nav-item nav-file ${state.pageId === page.id ? 'active' : ''}" data-page="${page.id}">${escapeHtml(page.fileTitle)}<span class="nav-file-path">${escapeHtml(page.path)}</span></button>`).join('');
      }).join('');
      document.getElementById('pageNav').innerHTML = groups || '<div class="empty">没有找到匹配内容</div>';
      document.querySelectorAll('[data-category]').forEach(btn => btn.onclick = () => {
        state.category = btn.dataset.category;
        state.pageId = '';
        history.replaceState(null, '', location.pathname);
        render();
      });
      document.querySelectorAll('[data-page]').forEach(btn => btn.onclick = () => {
        setPageHash(btn.dataset.page);
      });
    }

    function renderHome() {
      const list = filteredPages();
      const categoryCards = categories.map(([key, label]) => {
        const items = pages.filter(page => page.category === key);
        return `<article class="card" data-category-card="${key}">
          <h4>${label}</h4>
          <p>${escapeHtml(items[0]?.excerpt || '按主题浏览这一组知识节点。')}</p>
          <div class="meta"><span class="pill">${items.length} 篇</span></div>
        </article>`;
      }).join('');
      const pageCards = list.slice(0, 24).map(page => card(page)).join('');
      document.getElementById('crumb').textContent = state.category ? pageByCategory(state.category) : '首页';
      document.getElementById('content').innerHTML = `
        <section class="hero">
          <div>
            <h2>把 AI 学习路径整理成一张可分享的知识地图。</h2>
            <p>从产业、模型公司、Agent、平台、产品到商业模式，按主题进入，沿内部链接继续阅读。</p>
          </div>
          <div class="stats">
            <div class="stat"><strong>${pages.length}</strong><span>知识节点</span></div>
            <div class="stat"><strong>${categories.length}</strong><span>主题分区</span></div>
            <div class="stat"><strong>${pages.reduce((sum, page) => sum + page.links.length, 0)}</strong><span>内部连接</span></div>
          </div>
        </section>
        <div class="section-head"><h3>主题入口</h3><span>按学习路径浏览</span></div>
        <section class="grid">${categoryCards}</section>
        <div class="section-head"><h3>${state.query ? '搜索结果' : '推荐阅读'}</h3><span>${list.length} 篇</span></div>
        <section class="grid">${pageCards || '<div class="empty">没有找到匹配内容</div>'}</section>`;
      document.querySelectorAll('[data-open]').forEach(el => el.onclick = () => setPageHash(el.dataset.open));
      document.querySelectorAll('[data-category-card]').forEach(el => el.onclick = () => {
        state.category = el.dataset.categoryCard;
        render();
      });
    }

    function pageByCategory(key) {
      return categories.find(([id]) => id === key)?.[1] || key;
    }

    function card(page) {
      return `<article class="card" data-open="${page.id}">
        <h4>${escapeHtml(page.title)}</h4>
        <p>${escapeHtml(page.excerpt || '打开阅读完整内容。')}</p>
        <div class="meta"><span class="pill">${escapeHtml(page.category)}</span>${page.updated ? `<span>${escapeHtml(page.updated)}</span>` : ''}</div>
      </article>`;
    }

    function renderArticle(page) {
      document.getElementById('crumb').textContent = `${page.path}`;
      const related = page.links.map(id => pageById.get(id)).filter(Boolean).slice(0, 10);
      document.getElementById('content').innerHTML = `
        <article class="article">
          <h1>${escapeHtml(page.title)}</h1>
          <div class="article-meta">${escapeHtml(page.path)}${page.updated ? ' · ' + escapeHtml(page.updated) : ''}</div>
          ${renderMarkdown(page.body.replace(/^#\s+.+$/m, '').trim())}
        </article>
        <section class="related">
          <h3>关联阅读</h3>
          <div class="related-list">${related.length ? related.map(item => `<button class="btn" data-open="${item.id}">${escapeHtml(item.title)}</button>`).join('') : '<span class="crumb">暂无内部链接</span>'}</div>
        </section>`;
      document.querySelectorAll('[data-open]').forEach(el => el.onclick = () => setPageHash(el.dataset.open));
    }

    function render() {
      state.pageId = getHashPageId();
      renderShell();
      const page = pageById.get(state.pageId);
      if (page) renderArticle(page);
      else renderHome();
    }

    document.getElementById('search').addEventListener('input', event => {
      state.query = event.target.value;
      state.pageId = '';
      history.replaceState(null, '', location.pathname);
      render();
    });
    document.getElementById('homeBtn').onclick = () => { state.pageId = ''; state.category = ''; state.query = ''; document.getElementById('search').value = ''; history.replaceState(null, '', location.pathname); render(); };
    document.getElementById('printBtn').onclick = () => window.print();
    window.addEventListener('hashchange', render);
    render();
  </script>
</body>
</html>
