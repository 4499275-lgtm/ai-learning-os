eTitle": "Felo", "category": "06-Products", "categoryLabel": "AI 产品", "path": "06-Products/Felo.md", "updated": "2026-06-20", "tags": ["AI-Learning-OS", "product", "Search", "Research"], "body": "# Felo\n\n## 一句话定义\n\nFelo 是强调多语言搜索、知识整理和结构化展示的研究型搜索产品。\n\n## 定位\n\n位于 Research Search 层，将网页搜索转化为答案、知识结构和研究材料。\n\n## 时间轴\n\n- 搜索阶段：提供多语言 AI 搜索和答案聚合。\n- 知识阶段：扩展思维导图、主题整理和研究能力。\n\n## 产品矩阵\n\n- 多语言 AI 搜索\n- 知识整理\n- 思维导图\n- 研究与主题页面\n\n## 商业模式\n\n通过免费层、个人订阅和高级研究额度销售知识工作生产力。\n\n## 竞争格局\n\n与 [[Perplexity]]、[[Genspark]]、[[Kimi]] 等研究和搜索产品竞争，差异化重点是多语言与知识结构化。\n\n## 关联节点\n\n- [[Search产品地图]]\n- [[Perplexity]]\n- [[Genspark]]\n- [[Kimi]]\n- [[RAG]]\n\n## 延伸阅读\n\n- [[Search产品地图]]\n- [Felo](https://felo.ai/)\n\n", "excerpt": "Felo 一句话定义 Felo 是强调多语言搜索、知识整理和结构化展示的研究型搜索产品。 定位 位于 Research Search 层，将网页搜索转化为答案、知识结构和研究材料。 时间轴 搜索阶段：提供多语言 AI 搜索和答案聚合。 知识阶段：扩展思维导图、主题整理和研究能力。 产品矩阵 多语言 AI 搜索 知识整理 思维导图 研究与主题页面 商业模式 通...", "links": ["06-Products-Perplexity", "06-Products-Genspark", "06-Products-Kimi", "06-Products-Search产品地图", "03-Agent-RAG"]}, {"id": "06-Products-Gemini", "title": "Gemini", "fileTitle": "Gemini", "category": "06-Products", "categoryLabel": "AI 产品", "path": "06-Products/Gemini.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "product"], "body": "# Gemini\n\n## 一句话定义\n\n> Gemini 是 Google 的多模态 AI 助手与模型产品，深度集成 Google Search、Workspace、Android 和 Google Cloud。\n\n## 定位\n\n- 同时是消费者助手、Google 产品智能层和开发者模型品牌。\n- 差异化来自多模态、搜索、工作套件和移动终端分发。\n\n## 时间轴\n\n| 阶段 | 关键变化 | 意义 |\n|---|---|---|\n| 2023 | Gemini 1.0 与模型品牌发布 | 统一 Google 生成式 AI 产品路线 |\n| 2024 | Gemini 1.5、长上下文与 Workspace 整合 | 从聊天扩展到多模态生产力 |\n| 2025起 | 推理、Live、视频与 Agent 能力 | 向实时多模态助手和行动层演进 |\n\n## 产品矩阵\n\n| 产品 / 能力 | 定位 | 核心价值 |\n|---|---|---|\n| Gemini App | 消费者助手 | 对话、文件、创作、搜索与多模态 |\n| Gemini for Workspace | 企业生产力 | 集成 Gmail、Docs、Sheets、Meet |\n| Gemini Live / Agent | 实时与任务型 AI | 语音、视觉、工具与跨应用操作 |\n\n## 商业模式\n\n- Google One / Gemini 高级套餐销售消费者访问权。\n- Workspace 和 Google Cloud 通过席位、企业套餐与 API 变现。\n\n## 竞争格局\n\n- 与 ChatGPT、Claude、Copilot 和 Perplexity 竞争。\n- 优势是 Google 搜索、Workspace、Android、Cloud 和多模态模型的组合。\n\n## 关联节点\n\n- [[Google_DeepMind]]\n- [[ChatGPT]]\n- [[Claude]]\n- [[Copilot]]\n- [[Agent]]\n\n## 延伸阅读\n\n- [[Search产品地图]]\n- [[ChatGPT、Claude、Gemini、Kimi、豆包产品地图]]\n- [Gemini](https://gemini.google.com/)\n- [Gemini 官方介绍](https://gemini.google.com/overview/)\n", "excerpt": "Gemini 一句话定义 Gemini 是 Google 的多模态 AI 助手与模型产品，深度集成 Google Search、Workspace、Android 和 Google Cloud。 定位 同时是消费者助手、Google 产品智能层和开发者模型品牌。 差异化来自多模态、搜索、工作套件和移动终端分发。 时间轴 产品矩阵 商业模式 Google On...", "links": ["02-Model-Companies-Google_DeepMind", "06-Products-ChatGPT", "06-Products-Claude", "06-Products-Copilot", "10-Concepts-Agent", "06-Products-Search产品地图", "06-Products-ChatGPTClaudeGeminiKimi豆包产品地图"]}, {"id": "06-Products-Genspark", "title": "Genspark", "fileTitle": "Genspark", "category": "06-Products", "categoryLabel": "AI 产品", "path": "06-Products/Genspark.md", "updated": "2026-06-20", "tags": ["AI-Learning-OS", "product", "Search", "Agent"], "body": "# Genspark\n\n## 一句话定义\n\nGenspark 是将搜索、内容聚合、规划与任务执行结合的 Agent Search 产品。\n\n## 定位\n\n位于 Search 与 Agent 的交叉层，从返回答案扩展到生成主题页面和完整任务方案。\n\n## 时间轴\n\n- 搜索阶段：以 Sparkpage 聚合主题信息。\n- Agent 阶段：扩展规划、工具使用和任务执行。\n\n## 产品矩阵\n\n- AI 搜索\n- Sparkpage\n- 研究与规划 Agent\n- 多步骤任务执行\n\n## 商业模式\n\n通过免费体验、个人订阅、高级额度和 Agent 任务套餐变现。\n\n## 竞争格局\n\n与 [[Perplexity]]、[[Felo]]、[[ChatGPT]] Search 和通用研究 Agent 竞争，重点比较任务深度、引用质量与执行能力。\n\n## 关联节点\n\n- [[Search产品地图]]\n- [[Agent]]\n- [[Perplexity]]\n- [[Deep Research]]\n\n## 延伸阅读\n\n- [[Search产品地图]]\n- [Genspark](https://www.genspark.ai/)\n\n", "excerpt": "Genspark 一句话定义 Genspark 是将搜索、内容聚合、规划与任务执行结合的 Agent Search 产品。 定位 位于 Search 与 Agent 的交叉层，从返回答案扩展到生成主题页面和完整任务方案。 时间轴 搜索阶段：以 Sparkpage 聚合主题信息。 Agent 阶段：扩展规划、工具使用和任务执行。 产品矩阵 AI 搜索 Spar...", "links": ["06-Products-Perplexity", "06-Products-Felo", "06-Products-ChatGPT", "06-Products-Search产品地图", "10-Concepts-Agent", "06-Products-Deep-Research"]}, {"id": "06-Products-Kimi", "title": "Kimi", "fileTitle": "Kimi", "category": "06-Products", "categoryLabel": "AI 产品", "path": "06-Products/Kimi.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "product"], "body": "# Kimi\n\n## 一句话定义\n\n> Kimi 是月之暗面面向个人用户的通用 AI 助手，以长文档、搜索、阅读和中文知识工作为早期差异化。\n\n## 定位\n\n- 是 Moonshot 模型的消费者分发入口。\n- 产品方向从长上下文扩展到推理、代码、工具和 Agent。\n\n## 时间轴\n\n| 阶段 | 关键变化 | 意义 |\n|---|---|---|\n| 2023 | Kimi 上线 | 以长文本与文件理解建立产品认知 |\n| 2024 | 长上下文、搜索和用户规模扩展 | 成为国内通用 AI 助手主要竞争者 |\n| 2025起 | 推理、代码与 Agentic 能力 | 向深度工作与开发者生态扩展 |\n\n## 产品矩阵\n\n| 产品 / 能力 | 定位 | 核心价值 |\n|---|---|---|\n| Kimi Chat | 通用助手 | 问答、写作、搜索与文件 |\n| Kimi 深度工作 | 推理与研究 | 复杂问题、多步搜索与结果整理 |\n| Moonshot API | 开发者平台 | 将长上下文和模型能力提供给应用 |\n\n## 商业模式\n\n- Freemium 获客，会员、高级额度和 API 承接收入。\n- 长期可向研究、文档与 Agent 任务的生产力套餐扩展。\n\n## 竞争格局\n\n- 与 ChatGPT、豆包、元宝、文小言和通义竞争。\n- 优势是长文档与中文产品体验，挑战是分发和高成本 Agent 能力。\n\n## 关联节点\n\n- [[月之暗面_Kimi]]\n- [[RAG]]\n- [[Agent]]\n- [[AI订阅经济]]\n- [[AI产品地图]]\n\n## 延伸阅读\n\n- [[Search产品地图]]\n- [[ChatGPT、Claude、Gemini、Kimi、豆包产品地图]]\n- [Kimi](https://www.kimi.com/)\n- [Moonshot 开放平台](https://platform.moonshot.cn/)\n", "excerpt": "Kimi 一句话定义 Kimi 是月之暗面面向个人用户的通用 AI 助手，以长文档、搜索、阅读和中文知识工作为早期差异化。 定位 是 Moonshot 模型的消费者分发入口。 产品方向从长上下文扩展到推理、代码、工具和 Agent。 时间轴 产品矩阵 商业模式 Freemium 获客，会员、高级额度和 API 承接收入。 长期可向研究、文档与 Agent 任...", "links": ["02-Model-Companies-月之暗面_Kimi", "03-Agent-RAG", "10-Concepts-Agent", "07-Business-AI订阅经济", "00-MOC-AI产品地图", "06-Products-Search产品地图", "06-Products-ChatGPTClaudeGeminiKimi豆包产品地图"]}, {"id": "06-Products-Operator", "title": "Operator", "fileTitle": "Operator", "category": "06-Products", "categoryLabel": "AI 产品", "path": "06-Products/Operator.md", "updated": "2026-06-20", "tags": ["AI-Learning-OS", "product", "OpenAI", "Agent", "ComputerUse"], "body": "# Operator\n\n## 一句话定义\n\nOperator 是 [[OpenAI]] 面向网页任务探索的 Computer Use Agent，能够依据用户目标操作浏览器界面。\n\n## 定位\n\n位于 Browser Agent 层，将模型推理转化为点击、输入、导航和表单操作。\n\n## 时间轴\n\n- Chat 阶段：模型主要通过对话提供建议。\n- Agent 阶段：Operator 将能力扩展到网页真实环境中的任务执行。\n\n## 产品矩阵\n\n- 网页视觉理解\n- 鼠标和键盘操作\n- 表单与网站流程\n- 用户确认和安全控制\n\n## 商业模式\n\n作为 OpenAI 高级订阅与 Agent 平台能力，通过套餐、额度和企业服务承接价值。\n\n## 竞争格局\n\n与 [[AutoGLM]]、[[Manus]] 及其他 [[Computer_Use|Computer Use]] Agent 竞争，重点比较成功率、安全性和网站适配。\n\n## 关联节点\n\n- [[OpenAI]]\n- [[Agent产品地图]]\n- [[Computer_Use|Computer Use]]\n- [[Agent]]\n- [[AutoGLM]]\n\n## 延伸阅读\n\n- [[Agent产品地图]]\n- [[Computer Use全景图]]\n- [[OpenAI发展史]]\n\n", "excerpt": "Operator 一句话定义 Operator 是 OpenAI 面向网页任务探索的 Computer Use Agent，能够依据用户目标操作浏览器界面。 定位 位于 Browser Agent 层，将模型推理转化为点击、输入、导航和表单操作。 时间轴 Chat 阶段：模型主要通过对话提供建议。 Agent 阶段：Operator 将能力扩展到网页真实环境...", "links": ["02-Model-Companies-OpenAI", "05-Agent-Runners-AutoGLM", "05-Agent-Runners-Manus", "03-Agent-Computer_Use", "06-Products-Agent产品地图", "10-Concepts-Agent", "03-Agent-Computer-Use全景图"]}, {"id": "06-Products-Perplexity", "title": "Perplexity", "fileTitle": "Perplexity", "category": "06-Products", "categoryLabel": "AI 产品", "path": "06-Products/Perplexity.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "product"], "body": "# Perplexity\n\n## 一句话定义\n\n> Perplexity 是以网络检索、来源引用和直接答案为核心的 AI 答案引擎。\n\n## 定位\n\n- 定位于传统搜索引擎与通用 AI 助手之间。\n- 重点解决信息搜集、来源验证、研究和知识工作。\n\n## 时间轴\n\n| 阶段 | 关键变化 | 意义 |\n|---|---|---|\n| 起点 | 带引用的 AI 搜索 | 用直接答案替代网页列表 |\n| 演进 | Pro Search、文件、多模型和深度研究 | 从搜索走向研究工作台 |\n| Agent 方向 | 任务、浏览器与企业知识 | 从找信息走向完成工作 |\n\n## 产品矩阵\n\n| 产品 / 能力 | 定位 | 核心价值 |\n|---|---|---|\n| Free / Pro | 个人搜索与研究 | 更高额度、模型选择和文件 |\n| Enterprise Pro | 企业知识工作 | 内部搜索、安全、协作与治理 |\n| API | 搜索 / 答案能力 | 为开发者应用提供网络知识 |\n\n## 商业模式\n\n- Pro 订阅、Enterprise 席位和 API 用量构成主要收入。\n- 成本包含网络抓取、检索索引、模型推理和信息授权。\n\n## 竞争格局\n\n- 与 Google Search、ChatGPT Search、Gemini、Claude 和垂直搜索竞争。\n- 壁垒来自搜索质量、引用信任、索引新鲜度和用户研究工作流。\n\n## 关联节点\n\n- [[RAG]]\n- [[ChatGPT]]\n- [[Gemini]]\n- [[AI产品地图]]\n- [[API]]\n\n## 延伸阅读\n\n- [[Search产品地图]]\n- [Perplexity](https://www.perplexity.ai/)\n- [Perplexity Enterprise](https://www.perplexity.ai/enterprise)\n", "excerpt": "Perplexity 一句话定义 Perplexity 是以网络检索、来源引用和直接答案为核心的 AI 答案引擎。 定位 定位于传统搜索引擎与通用 AI 助手之间。 重点解决信息搜集、来源验证、研究和知识工作。 时间轴 产品矩阵 商业模式 Pro 订阅、Enterprise 席位和 API 用量构成主要收入。 成本包含网络抓取、检索索引、模型推理和信息授权。...", "links": ["03-Agent-RAG", "06-Products-ChatGPT", "06-Products-Gemini", "00-MOC-AI产品地图", "07-Business-API", "06-Products-Search产品地图"]}, {"id": "06-Products-Search产品地图", "title": "Search产品地图", "fileTitle": "Search产品地图", "category": "06-Products", "categoryLabel": "AI 产品", "path": "06-Products/Search产品地图.md", "updated": "2026-06-20", "tags": ["AI", "Search", "Research", "Agent"], "body": "# Search产品地图\n\n## 目录\n\n- [[#学习定位]]\n- [[#一句话总结]]\n- [[#为什么 Search 产品重要]]\n- [[#第一部分：Perplexity]]\n- [[#第二部分：Genspark]]\n- [[#第三部分：Felo]]\n- [[#第四部分：Kimi 搜索]]\n- [[#第五部分：ChatGPT Search]]\n- [[#第六部分：Gemini Search]]\n- [[#Search 产品分类地图]]\n- [[#产品能力对比]]\n- [[#Search 产品未来路线]]\n- [[#为什么 Search 会成为 Agent 入口]]\n- [[#关联节点]]\n- [[#核心结论]]\n\n## 学习定位\n\n很多人认为搜索产品只是“Google + AI”，实际上 AI 搜索正在成为 Agent 时代的入口。\n\n过去由用户自己搜索，未来更多搜索步骤会由 Agent 完成。因此，搜索产品正在演进为 AI 时代的信息入口与浏览器层。\n\n---\n\n# 一句话总结\n\n- [[Perplexity]]：以答案和引用为核心的 AI 搜索产品\n- [[Genspark]]：强调规划和页面生成的 Agent Search\n- [[Felo]]：知识发现与多语言研究引擎\n- [[Kimi]] 搜索：中文长文本与阅读型搜索\n- [[ChatGPT]] Search：OpenAI 的搜索与 Agent 入口\n- [[Gemini]] Search：Google 搜索生态的 AI 升级入口\n\n---\n\n# 为什么 Search 产品重要\n\nAI 搜索产品的发展路径：\n\n```text\n搜索 → 问答 → 研究 → Agent\n```\n\n搜索产品是用户从信息查询进入研究型 Agent 的自然起点。\n\n---\n\n# 第一部分：Perplexity\n\n## 所属公司\n\nPerplexity AI。\n\n## 一句话定义\n\n以引用式答案挑战传统搜索体验的 AI 搜索引擎。\n\n## 产品定位\n\nAI 搜索引擎。\n\n## 核心能力\n\n- 搜索\n- 问答\n- 引用来源\n- 深度研究\n\n## 工作方式\n\n面对“美国关税政策影响是什么”等问题，Perplexity 会搜索、聚合、标注来源并生成答案。\n\n## 最大特点\n\n答案附带来源，便于用户检查信息依据。\n\n## 本质\n\n```text\nSearch + LLM + Citations\n```\n\n## 优势\n\n- 搜索与问答体验完整\n- 来源引用清晰\n- 研究流程成熟\n\n## 缺点\n\n- 通用任务执行能力仍需扩展\n- 主要价值仍集中在信息获取与研究\n\n## 本质定位\n\nAI 搜索引擎。\n\n---\n\n# 第二部分：Genspark\n\n## 所属公司\n\nMainFunc。\n\n## 一句话定义\n\nAgent Search。\n\n## 产品定位\n\n搜索 Agent。\n\n## 核心能力\n\n- 搜索\n- 规划\n- 执行\n- 汇总\n\n## 工作方式\n\n面对“规划东京五日游”等目标，Genspark 可以搜索、整理、规划并生成完整方案。\n\n## 最大特点\n\n强调 Sparkpage，围绕用户主题自动生成聚合页面。\n\n## 本质\n\n```text\nSearch + Agent\n```\n\n## 优势\n\n- Agent 感强\n- 任务导向明显\n\n## 缺点\n\n- 生态规模较小\n- 市场认知仍需扩大\n\n## 本质定位\n\n研究 Agent。\n\n---\n\n# 第三部分：Felo\n\n## 所属公司\n\nFelo Inc.\n\n## 一句话定义\n\n知识发现引擎。\n\n## 产品定位\n\nResearch Search。\n\n## 核心能力\n\n- 搜索\n- 知识整理\n- 多语言研究\n- 思维导图\n\n## 最大特点\n\n强调知识结构化，适合学习、研究和行业分析。\n\n## 本质\n\n```text\nSearch + Knowledge\n```\n\n## 优势\n\n- 知识组织能力突出\n- 多语言研究体验较强\n\n## 缺点\n\n- 大众用户规模相对有限\n- 品牌影响力仍需提升\n\n## 本质定位\n\n知识研究助手。\n\n---\n\n# 第四部分：Kimi 搜索\n\n## 所属公司\n\n[[月之暗面_Kimi|月之暗面]]。\n\n## 一句话定义\n\n中文长文本搜索助手。\n\n## 产品定位\n\n阅读型搜索。\n\n## 核心能力\n\n- 长文本\n- PDF 阅读\n- 联网搜索\n- 信息整理\n\n## 最大特点\n\n长上下文和中文阅读体验。\n\n## 本质\n\n```text\nSearch + Reader\n```\n\n## 优势\n\n- 中文体验良好\n- 长文档处理能力突出\n\n## 缺点\n\n- Agent 执行能力仍需扩展\n- 国际化能力相对较弱\n\n## 本质定位\n\nAI 阅读搜索器。\n\n---\n\n# 第五部分：ChatGPT Search\n\n## 所属公司\n\n[[OpenAI]]。\n\n## 一句话定义\n\nOpenAI 的搜索入口。\n\n## 产品定位\n\n与 ChatGPT 深度融合的 AI 搜索助手。\n\n## 核心能力\n\n- 联网搜索\n- 问答\n- [[Deep Research]]\n\n## 最大特点\n\n搜索不是孤立产品，而是 ChatGPT 研究和 Agent 能力的入口。\n\n## 本质\n\n```text\nSearch + Agent Platform\n```\n\n## 优势\n\n- 用户分发能力强\n- 可与 OpenAI 模型和工具协同\n\n## 缺点\n\n- 专业搜索体验需要与 Perplexity 等垂直产品持续竞争\n\n## 本质定位\n\nAgent 入口。\n\n---\n\n# 第六部分：Gemini Search\n\n## 所属公司\n\n[[Google_DeepMind|Google]]。\n\n## 一句话定义\n\nGoogle 搜索的 AI 升级入口。\n\n## 产品定位\n\nGoogle AI 搜索与助手体验。\n\n## 核心能力\n\n- 搜索\n- Workspace\n- 多模态\n\n## 最大特点\n\n继承 Google 搜索基础设施，并与 Gemini 和 Google 产品生态协同。\n\n## 本质\n\n```text\nGoogle Search + Gemini\n```\n\n## 优势\n\n- 搜索基础设施和内容覆盖广\n- 与 Workspace、Android 和 Cloud 生态结合\n\n## 缺点\n\n- 需要协调传统搜索业务与生成式 AI 产品体验\n- 产品演进相对审慎\n\n## 本质定位\n\nGoogle 未来的信息入口。\n\n---\n\n# Search 产品分类地图\n\n## 第一类：AI Search\n\n代表：\n\n- [[Perplexity]]\n- [[Gemini]] Search\n\n特点：搜索增强与答案生成。\n\n## 第二类：Research Search\n\n代表：\n\n- [[Felo]]\n- [[Kimi]]\n\n特点：知识研究与结构化整理。\n\n## 第三类：Agent Search\n\n代表：\n\n- [[Genspark]]\n- [[ChatGPT]] Search\n- [[Deep Research]]\n\n特点：搜索、规划和执行结合。\n\n---\n\n# 产品能力对比\n\n| 产品 | 定位 | 最大优势 |\n|---|---|---|\n| [[Perplexity]] | AI 搜索 | 来源引用 |\n| [[Genspark]] | Agent 搜索 | 自动规划 |\n| [[Felo]] | 知识搜索 | 结构化知识 |\n| [[Kimi]] 搜索 | 阅读搜索 | 长文本 |\n| [[ChatGPT]] Search | Agent 入口 | 与 ChatGPT 融合 |\n| [[Gemini]] Search | Google 搜索升级 | 搜索与生态基础设施 |\n\n---\n\n# 用一张图理解\n\n```text\nPerplexity    = AI 搜索引擎\nGenspark      = 搜索 Agent\nFelo          = 知识研究员\nKimi          = 阅读助手\nChatGPT Search = Agent 入口\nGemini Search  = Google 未来入口\n```\n\n---\n\n# Search 产品未来路线\n\n```text\n搜索网页 → 搜索答案 → 搜索知识 → 完成研究 → 完成任务\n```\n\n最终演进方向：\n\n```text\nSearch → Research → Agent\n```\n\n---\n\n# 为什么 Search 会成为 Agent 入口\n\nAgent 需要持续获取、验证和更新信息，搜索能力天然是 Agent 基础设施。\n\n未来用户可能不再说“帮我搜索”，而是说“帮我完成”。搜索将成为 Agent 执行过程中的一个步骤。\n\n---\n\n# 知识图谱位置\n\n```text\n06-Products\n├── Chat产品地图\n├── Coding产品地图\n├── Search产品地图\n├── Agent产品地图\n└── Workflow产品地图\n```\n\n---\n\n# 关联节点\n\n- [[Perplexity]]\n- [[Genspark]]\n- [[Felo]]\n- [[Kimi]]\n- [[ChatGPT]]\n- [[Gemini]]\n- [[Agent]]\n- [[Deep Research]]\n- [[OpenAI_Anthropic_智谱三条路线演化对比#OpenAI 路线|OpenAI路线]]\n- [[Google_DeepMind|Google路线]]\n- [[AI产品地图]]\n\n---\n\n# 核心结论\n\n搜索产品正在经历：\n\n```text\nGoogle → AI Search → Research → Agent\n```\n\n未来竞争不再是谁找到网页，而是谁能够理解问题、整合知识、执行任务并最终交付结果。\n\n", "excerpt": "Search产品地图 目录 #学习定位 #一句话总结 #为什么 Search 产品重要 #第一部分：Perplexity #第二部分：Genspark #第三部分：Felo #第四部分：Kimi 搜索 #第五部分：ChatGPT Search #第六部分：Gemini Search #Search 产品分类地图 #产品能力对比 #Search 产品未来路线 ...", "links": ["06-Products-Perplexity", "06-Products-Genspark", "06-Products-Felo", "06-Products-Kimi", "06-Products-ChatGPT", "06-Products-Gemini", "02-Model-Companies-月之暗面_Kimi", "02-Model-Companies-OpenAI", "06-Products-Deep-Research", "02-Model-Companies-Google_DeepMind", "10-Concepts-Agent", "02-Model-Companies-OpenAI_Anthropic_智谱三条路线演化对比", "00-MOC-AI产品地图"]}, {"id": "06-Products-Windsurf", "title": "Windsurf", "fileTitle": "Windsurf", "category": "06-Products", "categoryLabel": "AI 产品", "path": "06-Products/Windsurf.md", "updated": "2026-06-20", "tags": ["AI-Learning-OS", "product", "AI-IDE", "Coding"], "body": "# Windsurf\n\n## 一句话定义\n\nWindsurf 是强调 Agent First 工作方式的 AI 开发环境。\n\n## 定位\n\n位于 Agent IDE 层，通过编辑器、项目上下文和 Cascade Agent 组合代码生成与多步骤执行。\n\n## 时间轴\n\n- Codeium 阶段：以 AI 编码辅助和补全服务开发者。\n- Windsurf 阶段：强化 Agent IDE 与主动执行体验。\n\n## 产品矩阵\n\n- AI 补全\n- Cascade Agent\n- 项目理解\n- 多文件修改与代码生成\n\n## 商业模式\n\n通过个人订阅、团队与企业方案销售 AI 开发生产力和使用额度。\n\n## 竞争格局\n\n主要与 [[Cursor]]、GitHub Copilot、[[Cline]] 和其他 AI IDE 竞争，重点比较 Agent 自主性、编辑体验和生态整合。\n\n## 关联节点\n\n- [[Coding产品地图]]\n- [[Cursor]]\n- [[Agent]]\n- [[Cline]]\n- [[Claude Code]]\n\n## 延伸阅读\n\n- [[Coding产品地图]]\n- [Windsurf](https://windsurf.com/)\n\n", "excerpt": "Windsurf 一句话定义 Windsurf 是强调 Agent First 工作方式的 AI 开发环境。 定位 位于 Agent IDE 层，通过编辑器、项目上下文和 Cascade Agent 组合代码生成与多步骤执行。 时间轴 Codeium 阶段：以 AI 编码辅助和补全服务开发者。 Windsurf 阶段：强化 Agent IDE 与主动执行体验...", "links": ["06-Products-Cursor", "05-Agent-Runners-Cline", "06-Products-Coding产品地图", "10-Concepts-Agent"]}, {"id": "06-Products-WorkBuddy", "title": "WorkBuddy", "fileTitle": "WorkBuddy", "category": "06-Products", "categoryLabel": "AI 产品", "path": "06-Products/WorkBuddy.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "product"], "body": "# WorkBuddy\n\n## 一句话定义\n\n> WorkBuddy 在本知识库中作为“企业 AI 工作伙伴”产品类别节点，关注会议、文档、知识库和业务流程。\n\n## 定位\n\n- 名称可对应不同厂商产品，在引入具体产品前应核验官网、厂商与版本。\n- 不将未核验的产品归属、定价或时间轴写为事实。\n\n## 时间轴\n\n| 阶段 | 关键变化 | 意义 |\n|---|---|---|\n| 产品识别 | 确认厂商、官网、数据边界和客户群 | 避免同名产品混淆 |\n| 能力评估 | 会议、文档、搜索、RAG 与 Workflow | 确定其是助手还是 Agent |\n| 商业评估 | 座席、用量、企业合同与治理 | 判断真实价值与迁移成本 |\n\n## 产品矩阵\n\n| 产品 / 能力 | 定位 | 核心价值 |\n|---|---|---|\n| Knowledge Assistant | 企业搜索与问答 | 连接文档、制度和项目知识 |\n| Meeting Assistant | 会议工作流 | 记录、摘要、待办与跟进 |\n| Workflow Agent | 业务执行 | 连接邮件、表格、CRM 与协作系统 |\n\n## 商业模式\n\n- 这类产品通常按席位、使用量、高级连接器和企业合同收费。\n- 核心价值来自节省知识工作时间与提高流程完成率。\n\n## 竞争格局\n\n- 与 Microsoft 365 Copilot、Gemini for Workspace、Notion AI 和企业搜索产品竞争。\n- 评估壁垒应关注企业连接器、权限、数据隔离和工作流深度。\n\n## 关联节点\n\n- [[Copilot]]\n- [[RAG]]\n- [[Workflow]]\n- [[SaaS]]\n- [[AI产品地图]]\n\n## 延伸阅读\n\n- [[官网索引]]\n- [[AI资讯来源]]\n", "excerpt": "WorkBuddy 一句话定义 WorkBuddy 在本知识库中作为“企业 AI 工作伙伴”产品类别节点，关注会议、文档、知识库和业务流程。 定位 名称可对应不同厂商产品，在引入具体产品前应核验官网、厂商与版本。 不将未核验的产品归属、定价或时间轴写为事实。 时间轴 产品矩阵 商业模式 这类产品通常按席位、使用量、高级连接器和企业合同收费。 核心价值来自节省...", "links": ["06-Products-Copilot", "03-Agent-RAG", "03-Agent-Workflow", "07-Business-SaaS", "00-MOC-AI产品地图", "99-Resources-官网索引", "99-Resources-AI资讯来源"]}, {"id": "06-Products-Workflow产品地图", "title": "Workflow产品地图", "fileTitle": "Workflow产品地图", "category": "06-Products", "categoryLabel": "AI 产品", "path": "06-Products/Workflow产品地图.md", "updated": "2026-06-20", "tags": ["AI", "Workflow", "Agent", "RAG"], "body": "# Workflow产品地图\n\n## 目录\n\n- [[#学习定位]]\n- [[#一句话总结]]\n- [[#为什么 Workflow 平台重要]]\n- [[#什么是 Workflow]]\n- [[#第一部分：Coze]]\n- [[#第二部分：Dify]]\n- [[#第三部分：n8n]]\n- [[#第四部分：LangGraph]]\n- [[#第五部分：Flowise]]\n- [[#第六部分：LangFlow]]\n- [[#第七部分：FastGPT]]\n- [[#第八部分：MaxKB]]\n- [[#Workflow 产品分类地图]]\n- [[#Workflow 能力对比]]\n- [[#Agent 工厂与 Agent 执行器]]\n- [[#Workflow 未来路线]]\n- [[#关联节点]]\n- [[#核心结论]]\n\n## 学习定位\n\nWorkflow 平台是学习 AI 时最容易混淆的产品类别之一。[[Coze]]、[[Dify]]、[[n8n]]、[[LangGraph]]、[[Flowise]]、[[LangFlow]]、[[FastGPT]]、[[MaxKB]] 看起来都在做 Agent，实际上它们分别属于低代码平台、自动化引擎、Agent Runtime 和 RAG 平台。\n\n更准确地说，多数 Workflow 平台是“Agent 工厂”，而不是直接执行具体任务的“Agent 员工”。\n\n理解 Workflow 产品，本质上是在理解 AI 应用如何被制造、连接和运行。\n\n---\n\n# 一句话总结\n\n- [[Coze]]：面向业务用户的低代码 Agent 工厂\n- [[Dify]]：企业级 AI 应用与 Agent 工厂\n- [[n8n]]：自动化流水线\n- [[LangGraph]]：Agent Runtime 与编排框架\n- [[Flowise]]：可视化 LangChain 开发平台\n- [[LangFlow]]：可视化 Agent 开发工具\n- [[FastGPT]]：知识库与 RAG 应用平台\n- [[MaxKB]]：企业知识库平台\n\n---\n\n# 为什么 Workflow 平台重要\n\nAI 应用可以抽象为三类能力：\n\n```text\n模型层 → Agent 层 → Workflow 层\n```\n\n- 模型负责思考\n- Agent 负责执行\n- Workflow 负责编排\n\n因此，Workflow 本质上是 AI 时代的流程流水线。\n\n---\n\n# 什么是 Workflow\n\n例如，用户提出“帮我分析市场”，Workflow 可以按固定流程运行：\n\n```text\n搜索 → 整理 → 总结 → 生成报告\n```\n\n每一步由系统预先定义。因此：\n\n```text\nWorkflow = 预定义流程\nAgent = 面向目标的动态决策与执行\n```\n\n---\n\n# 第一部分：Coze\n\n## 所属公司\n\n字节跳动。\n\n## 一句话定义\n\n面向业务用户的低代码 Agent Builder。\n\n## 产品定位\n\n低代码 AI 应用和 Agent 平台。\n\n## 核心能力\n\n- Workflow\n- 插件\n- Bot\n- 知识库\n\n## 工作方式\n\n通过拖拽节点组合搜索、知识库、大模型和输出步骤。\n\n## 本质\n\n```text\nLow-code Agent Factory\n```\n\n## 优势\n\n- 上手简单\n- 插件和渠道生态丰富\n- 适合业务人员快速搭建应用\n\n## 缺点\n\n- 高度复杂或深度定制的 Agent 需要更多工程能力\n\n## 本质定位\n\n可视化 AI 应用制作工具。\n\n---\n\n# 第二部分：Dify\n\n## 所属团队\n\nLangGenius。\n\n## 一句话定义\n\n企业级 AI 应用工厂。\n\n## 产品定位\n\nAI 应用开发与运营平台。\n\n## 核心能力\n\n- Workflow\n- [[RAG]]\n- [[Agent]]\n- API\n\n## 最大特点\n\n强调开源、企业部署和从开发到运营的完整能力。\n\n## 本质\n\n```text\nEnterprise AI Application Platform\n```\n\n## 优势\n\n- 企业应用广泛\n- 支持私有部署\n- 开源生态成熟\n\n## 缺点\n\n- 完整掌握平台能力存在学习曲线\n\n## 本质定位\n\n企业 Agent 工厂与 AI 中台。\n\n---\n\n# 第三部分：n8n\n\n## 所属公司\n\nn8n GmbH。\n\n## 一句话定义\n\n自动化流水线平台。\n\n## 产品定位\n\nWorkflow Automation。\n\n## 核心能力\n\n连接邮件、数据库、CRM、API 和 AI 模型，编排跨系统自动化流程。\n\n## 最大特点\n\n拥有丰富的系统集成，并支持自托管和可编程节点。\n\n## 本质\n\n```text\nAutomation Workflow Engine\n```\n\n## 优势\n\n- 自动化能力强\n- 集成丰富\n- 可自托管\n\n## 缺点\n\n- AI 只是其能力组成之一，并非全部产品核心\n\n## 本质定位\n\n业务自动化流水线。\n\n---\n\n# 第四部分：LangGraph\n\n> 深入课程：[[LangGraph全景图]]\n\n## 所属团队\n\nLangChain。\n\n## 一句话定义\n\n支持状态、循环和持久执行的 Agent 编排框架。\n\n## 产品定位\n\nAgent Runtime。\n\n## 核心能力\n\n- 状态管理\n- Multi-Agent\n- 长流程\n- 循环、回退和人工介入\n\n## 最大特点\n\n支持 Agent 循环，而不只是线性 Workflow。\n\n## 本质\n\n```text\nStateful Agent Runtime\n```\n\n## 优势\n\n- 适合复杂 Agent\n- 可表达循环、状态和长任务\n\n## 缺点\n\n- 开发门槛高于可视化低代码平台\n\n## 本质定位\n\nAgent 内核。\n\n---\n\n# 第五部分：Flowise\n\n## 所属团队\n\n开源社区。\n\n## 一句话定义\n\n可视化 LangChain 应用开发平台。\n\n## 产品定位\n\n拖拽式 AI 开发。\n\n## 核心能力\n\n- LangChain 组件\n- RAG\n- Workflow\n- 模型和工具连接\n\n## 本质\n\n```text\nLow-code AI Platform\n```\n\n## 优势\n\n- 简单直观\n- 开源\n- 原型开发快\n\n## 缺点\n\n- 复杂生产场景需要代码和运维能力补充\n\n---\n\n# 第六部分：LangFlow\n\n## 所属团队\n\nLangFlow 社区与团队。\n\n## 一句话定义\n\n可视化 Agent 开发平台。\n\n## 产品定位\n\nAgent 与 Flow 设计器。\n\n## 核心能力\n\n- Agent 设计\n- Flow 设计\n- 多模型连接\n- 组件化开发\n\n## 本质\n\n```text\nVisual Agent Builder\n```\n\n## 优势\n\n- 适合学习和实验\n- 原型开发快\n\n## 缺点\n\n- 生产部署仍需治理、观测和工程配套\n\n---\n\n# 第七部分：FastGPT\n\n## 所属团队\n\nFastGPT 团队。\n\n## 一句话定义\n\n知识库机器人与 RAG 应用平台。\n\n## 产品定位\n\n中文 RAG 平台。\n\n## 核心能力\n\n- 知识库\n- RAG\n- Workflow\n- AI 问答应用\n\n## 最大特点\n\n围绕中文知识库问答、部署和应用编排形成完整体验。\n\n## 本质\n\n```text\nEnterprise Q&A Platform\n```\n\n## 优势\n\n- 部署和使用相对直接\n- 中文生态友好\n\n## 缺点\n\n- 通用自主 Agent 能力不是主要定位\n\n---\n\n# 第八部分：MaxKB\n\n## 所属团队\n\n1Panel。\n\n## 一句话定义\n\n企业知识库平台。\n\n## 产品定位\n\nRAG 系统与企业问答入口。\n\n## 核心能力\n\n- 文档管理\n- 知识库\n- AI 问答\n\n## 本质\n\n```text\nEnterprise Knowledge Platform\n```\n\n## 优势\n\n- 企业知识场景清晰\n- 部署相对简单\n\n## 缺点\n\n- Workflow 和通用 Agent 能力相对有限\n\n---\n\n# Workflow 产品分类地图\n\n## 第一类：Agent 工厂\n\n代表：[[Coze]]、[[Dify]]。\n\n特点：生产和配置 Agent 应用。\n\n## 第二类：自动化平台\n\n代表：[[n8n]]。\n\n特点：连接系统并执行自动化流程。\n\n## 第三类：Agent 内核\n\n代表：[[LangGraph]]。\n\n特点：提供 Agent 状态和运行框架。\n\n## 第四类：低代码平台\n\n代表：[[Flowise]]、[[LangFlow]]。\n\n特点：拖拽式 AI 应用开发。\n\n## 第五类：知识库平台\n\n代表：[[FastGPT]]、[[MaxKB]]。\n\n特点：RAG、文档与企业问答。\n\n---\n\n# Workflow 能力对比\n\n| 产品 | 类型 | 核心定位 |\n|---|---|---|\n| [[Coze]] | Agent 工厂 | 低代码 Agent |\n| [[Dify]] | 企业 Agent 工厂 | AI 应用中台 |\n| [[n8n]] | 自动化平台 | 流程引擎 |\n| [[LangGraph]] | Agent 内核 | Agent Runtime |\n| [[Flowise]] | 低代码平台 | LangChain 可视化 |\n| [[LangFlow]] | Agent 设计器 | 可视化 Agent 开发 |\n| [[FastGPT]] | RAG 平台 | 企业问答 |\n| [[MaxKB]] | 知识库平台 | 企业知识库 |\n\n---\n\n# 用一张图理解\n\n```text\nCoze      = 可视化积木\nDify      = 企业 AI 工厂\nn8n       = 自动化流水线\nLangGraph = Agent 引擎\nFlowise   = 拖拽式 LangChain 工具\nLangFlow  = Agent 设计器\nFastGPT   = 企业问答平台\nMaxKB     = 企业知识库\n```\n\n---\n\n# Agent 工厂与 Agent 执行器\n\n这是最重要的区别。\n\n**Agent 工厂**：[[Coze]]、[[Dify]]、[[LangFlow]]，作用是设计和制造 Agent。\n\n**Agent 执行器**：[[Claude Code]]、[[Devin]]、[[Manus]]、[[OpenHands]]，作用是执行具体任务。\n\n```text\nWorkflow 平台 → 配置 Agent → Agent 执行器 → 完成任务\n```\n\n---\n\n# Workflow 未来路线\n\n```text\n流程自动化 → AI Workflow → Agent Workflow → Multi-Agent Workflow → Digital Workforce\n```\n\n---\n\n# 为什么 Dify 和 Coze 不是单一 Agent\n\nDify 和 Coze 更接近 Agent 制造与运行平台。具体 Agent 执行时，背后可能调用 Claude、OpenAI、GLM 等模型和工具。\n\n因此，平台本身与平台中运行的 Agent 实例需要分开理解。\n\n---\n\n# 知识图谱位置\n\n```text\n06-Products\n├── Chat产品地图\n├── Coding产品地图\n├── Search产品地图\n├── Agent产品地图\n└── Workflow产品地图\n```\n\n---\n\n# 关联节点\n\n- [[Coze]]\n- [[Dify]]\n- [[n8n]]\n- [[LangGraph]]\n- [[Flowise]]\n- [[LangFlow]]\n- [[FastGPT]]\n- [[MaxKB]]\n- [[Workflow]]\n- [[Agent]]\n- [[RAG]]\n- [[MCP]]\n- [[Claude Code]]\n- [[Manus]]\n- [[AI产品地图]]\n\n---\n\n# 核心结论\n\nWorkflow 平台不是单一 Agent，而是 Agent 制造、编排和运行系统。\n\n未来 AI 产业可能形成：\n\n```text\n模型公司 → Agent 执行器 → Workflow 工厂 → 企业应用\n```\n\nCoze、Dify、LangGraph 等产品处于关键的 Agent 工厂与运行层。\n", "excerpt": "Workflow产品地图 目录 #学习定位 #一句话总结 #为什么 Workflow 平台重要 #什么是 Workflow #第一部分：Coze #第二部分：Dify #第三部分：n8n #第四部分：LangGraph #第五部分：Flowise #第六部分：LangFlow #第七部分：FastGPT #第八部分：MaxKB #Workflow 产品分类地...", "links": ["04-Platforms-Coze", "04-Platforms-Dify", "04-Platforms-n8n", "04-Platforms-LangGraph", "04-Platforms-Flowise", "04-Platforms-LangFlow", "04-Platforms-FastGPT", "04-Platforms-MaxKB", "03-Agent-RAG", "10-Concepts-Agent", "04-Platforms-LangGraph全景图", "06-Products-Devin", "05-Agent-Runners-Manus", "05-Agent-Runners-OpenHands", "03-Agent-Workflow", "03-Agent-MCP", "00-MOC-AI产品地图"]}, {"id": "06-Products-元宝", "title": "元宝", "fileTitle": "元宝", "category": "06-Products", "categoryLabel": "AI 产品", "path": "06-Products/元宝.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "product"], "body": "# 元宝\n\n## 一句话定义\n\n> 元宝是腾讯面向个人用户的通用 AI 助手，与混元模型、微信生态、腾讯文档和搜索内容协同。\n\n## 定位\n\n- 定位于腾讯消费者 AI 入口。\n- 重点场景包括对话、搜索、文件、创作、图像与社交生态连接。\n\n## 时间轴\n\n| 阶段 | 关键变化 | 意义 |\n|---|---|---|\n| 产品起点 | 混元模型的消费者助手 | 建立腾讯统一 AI 入口 |\n| 能力扩展 | 文件、搜索、图像和深度思考 | 从聊天扩展到知识工作 |\n| 生态集成 | 腾讯系内容与微信场景 | 利用社交与内容分发形成差异化 |\n\n## 产品矩阵\n\n| 产品 / 能力 | 定位 | 核心价值 |\n|---|---|---|\n| 元宝 App | 通用 AI 助手 | 对话、搜索、文件、创作和多模态 |\n| 混元模型 | 底层模型 | 通用、推理、图像、视频与代码 |\n| 腾讯生态连接 | 分发与数据 | 连接文档、内容、社交和企业服务 |\n\n## 商业模式\n\n- Freemium 获客，长期可通过会员、高级能力、广告 / 内容协同和云 API 变现。\n- 元宝也能为腾讯云混元和企业 AI 带来消费者反馈与品牌。\n\n## 竞争格局\n\n- 与豆包、Kimi、文小言、通义和 ChatGPT 竞争。\n- 优势是微信 / 腾讯内容生态和云产品协同。\n\n## 关联节点\n\n- [[AI产品地图]]\n- [[豆包]]\n- [[Kimi]]\n- [[RAG]]\n- [[Agent]]\n\n## 延伸阅读\n\n- [腾讯元宝](https://yuanbao.tencent.com/)\n- [腾讯混元](https://hunyuan.tencent.com/)\n", "excerpt": "元宝 一句话定义 元宝是腾讯面向个人用户的通用 AI 助手，与混元模型、微信生态、腾讯文档和搜索内容协同。 定位 定位于腾讯消费者 AI 入口。 重点场景包括对话、搜索、文件、创作、图像与社交生态连接。 时间轴 产品矩阵 商业模式 Freemium 获客，长期可通过会 与学习 |\n| 多模态创作 | 图像 / 视频 / 语音 | 降低内容生产门槛 |\n| 火山方舟 | 企业模型平台 | 将豆包模型与 Agent 能力提供给开发者 |\n\n## 商业模式\n\n- Freemium 与消费者会员承接个人收入，火山引擎 API 和企业服务承接 B2B 收入。\n- AI 亦可提升字节内容与广告生态的创作、推荐和转化效率。\n\n## 竞争格局\n\n- 与 Kimi、元宝、文小言、通义和 ChatGPT 竞争。\n- 优势是用户分发、内容生态、语音与多模态产品化。\n\n## 关联节点\n\n- [[AI产品地图]]\n- [[Kimi]]\n- [[元宝]]\n- [[RAG]]\n- [[Agent]]\n\n## 延伸阅读\n\n- [[ChatGPT、Claude、Gemini、Kimi、豆包产品地图]]\n- [豆包](https://www.doubao.com/)\n- [火山方舟](https://www.volcengine.com/product/ark)\n", "excerpt": "豆包 一句话定义 豆包是字节跳动面向大众用户的通用 AI 助手与多模态创作入口。 定位 依托字节跳动的消费者产品、内容生态与火山引擎模型服务。 覆盖对话、语音、图像、视频、写作、搜索和学习场景。 时间轴 产品矩阵 商业模式 Freemium 与消费者会员承接个人收入，火山引擎 API 和企业服务承接 B2B 收入。 AI 亦可提升字节内容与广告生态的创作、推...", "links": ["00-MOC-AI产品地图", "06-Products-Kimi", "06-Products-元宝", "03-Agent-RAG", "10-Concepts-Agent", "06-Products-ChatGPTClaudeGeminiKimi豆包产品地图"]}, {"id": "07-Business-AI商业模式全景图", "title": "AI商业模式全景图", "fileTitle": "AI商业模式全景图", "category": "07-Business", "categoryLabel": "商业模式", "path": "07-Business/AI商业模式全景图.md", "updated": "2026-06-17", "tags": ["AI", "BusinessModel", "AIEconomics"], "body": "# AI商业模式全景图\n\n## 目录\n\n- [[#一、为什么必须研究 AI 商业模式|一、为什么必须研究 AI 商业模式]]\n- [[#二、AI 产业的收入来源|二、AI 产业的收入来源]]\n- [[#三、Token 经济学|三、Token 经济学]]\n- [[#四、为什么 API 模式会出现问题|四、为什么 API 模式会出现问题]]\n- [[#五、Subscription 模式|五、Subscription 模式]]\n- [[#六、为什么订阅模式成功|六、为什么订阅模式成功]]\n- [[#七、Credits 模式|七、Credits 模式]]\n- [[#八、为什么 Credits 流行|八、为什么 Credits 流行]]\n- [[#九、Coding Plan 模式|九、Coding Plan 模式]]\n- [[#十、为什么 Coding Plan 出现|十、为什么 Coding Plan 出现]]\n- [[#十一、Enterprise 模式|十一、Enterprise 模式]]\n- [[#十二、Agent Service 模式|十二、Agent Service 模式]]\n- [[#十三、AI 商业模式演进路线|十三、AI 商业模式演进路线]]\n- [[#十四、OpenAI 路线|十四、OpenAI 路线]]\n- [[#十五、Anthropic 路线|十五、Anthropic 路线]]\n- [[#十六、智谱路线|十六、智谱路线]]\n- [[#十七、未来推演|十七、未来推演]]\n- [[#十八、知识图谱位置|十八、知识图谱位置]]\n- [[#核心结论|核心结论]]\n- [[#关联节点|关联节点]]\n- [[#延伸阅读|延伸阅读]]\n- [[#待研究问题|待研究问题]]\n\n## 一、为什么必须研究 AI 商业模式\n\n很多人研究 AI 时，关注：\n\n- 模型能力\n- [[Agent基础|Agent]] 能力\n- 编码能力\n\n却忽略了一个核心问题：**谁为 AI 买单？**\n\n事实上，AI 产业的发展速度，很大程度由商业模式决定。例如：\n\n- [[OpenAI]] 为什么推出 Plus？\n- [[Anthropic|Claude]] 为什么推出 Max？\n- [[智谱AI|智谱]] 为什么推出 [[GLM Coding]]？\n- [[Coze]] 为什么卖 [[Credits]]？\n\n这些问题本质上都属于 **AI Economics（AI 经济学）**。\n\n## 二、AI 产业的收入来源\n\n目前 AI 公司的收入主要来自五类：\n\n```text\nAPI + Subscription + Credits + Enterprise + Agent Services\n```\n\n### 第一类：API 模式\n\n代表：\n\n- OpenAI API\n- Claude API\n- GLM API\n- Gemini API\n\n逻辑是**按使用量收费**：\n\n```text\n开发者调用 GPT\n        ↓\n     产生 Token\n        ↓\n       付费\n```\n\n这类似水费、电费和云计算费用。\n\n| 优点 | 缺点 |\n|---|---|\n| 精确计费、按需使用 | 费用不可预测 |\n\n这是 AI 产业最早的收费模式。\n\n## 三、Token 经济学\n\n[[Token]] 是 AI 行业的基础货币。\n\n它的本质是计算量，而不是文字数量。模型公司真正出售的是 GPU 推理能力，用户看到的是 Token。\n\n```text\nToken ≈ 算力 ≈ 成本\n```\n\n## 四、为什么 API 模式会出现问题\n\nChat 时代，问题不大：\n\n```text\n一次提问 → 一次回答\n```\n\nAgent 时代则变成：\n\n```text\n一次任务 → 几十次调用 → 几百次调用\n```\n\n于是用户发现费用不可预测。这也是很多 Agent 项目最终超预算的原因。\n\n## 五、Subscription 模式\n\n[[AI订阅经济|Subscription]] 即订阅模式。\n\n代表：\n\n- ChatGPT Plus\n- Claude Pro\n- Claude Max\n- Gemini Advanced\n\n逻辑是**固定月费**，用户获得使用额度，类似视频网站会员。\n\n| 优点 | 缺点 |\n|---|---|\n| 价格稳定、心理负担低 | 重度用户可能让平台亏损，轻度用户可能浪费 |\n\n## 六、为什么订阅模式成功\n\n因为大多数人不懂 Token。\n\n例如，用户对 100 万 Token 没有概念，但能理解 20 美元每月。\n\n> [!summary] 一句话\n> Subscription 的本质是隐藏 Token。\n\n## 七、Credits 模式\n\n[[Credits]] 即积分模式。\n\n代表：\n\n- [[Coze]]\n- 部分国内 Agent 平台\n- 部分模型中转平台\n\n逻辑是：\n\n```text\n购买积分 → 消费积分\n```\n\n例如 10,000 Credits。背后实际仍然对应 Token，只是进行了包装。\n\n## 八、为什么 Credits 流行\n\n平台通常会同时连接多个模型：\n\n- GPT\n- Claude\n- GLM\n- Gemini\n\n不同模型价格不同。如果直接展示 Token，用户会感到混乱。于是平台统一换算为 Credits，形成统一货币。\n\n## 九、Coding Plan 模式\n\n[[Coding_Plan|Coding Plan]] 是 2025 年以后最重要的新模式。\n\n代表：\n\n- Claude Code Max\n- [[GLM Coding]]\n- Cursor Ultra\n\n逻辑是：**不卖 Token，卖开发额度**。\n\n例如：\n\n- 每月 500 次 Agent 任务\n- 每 5 小时若干额度\n\n其本质是 **Token Pool**。平台承担风险，用户获得可预测成本。\n\n## 十、为什么 Coding Plan 出现\n\n因为 Agent 时代一次任务的 Token 差异太大。\n\n| 任务 | Token 消耗示例 |\n|---|---|\n| 翻译一句话 | 可能 1,000 Token |\n| 重构整个项目 | 可能 100 万 Token |\n\n因此，Token 收费越来越难以理解，于是出现了 **Developer Subscription（开发者订阅）**。\n\n## 十一、Enterprise 模式\n\n企业模式是目前 AI 公司最赚钱的业务之一。\n\n代表：\n\n- OpenAI Enterprise\n- Claude Enterprise\n- Microsoft Copilot Enterprise\n\n其特点不是卖模型，而是卖治理能力，例如：\n\n- 权限管理\n- 审计\n- 数据隔离\n- 安全控制\n\n企业真正购买的是**可信 AI**，而不是聊天机器人。\n\n## 十二、Agent Service 模式\n\nAgent Service 模式从 2026 年开始出现。\n\n代表：\n\n- [[Manus]] 类产品\n- Agent 团队服务\n- AI 员工服务\n\n其逻辑是**按结果收费**。例如，完成市场调研后收费，而不是按 Token 收费。这是未来的重要方向。\n\n## 十三、AI 商业模式演进路线\n\n| 阶段 | 模式 | 出售的价值 |\n|---|---|---|\n| 第一阶段 | API | 推理能力 |\n| 第二阶段 | Subscription | 访问权 |\n| 第三阶段 | Credits | 统一消费货币 |\n| 第四阶段 | Coding Plan | 开发者生产力 |\n| 第五阶段 | Agent Service | 结果 |\n\n## 十四、OpenAI 路线\n\n[[OpenAI]] 的演进路线：\n\n```text\nGPT\n ↓\nAPI\n ↓\nChatGPT\n ↓\nCodex\n ↓\nResponses API\n ↓\nAgent SDK\n ↓\n统一Agent Platform\n```\n\n战略是：**从卖模型到卖平台**。\n\n## 十五、Anthropic 路线\n\n[[Anthropic]] 的演进路线：\n\n```text\nClaude\n ↓\nClaude Code\n ↓\nMCP\n ↓\nAgent生态\n```\n\n战略是：**从卖模型到卖 Agent 基础设施**。\n\n## 十六、智谱路线\n\n[[智谱AI|智谱]] 的演进路线：\n\n```text\nGLM\n ↓\nChatGLM\n ↓\nAPI\n ↓\nAutoGLM\n ↓\nGLM Coding\n ↓\n产业Agent\n```\n\n战略是：**从卖 Token 到卖开发者套餐**。\n\n## 十七、未来推演\n\n未来 AI 商业模式可能变成**结果收费**。\n\n今天：调用 100 万 Token 后收费。\n\n未来：完成一个项目后收费。\n\n这就是 **Outcome Based Pricing（结果定价）**。\n\n## 十八、知识图谱位置\n\n```text\nAI Business\n├── Token\n├── API\n├── Subscription\n├── Credits\n├── Coding Plan\n├── Enterprise\n└── Agent Service\n```\n\n## 核心结论\n\nAI 商业模式的发展方向：\n\n```text\n卖模型\n  ↓\n卖访问\n  ↓\n卖生产力\n  ↓\n卖结果\n```\n\n最终，用户不关心用了多少 Token，只关心任务是否完成。这可能是未来十年的主线。\n\n## 关联节点\n\n- [[Token]]\n- [[API]]\n- [[Credits]]\n- [[AI订阅经济|Subscription]]\n- [[Coding_Plan|Coding Plan]]\n- [[Agent基础|Agent]]\n- [[OpenAI]]\n- [[Anthropic]]\n- [[智谱AI]]\n\n## 延伸阅读\n\n- [[AI商业模式地图]]\n- [[Agent_Business_Model|Agent Business Model]]\n- [[Agent_Economy|Agent Economy]]\n- [[OpenAI_Anthropic_智谱三条进化路线]]\n- [[AI产品地图]]\n\n## 待研究问题\n\n1. Outcome Pricing 是否会成为主流？\n2. Agent 公司如何计算成本？\n3. Token 会不会最终被隐藏？\n4. 企业更愿意买模型还是买结果？\n5. AI 行业会出现新的收费模式吗？\n", "excerpt": "AI商业模式全景图 目录 一、为什么必须研究 AI 商业模式 二、AI 产业的收入来源 三、Token 经济学 四、为什么 API 模式会出现问题 五、Subscription 模式 六、为什么订阅模式成功 七、Credits 模式 八、为什么 Credits 流行 九、Coding Plan 模式 十、为什么 Coding Plan 出现 十一、Enter...", "links": ["03-Agent-Agent基础", "02-Model-Companies-OpenAI", "02-Model-Companies-Anthropic", "02-Model-Companies-智谱AI", "05-Agent-Runners-GLM-Coding", "04-Platforms-Coze", "07-Business-Credits", "07-Business-Token", "07-Business-AI订阅经济", "07-Business-Coding_Plan", "05-Agent-Runners-Manus", "07-Business-API", "00-MOC-AI商业模式地图", "07-Business-Agent_Business_Model", "03-Agent-Agent_Economy", "02-Model-Companies-OpenAI_Anthropic_智谱三条进化路线", "00-MOC-AI产品地图"]}, {"id": "07-Business-AI订阅经济", "title": "AI订阅经济", "fileTitle": "AI订阅经济", "category": "07-Business", "categoryLabel": "商业模式", "path": "07-Business/AI订阅经济.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "business"], "body": "# AI订阅经济\n\n## 一句话定义\n\n> AI 订阅经济是将底层 Token 与模型成本包装为固定周期费用和使用额度的定价方式。\n\n## 定位\n\n- 对用户提供可预测价格，对平台提供经常性收入。\n- 适用于 Chat 助手、创作工具、Copilot 和部分 Agent 产品。\n\n## 时间轴\n\n| 阶段 | 关键变化 | 意义 |\n|---|---|---|\n| API 时代 | 用户直接面对 Token 计费 | 价格透明但难以预测 |\n| Chat 订阅 | 固定月费与公平使用限制 | 隐藏普通用户无法理解的 Token |\n| Agent 订阅 | 套餐加 Quota / Credits | 管理高波动任务成本 |\n\n## 产品矩阵\n\n| 产品 / 能力                 | 定位                                           | 核心价值          |\n| ----------------------- | -------------------------------------------- | ------------- |\n| Consumer Subscription   | ChatGPT Plus、Claude Pro、Gemini Advanced      | 卖模型和工具访问权     |\n| Coding Plan             | Claude Max、GLM Coding、Cursor Ultra           | 卖 Agent 开发生产力 |\n| Enterprise Subscription | Copilot、ChatGPT Enterprise、Claude Enterprise | 卖席位、治理与数据安全   |\n\n## 商业模式\n\n- 收入来自个人月费、年费、团队席位与企业合同。\n- 风险来自重度用户成本超过套餐收入，因此常需要限速、额度和分层。\n\n## 竞争格局\n\n- 通用 AI 产品的订阅竞争依赖模型能力、工具、用户分发和迁移成本。\n- 随着模型差距缩小，产品工作流与生态绑定更重要。\n\n## 关联节点\n\n- [[Subscription经济学]]\n- [[Token]]\n- [[Credits]]\n- [[Coding_Plan]]\n- [[SaaS]]\n\n## 延伸阅读\n\n- [[AI商业模式全景图]]\n- [[Coding Plan经济学]]\n", "excerpt": "AI订阅经济 一句话定义 AI 订阅经济是将底层 Token 与模型成本包装为固定周期费用和使用额度的定价方式。 定位 对用户提供可预测价格，对平台提供经常性收入。 适用于 Chat 助手、创作工具、Copilot 和部分 Agent 产品。 时间轴 产品矩阵 商业模式 收入来自个人月费、年费、团队席位与企业合同。 风险来自重度用户成本超过套餐收入，因此常需...", "links": ["07-Business-Subscription经济学", "07-Business-Token", "07-Business-Credits", "07-Business-Coding_Plan", "07-Business-SaaS", "07-Business-AI商业模式全景图", "07-Business-Coding-Plan经济学"]}, {"id": "07-Business-API", "title": "API", "fileTitle": "API", "category": "07-Business", "categoryLabel": "商业模式", "path": "07-Business/API.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "business", "API"], "body": "# API\n\n## 概述\n\nAPI（Application Programming Interface）是应用程序调用模型能力的可编程接口，可理解为“模型的插座”。它让创业公司无需自己训练模型，即可按需租用智能能力。\n\n```text\n应用程序 → API → 模型 → 返回结果\n```\n\nAPI 是 AI 产业的商业基础设施，类似电力行业的电网。\n\n## 时间轴\n\n| 时间 / 阶段 | 变化 | 影响 |\n|---|---|---|\n| 2020 | OpenAI 开放 GPT-3 API | 外部开发者可直接构建 AI 产品 |\n| 2020–2024 | 模型公司 → API → 创业公司 → 用户 | AI 客服、写作、翻译和搜索产品扩张 |\n| Agent 时代 | 一个任务引发几十次 API 调用 | 纯用量计费面临成本可预测性挑战 |\n| 平台阶段 | Agent SDK、Responses API、Tool Use、File Search | API 从模型调用扩展到 Agent 平台能力 |\n\n## 产品矩阵\n\n| API 类型          | 代表                                       | 销售的能力                           |                   |\n| --------------- | ---------------------------------------- | ------------------------------- | ----------------- |\n| 模型 API          | OpenAI API、Claude API、GLM API、Gemini API | 文本、多模态与推理能力                     |                   |\n| Agent API / SDK | [[OpenAI_Agents_SDK]]                    | OpenAI Agent SDK、Responses API | 工具调用、状态与 Agent 编排 |\n| 工具 API          | Search、File Search、地图、数据库                | 实时数据和外部执行                       |                   |\n| 企业 API          | 权限、日志、治理与私有数据连接                          | 可信的组织级智能                        |                   |\n\n## 商业模式\n\n- 核心收费方式是按 Token、请求数、数据量或工具调用量计费。\n- 优点是灵活、易于规模化、生态扩张快；缺点是成本波动与普通用户理解门槛高。\n- 模型 API 本质上销售的是 GPU 支撑的智能推理，类似云计算销售 CPU、存储和网络。\n- Agent 时代会在 API 之上增加 Credits、Subscription、Coding Plan 和 Outcome Pricing，但 API 不会消失。\n\n## 战略演进\n\n```text\n模型 API → 多模型平台 → Tool Use → Agent SDK / API → 幕后智能基础设施\n```\n\n未来普通用户可能看不到 API，但 Agent、Workflow、SaaS 和 AI 应用仍将运行在 API 之上。\n\n## 参考课程\n\n- [[API经济学]]\n- [[Token经济学]]\n- [[AI商业模式全景图]]\n\n## 关联节点\n\n- [[Token]]\n- [[Credits]]\n- [[Coding_Plan|Coding Plan]]\n- [[OpenAI]]\n- [[Anthropic]]\n- [[智谱AI]]\n- [[Agent基础|Agent]]\n- [[AI商业模式地图]]\n", "excerpt": "API 概述 API（Application Programming Interface）是应用程序调用模型能力的可编程接口，可理解为“模型的插座”。它让创业公司无需自己训练模型，即可按需租用智能能力。 API 是 AI 产业的商业基础设施，类似电力行业的电网。 时间轴 产品矩阵 商业模式 核心收费方式是按 Token、请求数、数据量或工具调用量计费。 优点...", "links": ["04-Platforms-OpenAI_Agents_SDK", "07-Business-API经济学", "07-Business-Token经济学", "07-Business-AI商业模式全景图", "07-Business-Token", "07-Business-Credits", "07-Business-Coding_Plan", "02-Model-Companies-OpenAI", "02-Model-Companies-Anthropic", "02-Model-Companies-智谱AI", "03-Agent-Agent基础", "00-MOC-AI商业模式地图"]}, {"id": "07-Business-API经济学", "title": "API经济学", "fileTitle": "API经济学", "category": "07-Business", "categoryLabel": "商业模式", "path": "07-Business/API经济学.md", "updated": "2026-06-17", "tags": ["AI", "BusinessModel", "APIEconomics"], "body": "# API经济学\n\n## 目录\n\n- [[#一、为什么 API 是 AI 产业的起点|一、为什么 API 是 AI 产业的起点]]\n- [[#二、什么是 API|二、什么是 API]]\n- [[#三、为什么 OpenAI 先做 API|三、为什么 OpenAI 先做 API]]\n- [[#四、API 模式解决了什么问题|四、API 模式解决了什么问题]]\n- [[#五、API 为什么按 Token 收费|五、API 为什么按 Token 收费]]\n- [[#六、API 模式的优点|六、API 模式的优点]]\n- [[#七、API 模式的缺点|七、API 模式的缺点]]\n- [[#八、API 与云计算的关系|八、API 与云计算的关系]]\n- [[#九、为什么 API 曾经统治 AI 行业|九、为什么 API 曾经统治 AI 行业]]\n- [[#十、为什么 API 模式开始受到挑战|十、为什么 API 模式开始受到挑战]]\n- [[#十一、OpenAI 为什么还重视 API|十一、OpenAI 为什么还重视 API]]\n- [[#十二、Anthropic 为什么也卖 API|十二、Anthropic 为什么也卖 API]]\n- [[#十三、智谱为什么也走 API 路线|十三、智谱为什么也走 API 路线]]\n- [[#十四、API 未来会消失吗|十四、API 未来会消失吗]]\n- [[#十五、API 经济学的本质|十五、API 经济学的本质]]\n- [[#十六、知识图谱位置|十六、知识图谱位置]]\n- [[#核心结论|核心结论]]\n- [[#关联节点|关联节点]]\n- [[#延伸阅读|延伸阅读]]\n- [[#待研究问题|待研究问题]]\n\n## 一、为什么 API 是 AI 产业的起点\n\n如果把 AI 产业比作电力行业：\n\n| AI 产业 | 电力行业 |\n|---|---|\n| 模型公司 | 发电厂 |\n| [[API]] | 电网 |\n| 用户 | 用电企业 |\n\n没有 API，模型无法商业化。\n\n因此，AI 产业真正的起点不是 [[ChatGPT]]，而是 **GPT-3 API**。\n\n## 二、什么是 API\n\nAPI 的全称是 **Application Programming Interface**，中文为**应用程序接口**。\n\n简单理解：API 是**模型的插座**。\n\n开发者通过 API 向模型发送请求，模型返回结果：\n\n```text\n应用程序\n   ↓\nAPI\n   ↓\n模型\n   ↓\n返回结果\n```\n\n例如，用户看到的 ChatGPT，背后实际上也是 API 调用。\n\n## 三、为什么 OpenAI 先做 API\n\n很多人以为 [[OpenAI]] 最早卖的是 ChatGPT，实际上不是。真正改变行业的是 **GPT-3 API**。\n\n2020 年，OpenAI 第一次允许外部开发者调用模型，结果是整个 AI 创业生态爆发。\n\n创业公司终于可以：\n\n> 不训练模型，直接做产品。\n\n## 四、API 模式解决了什么问题\n\n过去，如果想做 AI 产品，需要自己训练模型，成本从数百万美元起步。\n\nAPI 出现后，变成了**按需租用模型**，AI 创业门槛急剧下降。\n\n这与 AWS 对互联网行业的影响非常类似。\n\n## 五、API 为什么按 Token 收费\n\n模型公司的成本来自推理，推理成本主要由 GPU 时间决定，而 GPU 时间与 [[Token经济学|Token]] 数量高度相关。\n\n因此，Token 成为计费单位：\n\n```text\nToken\n  ↓\nGPU\n  ↓\n成本\n  ↓\n价格\n```\n\n## 六、API 模式的优点\n\n### 1. 极度灵活\n\n开发者按需付费，调用一次就付一次的费用。\n\n### 2. 容易规模化\n\n模型公司无需关心用户做什么产品，只需要提供能力。\n\n### 3. 生态扩张快\n\n任何开发者都能接入，因此 OpenAI 迅速形成生态。\n\n## 七、API 模式的缺点\n\n### 成本不可预测\n\n开发者不知道明天会产生多少调用。\n\n### Agent 时代成本爆炸\n\n传统产品可能只调用一次，Agent 任务可能调用几十次，导致费用剧烈波动。\n\n### 用户感知差\n\n普通用户不理解 Token，因此需要新的收费方式。\n\n## 八、API 与云计算的关系\n\n很多人误认为 OpenAI 是软件公司，实际上它更接近云服务公司，因为其本质在卖计算能力。\n\n其逻辑类似：\n\n- AWS\n- Azure\n- 阿里云\n\n区别在于，它卖的是**智能推理**，而不是 CPU、存储和网络。\n\n## 九、为什么 API 曾经统治 AI 行业\n\n2020–2024 年，整个行业的逻辑是：\n\n```text\n模型公司\n   ↓\nAPI\n   ↓\n创业公司\n   ↓\n用户\n```\n\n例如：\n\n- AI 客服\n- AI 写作\n- AI 翻译\n- AI 搜索\n\n其本质都是：\n\n```text\nOpenAI API + 产品包装\n```\n\n## 十、为什么 API 模式开始受到挑战\n\n因为 Agent 出现了。\n\n```text\n过去：一次调用 → 一次价值\n现在：一次任务 → 几十次调用\n```\n\n用户开始关心结果，而不是调用次数。于是出现了：\n\n- [[Credits经济学|Credits]]\n- [[AI订阅经济|Subscription]]\n- [[Coding Plan经济学|Coding Plan]]\n\n## 十一、OpenAI 为什么还重视 API\n\n因为 API 仍然是平台战略核心。\n\nOpenAI 希望成为 **AI 时代的 AWS**，即所有 Agent 和所有应用都建立在 OpenAI 平台之上。\n\n因此，以下能力都围绕 API 生态展开：\n\n- [[OpenAI_Agents_SDK|Agent SDK]]\n- Responses API\n- [[Tool_Use|Tool Use]]\n- File Search\n- Search\n\n## 十二、Anthropic 为什么也卖 API\n\n[[Anthropic]] 的战略不是只做聊天机器人，而是成为 Agent 基础设施。\n\n因此，以下能力共同组成平台：\n\n- Claude API\n- [[MCP全景图|MCP]]\n- [[Claude_Code|Claude Code]]\n\nAPI 仍然是核心。\n\n## 十三、智谱为什么也走 API 路线\n\n[[智谱AI|智谱]] 早期的核心收入是 GLM API，因为 API 是最容易商业化的模型能力。\n\n后来，智谱逐步增加：\n\n- [[AutoGLM]]\n- [[GLM Coding]]\n\n但底层仍然依赖 API。\n\n## 十四、API 未来会消失吗\n\n不会。\n\n未来，普通用户可能看不到 API，但以下系统的底层仍然运行在 API 之上：\n\n- [[Agent基础|Agent]]\n- [[Workflow全景图|Workflow]]\n- [[SaaS]]\n- AI 应用\n\n就像普通用户看不到 HTTP，但互联网离不开 HTTP。\n\n## 十五、API 经济学的本质\n\nAPI 卖的不是答案，也不是聊天，而是：\n\n> **可编程智能**\n\n这是 AI 产业最重要的创新之一。\n\n## 十六、知识图谱位置\n\n```text\nAI Business\n├── Token\n├── API\n├── Credits\n├── Subscription\n├── Coding Plan\n└── Agent Service\n```\n\nAPI 位于**商业基础设施层**。\n\n## 核心结论\n\n云计算时代：\n\n```text\nAPI = 计算能力接口\n```\n\nAI 时代：\n\n```text\nAPI = 智能能力接口\n```\n\n无论未来出现 Agent、MCP、Coding Plan 还是 Outcome Pricing，底层都离不开 API。\n\n> **API 是 AI 产业的电网。**\n\n## 关联节点\n\n- [[Token经济学]]\n- [[Credits经济学]]\n- [[Coding Plan经济学]]\n- [[Agent经济学]]\n- [[OpenAI]]\n- [[Anthropic]]\n- [[智谱AI]]\n\n## 延伸阅读\n\n- [[AI商业模式全景图]]\n- [[API]]\n- [[Token经济学]]\n- [[OpenAI_Anthropic_智谱三条进化路线]]\n- [[AI商业模式地图]]\n\n## 待研究问题\n\n1. API 会不会被 Agent 平台边缘化？\n2. [[OpenAI]] 能否成为 AI 时代的 AWS？\n3. API 价格是否会持续下降？\n4. 企业是否应该直接购买 API？\n5. Agent 时代 API 收入占比会下降吗？\n", "excerpt": "API经济学 目录 一、为什么 API 是 AI 产业的起点 二、什么是 API 三、为什么 OpenAI 先做 API 四、API 模式解决了什么问题 五、API 为什么按 Token 收费 六、API 模式的优点 七、API 模式的缺点 八、API 与云计算的关系 九、为什么 API 曾经统治 AI 行业 十、为什么 API 模式开始受到挑战 十一、Op...", "links": ["07-Business-API", "06-Products-ChatGPT", "02-Model-Companies-OpenAI", "07-Business-Token经济学", "07-Business-Credits经济学", "07-Business-AI订阅经济", "07-Business-Coding-Plan经济学", "04-Platforms-OpenAI_Agents_SDK", "03-Agent-Tool_Use", "02-Model-Companies-Anthropic", "03-Agent-MCP全景图", "05-Agent-Runners-Claude_Code", "02-Model-Companies-智谱AI", "05-Agent-Runners-AutoGLM", "05-Agent-Runners-GLM-Coding", "03-Agent-Agent基础", "03-Agent-Workflow全景图", "07-Business-SaaS", "07-Business-Agent经济学", "07-Business-AI商业模式全景图", "02-Model-Companies-OpenAI_Anthropic_智谱三条进化路线", "00-MOC-AI商业模式地图"]}, {"id": "07-Business-Agent_Business_Model", "title": "Agent_Business_Model", "fileTitle": "Agent_Business_Model", "category": "07-Business", "categoryLabel": "商业模式", "path": "07-Business/Agent_Business_Model.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "business"], "body": "# Agent Business Model\n\n## 一句话定义\n\n> Agent Business Model 是围绕 Agent 完成任务、交付结果和替代部分人力所设计的收费与成本结构。\n\n## 定位\n\n- 与 Chat 卖回答不同，Agent 更接近卖行动、生产力和结果。\n- 需要同时管理模型、工具、沙箱、重试和人工审批成本。\n\n## 时间轴\n\n| 阶段 | 关键变化 | 意义 |\n|---|---|---|\n| Chat 阶段 | 订阅或 Token 用量 | 单轮成本相对可预测 |\n| Agent 套餐 | 任务额度、Credits 与 Coding Plan | 隐藏多轮调用的成本波动 |\n| Outcome Pricing | 按完成的任务或业务结果收费 | 价格与客户价值更直接地对齐 |\n| Digital Labor | 按数字岗位或团队收费 | 从软件工具走向持续工作服务 |\n\n## 产品矩阵\n\n| 产品 / 能力 | 定位 | 核心价值 |\n|---|---|---|\n| Subscription Agent | 个人 / 团队套餐 | 以固定费用销售任务额度 |\n| Usage Agent | 按 Token / 执行计费 | 价格透明但用户预算波动 |\n| Outcome Agent | 按结果计费 | 对齐调研、获客、代码或流程成果 |\n\n## 商业模式\n\n- Agent 成本 = 模型 + 工具 + 执行环境 + 观测治理 + 失败重试。\n- 主要收入模式是订阅、Quota、Credits、企业合同和 Outcome Pricing。\n- 核心矛盾是收入固定而成本浮动。\n\n## 竞争格局\n\n- 竞争对手不仅是软件，还包括人工服务、外包和内部员工。\n- 长期壁垒来自任务完成率、专有工作流、客户数据、工具生态与信任。\n\n## 关联节点\n\n- [[Agent_Economy]]\n- [[Agent经济学]]\n- [[Outcome Pricing]]\n- [[Coding_Plan]]\n- [[SaaS]]\n\n## 延伸阅读\n\n- [[AI商业模式全景图]]\n- [[Agent全景图]]\n", "excerpt": "Agent Business Model 一句话定义 Agent Business Model 是围绕 Agent 完成任务、交付结果和替代部分人力所设计的收费与成本结构。 定位 与 Chat 卖回答不同，Agent 更接近卖行动、生产力和结果。 需要同时管理模型、工具、沙箱、重试和人工审批成本。 时间轴 产品矩阵 商业模式 Agent 成本 = 模型 + ...", "links": ["03-Agent-Agent_Economy", "07-Business-Agent经济学", "10-Concepts-Outcome-Pricing", "07-Business-Coding_Plan", "07-Business-SaaS", "07-Business-AI商业模式全景图", "03-Agent-Agent全景图"]}, {"id": "07-Business-Agent经济学", "title": "Agent经济学", "fileTitle": "Agent经济学", "category": "07-Business", "categoryLabel": "商业模式", "path": "07-Business/Agent经济学.md", "updated": "2026-06-17", "tags": ["AI", "Agent", "AgentEconomics"], "body": "# Agent经济学\n\n## 目录\n\n- [[#一、为什么 Agent 经济学如此重要|一、为什么 Agent 经济学如此重要]]\n- [[#二、Chat 经济学|二、Chat 经济学]]\n- [[#三、Agent 经济学|三、Agent 经济学]]\n- [[#四、Agent 为什么特别贵|四、Agent 为什么特别贵]]\n- [[#五、Agent 成本公式|五、Agent 成本公式]]\n- [[#六、为什么 Agent 公司容易亏损|六、为什么 Agent 公司容易亏损]]\n- [[#七、Agent 与 SaaS 的区别|七、Agent 与 SaaS 的区别]]\n- [[#八、为什么 Agent 更像员工|八、为什么 Agent 更像员工]]\n- [[#九、Agent 的价值衡量方式|九、Agent 的价值衡量方式]]\n- [[#十、Agent 为什么推动 Outcome Pricing|十、Agent 为什么推动 Outcome Pricing]]\n- [[#十一、Agent 与外包行业|十一、Agent 与外包行业]]\n- [[#十二、为什么 Manus 引发关注|十二、为什么 Manus 引发关注]]\n- [[#十三、Agent 公司未来的收入来源|十三、Agent 公司未来的收入来源]]\n- [[#十四、Agent 经济学的发展阶段|十四、Agent 经济学的发展阶段]]\n- [[#十五、为什么 Agent 会改变软件行业|十五、为什么 Agent 会改变软件行业]]\n- [[#十六、Agent 经济学的核心矛盾|十六、Agent 经济学的核心矛盾]]\n- [[#十七、知识图谱位置|十七、知识图谱位置]]\n- [[#核心结论|核心结论]]\n- [[#关联节点|关联节点]]\n- [[#延伸阅读|延伸阅读]]\n- [[#待研究问题|待研究问题]]\n\n## 一、为什么 Agent 经济学如此重要\n\n[[ChatGPT]] 出现后，行业形成了一种误解：\n\n```text\nAgent = 更聪明的聊天机器人\n```\n\n实际上并不是。从商业角度看，Agent 和 Chat 属于两种经济体系：\n\n```text\nChat：卖回答\nAgent：卖行动\n```\n\n这会导致成本结构、收入结构和产品结构全部变化。\n\n## 二、Chat 经济学\n\nChatGPT 时代的流程：\n\n```text\n用户提问\n   ↓\n模型回答\n   ↓\n结束\n```\n\n特点是调用次数有限，成本可预测。例如，一次问答消耗 5,000 Token，平台容易控制成本。\n\n## 三、Agent 经济学\n\nAgent 时代的流程：\n\n```text\n目标\n ↓\n规划\n ↓\n执行\n ↓\n检查\n ↓\n修正\n ↓\n再次执行\n```\n\n其特点是**循环**，而不是一次问答。因此，成本结构完全改变。\n\n## 四、Agent 为什么特别贵\n\n很多用户发现 Agent 比聊天贵很多。原因不是模型更贵，而是**调用次数暴涨**。\n\n聊天：\n\n```text\n1 次问题 → 1 次回答\n```\n\nAgent：\n\n```text\n规划\n ↓\n搜索\n ↓\n执行\n ↓\n测试\n ↓\n修复\n ↓\n重试\n```\n\n这个过程可能调用模型几十次，甚至上百次。\n\n## 五、Agent 成本公式\n\nAgent 成本可以简化为：\n\n```text\nAgent 成本 = 模型成本 + 工具成本 + 执行成本 + 管理成本\n```\n\n| 成本类型 | 主要内容 |\n|---|---|\n| 模型成本 | Token 消耗 |\n| 工具成本 | 搜索 API、地图 API、数据库 |\n| 执行成本 | [[Computer_Use|Computer Use]]、浏览器环境、沙箱环境 |\n| 管理成本 | 监控、日志、权限管理 |\n\n因此，Agent 远比聊天复杂。\n\n## 六、为什么 Agent 公司容易亏损\n\n2025 年出现了一个现象：很多 Agent 产品用户很多，但收入很少。\n\n原因是**边际成本高**。\n\n| 类型 | 边际成本特征 |\n|---|---|\n| 传统 [[SaaS]] | 软件写一次，可以无限复制 |\n| Agent | 每个用户都会持续消耗资源 |\n\n因此，Agent 更像人工服务，而不是传统软件。\n\n## 七、Agent 与 SaaS 的区别\n\n| 类型 | 定位 | 出售的价值 |\n|---|---|---|\n| SaaS | 软件 | 工具 |\n| Agent | 数字劳动力 | 工作 |\n\n这是根本区别。\n\n## 八、为什么 Agent 更像员工\n\n用户购买 ChatGPT，得到的是建议；用户购买 Agent，得到的是执行。\n\n因此，Agent 的竞争对手不一定是软件，更可能是**人力成本**。\n\n## 九、Agent 的价值衡量方式\n\n| 时代 | 价值衡量方式 |\n|---|---|\n| Chat 时代 | 回答质量 |\n| Agent 时代 | 任务完成率 |\n\n用户不会关心用了多少 Token，而会更关心任务是否完成。因此，评价体系发生了变化。\n\n## 十、Agent 为什么推动 Outcome Pricing\n\nOutcome 即结果。\n\n传统模式是按 Token 收费，未来可能按结果收费。\n\n例如：完成一份市场分析后收费，而不是根据消耗多少 Token 收费。\n\n## 十一、Agent 与外包行业\n\n一个重要观察是：Agent 越来越像**数字外包团队**。\n\n过去，企业购买咨询服务。未来，企业可能购买 Agent 团队，例如：\n\n- Research Agent\n- Writer Agent\n- Reviewer Agent\n\n它们共同形成虚拟团队。\n\n## 十二、为什么 Manus 引发关注\n\n很多人认为 [[Manus]] 的成功来自模型，实际上更重要的是任务完成能力。\n\nManus 卖的不是聊天，而是执行结果。这代表 Agent 经济学开始出现。\n\n## 十三、Agent 公司未来的收入来源\n\n| 收入来源 | 示例 |\n|---|---|\n| 订阅 | 每月会员 |\n| 额度 | 每月任务数 |\n| 结果收费 | 完成项目后收费 |\n| 企业服务 | Agent 员工体系 |\n\n## 十四、Agent 经济学的发展阶段\n\n| 阶段 | 出售的价值 |\n|---|---|\n| 第一阶段 | 模型 |\n| 第二阶段 | 聊天 |\n| 第三阶段 | 生产力 |\n| 第四阶段 | 结果 |\n| 第五阶段 | 数字劳动力 |\n\n这是未来十年的方向。\n\n## 十五、为什么 Agent 会改变软件行业\n\n过去：\n\n```text\n用户\n ↓\n软件\n ↓\n结果\n```\n\n未来：\n\n```text\n用户\n ↓\nAgent\n ↓\n软件\n ↓\n结果\n```\n\nAgent 会成为新的操作层，因此很多软件公司会被迫重构。\n\n## 十六、Agent 经济学的核心矛盾\n\nAgent 公司面临的核心矛盾是：\n\n```text\n收入固定，成本浮动\n```\n\n例如，用户每月付费 99 美元，但 Agent 可能产生 500 美元成本。\n\n因此，Agent 商业模式仍在探索。\n\n## 十七、知识图谱位置\n\n```text\nAI Business\n├── Token\n├── API\n├── Credits\n├── Coding Plan\n├── Agent\n└── Outcome Pricing\n```\n\nAgent 位于**价值交付层**。\n\n## 核心结论\n\n```text\nChat 时代：卖答案\nAgent 时代：卖行动\n未来：卖结果\n```\n\nAgent 真正改变的不是模型能力，而是**价值交付方式**。\n\n> **这可能是 AI 产业最大的商业变革。**\n\n## 关联节点\n\n- [[Token经济学]]\n- [[API经济学]]\n- [[Credits经济学]]\n- [[Coding Plan经济学]]\n- [[Outcome Pricing]]\n- [[Manus]]\n- [[Claude_Code|Claude Code]]\n- [[OpenAI]]\n- [[Anthropic]]\n\n## 延伸阅读\n\n- [[AI商业模式全景图]]\n- [[Agent_Economy|Agent Economy]]\n- [[Agent_Business_Model|Agent Business Model]]\n- [[Agent全景图]]\n- [[AI商业模式地图]]\n\n## 待研究问题\n\n1. Agent 公司如何避免亏损？\n2. Outcome Pricing 何时成熟？\n3. Agent 是否会替代部分外包行业？\n4. 数字劳动力如何定价？\n5. Agent 未来会不会像员工一样管理？\n", "excerpt": "Agent经济学 目录 一、为什么 Agent 经济学如此重要 二、Chat 经济学 三、Agent 经济学 四、Agent 为什么特别贵 五、Agent 成本公式 六、为什么 Agent 公司容易亏损 七、Agent 与 SaaS 的区别 八、为什么 Agent 更像员工 九、Agent 的价值衡量方式 十、Agent 为什么推动 Outcome Pric...", "links": ["06-Products-ChatGPT", "03-Agent-Computer_Use", "07-Business-SaaS", "05-Agent-Runners-Manus", "07-Business-Token经济学", "07-Business-API经济学", "07-Business-Credits经济学", "07-Business-Coding-Plan经济学", "10-Concepts-Outcome-Pricing", "05-Agent-Runners-Claude_Code", "02-Model-Companies-OpenAI", "02-Model-Companies-Anthropic", "07-Business-AI商业模式全景图", "03-Agent-Agent_Economy", "07-Business-Agent_Business_Model", "03-Agent-Agent全景图", "00-MOC-AI商业模式地图"]}, {"id": "07-Business-Coding-Plan经济学", "title": "Coding Plan经济学", "fileTitle": "Coding Plan经济学", "category": "07-Business", "categoryLabel": "商业模式", "path": "07-Business/Coding Plan经济学.md", "updated": "2026-06-17", "tags": ["AI", "BusinessModel", "CodingPlanEconomics"], "body": "# Coding Plan经济学\n\n## 目录\n\n- [[#一、为什么会出现 Coding Plan|一、为什么会出现 Coding Plan]]\n- [[#二、Chat 时代与 Agent 时代的区别|二、Chat 时代与 Agent 时代的区别]]\n- [[#三、为什么用户无法接受 Agent API|三、为什么用户无法接受 Agent API]]\n- [[#四、Coding Plan 的本质|四、Coding Plan 的本质]]\n- [[#五、Coding Plan 卖的是什么|五、Coding Plan 卖的是什么]]\n- [[#六、为什么 Coding Plan 特别适合开发者|六、为什么 Coding Plan 特别适合开发者]]\n- [[#七、Claude Max 案例|七、Claude Max 案例]]\n- [[#八、GLM Coding 案例|八、GLM Coding 案例]]\n- [[#九、Cursor Ultra 案例|九、Cursor Ultra 案例]]\n- [[#十、为什么 Coding Plan 越来越像云计算|十、为什么 Coding Plan 越来越像云计算]]\n- [[#十一、Coding Plan 与 Subscription 的区别|十一、Coding Plan 与 Subscription 的区别]]\n- [[#十二、Coding Plan 与 Credits 的区别|十二、Coding Plan 与 Credits 的区别]]\n- [[#十三、平台为什么喜欢 Coding Plan|十三、平台为什么喜欢 Coding Plan]]\n- [[#十四、Agent 时代为什么必须出现 Coding Plan|十四、Agent 时代为什么必须出现 Coding Plan]]\n- [[#十五、Coding Plan 未来的发展|十五、Coding Plan 未来的发展]]\n- [[#十六、产业演进路线|十六、产业演进路线]]\n- [[#十七、知识图谱位置|十七、知识图谱位置]]\n- [[#核心结论|核心结论]]\n- [[#关联节点|关联节点]]\n- [[#延伸阅读|延伸阅读]]\n- [[#待研究问题|待研究问题]]\n\n## 一、为什么会出现 Coding Plan\n\n如果说 API 时代解决的是“如何调用模型”，那么 Agent 时代解决的是“如何完成任务”。\n\n这是整个 AI 产业最重要的转折之一。\n\n在 GPT-3 时代：\n\n```text\n用户问问题\n    ↓\n模型回答问题\n    ↓\n按 Token 收费\n```\n\n这完全合理，因为一次问题大约对应一次调用。\n\n但 Agent 时代出现后，逻辑变成：\n\n```text\n一个任务 = 几十次调用 = 几百次调用\n```\n\n于是，Token 计费开始失效。\n\n## 二、Chat 时代与 Agent 时代的区别\n\n### Chat 时代\n\n```text\nQuestion\n   ↓\nAnswer\n```\n\n成本容易预测，例如一次对话消耗 5,000 Token。\n\n### Agent 时代\n\n```text\nGoal\n ↓\nPlan\n ↓\nAct\n ↓\nReview\n ↓\nRetry\n```\n\n例如，开发一个网站时，Agent 可能会：\n\n```text\n读代码\n  ↓\n生成代码\n  ↓\n运行测试\n  ↓\n修复 Bug\n  ↓\n再次测试\n```\n\n这会产生几十万 Token，甚至几百万 Token。\n\n## 三、为什么用户无法接受 Agent API\n\n想象一下，用户说“帮我开发一个系统”，Agent 运行两小时后，账单是 37 美元。\n\n用户会无法接受，因为事先不知道价格。这就像出租车按秒计费，心理压力极大。\n\n## 四、Coding Plan 的本质\n\n[[Coding_Plan|Coding Plan]] 不是技术创新，而是**商业创新**。\n\n其核心思想是：**隐藏 Token**。\n\n用户看到的是：\n\n> 99 美元 / 月\n\n而不是：\n\n> 本月消耗 12,738,492 Token\n\n因此，Coding Plan 的本质是**Agent 时代的订阅制**。\n\n## 五、Coding Plan 卖的是什么\n\n很多人以为 Coding Plan 卖的是模型，实际上卖的是**开发生产力**。\n\n例如：\n\n- 用户购买 Claude Max，购买的不是 Claude 模型，而是 [[Claude_Code|Claude Code]] 的工作能力。\n- 用户购买 [[GLM Coding]]，购买的不是 GLM Token，而是编码额度。\n\n## 六、为什么 Coding Plan 特别适合开发者\n\n开发者最大的痛点不是价格，而是**价格不可预测**。\n\n例如：\n\n```text\n今天：2 美元\n明天：50 美元\n```\n\n没人愿意管理这种账单，因此开发者更喜欢固定套餐。\n\n## 七、Claude Max 案例\n\n[[Anthropic]] 发现，Claude Code 用户比普通聊天用户消耗更多，原因是 Agent 不断循环：\n\n```text\n读代码 → 写代码 → 运行 → 修复\n```\n\n在这个过程中，Agent 会持续调用模型。于是 Anthropic 推出 Max：\n\n```text\n固定月费 → 提供大量 Agent 额度\n```\n\n用户不再关心 Token。\n\n## 八、GLM Coding 案例\n\n[[智谱AI|智谱]] 也发现，Agent 模式下 Token 计费越来越难以理解，于是推出 GLM Coding。\n\n核心变化是：\n\n```text\n卖 Token → 卖开发额度\n```\n\n实际上，背后仍然是 Token，只是被套餐化。\n\n## 九、Cursor Ultra 案例\n\n[[Cursor]] 最初的本质是 AI IDE。后来 Agent 越来越重，开始出现高级额度。\n\n原因是普通套餐无法覆盖 Agent 消耗，因此开发工具开始转向**生产力订阅**。\n\n## 十、为什么 Coding Plan 越来越像云计算\n\n早期云计算按 CPU 收费，后来企业希望获得固定预算，于是出现包年包月。\n\nAI 正在重复同样的过程：\n\n```text\nToken → 套餐\n```\n\n## 十一、Coding Plan 与 Subscription 的区别\n\n很多人会混淆这两种模式。\n\n| 模式 | 定位 | 核心能力 |\n|---|---|---|\n| ChatGPT Plus | [[Subscription经济学|Subscription]] | 聊天 |\n| Claude Max | Coding Plan | Agent 工作 |\n\n两者的本质不同。\n\n## 十二、Coding Plan 与 Credits 的区别\n\n| 模式 | 类比 | 使用方式 |\n|---|---|---|\n| [[Credits经济学|Credits]] | 储值卡 | 按量消耗 |\n| Coding Plan | 会员卡 | 按周期使用 |\n\n因此，Coding Plan 更加稳定。\n\n## 十三、平台为什么喜欢 Coding Plan\n\n### 1. 收入稳定\n\n每月形成固定现金流。\n\n### 2. 用户留存高\n\n开发者不会轻易更换工具。\n\n### 3. 便于成本控制\n\n平台可以统计平均使用量，制定合理套餐。\n\n## 十四、Agent 时代为什么必须出现 Coding Plan\n\nAgent 的一个特点是长时间运行。\n\n例如，一个任务运行 30 分钟，期间可能调用模型上百次。如果继续按 Token 计费，用户体验很差。\n\n因此，Agent 服务必须套餐化。\n\n## 十五、Coding Plan 未来的发展\n\n当前卖的是开发额度，未来可能卖结果额度。\n\n例如：\n\n> 每月完成 50 个项目\n\n而不是：\n\n> 每月 5,000 次调用\n\n这就是 **Outcome Pricing**。\n\n## 十六、产业演进路线\n\n| 阶段 | 模式 | 出售的价值 |\n|---|---|---|\n| 第一阶段 | Token | 计算量 |\n| 第二阶段 | API | 调用能力 |\n| 第三阶段 | Credits | 平台额度 |\n| 第四阶段 | Coding Plan | 生产力 |\n| 第五阶段 | Agent Service | 结果 |\n\n## 十七、知识图谱位置\n\n```text\nAI Business\n├── Token\n├── API\n├── Credits\n├── Coding Plan\n└── Agent Service\n```\n\nCoding Plan 位于**生产力销售层**。\n\n## 核心结论\n\n```text\nAPI 时代：卖调用\nChat 时代：卖访问权\nAgent 时代：卖生产力\n```\n\nCoding Plan 的出现，本质上意味着 AI 行业开始从**能力收费**转向**生产力收费**。\n\n这与软件行业从卖软件转向卖 SaaS 非常类似。\n\n## 关联节点\n\n- [[Token经济学]]\n- [[API经济学]]\n- [[Credits经济学]]\n- [[Agent经济学]]\n- [[Subscription经济学]]\n- [[Claude]]\n- [[Claude_Code|Claude Code]]\n- [[GLM Coding]]\n- [[Cursor]]\n\n## 延伸阅读\n\n- [[AI商业模式全景图]]\n- [[Coding_Plan|Coding Plan]]\n- [[AI订阅经济]]\n- [[Agent_Economy|Agent Economy]]\n- [[AI商业模式地图]]\n\n## 待研究问题\n\n1. Coding Plan 是否会成为主流？\n2. Agent 时代 Token 是否会彻底隐藏？\n3. Outcome Pricing 何时普及？\n4. 开发者是否更喜欢套餐制？\n5. Coding Plan 会不会取代 API？\n", "excerpt": "Coding Plan经济学 目录 一、为什么会出现 Coding Plan 二、Chat 时代与 Agent 时代的区别 三、为什么用户无法接受 Agent API 四、Coding Plan 的本质 五、Coding Plan 卖的是什么 六、为什么 Coding Plan 特别适合开发者 七、Claude Max 案例 八、GLM Coding 案例 ...", "links": ["07-Business-Coding_Plan", "05-Agent-Runners-Claude_Code", "05-Agent-Runners-GLM-Coding", "02-Model-Companies-Anthropic", "02-Model-Companies-智谱AI", "06-Products-Cursor", "07-Business-Subscription经济学", "07-Business-Credits经济学", "07-Business-Token经济学", "07-Business-API经济学", "07-Business-Agent经济学", "06-Products-Claude", "07-Business-AI商业模式全景图", "07-Business-AI订阅经济", "03-Agent-Agent_Economy", "00-MOC-AI商业模式地图"]}, {"id": "07-Business-Coding_Plan", "title": "Coding_Plan", "fileTitle": "Coding_Plan", "category": "07-Business", "categoryLabel": "商业模式", "path": "07-Business/Coding_Plan.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "business", "coding-plan"], "body": "# Coding Plan\n\n## 概述\n\nCoding Plan 是面向 Coding Agent 和重度开发者的周期性套餐。它不直接销售 Token，而是把底层 Token 池包装为开发额度、任务额度或使用周期。\n\n> Coding Plan 的本质是 Agent 时代的订阅制，销售的是开发生产力。\n\n## 时间轴\n\n| 阶段 | 计费对象 | 用户感知 |\n|---|---|---|\n| API 时代 | 每次调用 / Token | 按量付费，成本相对可解释 |\n| Chat 订阅 | 聊天访问权 | 固定月费隐藏普通对话 Token |\n| Coding Plan | Agent 开发额度 | 固定预算覆盖多轮规划、编码、测试与修复 |\n| 未来 | 项目 / 结果额度 | 从调用次数转向 Outcome Pricing |\n\n## 产品矩阵\n\n| 产品 | 定位 | 出售的价值 |\n|---|---|---|\n| Claude Max | Claude Code 重度用户套餐 | 大量 Agent 开发额度 |\n| [[GLM Coding]] | 智谱 Coding Agent 套餐 | 从 GLM Token 转向编码额度 |\n| [[Cursor]] Ultra | AI IDE 高级套餐 | 覆盖更重的 Agent 使用 |\n| 未来 Agent Plan | 结果型套餐 | 每月完成的项目或任务数 |\n\n## 商业模式\n\n- 用户以固定月费获得 Agent 额度，平台承担重度用户的成本风险。\n- 平台通过统计平均使用量、限速、时间窗口和额度分层来管理 Token 预算池。\n- 对平台的价值是固定现金流和开发者留存；对用户的价值是成本可预测。\n- 与 Credits 相比，Coding Plan 更像会员卡，按周期使用；Credits 更像储值卡，按量消耗。\n\n## 战略演进\n\n```text\nToken → API → Credits → Coding Plan → Agent Service / Outcome Pricing\n```\n\nCoding Plan 标志着 AI 行业开始从能力收费转向生产力收费。\n\n## 参考课程\n\n- [[Coding Plan经济学]]\n- [[Token经济学]]\n- [[Agent经济学]]\n\n## 关联节点\n\n- [[Token]]\n- [[API]]\n- [[Credits]]\n- [[AI订阅经济|Subscription]]\n- [[Claude_Code|Claude Code]]\n- [[GLM Coding]]\n- [[Cursor]]\n- [[Agent_Economy|Agent Economy]]\n- [[AI商业模式地图]]\n", "excerpt": "Coding Plan 概述 Coding Plan 是面向 Coding Agent 和重度开发者的周期性套餐。它不直接销售 Token，而是把底层 Token 池包装为开发额度、任务额度或使用周期。 Coding Plan 的本质是 Agent 时代的订阅制，销售的是开发生产力。 时间轴 产品矩阵 商业模式 用户以固定月费获得 Agent 额度，平台承担...", "links": ["05-Agent-Runners-GLM-Coding", "06-Products-Cursor", "07-Business-Coding-Plan经济学", "07-Business-Token经济学", "07-Business-Agent经济学", "07-Business-Token", "07-Business-API", "07-Business-Credits", "07-Business-AI订阅经济", "05-Agent-Runners-Claude_Code", "03-Agent-Agent_Economy", "00-MOC-AI商业模式地图"]}, {"id": "07-Business-Credits", "title": "Credits", "fileTitle": "Credits", "category": "07-Business", "categoryLabel": "商业模式", "path": "07-Business/Credits.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "business", "credits"], "body": "# Credits\n\n## 概述\n\nCredits 是 AI 平台发行的内部结算单位。它不是底层成本单位，而是平台把不同模型、Token 价格和工具成本换算后的统一货币。\n\n```text\n现金 → 购买 Credits → 平台按规则换算 Token / Tool 消耗\n```\n\n## 时间轴\n\n| 阶段 | 计费形式 | 用户感知 |\n|---|---|---|\n| 直接 Token | 显示具体 Token 数 | 透明，但难以理解 |\n| Credits | 按平台汇率换算 | 简化多模型定价 |\n| Credits + 促销 | 赠送、返还、活动奖励 | 降低价格敏感度并提高留存 |\n| Credits + Quota | 积分与任务额度组合 | 缓冲 Agent 任务的成本波动 |\n\n## 产品矩阵\n\n| 平台类型 | 代表 | Credits 作用 |\n|---|---|---|\n| Agent 平台 | [[Coze]] 等 | 统一 Workflow、模型和工具消耗 |\n| 模型聚合平台 | GPT、Claude、GLM、Gemini 聚合服务 | 隐藏各模型不同的 Token 单价 |\n| 国内 AI 平台 | 积分、点数、算力包 | 利用成熟的虚拟货币使用习惯 |\n| Agent 任务平台 | Credits + Quota | 用积分和任务数共同管理高消耗任务 |\n\n## 商业模式\n\n- 平台自主设定 Token 到 Credits 的换算率，并可按模型、工具和 Agent 模式设置不同倍率。\n- 优势：统一多模型结算、方便促销、降低价格敏感度、增加预付现金流。\n- 风险：换算规则不透明时，用户容易误判 Credits 的真实价值。\n- Agent 会通过规划、读文件、生成、测试和修复引发多轮调用，因此积分消耗不等于聊天轮数。\n\n## 战略演进\n\n```text\n直接 Token → 平台 Credits → Credits + Subscription → Credits + Agent Quota\n```\n\nCredits 不会取代 Token 作为底层成本单位，但会继续作为平台运营和用户定价的包装层。\n\n## 参考课程\n\n- [[Credits经济学]]\n- [[Token经济学]]\n- [[AI商业模式全景图]]\n\n## 关联节点\n\n- [[Token]]\n- [[API]]\n- [[Coding_Plan|Coding Plan]]\n- [[AI订阅经济|Subscription]]\n- [[Coze]]\n- [[Agent_Economy|Agent Economy]]\n- [[AI商业模式地图]]\n", "excerpt": "Credits 概述 Credits 是 AI 平台发行的内部结算单位。它不是底层成本单位，而是平台把不同模型、Token 价格和工具成本换算后的统一货币。 时间轴 产品矩阵 商业模式 平台自主设定 Token 到 Credits 的换算率，并可按模型、工具和 Agent 模式设置不同倍率。 优势：统一多模型结算、方便促销、降低价格敏感度、增加预付现金流。 ...", "links": ["04-Platforms-Coze", "07-Business-Credits经济学", "07-Business-Token经济学", "07-Business-AI商业模式全景图", "07-Business-Token", "07-Business-API", "07-Business-Coding_Plan", "07-Business-AI订阅经济", "03-Agent-Agent_Economy", "00-MOC-AI商业模式地图"]}, {"id": "07-Business-Credits经济学", "title": "Credits经济学", "fileTitle": "Credits经济学", "category": "07-Business", "categoryLabel": "商业模式", "path": "07-Business/Credits经济学.md", "updated": "2026-06-17", "tags": ["AI", "BusinessModel", "CreditsEconomics"], "body": "# Credits经济学\n\n## 目录\n\n- [[#一、为什么会出现 Credits|一、为什么会出现 Credits]]\n- [[#二、Credits 是什么|二、Credits 是什么]]\n- [[#三、为什么平台不直接卖 Token|三、为什么平台不直接卖 Token]]\n- [[#四、Credits 解决了什么问题|四、Credits 解决了什么问题]]\n- [[#五、Credits 与 Token 的关系|五、Credits 与 Token 的关系]]\n- [[#六、为什么 Credits 容易让用户误判|六、为什么 Credits 容易让用户误判]]\n- [[#七、为什么你的 5000 积分消耗那么快|七、为什么你的 5000 积分消耗那么快]]\n- [[#八、Credits 与 Agent 的关系|八、Credits 与 Agent 的关系]]\n- [[#九、为什么中国平台特别喜欢 Credits|九、为什么中国平台特别喜欢 Credits]]\n- [[#十、Credits 与 Subscription 的区别|十、Credits 与 Subscription 的区别]]\n- [[#十一、Credits 与 API 的区别|十一、Credits 与 API 的区别]]\n- [[#十二、Credits 为什么对平台有利|十二、Credits 为什么对平台有利]]\n- [[#十三、Credits 的未来|十三、Credits 的未来]]\n- [[#十四、Credits 在产业链中的位置|十四、Credits 在产业链中的位置]]\n- [[#十五、Credits 的本质|十五、Credits 的本质]]\n- [[#十六、知识图谱位置|十六、知识图谱位置]]\n- [[#核心结论|核心结论]]\n- [[#关联节点|关联节点]]\n- [[#延伸阅读|延伸阅读]]\n- [[#待研究问题|待研究问题]]\n\n## 一、为什么会出现 Credits\n\n如果说 [[Token经济学|Token]] 是 AI 行业的底层货币，那么 [[Credits]] 就是平台发行的代币。\n\n很多用户发现，[[OpenAI]] 讲 Token，但很多平台讲：\n\n- Credits\n- 积分\n- 点数\n- 算力包\n- 调用额度\n\n原因是：平台不希望用户直接面对 Token。\n\n## 二、Credits 是什么\n\nCredits 的本质是**平台内部货币**。\n\n它类似：\n\n```text\n人民币\n  ↓ 兑换\n游戏金币\n```\n\n对应到 AI 平台：\n\n```text\nToken\n  ↓ 兑换\nCredits\n```\n\n因此，Credits 不是成本单位，而是**结算单位**。\n\n## 三、为什么平台不直接卖 Token\n\n因为 Token 对普通用户不友好。\n\n例如，告诉用户“本次消耗 137,421 Token”，绝大多数人无法判断贵不贵。\n\n平台改成“消耗 387 Credits”后，对用户来说更容易理解。\n\n## 四、Credits 解决了什么问题\n\n### 1. 隐藏复杂定价\n\n不同模型的价格差异巨大，例如：\n\n- GPT\n- Claude\n- GLM\n- Gemini\n\n如果直接显示 Token，用户很难理解。Credits 统一后，可以把 1 Credit 表示为统一价值，用户体验更简单。\n\n### 2. 统一多模型平台\n\n很多平台同时接入：\n\n- [[OpenAI]]\n- [[Claude]]\n- [[Gemini]]\n- [[智谱AI|GLM]]\n\n不同模型的成本完全不同。Credits 可以统一结算，形成平台货币体系。\n\n### 3. 便于营销\n\n用户更容易接受“赠送 10,000 Credits”，而不是“赠送 300 万 Token”。\n\n## 五、Credits 与 Token 的关系\n\n两者的本质关系是：\n\n```text\nToken\n  ↓ 换算\nCredits\n```\n\n因此，Credits 永远来自 Token 成本，只是平台把换算规则隐藏了。\n\n例如，平台可能规定：\n\n```text\n1,000 Token = 1 Credit\n```\n\n也可能规定：\n\n```text\n500 Token = 1 Credit\n```\n\n换算规则完全由平台决定。\n\n## 六、为什么 Credits 容易让用户误判\n\n用户看到 10,000 Credits 时会感觉很多。实际上，如果使用高端模型，可能几次任务就会消耗完。\n\n因为平台后台会动态换算，例如：\n\n| 模式 | 消耗倍率示例 |\n|---|---|\n| GPT | 1 倍 |\n| Claude | 2 倍 |\n| Agent 模式 | 10 倍 |\n\n于是 Credits 下降得很快。\n\n## 七、为什么你的 5000 积分消耗那么快\n\n典型场景是：用户以为自己只问了几句话，实际上 Agent 正在执行：\n\n```text\n规划\n ↓\n分析\n ↓\n读取文件\n ↓\n生成代码\n ↓\n测试\n ↓\n修复\n```\n\n背后可能调用模型几十次。因此，积分消耗并不是按聊天轮数计算，而是按实际 Token 计算。\n\n## 八、Credits 与 Agent 的关系\n\nAgent 时代，Credits 越来越流行，因为 Agent 成本不可预测。\n\n| 任务 | Token 消耗示例 |\n|---|---|\n| 翻译一句话 | 1,000 Token |\n| 重构项目 | 100 万 Token |\n\n平台不希望用户每天看到不同账单，因此引入 Credits 作为缓冲。\n\n## 九、为什么中国平台特别喜欢 Credits\n\n国内大量平台喜欢积分体系，例如：\n\n- [[智谱AI|智谱]]\n- [[Coze]] 的部分场景\n- 模型聚合平台\n- AI 中转站\n\n主要原因：\n\n### 1. 用户习惯\n\n国内互联网长期使用积分、金币和点券，用户接受度高。\n\n### 2. 方便促销\n\n例如：注册赠送 1,000 积分。\n\n### 3. 方便跨模型\n\n平台可以灵活调整换算规则。\n\n## 十、Credits 与 Subscription 的区别\n\n| 模式 | 付费方式 | 类比 |\n|---|---|---|\n| [[Subscription经济学|Subscription]] | 固定月费 | 健身房会员 |\n| Credits | 按量消费 | 储值卡 |\n\n## 十一、Credits 与 API 的区别\n\n| 模式 | 计费方式 | 透明度 |\n|---|---|---|\n| [[API经济学|API]] | 直接计费，例如 100 万 Token 对应多少费用 | 透明 |\n| Credits | 间接计费，例如消耗 300 Credits | 用户未必知道实际成本 |\n\n## 十二、Credits 为什么对平台有利\n\n### 1. 降低价格敏感度\n\n用户不容易计算真实成本。\n\n### 2. 提高留存\n\n用户购买积分包后，通常会继续使用。\n\n### 3. 便于运营\n\n平台可以灵活进行：\n\n- 赠送\n- 返还\n- 活动奖励\n\n## 十三、Credits 的未来\n\n短期内，Credits 不会消失，因为其用户体验好。\n\n长期来看，Credits 可能与 Agent 额度融合，形成混合模式：\n\n```text\nCredits + Quota\n```\n\n例如，每月包含：\n\n```text\n1,000 任务额度 + 10,000 Credits\n```\n\n## 十四、Credits 在产业链中的位置\n\n```text\nToken\n  ↓\nAPI\n  ↓\nCredits\n  ↓\nSubscription\n  ↓\nAgent Plan\n```\n\nCredits 位于**平台运营层**。\n\n## 十五、Credits 的本质\n\n很多人认为 Credits 是一种新货币，实际上并不是。\n\nCredits 的本质是：\n\n- 包装后的 Token\n- 平台版 Token\n\n其本质价值仍然来自模型推理能力。\n\n## 十六、知识图谱位置\n\n```text\nAI Business\n├── Token\n├── API\n├── Credits\n├── Subscription\n├── Coding Plan\n└── Agent Service\n```\n\nCredits 位于**平台货币层**。\n\n## 核心结论\n\n```text\nToken = AI 行业货币\nCredits = 平台发行货币\n```\n\n所有积分、点数、Credits 和算力包，最终都对应 Token。\n\n> **Credits 不是新的经济体系，只是 Token 经济学的包装层。**\n\n## 关联节点\n\n- [[Token经济学]]\n- [[API经济学]]\n- [[Coding Plan经济学]]\n- [[Agent经济学]]\n- [[Subscription经济学]]\n\n## 延伸阅读\n\n- [[AI商业模式全景图]]\n- [[Credits]]\n- [[Token]]\n- [[AI订阅经济]]\n- [[AI商业模式地图]]\n\n## 待研究问题\n\n1. Credits 是否会取代 Token？\n2. 平台应不应该公开换算规则？\n3. Agent 时代 Credits 是否足够？\n4. Credits 与 Quota 如何融合？\n5. 用户如何评估 Credits 真实价值？\n", "excerpt": "Credits经济学 目录 一、为什么会出现 Credits 二、Credits 是什么 三、为什么平台不直接卖 Token 四、Credits 解决了什么问题 五、Credits 与 Token 的关系 六、为什么 Credits 容易让用户误判 七、为什么你的 5000 积分消耗那么快 八、Credits 与 Agent 的关系 九、为什么中国平台特别喜...", "links": ["07-Business-Token经济学", "07-Business-Credits", "02-Model-Companies-OpenAI", "06-Products-Claude", "06-Products-Gemini", "02-Model-Companies-智谱AI", "04-Platforms-Coze", "07-Business-Subscription经济学", "07-Business-API经济学", "07-Business-Coding-Plan经济学", "07-Business-Agent经济学", "07-Business-AI商业模式全景图", "07-Business-Token", "07-Business-AI订阅经济", "00-MOC-AI商业模式地图"]}, {"id": "07-Business-SaaS", "title": "SaaS", "fileTitle": "SaaS", "category": "07-Business", "categoryLabel": "商业模式", "path": "07-Business/SaaS.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "business"], "body": "# SaaS\n\n## 一句话定义\n\n> SaaS 是通过云端持续交付软件并按周期收取订阅费的商业模式。\n\n## 定位\n\n- AI SaaS 在传统软件订阅上增加模型 Token、工具和 Agent 运行成本。\n- 主要指标包括 ARR、ARPU、留存、毛利率与使用深度。\n\n## 时间轴\n\n| 阶段 | 关键变化 | 意义 |\n|---|---|---|\n| 传统 SaaS | 固定席位与功能订阅 | 软件复制的边际成本低 |\n| AI Copilot | 在 SaaS 中增加模型助手 | 通过 AI 提高 ARPU 与产品黏性 |\n| Agent SaaS | 软件开始执行工作 | 成本与使用量更紧密相关 |\n\n## 产品矩阵\n\n| 产品 / 能力 | 定位 | 核心价值 |\n|---|---|---|\n| Per-seat | 席位订阅 | 适合稳定的企业软件访问 |\n| Usage-based | 用量计费 | 覆盖 Token、存储、执行与 API 成本 |\n| Hybrid | 席位 + 额度 | 同时稳定收入并控制重度用户成本 |\n\n## 商业模式\n\n- AI SaaS 常采用基础席位费加 AI 额度、Credits 或高级套餐。\n- 成功关键是使用频率、可量化 ROI 与可控模型成本。\n\n## 竞争格局\n\n- 传统 SaaS 厂商拥有工作流与数据优势，AI 原生公司拥有更快的产品与 Agent 创新。\n- 当模型商品化后，数据、分发、连接器和流程成为主要壁垒。\n\n## 关联节点\n\n- [[AI订阅经济]]\n- [[Credits]]\n- [[Agent_Business_Model]]\n- [[Copilot]]\n- [[Workflow]]\n\n## 延伸阅读\n\n- [[AI商业模式全景图]]\n- [[Agent经济学]]\n", "excerpt": "SaaS 一句话定义 SaaS 是通过云端持续交付软件并按周期收取订阅费的商业模式。 定位 AI SaaS 在传统软件订阅上增加模型 Token、工具和 Agent 运行成本。 主要指标包括 ARR、ARPU、留存、毛利率与使用深度。 时间轴 产品矩阵 商业模式 AI SaaS 常采用基础席位费加 AI 额度、Credits 或高级套餐。 成功关键是使用频率...", "links": ["07-Business-AI订阅经济", "07-Business-Credits", "07-Business-Agent_Business_Model", "06-Products-Copilot", "03-Agent-Workflow", "07-Business-AI商业模式全景图", "07-Business-Agent经济学"]}, {"id": "07-Business-Subscription经济学", "title": "Subscription经济学", "fileTitle": "Subscription经济学", "category": "07-Business", "categoryLabel": "商业模式", "path": "07-Business/Subscription经济学.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "business"], "body": "# Subscription经济学\n\n## 一句话定义\n\n> Subscription 经济学研究如何用固定周期付费隐藏 Token 复杂度，并在用户价格可预测与平台成本波动之间平衡。\n\n## 定位\n\n- 是 Token、Credits、Coding Plan 和 Agent 定价之间的中间层。\n- 关注月费、年费、席位、额度、留存和毛利率。\n\n## 时间轴\n\n| 阶段 | 关键变化 | 意义 |\n|---|---|---|\n| Token 计费 | 按次和用量收费 | 平台风险低，用户理解成本高 |\n| Consumer Subscription | 固定月费与公平使用 | 用价格简单性提高转化和留存 |\n| Agent Subscription | 周期费 + Credits / Quota | 用限制条件管理重度任务成本 |\n\n## 产品矩阵\n\n| 产品 / 能力 | 定位 | 核心价值 |\n|---|---|---|\n| Flat-rate | 固定套餐 | 价格简单，需要公平使用策略 |\n| Tiered | 分层套餐 | 按模型、工具、额度和速度差异化 |\n| Hybrid | 订阅 + 超额用量 | 稳定收入并降低重度用户风险 |\n\n## 商业模式\n\n- MRR / ARR 提供稳定现金流，年付降低流失并改善现金周转。\n- 套餐设计需基于用户使用分布、模型边际成本和功能价值分层。\n\n## 竞争格局\n\n- 通用 AI 订阅存在多产品并行付费疲劳，需要用独特工作流提高黏性。\n- 当模型商品化后，订阅价值越来越来自个人数据、连接器、记忆和产品生态。\n\n## 关联节点\n\n- [[AI订阅经济]]\n- [[Token经济学]]\n- [[Credits经济学]]\n- [[Coding Plan经济学]]\n- [[Agent经济学]]\n\n## 延伸阅读\n\n- [[AI商业模式全景图]]\n- [[AI商业模式地图]]\n", "excerpt": "Subscription经济学 一句话定义 Subscription 经济学研究如何用固定周期付费隐藏 Token 复杂度，并在用户价格可预测与平台成本波动之间平衡。 定位 是 Token、Credits、Coding Plan 和 Agent 定价之间的中间层。 关注月费、年费、席位、额度、留存和毛利率。 时间轴 产品矩阵 商业模式 MRR / ARR 提...", "links": ["07-Business-AI订阅经济", "07-Business-Token经济学", "07-Business-Credits经济学", "07-Business-Coding-Plan经济学", "07-Business-Agent经济学", "07-Business-AI商业模式全景图", "00-MOC-AI商业模式地图"]}, {"id": "07-Business-Token", "title": "Token", "fileTitle": "Token", "category": "07-Business", "categoryLabel": "商业模式", "path": "07-Business/Token.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "business", "token"], "body": "# Token\n\n## 概述\n\nToken 是模型处理的信息单位，也是 AI 产业度量推理使用量的底层经济单位。它不等于字数；文本会被转换为 Token 序列后再参与模型计算。\n\n```text\nToken → 计算量 → GPU 时间 → 成本 → 价格\n```\n\n## 时间轴\n\n| 阶段        | 用户所见               | Token 角色         |\n| --------- | ------------------ | ---------------- |\n| API 时代    | 输入 / 输出 Token 单价   | 直接计费单位           |\n| Chat 订阅时代 | Plus / Pro 固定月费    | 被订阅隐藏            |\n| 平台时代      | Credits / 积分 / 算力包 | 被平台货币换算          |\n| Agent 时代  | Coding Plan / 任务额度 | 被打包进预算池          |\n| 未来        | Outcome Pricing    | Token 进一步退到幕后成本层 |\n\n## 产品矩阵\n\n| 形态 | 代表 | Token 呈现方式 |\n|---|---|---|\n| 模型 API | OpenAI API、Claude API、GLM API、Gemini API | 直接显示输入与输出用量 |\n| 消费订阅 | ChatGPT Plus、Claude Pro | 固定月费隐藏底层用量 |\n| Credits 平台 | [[Coze]]、模型聚合平台 | Token 按平台规则换算为积分 |\n| Coding Plan | Claude Max、GLM Coding、Cursor Ultra | Token 被打包为开发额度 |\n\n## 商业模式\n\n- API 通常分别对 Input Token 和 Output Token 定价，输出价格通常更高。\n- Context Window 表示模型一次能看到的 Token 数，窗口越大，潜在成本越高。\n- Agent 的规划、执行、检查和重试会引发多轮调用，让 Token 成本显著高于聊天。\n- 算力效率、模型优化和市场竞争会推动 Token 价格下降与商品化。\n\n## 战略演进\n\n```text\n显式 Token 计费 → Credits 换算 → Subscription / Coding Plan 打包 → 结果定价\n```\n\nToken 不会从成本结构中消失，但会越来越少地暴露给最终用户。\n\n## 参考课程\n\n- [[Token经济学]]\n- [[AI商业模式全景图]]\n- [[Agent经济学]]\n\n## 关联节点\n\n- [[API]]\n- [[Credits]]\n- [[Coding_Plan|Coding Plan]]\n- [[AI订阅经济|Subscription]]\n- [[Agent_Economy|Agent Economy]]\n- [[AI商业模式地图]]\n", "excerpt": "Token 概述 Token 是模型处理的信息单位，也是 AI 产业度量推理使用量的底层经济单位。它不等于字数；文本会被转换为 Token 序列后再参与模型计算。 时间轴 产品矩阵 商业模式 API 通常分别对 Input Token 和 Output Token 定价，输出价格通常更高。 Context Window 表示模型一次能看到的 Token 数，...", "links": ["04-Platforms-Coze", "07-Business-Token经济学", "07-Business-AI商业模式全景图", "07-Business-Agent经济学", "07-Business-API", "07-Business-Credits", "07-Business-Coding_Plan", "07-Business-AI订阅经济", "03-Agent-Agent_Economy", "00-MOC-AI商业模式地图"]}, {"id": "07-Business-Token经济学", "title": "Token经济学", "fileTitle": "Token经济学", "category": "07-Business", "categoryLabel": "商业模式", "path": "07-Business/Token经济学.md", "updated": "2026-06-17", "tags": ["AI", "BusinessModel", "TokenEconomics"], "body": "# Token经济学\n\n## 目录\n\n- [[#一、为什么必须理解 Token|一、为什么必须理解 Token]]\n- [[#二、Token 是什么|二、Token 是什么]]\n- [[#三、为什么会有 Token|三、为什么会有 Token]]\n- [[#四、Token 与成本的关系|四、Token 与成本的关系]]\n- [[#五、输入 Token 与输出 Token|五、输入 Token 与输出 Token]]\n- [[#六、Context Window|六、Context Window]]\n- [[#七、为什么 Agent 特别烧 Token|七、为什么 Agent 特别烧 Token]]\n- [[#八、Token 价格为什么不断下降|八、Token 价格为什么不断下降]]\n- [[#九、为什么用户越来越看不到 Token|九、为什么用户越来越看不到 Token]]\n- [[#十、Credits 与 Token 的关系|十、Credits 与 Token 的关系]]\n- [[#十一、Coding Plan 与 Token 的关系|十一、Coding Plan 与 Token 的关系]]\n- [[#十二、为什么 5000 积分一下烧完|十二、为什么 5000 积分一下烧完]]\n- [[#十三、Token 的未来|十三、Token 的未来]]\n- [[#十四、知识图谱位置|十四、知识图谱位置]]\n- [[#核心结论|核心结论]]\n- [[#关联节点|关联节点]]\n- [[#延伸阅读|延伸阅读]]\n- [[#待研究问题|待研究问题]]\n\n## 一、为什么必须理解 Token\n\n很多人使用 AI 时，最困惑的问题是：**为什么收费这么复杂？**\n\n例如：\n\n- [[OpenAI]] 按 [[Token]] 收费\n- [[Anthropic|Claude]] 按额度收费\n- [[智谱AI|智谱]] 按积分收费\n- [[Coze]] 按 [[Credits]] 收费\n\n看起来完全不同，实际上背后都对应 Token。\n\n> [!summary] 一句话\n> 理解 Token，等于理解 AI 产业成本。\n\n## 二、Token 是什么\n\n很多人误以为 Token 等于字数，实际上并不准确。\n\n更准确的定义是：\n\n```text\nToken = 模型处理的信息单位\n```\n\n它类似计算机中的字节（Byte），或者互联网中的流量。模型不会直接看文字，而是处理 Token 序列。\n\n## 三、为什么会有 Token\n\n因为模型本质上是数学系统。\n\n例如，一句话：\n\n> 我喜欢人工智能\n\n模型不会直接看到文字，而是把文字转换为数字，再进行计算。\n\n因此，Token 的本质是**计算对象**。\n\n## 四、Token 与成本的关系\n\n很多人认为 AI 公司卖的是回答，实际上卖的是**推理能力**。\n\n推理能力来自 GPU。GPU 运行时间越长，成本越高。因此，模型公司需要一个计量单位，最终选择了 Token。\n\n```text\nToken\n  ↓\n计算量\n  ↓\nGPU 时间\n  ↓\n成本\n```\n\n## 五、输入 Token 与输出 Token\n\nAPI 通常把 Token 分为：\n\n| 类型 | 含义 | 示例 |\n|---|---|---|\n| Input Token | 输入 | 用户提问 |\n| Output Token | 输出 | 模型回答 |\n\n一般情况下，输出更贵，原因是生成过程计算更复杂。因此，很多模型的价格关系是：\n\n```text\nInput < Output\n```\n\n## 六、Context Window\n\n理解 Token 必须理解 **Context Window（上下文窗口）**。\n\n例如：\n\n- 128K\n- 256K\n- 1M\n\n它们表示模型一次能看到多少 Token。窗口越大，模型记忆越长，但成本也越高。\n\n## 七、为什么 Agent 特别烧 Token\n\n传统聊天：\n\n```text\n一次问题 → 一次回答 → 例如 5,000 Token\n```\n\nAgent：\n\n```text\n规划\n ↓\n执行\n ↓\n检查\n ↓\n修正\n ↓\n再次执行\n```\n\n这个过程可能调用几十次模型，最终消耗 20 万 Token，甚至 100 万 Token。\n\n因此，Agent 时代的 Token 消耗呈指数级增长。\n\n## 八、Token 价格为什么不断下降\n\nOpenAI 最初的 GPT-4 价格很高，后来的 GPT-4o、GPT-5 系列价格不断下降。主要原因包括：\n\n1. **算力提升**：GPU 效率提升。\n2. **模型优化**：推理成本下降。\n3. **市场竞争**：[[DeepSeek]]、[[智谱AI|智谱]]、[[Gemini]] 持续压价。\n\n因此，Token 正在商品化。\n\n## 九、为什么用户越来越看不到 Token\n\n因为普通用户无法理解 Token。\n\n例如，“用了 13.7 万 Token”对用户没有意义。用户更关心花了多少钱。\n\n因此出现了：\n\n- Plus\n- Pro\n- Credits\n- Coding Plan\n\n它们的本质都是**隐藏 Token**。\n\n## 十、Credits 与 Token 的关系\n\nCredits 不是成本单位，而是平台货币。\n\n```text\nToken\n  ↓\n换算\n  ↓\nCredits\n```\n\n因此，Credits 的本质是包装后的 Token。\n\n## 十一、Coding Plan 与 Token 的关系\n\n[[Coding_Plan|Coding Plan]] 不是替代 Token，而是**打包 Token**。\n\n例如，用户购买每月套餐，后台可能对应 500 万 Token 预算池，只是用户看不到。\n\n## 十二、为什么 5000 积分一下烧完\n\n典型原因是用户正在使用 Coding Agent，而不是聊天。\n\nAgent 过程：\n\n```text\n分析项目\n   ↓\n读文件\n   ↓\n生成代码\n   ↓\n修复\n   ↓\n测试\n```\n\n每一步都消耗 Token。因此，表面上只问了几句话，实际上可能调用了几十轮模型。\n\n## 十三、Token 的未来\n\n目前，Token 是 AI 行业货币。未来，Token 越来越可能被隐藏，用户购买的是结果，而不是 Token。\n\n例如，未来可能是：\n\n> 生成网站：99 美元\n\n而不是：\n\n> 消耗 300 万 Token\n\n## 十四、知识图谱位置\n\n```text\nAI Business\n├── Token\n├── API\n├── Credits\n├── Subscription\n├── Coding Plan\n└── Agent Service\n```\n\nToken 位于**成本层**。\n\n## 核心结论\n\n今天看到的：\n\n- API 收费\n- Credits 收费\n- 积分收费\n- 套餐收费\n\n表面不同，本质上都在销售 Token 对应的推理能力。\n\n> **Token 是 AI 时代最底层的经济单位。**\n\n## 关联节点\n\n- [[AI商业模式全景图]]\n- [[API经济学]]\n- [[Credits经济学]]\n- [[Coding Plan经济学]]\n- [[Agent经济学]]\n\n## 延伸阅读\n\n- [[Token]]\n- [[Credits]]\n- [[Coding_Plan|Coding Plan]]\n- [[AI订阅经济]]\n- [[Agent_Economy|Agent Economy]]\n\n## 待研究问题\n\n1. Token 是否会像云计算一样持续降价？\n2. Agent 时代 Token 消耗会增长多少倍？\n3. Token 是否会被完全隐藏？\n4. 企业应如何预测 Token 成本？\n5. 未来 AI 是否会按结果收费？\n", "excerpt": "Token经济学 目录 一、为什么必须理解 Token 二、Token 是什么 三、为什么会有 Token 四、Token 与成本的关系 五、输入 Token 与输出 Token 六、Context Window 七、为什么 Agent 特别烧 Token 八、Token 价格为什么不断下降 九、为什么用户越来越看不到 Token 十、Credits 与 T...", "links": ["02-Model-Companies-OpenAI", "07-Business-Token", "02-Model-Companies-Anthropic", "02-Model-Companies-智谱AI", "04-Platforms-Coze", "07-Business-Credits", "02-Model-Companies-DeepSeek", "06-Products-Gemini", "07-Business-Coding_Plan", "07-Business-AI商业模式全景图", "07-Bus h": "10-Concepts/Agent.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "concept"], "body": "# Agent\n\n## 一句话定义\n\n> Agent 是以目标为驱动，能规划、使用工具、执行、检查并重试的 AI 系统。\n\n## 定位\n\n- 本页是 Concept 层入口，详细主文件为 [[Agent基础]]。\n- 关键组件是 LLM、Planner、Workflow、Executor 与 Tools。\n\n## 时间轴\n\n| 阶段 | 关键变化 | 意义 |\n|---|---|---|\n| 概念形成 | 从单一模型能力中抽象出通用方法 | 建立可复用的 AI 系统组件 |\n| 工程化 | 引入 API、评测、观测和治理 | 从演示走向生产应用 |\n| Agent 阶段 | 与知识、工具和流程协同 | 成为端到端任务的组成部分 |\n\n## 产品矩阵\n\n| 产品 / 能力 | 定位 | 核心价值 |\n|---|---|---|\n| 核心机制 | Agent | 提供该概念的基础能力 |\n| 应用层 | RAG / Workflow / Agent | 把概念组合进可用系统 |\n| 治理层 | 评测、安全、成本 | 管理质量与生产风险 |\n\n## 商业模式\n\n- 概念本身通常不独立收费，而是通过 API、SaaS、企业平台或 Agent 产品变现。\n- 成本与模型推理、数据、存储、工具或工程维护相关。\n\n## 竞争格局\n\n- 竞争重点是质量、成本、开放性、工具生态和企业可治理性。\n- 在模型商品化背景下，工程可靠性与应用数据更重要。\n\n## 关联节点\n\n- [[Agent基础]]\n- [[Workflow]]\n- [[Tool_Use]]\n- [[MCP]]\n- [[Computer_Use]]\n\n## 延伸阅读\n\n- [[Agent地图]]\n- [[论文索引]]\n- [[官网索引]]\n", "excerpt": "Agent 一句话定义 Agent 是以目标为驱动，能规划、使用工具、执行、检查并重试的 AI 系统。 定位 本页是 Concept 层入口，详细主文件为 Agent基础。 关键组件是 LLM、Planner、Workflow、Executor 与 Tools。 时间轴 产品矩阵 商业模式 概念本身通常不独立收费，而是通过 API、SaaS、企业平台或 Ag...", "links": ["03-Agent-Agent基础", "03-Agent-Workflow", "03-Agent-Tool_Use", "03-Agent-MCP", "03-Agent-Computer_Use", "00-MOC-Agent地图", "99-Resources-论文索引", "99-Resources-官网索引"]}, {"id": "10-Concepts-Constitutional-AI", "title": "Constitutional AI", "fileTitle": "Constitutional AI", "category": "10-Concepts", "categoryLabel": "核心概念", "path": "10-Concepts/Constitutional AI.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "concept", "AI-Safety", "Alignment"], "body": "# Constitutional AI\n\n## 一句话定义\n\nConstitutional AI（宪法式 AI）是一种让模型依据一组明确原则进行自我批评、修正和对齐训练的方法。\n\n## 定位\n\nConstitutional AI 位于 [[AI Safety]] 与 [[AI Alignment]] 层，目标是在减少逐条人工反馈依赖的同时，提高模型行为的可控性、透明度和一致性。\n\n## 时间轴\n\n| 时间 | 事件 |\n|---|---|\n| 2021 | [[Anthropic]] 成立，安全与可控性成为核心研究方向 |\n| 2022 | Anthropic 发布 Constitutional AI 研究，系统阐述基于原则的模型对齐方法 |\n| 2023 | [[Claude]] 产品化，Constitutional AI 成为其安全路线的重要组成部分 |\n| 2024-2026 | 宪法式方法与 [[RLHF]]、红队测试和可解释性研究共同演进 |\n\n## 产品矩阵\n\n| 层级 | 代表能力或产品 | 作用 |\n|---|---|---|\n| 原则层 | Constitution | 定义模型应遵守的行为原则 |\n| 训练层 | 自我批评与修正 | 让模型依据原则改进回答 |\n| 反馈层 | AI Feedback | 使用模型反馈辅助对齐训练 |\n| 产品层 | [[Claude]] | 将安全与可靠性研究应用于通用助手 |\n\n## 商业模式\n\nConstitutional AI 本身不是独立收费产品。它通过提升 Claude 的安全性、可靠性和企业可接受度，为 API、订阅和企业服务提供信任基础。\n\n## 竞争格局\n\n| 路线 | 代表 | 重点 |\n|---|---|---|\n| Constitutional AI | [[Anthropic]] | 基于明确原则进行自我批评与修正 |\n| RLHF | [[OpenAI]] 等 | 依据人类偏好反馈优化模型行为 |\n| 规则与安全策略 | 多家模型公司 | 在产品层约束输出与工具行为 |\n| 可解释性研究 | Anthropic、Google DeepMind 等 | 理解模型内部机制和风险来源 |\n\n## 关联节点\n\n- [[Anthropic]]\n- [[Claude]]\n- [[RLHF]]\n- [[AI Safety]]\n- [[AI Alignment]]\n- [[Agent]]\n- [[Anthropic为什么与OpenAI分裂]]\n\n## 延伸阅读\n\n- [Constitutional AI: Harmlessness from AI Feedback](https://arxiv.org/abs/2212.08073)\n- [Anthropic Research](https://www.anthropic.com/research)\n- [[Anthropic为什么与OpenAI分裂]]\n\n", "excerpt": "Constitutional AI 一句话定义 Constitutional AI（宪法式 AI）是一种让模型依据一组明确原则进行自我批评、修正和对齐训练的方法。 定位 Constitutional AI 位于 AI Safety 与 AI Alignment 层，目标是在减少逐条人工反馈依赖的同时，提高模型行为的可控性、透明度和一致性。 时间轴 产品矩阵 ...", "links": ["02-Model-Companies-Anthropic", "06-Products-Claude", "10-Concepts-RLHF", "02-Model-Companies-OpenAI", "10-Concepts-Agent", "02-Model-Companies-Anthropic为什么与OpenAI分裂"]}, {"id": "10-Concepts-Context-Window", "title": "Context Window", "fileTitle": "Context Window", "category": "10-Concepts", "categoryLabel": "核心概念", "path": "10-Concepts/Context Window.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "concept"], "body": "# Context Window\n\n## 一句话定义\n\n> Context Window 是模型一次推理能接收和产生的 Token 总范围。\n\n## 定位\n\n- 决定模型能同时看到的对话、文档和工具结果规模。\n- 窗口越大不代表所有信息都能被等效利用，且成本可能上升。\n\n## 时间轴\n\n| 阶段 | 关键变化 | 意义 |\n|---|---|---|\n| 概念形成 | 从单一模型能力中抽象出通用方法 | 建立可复用的 AI 系统组件 |\n| 工程化 | 引入 API、评测、观测和治理 | 从演示走向生产应用 |\n| Agent 阶段 | 与知识、工具和流程协同 | 成为端到端任务的组成部分 |\n\n## 产品矩阵\n\n| 产品 / 能力 | 定位 | 核心价值 |\n|---|---|---|\n| 核心机制 | Context Window | 提供该概念的基础能力 |\n| 应用层 | RAG / Workflow / Agent | 把概念组合进可用系统 |\n| 治理层 | 评测、安全、成本 | 管理质量与生产风险 |\n\n## 商业模式\n\n- 概念本身通常不独立收费，而是通过 API、SaaS、企业平台或 Agent 产品变现。\n- 成本与模型推理、数据、存储、工具或工程维护相关。\n\n## 竞争格局\n\n- 竞争重点是质量、成本、开放性、工具生态和企业可治理性。\n- 在模型商品化背景下，工程可靠性与应用数据更重要。\n\n## 关联节点\n\n- [[Token]]\n- [[LLM]]\n- [[RAG]]\n- [[Prompt Engineering]]\n\n## 延伸阅读\n\n- [[Agent地图]]\n- [[论文索引]]\n- [[官网索引]]\n", "excerpt": "Context Window 一句话定义 Context Window 是模型一次推理能接收和产生的 Token 总范围。 定位 决定模型能同时看到的对话、文档和工具结果规模。 窗口越大不代表所有信息都能被等效利用，且成本可能上升。 时间轴 产品矩阵 商业模式 概念本身通常不独立收费，而是通过 API、SaaS、企业平台或 Agent 产品变现。 成本与模型...", "links": ["07-Business-Token", "10-Concepts-LLM", "03-Agent-RAG", "10-Concepts-Prompt-Engineering", "00-MOC-Agent地图", "99-Resources-论文索引", "99-Resources-官网索引"]}, {"id": "10-Concepts-Digital-Workforce", "title": "Digital Workforce", "fileTitle": "Digital Workforce", "category": "10-Concepts", "categoryLabel": "核心概念", "path": "10-Concepts/Digital Workforce.md", "updated": "2026-06-20", "tags": ["AI-Learning-OS", "concept", "Agent", "Multi-Agent"], "body": "# Digital Workforce\n\n## 一句话定义\n\nDigital Workforce 是由多个专业 Agent、运行时、工具和治理机制组成，可持续承担组织工作流程的数字劳动力体系。\n\n## 定位\n\n位于 [[Multi-Agent]] 之上的组织级价值交付层，把单个数字助手扩展为可分工、协作、审计和管理的数字团队。\n\n## 时间轴\n\n- ChatBot：提供回答。\n- Copilot：辅助人类工作。\n- Agent：自主执行任务。\n- Multi-Agent：多个数字角色协作。\n- Digital Workforce：数字团队进入持续业务流程。\n\n## 产品矩阵\n\n- 数字销售与客服\n- 数字研究员与分析师\n- 数字程序员与测试 Agent\n- 主管、审核与治理 Agent\n- Agent Runtime、工具和企业系统连接\n\n## 商业模式\n\n可以按席位、任务额度、流程用量、结果或企业级数字团队服务收费，核心是将技术使用量转化为可衡量的业务产出。\n\n## 竞争格局\n\nAgent 平台、自动化厂商、企业 SaaS、咨询与外包服务商都可能进入该市场，竞争重点是任务完成率、成本、治理、安全和业务集成。\n\n## 关联节点\n\n- [[Multi-Agent]]\n- [[Agent]]\n- [[Agent Runtime]]\n- [[Agent经济学]]\n- [[Outcome Pricing]]\n- [[LangGraph]]\n\n## 延伸阅读\n\n- [[Multi-Agent]]\n- [[Agent产品地图]]\n- [[Agent经济学]]\n\n", "excerpt": "Digital Workforce 一句话定义 Digital Workforce 是由多个专业 Agent、运行时、工具和治理机制组成，可持续承担组织工作流程的数字劳动力体系。 定位 位于 Multi-Agent 之上的组织级价值交付层，把单个数字助手扩展为可分工、协作、审计和管理的数字团队。 时间轴 ChatBot：提供回答。 Copilot：辅助人类工...", "links": ["10-Concepts-Multi-Agent", "10-Concepts-Agent", "10-Concepts-Agent-Runtime", "07- 协同 | 成为端到端任务的组成部分 |\n\n## 产品矩阵\n\n| 产品 / 能力 | 定位 | 核心价值 |\n|---|---|---|\n| 核心机制 | Fine-tuning | 提供该概念的基础能力 |\n| 应用层 | RAG / Workflow / Agent | 把概念组合进可用系统 |\n| 治理层 | 评测、安全、成本 | 管理质量与生产风险 |\n\n## 商业模式\n\n- 概念本身通常不独立收费，而是通过 API、SaaS、企业平台或 Agent 产品变现。\n- 成本与模型推理、数据、存储、工具或工程维护相关。\n\n## 竞争格局\n\n- 竞争重点是质量、成本、开放性、工具生态和企业可治理性。\n- 在模型商品化背景下，工程可靠性与应用数据更重要。\n\n## 关联节点\n\n- [[LLM]]\n- [[RAG]]\n- [[RLHF]]\n- [[Embedding]]\n\n## 延伸阅读\n\n- [[Agent地图]]\n- [[论文索引]]\n- [[官网索引]]\n", "excerpt": "Fine-tuning 一句话定义 Fine-tuning 是用特定数据继续训练预训练模型，以调整其行为、风格或任务能力。 定位 适合稳定行为与专项能力，不是注入频繁变化知识的首选。 知识补充通常优先考虑 RAG。 时间轴 产品矩阵 商业模式 概念本身通常不独立收费，而是通过 API、SaaS、企业平台或 Agent 产品变现。 成本与模型推理、数据、存储、...", "links": ["10-Concepts-LLM", "03-Agent-RAG", "10-Concepts-RLHF", "10-Concepts-Embedding", "00-MOC-Agent地图", "99-Resources-论文索引", "99-Resources-官网索引"]}, {"id": "10-Concepts-Function-Calling", "title": "Function Calling", "fileTitle": "Function Calling", "category": "10-Concepts", "categoryLabel": "核心概念", "path": "10-Concepts/Function Calling.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "concept"], "body": "# Function Calling\n\n## 一句话定义\n\n> Function Calling 是模型根据函数 Schema 生成结构化调用参数，由外部程序执行工具的机制。\n\n## 定位\n\n- Tool Use 的基础实现机制。\n- MCP 负责更高层的工具发现、连接与管理。\n\n## 时间轴\n\n| 阶段 | 关键变化 | 意义 |\n|---|---|---|\n| 概念形成 | 从单一模型能力中抽象出通用方法 | 建立可复用的 AI 系统组件 |\n| 工程化 | 引入 API、评测、观测和治理 | 从演示走向生产应用 |\n| Agent 阶段 | 与知识、工具和流程协同 | 成为端到端任务的组成部分 |\n\n## 产品矩阵\n\n| 产品 / 能力 | 定位 | 核心价值 |\n|---|---|---|\n| 核心机制 | Function Calling | 提供该概念的基础能力 |\n| 应用层 | RAG / Workflow / Agent | 把概念组合进可用系统 |\n| 治理层 | 评测、安全、成本 | 管理质量与生产风险 |\n\n## 商业模式\n\n- 概念本身通常不独立收费，而是通过 API、SaaS、企业平台或 Agent 产品变现。\n- 成本与模型推理、数据、存储、工具或工程维护相关。\n\n## 竞争格局\n\n- 竞争重点是质量、成本、开放性、工具生态和企业可治理性。\n- 在模型商品化背景下，工程可靠性与应用数据更重要。\n\n## 关联节点\n\n- [[Tool_Use]]\n- [[MCP]]\n- [[Agent]]\n- [[API]]\n- [[OpenAI_Agents_SDK]]\n\n## 延伸阅读\n\n- [[Agent地图]]\n- [[论文索引]]\n- [[官网索引]]\n", "excerpt": "Function Calling 一句话定义 Function Calling 是模型根据函数 Schema 生成结构化调用参数，由外部程序执行工具的机制。 定位 Tool Use 的基础实现机制。 MCP 负责更高层的工具发现、连接与管理。 时间轴 产品矩阵 商业模式 概念本身通常不独立收费，而是通过 API、SaaS、企业平台或 Agent 产品变现。 ...", "links": ["03-Agent-Tool_Use", "03-Agent-MCP", "10-Concepts-Agent", "07-Business-API", "04-Platforms-OpenAI_Agents_SDK", "00-MOC-Agent地图", "99-Resources-论文索引", "99-Resources-官网索引"]}, {"id": "10-Concepts-GLM", "title": "GLM", "fileTitle": "GLM", "category": "10-Concepts", "categoryLabel": "核心概念", "path": "10-Concepts/GLM.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "concept", "GLM", "LLM"], "body": "# GLM\n\n## 一句话定义\n\nGLM（General Language Model）是 [[智谱AI]] 的通用语言模型技术路线，也是其 API、Chat、Agent 与 Coding 产品的模型基础。\n\n## 定位\n\nGLM 位于智谱产品体系的模型层，重点覆盖中英双语、通用推理、工具调用、多模态与产业适配。\n\n## 时间轴\n\n| 时间 | 演进 |\n|---|---|\n| 2021-2023 | GLM 路线形成并持续迭代 |\n| 2023 | [[ChatGLM]] 扩大开发者影响力 |\n| 2024-2025 | GLM-4 系列加强上下文、工具调用与 Agent 能力 |\n| 2025-2026 | 支撑 [[AutoGLM]] 与 [[GLM Coding]] 等执行型产品 |\n\n## 产品矩阵\n\n- [[ChatGLM]]：开放模型与开发者生态\n- [[智谱清言]]：终端用户助手\n- GLM API：开发者和企业模型接口\n- [[AutoGLM]]：Agent 与操作能力\n- [[GLM Coding]]：编码 Agent\n\n## 商业模式\n\n通过 API Token、企业服务、Agent 产品和 Coding Plan 将模型能力商业化。\n\n## 竞争格局\n\nGLM 与 GPT、Claude、Gemini、DeepSeek 等模型体系竞争，差异化重点包括中文能力、国产化部署和产业交付。\n\n## 关联节点\n\n- [[智谱AI]]\n- [[ChatGLM]]\n- [[AutoGLM]]\n- [[GLM Coding]]\n- [[LLM]]\n- [[智谱AI发展史（2019-2026）]]\n\n## 延伸阅读\n\n- [[智谱AI发展史（2019-2026）]]\n- [[AI产业地图]]\n\n", "excerpt": "GLM 一句话定义 GLM（General Language Model）是 智谱AI 的通用语言模型技术路线，也是其 API、Chat、Agent 与 Coding 产品的模型基础。 定位 GLM 位于智谱产品体系的模型层，重点覆盖中英双语、通用推理、工具调用、多模态与产业适配。 时间轴 产品矩阵 ChatGLM：开放模型与开发者生态 智谱清言：终端用户助...", "links": ["02-Model-Companies-智谱AI", "06-Products-ChatGLM", "05-Agent-Runners-AutoGLM", "05-Agent-Runners-GLM-Coding", "06-Products-智谱清言", "10-Concepts-LLM", "02-Model-Companies-智谱AI发展史2019-2026", "00-MOC-AI产业地图"]}, {"id": "10-Concepts-GraphRAG", "title": "GraphRAG", "fileTitle": "GraphRAG", "category": "10-Concepts", "categoryLabel": "核心概念", "path": "10-Concepts/GraphRAG.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "concept"], "body": "# GraphRAG\n\n## 一句话定义\n\n> Graph
