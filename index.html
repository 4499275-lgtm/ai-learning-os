Title": "Anthropic", "category": "02-Model-Companies", "categoryLabel": "模型公司", "path": "02-Model-Companies/Anthropic.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "model-companies", "Anthropic"], "body": "# Anthropic\n\n## 概述\n\nAnthropic 是围绕 Claude 模型、开发者 API、Coding Agent 与 [[MCP]] 构建 Agent 基础设施的 AI 公司。课程将其战略概括为：**从卖模型到卖 Agent 基础设施**。\n\n- 核心能力：Claude 模型、Claude API、[[Claude_Code|Claude Code]] 和 MCP 开放协议。\n- 产品方向：从聊天产品扩展到高强度 Agent 工作。\n- 平台意图：通过 MCP 统一模型与工具的连接方式。\n\n## 时间轴\n\n| 时间 / 阶段 | 关键演进 | 影响 |\n|---|---|---|\n| 模型 API 阶段 | Claude API | 向开发者销售可编程智能 |\n| 消费订阅阶段 | Claude Pro | 以固定月费销售访问权 |\n| Agent 订阅阶段 | Claude Max / Claude Code | 从聊天额度转向高消耗的开发生产力 |\n| 2024-11 | 提出 Model Context Protocol | 尝试建立 Agent 时代的通用工具连接标准 |\n| 路线判断 | Claude → Claude Code → MCP → Agent生态 | 以可靠性和开放协议争夺 Agent 标准 |\n\n## 产品矩阵\n\n| 产品 / 能力 | 定位 | 主要用户 | 价值 |\n|---|---|---|---|\n| Claude API | 模型 API | 开发者、企业 | 可编程推理能力 |\n| [[Claude]] / Pro | 通用 AI 助手与订阅 | 个人用户 | 稳定访问与使用额度 |\n| Claude Max | Agent 重度用户套餐 | 开发者 | 以固定月费包装大量 Agent 消耗 |\n| [[Claude_Code|Claude Code]] | Coding Agent | 开发者 | 读代码、写代码、运行与修复 |\n| [[MCP]] | 开放工具连接协议 | Agent 客户端与工具提供方 | 统一 Client、Server 和 Tool 的连接 |\n| [[Constitutional AI]] | 模型安全与对齐路线 | 模型、企业产品 | 用原则提升模型行为的可控性与可靠性 |\n\n## 商业模式\n\n- **API**：按 Token 销售 Claude 模型推理。\n- **Subscription**：Claude Pro 销售聊天访问权。\n- **Coding Plan**：Claude Max 销售 Claude Code 的 Agent 工作额度与开发生产力。\n- **Enterprise**：Claude Enterprise 销售组织级安全、治理与数据隔离。\n- **生态战略**：MCP 降低工具连接的 N × M 集成复杂度。\n- **路线侧重**：以可靠模型、Claude Code 和 MCP 构建企业可接受的 Agent 基础设施。\n\n## 战略路线\n\n```text\nClaude → Constitutional AI → MCP → Claude Code\n```\n\n核心信仰是“能力增长必须可控”。路线从可靠模型与聊天订阅，演进到开发者 Agent 和开放连接标准。\n\n## 参考课程\n\n- [[Anthropic为什么与OpenAI分裂]]\n- [[OpenAI_Anthropic_智谱三条路线演化对比]]\n- [[OpenAI_Anthropic_智谱三条进化路线]]\n- [[MCP全景图]]\n- [[API经济学]]\n- [[Coding Plan经济学]]\n\n## 关联节点\n\n- [[Constitutional AI]]\n- [[OpenAI]]\n- [[智谱AI]]\n- [[Claude]]\n- [[Claude_Code|Claude Code]]\n- [[MCP]]\n- [[Coding_Plan|Coding Plan]]\n- [[AI产业地图]]\n", "excerpt": "Anthropic 概述 Anthropic 是围绕 Claude 模型、开发者 API、Coding Agent 与 MCP 构建 Agent 基础设施的 AI 公司。课程将其战略概括为：**从卖模型到卖 Agent 基础设施**。 核心能力：Claude 模型、Claude API、Claude Code 和 MCP 开放协议。 产品方向：从聊天产品扩展...", "links": ["03-Agent-MCP", "05-Agent-Runners-Claude_Code", "06-Products-Claude", "10-Concepts-Constitutional-AI", "02-Model-Companies-Anthropic为什么与OpenAI分裂", "02-Model-Companies-OpenAI_Anthropic_智谱三条路线演化对比", "02-Model-Companies-OpenAI_Anthropic_智谱三条进化路线", "03-Agent-MCP全景图", "07-Business-API经济学", "07-Business-Coding-Plan经济学", "02-Model-Companies-OpenAI", "02-Model-Companies-智谱AI", "07-Business-Coding_Plan", "00-MOC-AI产业地图"]}, {"id": "02-Model-Companies-Anthropic为什么与OpenAI分裂", "title": "Anthropic为什么与OpenAI分裂", "fileTitle": "Anthropic为什么与OpenAI分裂", "category": "02-Model-Companies", "categoryLabel": "模型公司", "path": "02-Model-Companies/Anthropic为什么与OpenAI分裂.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "Anthropic", "OpenAI", "AGI", "AI-Safety"], "body": "# Anthropic为什么与OpenAI分裂\n\n## 目录\n\n- [[#学习定位]]\n- [[#一句话定义]]\n- [[#核心问题]]\n- [[#发展时间轴]]\n- [[#Anthropic 与 OpenAI 路线对比]]\n- [[#商业模式对比]]\n- [[#当前判断（2026）]]\n- [[#知识图谱位置]]\n- [[#关联节点]]\n- [[#核心结论]]\n- [[#延伸阅读]]\n\n## 学习定位\n\n理解 [[Anthropic]]，不能从 [[Claude]] 开始，必须从 [[OpenAI]] 内部矛盾开始。\n\nAnthropic 不是普通创业公司。更准确地说：\n\n> Anthropic = OpenAI 核心团队的二次创业\n\n因此，Anthropic 的发展史，本质上是两种 [[AGI]] 路线之争。\n\n## 一句话定义\n\n[[Anthropic]] 是由 OpenAI 前核心研究团队创立、以安全优先为核心理念的 AI 公司。\n\n## 核心问题\n\n为什么 OpenAI 最核心的一批人离开 OpenAI？\n\n答案是：理念冲突逐渐大于组织共识。\n\n## 发展时间轴\n\n| 阶段 | 时间 | 核心事件 | 路线变化 |\n|---|---|---|---|\n| OpenAI 黄金时代 | 2015-2019 | 顶尖研究者共同推动 AGI | 目标高度一致 |\n| 第一次矛盾 | 2019-2020 | OpenAI 建立有限盈利结构 | 开放研究与商业化产生张力 |\n| 安全问题升级 | 2020-2021 | 模型能力快速增长 | 能力增长与安全研究速度失衡 |\n| Anthropic 成立 | 2021 | Dario Amodei 等人离开 OpenAI | 建立安全优先的新组织 |\n| Constitutional AI | 2022 | 提出宪法式 AI | 用原则约束模型行为 |\n| Claude 路线 | 2023 | Claude 产品化 | 强调可靠性、长上下文与稳健输出 |\n| MCP 路线 | 2024-2025 | 提出 Model Context Protocol | 统一 Agent 工具连接方式 |\n| Claude Code 路线 | 2025 | 推出 Claude Code | 从聊天走向可执行 Agent |\n\n## 第一阶段：OpenAI 黄金时代（2015-2019）\n\n当时，OpenAI 聚集了全球顶尖 AI 研究者，核心人物包括：\n\n- Sam Altman：商业与组织负责人\n- Greg Brockman：技术与组织负责人\n- Ilya Sutskever：首席科学家\n- Dario Amodei：后来成为 Anthropic 创始人\n- Daniela Amodei：后来成为 Anthropic 联合创始人\n\n这一阶段，团队目标相对一致：推动 AGI 发展。\n\n## 第二阶段：第一次矛盾（2019-2020）\n\n随着 GPT-2、GPT-3 等模型取得进展，OpenAI 发现训练前沿模型需要越来越高的资金和算力投入。\n\n组织面临关键选择：继续以开放研究为主，还是加速商业化以获得资源。\n\nOpenAI 建立有限盈利结构，标志着其从纯非营利研究机构向商业化组织转变。这成为双方路线出现分歧的重要背景。\n\n## 第三阶段：安全问题升级（2020-2021）\n\n随着 GPT 能力增强，Dario Amodei 团队开始担心：\n\n> 能力增长速度 > 安全研究速度\n\n换言之，模型越来越强，但如何理解、约束和控制模型的研究仍不充分。能力扩张与安全治理之间的优先级，逐渐成为核心分歧。\n\n## 第四阶段：Anthropic 成立（2021）\n\nDario Amodei、Daniela Amodei 及多位 OpenAI 前成员离开 OpenAI，创立 Anthropic。\n\n其目标不是只追求更强的模型，而是构建更可控、更可靠的 AGI 系统。\n\n课程将 Anthropic 的命名解读为“人类中心”，表达 AI 应服务于人类，而不是脱离人类目标。\n\n## 第五阶段：Constitutional AI（2022）\n\nAnthropic 提出 [[Constitutional AI]]，中文常译为“宪法式 AI”。\n\n其核心思想是：为模型提供一组明确原则，让模型依据这些原则进行自我批评和修正，而不只依赖逐条人工反馈。\n\n原则可以涉及：\n\n- 避免伤害\n- 尊重事实\n- 保持诚实\n- 服从人类可接受的行为边界\n\nConstitutional AI 成为 Claude 安全与对齐路线的重要基础。\n\n## 第六阶段：Claude 路线（2023）\n\nOpenAI 押注 [[ChatGPT]]，Anthropic 则推出 Claude。\n\n课程中的路线差异可以概括为：\n\n- ChatGPT 更强调能力扩展与产品普及\n- Claude 更强调可靠性、长上下文和稳定输出\n\n这并不意味着两家公司只关注单一目标，而是反映了各自战略叙事和产品优先级的差异。\n\n## 第七阶段：MCP 路线（2024-2025）\n\nAnthropic 判断未来 [[Agent]] 需要连接大量工具。如果每个模型分别适配每个工具，将形成 N × M 的集成复杂度。\n\n因此，Anthropic 提出 [[MCP]]（Model Context Protocol），尝试统一 Agent 与外部数据、工具和系统之间的接口。\n\n这使 Anthropic 的战略从模型与应用扩展到 Agent 连接基础设施。\n\n## 第八阶段：Claude Code 路线（2025）\n\nAnthropic 进一步判断，软件开发是 Agent 最容易形成实际价值的场景之一，因此推出 [[Claude_Code|Claude Code]]。\n\nClaude Code 的核心不只是对话，而是读取代码、修改文件、运行命令、检查结果并持续迭代，标志着 Anthropic 从聊天产品进入执行型 Agent 阶段。\n\n## Anthropic 与 OpenAI 路线对比\n\n| 维度 | [[OpenAI]] | [[Anthropic]] |\n|---|---|---|\n| 核心叙事 | 能力优先 | 安全优先 |\n| 主要路线 | GPT → ChatGPT → Agent | Claude → MCP → Claude Code |\n| 模型侧重点 | 扩展能力边界 | 扩展可控与可靠边界 |\n| Agent 战略 | 建设综合 Agent 平台 | 建设模型、协议与编码 Agent 基础设施 |\n| 核心假设 | 持续创造能力，同步解决应用与治理问题 | 能力增长必须伴随安全与控制能力增长 |\n\n## 商业模式对比\n\n### OpenAI\n\n- [[API经济学|API]]\n- ChatGPT 订阅\n- 企业服务\n- Agent Platform\n\n### Anthropic\n\n- Claude API\n- Claude 订阅\n- Claude Code 套餐\n- 企业服务\n- MCP 与 Agent 生态基础设施\n\n## 当前判断（2026）\n\n课程将 Anthropic 定位为 OpenAI 的“镜像”：\n\n- OpenAI 主要探索能力边界\n- Anthropic 主要探索控制边界\n\n二者不是简单的复制与被复制关系，而是以不同优先级共同推动 AGI 技术、产品与治理体系的发展。\n\n## 知识图谱位置\n\n```text\nAnthropic\n├── Claude\n├── Constitutional AI\n├── MCP\n├── Claude Code\n├── Tool Use\n└── Agent\n```\n\n## 关联节点\n\n- [[OpenAI发展史（2015-2026）|OpenAI发展史]]\n- [[Claude]]\n- [[MCP]]\n- [[Claude_Code|Claude Code]]\n- [[Constitutional AI]]\n- [[Agent]]\n- [[OpenAI]]\n- [[Google_DeepMind|Google DeepMind]]\n\n## 核心结论\n\nAnthropic 不是 OpenAI 的复制品。\n\nAnthropic 的出现代表 AI 行业开始系统性思考：问题不仅是“AI 能做什么”，还包括“AI 应该做什么”。\n\nClaude、MCP 和 Claude Code，都是 Anthropic 对这个问题的延伸回答。\n\n## 延伸阅读\n\n- [[Anthropic]]\n- [[OpenAI发展史（2015-2026）|OpenAI发展史]]\n- [[MCP全景图]]\n- [[Agent全景图]]\n- [[AI产业地图]]\n\n", "excerpt": "Anthropic为什么与OpenAI分裂 目录 #学习定位 #一句话定义 #核心问题 #发展时间轴 #Anthropic 与 OpenAI 路线对比 #商业模式对比 #当前判断（2026） #知识图谱位置 #关联节点 #核心结论 #延伸阅读 学习定位 理解 Anthropic，不能从 Claude 开始，必须从 OpenAI 内部矛盾开始。 Anthrop...", "links": ["02-Model-Companies-Anthropic", "06-Products-Claude", "02-Model-Companies-OpenAI", "10-Concepts-Constitutional-AI", "06-Products-ChatGPT", "10-Concepts-Agent", "03-Agent-MCP", "05-Agent-Runners-Claude_Code", "07-Business-API经济学", "02-Model-Companies-OpenAI发展史2015-2026", "02-Model-Companies-Google_DeepMind", "03-Agent-MCP全景图", "03-Agent-Agent全景图", "00-MOC-AI产业地图"]}, {"id": "02-Model-Companies-DeepSeek", "title": "DeepSeek", "fileTitle": "DeepSeek", "category": "02-Model-Companies", "categoryLabel": "模型公司", "path": "02-Model-Companies/DeepSeek.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "model-companies", "DeepSeek"], "body": "# DeepSeek\n\n## 概述\n\nDeepSeek 是聚焦高效基础模型、代码模型与推理模型的中国 AI 公司。其主要影响来自开放权重、较低 API 定价以及对模型训练和推理效率的工程优化。\n\n- 核心模型：DeepSeek Coder、DeepSeek-V2 / V3、DeepSeek-R1。\n- 产品形态：网页 / App 助手、API 平台、开放权重模型。\n- 战略特征：以成本效率和开放生态对高价闭源模型形成压力。\n\n## 时间轴\n\n| 时间 | 关键事件 | 影响 |\n|---|---|---|\n| 2023 | DeepSeek 开始发布基础与代码模型 | 建立开放模型与开发者定位 |\n| 2023 | DeepSeek Coder 公布 | 进入代码生成与开发者市场 |\n| 2024 | DeepSeek-V2 推进 MoE 与成本效率路线 | 以更低训练和推理成本扩大 API 竞争 |\n| 2024-12 | DeepSeek-V3 发布 | 提升通用、代码和多任务能力 |\n| 2025-01 | DeepSeek-R1 发布 | 以开放推理模型扩大全球影响 |\n\n## 产品矩阵\n\n| 产品 / 能力 | 定位 | 主要用户 | 关键价值 |\n|---|---|---|---|\n| DeepSeek-V3 | 通用 MoE 基础模型 | 开发者、企业、消费者 | 通用对话、代码、知识与多任务处理 |\n| DeepSeek-R1 | 推理模型 | 数学、代码、复杂问题用户 | 强化长链路推理与可复现研究 |\n| DeepSeek Coder | 代码模型 | 开发者 | 代码生成、理解与修复 |\n| DeepSeek App / Web | 消费者 AI 助手 | 个人用户 | 低门槛使用 DeepSeek 模型 |\n| DeepSeek API | 开发者平台 | 开发者、企业 | 以竞争性定价提供模型能力 |\n\n## 商业模式\n\n- **API**：以按 Token 计费的 API 向开发者和企业销售推理能力。\n- **Open Weights**：开放模型扩大开发者覆盖、本地部署和衍生模型生态。\n- **Cost Leadership**：通过 MoE、工程优化和高效训练降低 Token 价格，推动模型商品化。\n- **Strategic Ecosystem**：消费者助手带来品牌与用户规模，API 与开源生态带来开发者采用。\n\n## 战略演进\n\n```text\n代码模型 → 高效 MoE 基础模型 → 通用 V3 → 开放推理 R1 → 开发者与企业生态\n```\n\n核心战略是以较低的训练与推理成本，配合开放权重和低价 API，扩大模型的全球采用。\n\n## 参考资料\n\n- [DeepSeek 官网](https://www.deepseek.com/)\n- [DeepSeek API 官方文档](https://api-docs.deepseek.com/)\n- [DeepSeek 官方 GitHub](https://github.com/deepseek-ai)\n- [[Github索引]]\n\n## 关联节点\n\n- [[OpenAI]]\n- [[智谱AI]]\n- [[阿里通义]]\n- [[Meta_AI|Meta AI]]\n- [[API]]\n- [[Token]]\n- [[Coding_Plan|Coding Plan]]\n- [[AI产业地图]]\n", "excerpt": "DeepSeek 概述 DeepSeek 是聚焦高效基础模型、代码模型与推理模型的中国 AI 公司。其主要影响来自开放权重、较低 API 定价以及对模型训练和推理效率的工程优化。 核心模型：DeepSeek Coder、DeepSeek-V2 / V3、DeepSeek-R1。 产品形态：网页 / App 助手、API 平台、开放权重模型。 战略特征：以成本...", "links": ["99-Resources-Github索引", "02-Model-Companies-OpenAI", "02-Model-Companies-智谱AI", "02-Model-Companies-阿里通义", "02-Model-Companies-Meta_AI", "07-Business-API", "07-Business-Token", "07-Business-Coding_Plan", "00-MOC-AI产业地图"]}, {"id": "02-Model-Companies-Google_DeepMind", "title": "Google_DeepMind", "fileTitle": "Google_DeepMind", "category": "02-Model-Companies", "categoryLabel": "模型公司", "path": "02-Model-Companies/Google_DeepMind.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "model-companies", "Google", "DeepMind"], "body": "# Google DeepMind\n\n## 概述\n\nGoogle DeepMind 是 Google 的核心 AI 研究与模型组织，覆盖基础模型、多模态生成、科学 AI、Agent 与 Google 产品集成。其特征是同时拥有模型研发、云平台、消费者入口和科学研究能力。\n\n- 核心模型：Gemini 系列、Gemma 开放模型、Veo 视频模型、Imagen 图像模型。\n- 科学路线：AlphaGo、AlphaFold 等将 AI 用于复杂科学问题。\n- 分发优势：Google Search、Workspace、Android、Google Cloud 和 Gemini 应用。\n\n## 时间轴\n\n| 时间 | 关键事件 | 影响 |\n|---|---|---|\n| 2010 | DeepMind 成立 | 以通用学习系统与强化学习为主要方向 |\n| 2014 | Google 收购 DeepMind | 将前沿研究与 Google 计算和产品生态结合 |\n| 2016 | AlphaGo 里程碑 | 展示深度学习与强化学习的复杂决策能力 |\n| 2020 | AlphaFold 2 取得突破 | 建立 Google DeepMind 在科学 AI 的代表性位置 |\n| 2023 | Google Brain 与 DeepMind 整合；Gemini 1.0 发布 | 统一基础模型研发并进入原生多模态路线 |\n| 2024 | Gemini 1.5、Gemma、Veo 等产品线扩展 | 强化长上下文、开放模型和多媒体生成 |\n| 2025 | Gemini 2.5 等推理与 Agent 能力演进 | 从多模态助手向推理、工具与 Agent 扩展 |\n\n## 产品矩阵\n\n| 产品 / 能力 | 定位 | 主要用户 | 关键价值 |\n|---|---|---|---|\n| [[Gemini]] | 多模态基础模型与助手 | 个人、开发者、企业 | 文本、图像、音频、视频、代码与工具调用 |\n| Gemma | 开放权重模型 | 研究者、开发者 | 本地部署、定制与开放生态 |\n| Veo / Imagen | 视频与图像生成 | 创作者、企业 | 多媒体内容生成 |\n| AlphaFold | 科学 AI | 科研机构、生命科学行业 | 蛋白质结构与分子研究 |\n| Google AI Studio / Gemini API | 开发者平台 | 开发者 | 快速试验和调用 Gemini |\n| Vertex AI | 企业 AI 平台 | 企业 | 模型访问、治理、数据与应用部署 |\n\n## 商业模式\n\n- **API / Cloud**：通过 Gemini API 和 Vertex AI 按用量销售模型能力。\n- **Subscription**：通过 Gemini 高级套餐和 Google One 等组合销售消费者访问权。\n- **Workspace / Enterprise**：将 Gemini 整合进 Gmail、Docs、Meet 等工作流，销售企业生产力与治理。\n- **Ecosystem**：通过 Search、Android、Cloud 和开放模型扩大分发与开发者生态。\n\n## 战略演进\n\n```text\n强化学习研究 → 科学 AI → 多模态基础模型 → Google 全产品集成 → Agent 平台\n```\n\n核心战略是把模型研究转化为 Google 云、工作套件、搜索和消费终端中的通用智能层。\n\n## 参考资料\n\n- [Google DeepMind 官网](https://deepmind.google/)\n- [Google DeepMind Models](https://deepmind.google/models/)\n- [Gemini API 官方文档](https://ai.google.dev/gemini-api/docs/models)\n- [[官网索引]]\n\n## 关联节点\n\n- [[Gemini]]\n- [[OpenAI]]\n- [[Anthropic]]\n- [[Meta_AI|Meta AI]]\n- [[AI产业地图]]\n- [[AI产品地图]]\n- [[API]]\n- [[Agent基础|Agent]]\n", "excerpt": "Google DeepMind 概述 Google DeepMind 是 Google 的核心 AI 研究与模型组织，覆盖基础模型、多模态生成、科学 AI、Agent 与 Google 产品集成。其特征是同时拥有模型研发、云平台、消费者入口和科学研究能力。 核心模型：Gemini 系列、Gemma 开放模型、Veo 视频模型、Imagen 图像模型。 科学路...", "links": ["06-Products-Gemini", "99-Resources-官网索引", "02-Model-Companies-OpenAI", "02-Model-Companies-Anthropic", "02-Model-Companies-Meta_AI", "00-MOC-AI产业地图", "00-MOC-AI产品地图", "07-Business-API", "03-Agent-Agent基础"]}, {"id": "02-Model-Companies-Meta_AI", "title": "Meta_AI", "fileTitle": "Meta_AI", "category": "02-Model-Companies", "categoryLabel": "模型公司", "path": "02-Model-Companies/Meta_AI.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "model-companies", "Meta", "Llama"], "body": "# Meta AI\n\n## 概述\n\nMeta AI 是 Meta 的 AI 研究、基础模型与产品组织，核心路线是通过 Llama 开放权重模型扩大开发者生态，并将 Meta AI 助手集成到 WhatsApp、Instagram、Facebook 和 Messenger 等产品。\n\n- 核心模型：Llama 系列。\n- 核心产品：Meta AI 助手、AI 创作工具与智能眼镜中的 AI 交互。\n- 战略特征：用开放模型建立行业生态，用社交应用规模实现分发。\n\n## 时间轴\n\n| 时间 | 关键事件 | 影响 |\n|---|---|---|\n| 2013 | Facebook AI Research（FAIR）成立 | 建立长期 AI 研究基础 |\n| 2023-02 | LLaMA 公布 | 进入通用大语言模型竞争 |\n| 2023-07 | Llama 2 开放使用 | 加速开发者、云平台与企业部署生态 |\n| 2024 | Llama 3 / 3.1 与 Meta AI 产品集成扩展 | 开放模型与 Meta 消费者应用结合 |\n| 2025 | Llama 4 多模态模型系列公布 | 开放模型路线向原生多模态与 MoE 扩展 |\n\n## 产品矩阵\n\n| 产品 / 能力 | 定位 | 主要用户 | 关键价值 |\n|---|---|---|---|\n| Llama | 开放权重基础模型 | 开发者、研究者、企业 | 定制、本地部署与开放生态 |\n| Meta AI | 通用 AI 助手 | Meta 应用用户 | 对话、搜索、创作与社交上下文交互 |\n| WhatsApp / Instagram / Facebook AI | 嵌入式 AI | 社交与通讯用户 | 低摩擦的大规模分发 |\n| AI 智能眼镜 | 可穿戴 AI 入口 | 消费者 | 视觉、语音和环境理解 |\n| Llama 合作生态 | 云与硬件伙伴 | 企业、开发者 | 降低部署门槛并扩大模型覆盖 |\n\n## 商业模式\n\n- **Engagement / Advertising**：AI 提升 Meta 应用的用户活跃、内容创作、推荐与广告效率。\n- **Open Ecosystem**：Llama 通过开放权重降低采用门槛，影响开发框架、云平台与硬件生态。\n- **Enterprise Partnerships**：与云、硬件和软件伙伴合作提供部署与定制。\n- **Devices**：通过 AI 智能眼镜等硬件建立新交互入口。\n\n## 战略演进\n\n```text\nFAIR 基础研究 → Llama 开放模型 → Meta AI 社交分发 → 多模态与可穿戴 AI\n```\n\n其核心不是单纯以 API 收入为中心，而是用开放模型和消费者分发巩固 Meta 的平台与设备生态。\n\n## 参考资料\n\n- [Meta AI 官网](https://ai.meta.com/)\n- [Llama 官方页](https://ai.meta.com/llama/)\n- [Meta AI Blog](https://ai.meta.com/blog/)\n- [[官网索引]]\n\n## 关联节点\n\n- [[OpenAI]]\n- [[Google_DeepMind|Google DeepMind]]\n- [[DeepSeek]]\n- [[AI产业地图]]\n- [[AI产品地图]]\n- [[API]]\n- [[Agent基础|Agent]]\n", "excerpt": "Meta AI 概述 Meta AI 是 Meta 的 AI 研究、基础模型与产品组织，核心路线是通过 Llama 开放权重模型扩大开发者生态，并将 Meta AI 助手集成到 WhatsApp、Instagram、Facebook 和 Messenger 等产品。 核心模型：Llama 系列。 核心产品：Meta AI 助手、AI 创作工具与智能眼镜中的 ...", "links": ["99-Resources-官网索引", "02-Model-Companies-OpenAI", "02-Model-Companies-Google_DeepMind", "02-Model-Companies-DeepSeek", "00-MOC-AI产业地图", "00-MOC-AI产品地图", "07-Business-API", "03-Agent-Agent基础"]}, {"id": "02-Model-Companies-OpenAI", "title": "OpenAI", "fileTitle": "OpenAI", "category": "02-Model-Companies", "categoryLabel": "模型公司", "path": "02-Model-Companies/OpenAI.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "model-companies", "OpenAI"], "body": "# OpenAI\n\n## 概述\n\nOpenAI 是以大模型 API 起家、逐步向消费者订阅、企业治理和 Agent 平台扩张的 AI 公司。课程将其战略概括为：**从卖模型到卖平台**。\n\n- 核心能力：模型推理、可编程智能、工具调用与 Agent 基础设施。\n- 平台目标：成为“AI 时代的 AWS”，让应用和 Agent 建立在 OpenAI 平台上。\n- 价值交付：从 API 调用，扩展到访问权、企业治理和 Agent 能力。\n\n## 时间轴\n\n| 时间 / 阶段 | 关键演进 | 产业意义 |\n|---|---|---|\n| 2020 | 开放 GPT-3 API | 外部开发者可无需训练模型直接构建产品 |\n| Chat 阶段 | 推出 [[ChatGPT]] 与 Plus | 从按量 API 扩展到消费者订阅 |\n| 组织阶段 | Team 与 Enterprise | 增加权限、审计、数据隔离和安全治理 |\n| Agent 阶段 | Codex、Responses API、Agent SDK、Tool Use、File Search、Search | 向统一 Agent 平台与开发者生态演进 |\n| 路线判断 | GPT → API → ChatGPT → Codex → Responses API → Agent SDK → 统一Agent Platform | 以能力创新牵引需求，争夺 AI 操作系统入口 |\n\n## 产品矩阵\n\n| 产品 / 能力 | 定位 | 主要用户 | 价值 |\n|---|---|---|---|\n| OpenAI API | 可编程模型能力 | 开发者、企业 | 按需租用智能推理 |\n| [[ChatGPT]] / Plus | 通用 AI 助手与订阅 | 个人用户 | 隐藏 Token，以固定月费提供访问权 |\n| [[Codex]] | 官方 [[Software Engineering Agent]] | 开发者、工程团队 | 理解代码库、修改代码、执行测试 |\n| Team / Enterprise | 组织级 AI | 团队、企业 | 可信 AI 与治理能力 |\n| Responses API / [[OpenAI_Agents_SDK|Agent SDK]] | Agent 开发基础设施 | 开发者 | 工具、检索与 Agent 编排 |\n| Operator / Deep Research | 执行与研究型 Agent | 个人、专业用户 | 从回答问题扩展到自主完成任务 |\n\n## 商业模式\n\n- **API**：按 Token 销售模型推理能力。\n- **Subscription**：Plus 以固定月费销售访问权。\n- **Team / Enterprise**：销售组织级治理、安全和数据隔离。\n- **Platform**：通过 Agent SDK 和相关 API 扩大开发者生态与平台依赖。\n- **路线侧重**：以能力领先带动 API、订阅和平台生态，长期目标是成为 Agent 操作层。\n- **核心矛盾**：Agent 任务会触发多次调用，让纯 Token 计费的成本可预测性下降。\n\n## 战略路线\n\n```text\nGPT\n↓\nAPI\n↓\nChatGPT\n↓\nCodex\n↓\nResponses API\n↓\nAgent SDK\n↓\n统一Agent Platform\n```\n\n核心信仰是“能力创造需求”。路线从销售单次推理，演进为销售用户访问、企业治理和 Agent 平台；API 仍然是底层商业基础设施。\n\n## 参考课程\n\n- [[OpenAI发展史（2015-2026）]]\n- [[OpenAI_Anthropic_智谱三条路线演化对比]]\n- [[OpenAI_Anthropic_智谱三条进化路线]]\n- [[AI商业模式全景图]]\n- [[API经济学]]\n- [[Agent经济学]]\n\n## 关联节点\n\n- [[Anthropic]]\n- [[智谱AI]]\n- [[API]]\n- [[Token]]\n- [[Agent基础|Agent]]\n- [[Codex]]\n- [[Software Engineering Agent]]\n- [[OpenAI Agent Platform]]\n- [[MCP]]\n- [[AI产业地图]]\n", "excerpt": "OpenAI 概述 OpenAI 是以大模型 API 起家、逐步向消费者订阅、企业治理和 Agent 平台扩张的 AI 公司。课程将其战略概括为：**从卖模型到卖平台**。 核心能力：模型推理、可编程智能、工具调用与 Agent 基础设施。 平台目标：成为“AI 时代的 AWS”，让应用和 Agent 建立在 OpenAI 平台上。 价值交付：从 API 调...", "links": ["06-Products-ChatGPT", "05-Agent-Runners-Codex", "04-Platforms-OpenAI_Agents_SDK", "02-Model-Companies-OpenAI发展史2015-2026", "02-Model-Companies-OpenAI_Anthropic_智谱三条路线演化对比", "02-Model-Companies-OpenAI_Anthropic_智谱三条进化路线", "07-Business-AI商业模式全景图", "07-Business-API经济学", "07-Business-Agent经济学", "02-Model-Companies-Anthropic", "02-Model-Companies-智谱AI", "07-Business-API", "07-Business-Token", "03-Agent-Agent基础", "03-Agent-MCP", "00-MOC-AI产业地图"]}, {"id": "02-Model-Companies-OpenAI_Anthropic_智谱三条路线演化对比", "title": "OpenAI、Anthropic、智谱三条路线演化对比", "fileTitle": "OpenAI_Anthropic_智谱三条路线演化对比", "category": "02-Model-Companies", "categoryLabel": "模型公司", "path": "02-Model-Companies/OpenAI_Anthropic_智谱三条路线演化对比.md", "updated": "2026-06-19", "tags": ["AI", "OpenAI", "Anthropic", "智谱", "Agent"], "body": "# OpenAI、Anthropic、智谱三条路线演化对比\n\n## 学习定位\n\n很多人研究 AI 公司，喜欢研究谁的模型更强。\n\n实际上，更重要的是谁选择了什么路线。因为模型会更新，产品会变化，但战略路线通常会延续很多年。\n\n因此，理解 [[OpenAI]]、[[Anthropic]]、[[智谱AI]] 三家公司，本质是在理解 AI 产业的三种发展哲学。\n\n---\n\n# 一句话总结\n\n- [[OpenAI]]：能力优先\n- [[Anthropic]]：安全优先\n- [[智谱AI]]：产业优先\n\n---\n\n# 第一条路线\n\n# OpenAI 路线\n\n## 核心信仰\n\nOpenAI 相信：能力创造需求。\n\n即先把能力做出来，市场自然出现。\n\n```text\nGPT\n↓\nAPI\n↓\nChatGPT\n↓\nCodex\n↓\nResponses API\n↓\nAgent SDK\n↓\n统一Agent Platform\n```\n\n逻辑：能力推动产业。\n\n## 战略主线\n\n```text\nGPT → API → ChatGPT → Codex → Responses API → Agent SDK → 统一Agent Platform\n```\n\n## 产品特点\n\n优先发布前沿能力，例如：\n\n- GPT-4\n- GPT-4o\n- o 系列\n\n而不是优先提供行业方案。\n\n## 优势\n\n- 能力领先\n- 生态强大\n- 开发者规模大\n\n## 风险\n\n- 成本巨大\n- 安全压力巨大\n- 监管压力巨大\n\n---\n\n# 第二条路线\n\n# Anthropic 路线\n\n## 核心信仰\n\nAnthropic 相信：能力增长必须可控。\n\n因此重点不只是最强，而是最可靠。\n\n## 战略主线\n\n```text\nClaude → Claude Code → MCP → Agent生态\n```\n\n## 产品特点\n\n长期强调稳定性，包括：\n\n- 长上下文\n- 工具规范\n- [[Agent]] 基础设施\n\n## 为什么发明 MCP\n\nAnthropic 认为，未来问题不只是模型不够强，还包括 Agent 无法协同。\n\n因此提出 [[MCP]]，目标是建立 AI 时代的通用连接协议。\n\n## 优势\n\n- 企业接受度高\n- Agent 生态优势明显\n\n## 风险\n\n- 增长速度可能慢于 OpenAI\n\n---\n\n# 第三条路线\n\n# 智谱路线\n\n## 核心信仰\n\n智谱相信：产业价值优先。\n\n换句话说，用户不一定关心参数，更关心能否解决问题。\n\n## 战略主线\n\n```text\nGLM → ChatGLM → API → AutoGLM → GLM Coding → 产业Agent\n```\n\n## 产品特点\n\n强调产业落地，包括：\n\n- 企业服务\n- Agent 应用\n- 行业场景\n\n## 为什么推出 AutoGLM\n\n智谱判断 Agent 比聊天更有商业价值，因此提前布局 [[AutoGLM]]。\n\n## 优势\n\n- 本地化能力强\n- 企业合作能力强\n- 落地速度快\n\n## 风险\n\n- 模型生态弱于 OpenAI\n- 全球影响力有限\n\n---\n\n# 三家公司路线图对比\n\n## OpenAI\n\n```text\nGPT\n↓\nAPI\n↓\nChatGPT\n↓\nCodex\n↓\nResponses API\n↓\nAgent SDK\n↓\n统一Agent Platform\n```\n\n## Anthropic\n\n```text\nClaude\n↓\nClaude Code\n↓\nMCP\n↓\nAgent生态\n```\n\n## 智谱\n\n```text\nGLM\n↓\nChatGLM\n↓\nAPI\n↓\nAutoGLM\n↓\nGLM Coding\n↓\n产业Agent\n```\n\n---\n\n# 三家公司产品矩阵对比\n\n| 公司 | 模型 | 平台或协议 | 代表产品 |\n|---|---|---|---|\n| [[OpenAI]] | GPT | Responses API、Agent SDK、[[OpenAI Agent Platform]] | ChatGPT、[[Codex]]、Operator、Deep Research |\n| [[Anthropic]] | Claude | [[MCP]] | Claude、[[Claude Code]] |\n| [[智谱AI]] | GLM | 企业 API | [[AutoGLM]]、GLM Coding |\n\n## OpenAI\n\n模型：GPT\n\n平台：\n\n- Responses API\n- Agent SDK\n- [[OpenAI Agent Platform]]\n\n产品：\n\n- ChatGPT\n- [[Codex]]\n- Operator\n- Deep Research\n\n## Anthropic\n\n模型：Claude\n\n协议：[[MCP]]\n\n产品：\n\n- Claude\n- [[Claude Code]]\n\n## 智谱\n\n模型：GLM\n\nAgent：[[AutoGLM]]\n\n开发：GLM Coding\n\n---\n\n# 为什么 Claude Code 和 GLM Coding 看起来很像\n\n因为二者都发现：Coding 是 Agent 最成熟的场景。\n\n区别在于：\n\n- Anthropic 从 Agent 基础设施切入\n- 智谱从产业落地切入\n\n---\n\n# 为什么 OpenAI 和 Anthropic 的 Coding Agent 路线不同\n\nOpenAI 已经拥有官方 [[Software Engineering Agent]]（[[Codex]]）。\n\n但 OpenAI 没有采用 Anthropic 那种“Claude + Claude Code”双产品路线。OpenAI 选择的是统一 Agent 平台路线：\n\n```text\nGPT\n↓\nAPI\n↓\nChatGPT\n↓\nCodex\n↓\nResponses API\n↓\nAgent SDK\n↓\n统一Agent Platform\n```\n\nAnthropic 则将 Claude Code 打造为旗舰 Coding Agent 产品：\n\n```text\nClaude\n↓\nClaude Code\n↓\nMCP\n↓\nAgent生态\n```\n\n所以 OpenAI 的 Agent 产品组合包括：\n\n- Operator\n- Codex\n- Agent SDK\n- Responses API\n\n---\n\n# 三家公司未来竞争\n\n很多人认为未来竞争是模型大战，实际上更可能是平台大战。\n\n## OpenAI\n\n争夺：AI 操作系统。\n\n## Anthropic\n\n争夺：Agent 标准。\n\n## 智谱\n\n争夺：产业 Agent。\n\n---\n\n# 用一张图理解\n\n```text\nOpenAI    = 创造能力\nAnthropic = 规范能力\n智谱      = 落地能力\n```\n\n---\n\n# 对后续产品的判断方法\n\n以后看到任何产品，先问它继承哪条路线。\n\n| 产品 | 路线判断 |\n|---|---|\n| [[Claude Code]] | Anthropic 路线 |\n| Cursor | 多模型 AI IDE 路线 |\n| [[AutoGLM]] | 智谱路线 |\n| Coze | 产业落地路线 |\n| Dify | Agent 基础设施路线 |\n\n---\n\n# 知识图谱位置\n\n```text\nAI公司路线\n├── OpenAI路线\n├── Anthropic路线\n└── 智谱路线\n```\n\n---\n\n# 关联节点\n\n- [[OpenAI]]\n- [[Anthropic]]\n- [[智谱AI]]\n- [[OpenAI发展史]]\n- [[Anthropic为什么与OpenAI分裂]]\n- [[智谱AI发展史]]\n- [[Claude Code]]\n- [[Codex]]\n- [[Software Engineering Agent]]\n- [[OpenAI Agent Platform]]\n- [[AutoGLM]]\n- [[Agent]]\n- [[MCP]]\n- [[Coding Plan经济学]]\n\n---\n\n# 核心结论\n\n未来十年，AI 产业未必只有一个赢家。\n\n更可能形成：\n\n- OpenAI 负责创造能力\n- Anthropic 负责制定规则\n- 智谱负责产业落地\n\n未来绝大多数 AI 产品，都可以在这三条路线中找到自己的源头。\n", "excerpt": "OpenAI、Anthropic、智谱三条路线演化对比 学习定位 很多人研究 AI 公司，喜欢研究谁的模型更强。 实际上，更重要的是谁选择了什么路线。因为模型会更新，产品会变化，但战略路线通常会延续很多年。 因此，理解 OpenAI、Anthropic、智谱AI 三家公司，本质是在理解 AI 产业的三种发展哲学。 一句话总结 OpenAI：能力优先 Anth...", "links": ["02-Model-Companies-OpenAI", "02-Model-Companies-Anthropic", "02-Model-Companies-智谱AI", "10-Concepts-Agent", "03-Agent-MCP", "05-Agent-Runners-AutoGLM", "05-Agent-Runners-Codex", "02-Model-Companies-Anthropic为什么与OpenAI分裂", "07-Business-Coding-Plan经济学"]}, {"id": "02-Model-Companies-OpenAI_Anthropic_智谱三条进化路线", "title": "OpenAI、Anthropic、智谱三条进化路线", "fileTitle": "OpenAI_Anthropic_智谱三条进化路线", "category": "02-Model-Companies", "categoryLabel": "模型公司", "path": "02-Model-Companies/OpenAI_Anthropic_智谱三条进化路线.md", "updated": "2026-06-17", "tags": ["AI", "Agent", "ModelCompany"], "body": "# OpenAI、Anthropic、智谱三条进化路线\n\n## 目录\n\n- [[#正文|正文]]\n- [[#关联节点|关联节点]]\n- [[#延伸阅读|延伸阅读]]\n- [[#待研究问题|待研究问题]]\n\n## 正文\n\n| 公司            | 起点         | 中间层                          | Agent 方向                          | 商业演进                                 |                   |\n| ------------- | ---------- | ---------------------------- | --------------------------------- | ------------------------------------ | ----------------- |\n| [[OpenAI]] | GPT / API | ChatGPT、Codex、Responses API | Agent SDK 与统一 [[OpenAI Agent Platform]] | 从卖模型到卖平台 |\n| [[Anthropic]] | Claude | Claude Code | [[MCP]] 与 Agent 生态 | 从卖模型到卖 Agent 基础设施 |\n| [[智谱AI]] | GLM / ChatGLM | API、AutoGLM、GLM Coding | 产业 Agent | 从卖 Token 到卖开发者生产力 |\n\n三条路线的共同方向是：\n\n```text\n模型能力 → 消费者产品 / API → Software Engineering Agent → 平台与生态\n```\n\n三条路线分别统一为：\n\n```text\nOpenAI：GPT → API → ChatGPT → Codex → Responses API → Agent SDK → 统一Agent Platform\nAnthropic：Claude → Claude Code → MCP → Agent生态\n智谱：GLM → ChatGLM → API → AutoGLM → GLM Coding → 产业Agent\n```\n\n差异在于价值链重心：OpenAI 更强调通用平台，Anthropic 更强调开发者 Agent 与开放连接协议，智谱则将模型 API、Computer Use 和开发者套餐结合。\n\n## 关联节点\n\n- [[OpenAI]]\n- [[Anthropic]]\n- [[智谱AI|智谱]]\n- [[Agent基础|Agent]]\n- [[MCP]]\n- [[Claude_Code|Claude Code]]\n- [[Codex]]\n- [[Software Engineering Agent]]\n- [[OpenAI Agent Platform]]\n- [[GLM Coding]]\n\n## 延伸阅读\n\n- [[AI产业地图]]\n- [[AI公司分类体系]]\n- [[从Chat到Agent]]\n- [[Agent地图]]\n\n## 待研究问题\n\n- [ ] 三家公司的模型、产品和 Agent 路线分别如何演进？\n- [ ] 三条路线在开发者生态、工具调用和 [[MCP]] 支持上有何差异？\n- [ ] [[Claude_Code|Claude Code]] 与 [[GLM Coding]] 如何体现各自的 Agent 战略？\n", "excerpt": "OpenAI、Anthropic、智谱三条进化路线 目录 正文 关联节点 延伸阅读 待研究问题 正文 三条路线的共同方向是： 三条路线分别统一为： 差异在于价值链重心：OpenAI 更强调通用平台，Anthropic 更强调开发者 Agent 与开放连接协议，智谱则将模型 API、Computer Use 和开发者套餐结合。 关联节点 OpenAI Anth...", "links": ["02-Model-Companies-OpenAI", "02-Model-Companies-Anthropic", "03-Agent-MCP", "02-Model-Companies-智谱AI", "03-Agent-Agent基础", "05-Agent-Runners-Claude_Code", "05-Agent-Runners-Codex", "05-Agent-Runners-GLM-Coding", "00-MOC-AI产业地图", "01-Industry-AI公司分类体系", "01-Industry-从Chat到Agent", "00-MOC-Agent地图"]}, {"id": "02-Model-Companies-OpenAI发展史2015-2026", "title": "OpenAI发展史（2015-2026）", "fileTitle": "OpenAI发展史（2015-2026）", "category": "02-Model-Companies", "categoryLabel": "模型公司", "path": "02-Model-Companies/OpenAI发展史（2015-2026）.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "OpenAI", "ModelCompany", "History"], "body": "# OpenAI发展史（2015-2026）\n\n## 目录\n\n- [[#学习定位|学习定位]]\n- [[#一句话定义|一句话定义]]\n- [[#核心问题|核心问题]]\n- [[#发展时间轴|发展时间轴]]\n- [[#第一阶段：理想主义时代（2015-2018）|第一阶段：理想主义时代]]\n- [[#第二阶段：Transformer 革命（2018-2020）|第二阶段：Transformer 革命]]\n- [[#第三阶段：API 时代（2020-2022）|第三阶段：API 时代]]\n- [[#第四阶段：ChatGPT 时代（2022-2024）|第四阶段：ChatGPT 时代]]\n- [[#第五阶段：平台时代（2023-2025）|第五阶段：平台时代]]\n- [[#第六阶段：Agent 时代（2025-2026）|第六阶段：Agent 时代]]\n- [[#OpenAI 产品矩阵|OpenAI 产品矩阵]]\n- [[#OpenAI 商业模式演进|OpenAI 商业模式演进]]\n- [[#OpenAI 战略主线|OpenAI 战略主线]]\n- [[#OpenAI 与微软的关系|OpenAI 与微软的关系]]\n- [[#竞争格局|竞争格局]]\n- [[#当前判断（2026）|当前判断（2026）]]\n- [[#知识图谱位置|知识图谱位置]]\n- [[#关联节点|关联节点]]\n- [[#核心结论|核心结论]]\n\n## 学习定位\n\n[[OpenAI]] 不只是一家模型公司。更准确地说，OpenAI 是过去十年 AI 产业最重要的战略实验之一。\n\n理解 OpenAI 的发展史，本质上是在理解：\n\n- [[LLM|大模型]]为什么出现。\n- [[ChatGPT]] 为什么出现。\n- [[Agent]] 为什么出现。\n- AI 商业模式为什么不断变化。\n\n[[Anthropic]]、[[Google_DeepMind|Google Gemini]]、[[Claude_Code|Claude Code]]、[[Cursor]]、[[智谱AI|智谱]]和 [[DeepSeek]] 等后来者，都在不同程度上回应 OpenAI 的战略动作。\n\n## 一句话定义\n\n> OpenAI 是从 AI 研究机构演变为 AI 时代基础设施平台的典型案例。\n\n## 核心问题\n\nOpenAI 究竟想成为模型公司、软件公司、云平台，还是 Agent 平台？\n\n> 答案是：全部都是。\n\nOpenAI 持续向价值链上下游扩张，把模型、API、消费产品、开发平台和 Agent 基础设施组合成同一战略体系。\n\n## 发展时间轴\n\n| 时间 | 阶段 | 核心变化 | 商业定位 |\n|---|---|---|---|\n| 2015-2018 | 理想主义时代 | 开放研究、论文与长期 AGI 目标 | 非营利研究机构 |\n| 2018-2020 | Transformer 革命 | GPT-1、GPT-2、GPT-3 与 [[Scaling Law]] | 基础模型公司 |\n| 2020-2022 | API 时代 | 外部开发者可直接调用 GPT | 可编程智能平台 |\n| 2022-2024 | ChatGPT 时代 | 大模型进入大众市场 | 消费者订阅产品 |\n| 2023-2025 | 平台时代 | GPT Store、Function Calling、Assistants / Responses API | AI 应用与开发平台 |\n| 2025-2026 | Agent 时代 | Codex、Operator、Deep Research、Agent SDK | Agent 基础设施平台 |\n\n## 第一阶段：理想主义时代（2015-2018）\n\n### 成立背景\n\nOpenAI 于 2015 年成立。创始团队包括 Sam Altman、Elon Musk、Greg Brockman 和 Ilya Sutskever 等人。\n\n其目标是：\n\n> 确保 AGI 造福全人类。\n\n当时 Google 在 AI 研究中占据强势位置。OpenAI 希望建立一个开放研究机构，因此名称由“Open + AI”构成。\n\n### 商业模式\n\n这一阶段没有明确商业模式，本质上是研究机构，具有以下特征：\n\n- 论文驱动。\n- 开源驱动。\n- 学术驱动。\n\n## 第二阶段：Transformer 革命（2018-2020）\n\n2017 年，Google 发表《Attention Is All You Need》，提出 Transformer 架构。OpenAI 迅速押注这一方向：\n\n- 2018：GPT-1。\n- 2019：GPT-2。\n- 2020：GPT-3。\n\n行业开始意识到：\n\n```text\n规模 ≈ 能力\n```\n\n[[Scaling Law]] 成为重要的模型发展思路。OpenAI 的战略也从研究机构转向模型公司。\n\n## 第三阶段：API 时代（2020-2022）\n\nGPT-3 发布后，OpenAI 做出关键决定：开放 API。\n\n其意义是，任何创业公司都可以在不训练模型的情况下调用 GPT，从而促成了：\n\n- AI 客服。\n- AI 写作。\n- AI 翻译。\n- AI 搜索。\n\nOpenAI 开始具备“AI 时代 AWS”的雏形。\n\n### 商业模式\n\nAPI 按 [[Token]] 销售智能能力，而不是销售某个固定软件。详见 [[API经济学]]。\n\n## 第四阶段：ChatGPT 时代（2022-2024）\n\n2022 年 11 月，ChatGPT 发布，成为重要的历史转折点。大模型第一次以极低门槛面向大规模普通用户。\n\n课程中的代表性增长判断是：ChatGPT 在约两个月内达到 1 亿用户，成为当时增长最快的互联网产品之一。\n\n### 为什么成功\n\n核心不只是模型，而是**产品化**。GPT 早已存在，ChatGPT 解决的是“如何让普通人使用 AI”。\n\n### 商业模式变化\n\n```text\nAPI → Subscription\n```\n\nChatGPT Plus 让 OpenAI 第一次大规模直接面向消费者收费。\n\n## 第五阶段：平台时代（2023-2025）\n\nOpenAI 意识到单纯聊天的价值有限，开始建设平台：\n\n| 能力 / 产品 | 作用 | 战略目标 |\n|---|---|---|\n| GPT Store | 让用户创建和分发 GPT | 建立应用生态 |\n| [[Function Calling]] | 让模型调用工具 | 连接现实世界 |\n| Assistants API | 管理助手、文件与工具 | 开始 Agent 化 |\n| Responses API | 统一模型、工具与 Agent 调用 | 建立 Agent 接口 |\n| Search | 获取实时信息 | 弥补知识截止 |\n\n战略从 Chat 转向 Platform。\n\n## 第六阶段：Agent 时代（2025-2026）\n\nOpenAI 的战略重点再次变化：让 AI 完成任务，而不只是回答问题。\n\n| 产品 / 能力 | 定位 |\n|---|---|\n| [[Codex]] | OpenAI 官方 [[Software Engineering Agent]] |\n| [[Operator]] | 通过 [[Computer_Use|Computer Use]] 操作网页 |\n| [[Deep Research]] | 多步搜索、研究和报告交付 |\n| [[OpenAI_Agents_SDK|Agent SDK]] | 开发者构建 Agent 的工具包 |\n| Responses API | 统一 Agent 模型、工具与运行基础设施 |\n\n新版 Codex 已经演进为 OpenAI 官方 [[Software Engineering Agent]]，属于 [[OpenAI Agent Platform]] 的重要组成部分。\n\n战略从 ChatGPT 转向统一 [[OpenAI Agent Platform]]。\n\n## OpenAI 产品矩阵\n\n```text\nOpenAI\n├── GPT\n├── ChatGPT\n├── Codex\n├── Responses API\n├── Agent SDK\n├── Operator\n├── Deep Research\n└── Enterprise\n```\n\n## OpenAI 商业模式演进\n\n| 阶段 | 公司定位 | 主要收入逻辑 |\n|---|---|---|\n| 第一阶段 | 研究机构 | 无明确商业模式 |\n| 第二阶段 | 模型公司 | 资本与模型能力积累 |\n| 第三阶段 | API 公司 | 按 Token 销售智能能力 |\n| 第四阶段 | 聊天产品 | Plus / Team / Enterprise 订阅 |\n| 第五阶段 | 平台公司 | API、GPT 生态与企业平台 |\n| 第六阶段 | Agent 基础设施公司 | Agent 平台、开发生产力与任务交付 |\n\n## OpenAI 战略主线\n\n很多人认为 OpenAI 在不断更换方向，但其主线一直是：\n\n> 成为 AI 时代的操作系统。\n\n```text\nGPT\n ↓\nAPI\n ↓\nChatGPT\n ↓\nCodex\n ↓\nResponses API\n ↓\nAgent SDK\n ↓\n统一Agent Platform\n```\n\n## OpenAI 与微软的关系\n\n课程将微软对 OpenAI 的投资规模概括为超过百亿美元。微软同时提供 Azure 算力，OpenAI 则提供模型能力。\n\n```text\nAzure 算力 + OpenAI 模型 = 战略联盟\n```\n\n这种结合是 OpenAI 快速扩张的重要原因，也让微软能够将 AI 集成到 Azure、[[Copilot]]、GitHub 和 Microsoft 365。\n\n## 竞争格局\n\n| 阶段 | 主要竞争对手 | 竞争焦点 |\n|---|---|---|\n| 早期 | Google | AI 研究、人才和计算资源 |\n| 中期 | [[Anthropic]] | 模型能力、安全与企业市场 |\n| 当前 | [[Google_DeepMind|Google Gemini]]、Anthropic Claude、[[DeepSeek]]、[[xAI]]、[[智谱AI|智谱]] | 模型、分发、价格、开发者生态和 Agent 平台 |\n\n## 当前判断（2026）\n\nOpenAI 已经不只是聊天机器人公司，也不只是模型公司，而是在向**Agent 基础设施公司**演进。\n\n未来的竞争不再只是“模型 PK 模型”，而是：\n\n> 平台 PK 平台。\n\n## 知识图谱位置\n\n```text\nOpenAI\n├── GPT\n├── ChatGPT\n├── Codex\n├── Responses API\n├── Agent SDK\n├── Operator\n├── Deep Research\n└── Enterprise\n```\n\n## 关联节点\n\n- [[Anthropic]]\n- [[Google_DeepMind|Google DeepMind]]\n- [[智谱AI]]\n- [[GPT]]\n- [[ChatGPT]]\n- [[Agent]]\n- [[Operator]]\n- [[Deep Research]]\n- [[API经济学]]\n- [[Agent经济学]]\n- [[AI产业地图]]\n\n## 核心结论\n\nOpenAI 的发展路线：\n\n```text\nGPT\n ↓\nAPI\n ↓\nChatGPT\n ↓\nCodex\n ↓\nResponses API\n ↓\nAgent SDK\n ↓\n统一Agent Platform\n```\n\n过去十年，OpenAI 几乎定义了 AI 产业的每一个关键阶段。理解 OpenAI，就是在理解现代 AI 产业的发展逻辑。\n\n## 延伸阅读\n\n- [[OpenAI]]\n- [[OpenAI_Anthropic_智谱三条进化路线]]\n- [[AI发展时间轴]]\n- [[从Chat到Agent]]\n- [[AI商业模式全景图]]\n- [[官网索引]]\n", "excerpt": "OpenAI发展史（2015-2026） 目录 学习定位 一句话定义 核心问题 发展时间轴 第一阶段：理想主义时代 第二阶段：Transformer 革命 第三阶段：API 时代 第四阶段：ChatGPT 时代 第五阶段：平台时代 第六阶段：Agent 时代 OpenAI 产品矩阵 OpenAI 商业模式演进 OpenAI 战略主线 OpenAI 与微软的关...", "links": ["02-Model-Companies-OpenAI", "10-Concepts-LLM", "06-Products-ChatGPT", "10-Concepts-Agent", "02-Model-Companies-Anthropic", "02-Model-Companies-Google_DeepMind", "05-Agent-Runners-Claude_Code", "06-Products-Cursor", "02-Model-Companies-智谱AI", "02-Model-Companies-DeepSeek", "07-Business-Token", "07-Business-API经济学", "10-Concepts-Function-Calling", "05-Agent-Runners-Codex", "06-Products-Operator", "03-Agent-Computer_Use", "06-Products-Deep-Research", "04-Platforms-OpenAI_Agents_SDK", "06-Products-Copilot", "02-Model-Companies-xAI", "07-Business-Agent经济学", "00-MOC-AI产业地图", "02-Model-Companies-OpenAI_Anthropic_智谱三条进化路线", "01-Industry-AI发展时间轴", "01-Industry-从Chat到Agent", "07-Business-AI商业模式全景图", "99-Resources-官网索引"]}, {"id": "02-Model-Companies-xAI", "title": "xAI", "fileTitle": "xAI", "category": "02-Model-Companies", "categoryLabel": "模型公司", "path": "02-Model-Companies/xAI.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "model-companies", "xAI", "Grok"], "body": "# xAI\n\n## 概述\n\nxAI 是以 Grok 模型与 X 平台实时信息场景为核心的 AI 公司。其路线将基础模型、消费者助手、开发者 API 和大规模计算基础设施结合。\n\n- 核心产品：Grok 模型、Grok 应用 / X 内集成、xAI API。\n- 分发特征：利用 X 平台作为用户入口和实时信息场景。\n- 基础设施特征：通过大规模训练集群支撑快速模型迭代。\n\n## 时间轴\n\n| 时间 | 关键事件 | 影响 |\n|---|---|---|\n| 2023 | xAI 成立 | 进入通用基础模型竞争 |\n| 2023-11 | Grok 首次公布 | 与 X 平台结合的消费者 AI 助手成型 |\n| 2024-03 | Grok-1 开放权重 | 扩大开发者与研究社区影响 |\n| 2024 | Grok-2 与 xAI API 扩展 | 从 X 内产品走向可编程模型平台 |\n| 2025 | Grok-3 及后续模型能力演进 | 加强推理、搜索、代码与多模态场景 |\n\n## 产品矩阵\n\n| 产品 / 能力 | 定位 | 主要用户 | 关键价值 |\n|---|---|---|---|\n| Grok | 通用 AI 助手 | X 用户、消费者 | 对话、实时信息、搜索、推理与内容生成 |\n| Grok 独立应用 | 消费者 AI 入口 | 个人用户 | 降低对 X 单一入口的依赖 |\n| xAI API | 开发者模型平台 | 开发者、企业 | 将 Grok 推理与工具能力提供给外部应用 |\n| Grok 开放权重资产 | 开发者与研究生态 | 研究者、开发者 | 扩大模型影响和生态试验 |\n\n## 商业模式\n\n- **Subscription**：通过 X 高级套餐和 Grok 订阅销售消费者访问权。\n- **API**：通过 xAI API 按用量销售模型推理能力。\n- **Platform Synergy**：Grok 提高 X 的订阅价值、用户活跃和内容交互。\n- **Enterprise / Developer**：向企业应用、代码和 Agent 场景扩展。\n\n## 战略演进\n\n```text\nX 内 Grok 助手 → 独立消费者产品 → xAI API → 多模态与 Agent 平台\n```\n\n核心战略是将 X 的分发和实时信息优势，与大规模模型训练和 API 生态结合。\n\n## 参考资料\n\n- [xAI 官网](https://x.ai/)\n- [xAI News](https://x.ai/news)\n- [xAI API 官方文档](https://docs.x.ai/)\n- [[官网索引]]\n\n## 关联节点\n\n- [[OpenAI]]\n- [[Anthropic]]\n- [[Google_DeepMind|Google DeepMind]]\n- [[Meta_AI|Meta AI]]\n- [[API]]\n- [[AI订阅经济|Subscription]]\n- [[Agent基础|Agent]]\n- [[AI产业地图]]\n", "excerpt": "xAI 概述 xAI 是以 Grok 模型与 X 平台实时信息场景为核心的 AI 公司。其路线将基础模型、消费者助手、开发者 API 和大规模计算基础设施结合。 核心产品：Grok 模型、Grok 应用 / X 内集成、xAI API。 分发特征：利用 X 平台作为用户入口和实时信息场景。 基础设施特征：通过大规模训练集群支撑快速模型迭代。 时间轴 产品矩阵...", "links": ["99-Resources-官网索引", "02-Model-Companies-OpenAI", "02-Model-Companies-Anthropic", "02-Model-Companies-Google_DeepMind", "02-Model-Companies-Meta_AI", "07-Business-API", "07-Business-AI订阅经济", "03-Agent-Agent基础", "00-MOC-AI产业地图"]}, {"id": "02-Model-Companies-字节跳动", "title": "字节跳动", "fileTitle": "字节跳动", "category": "02-Model-Companies", "categoryLabel": "模型公司", "path": "02-Model-Companies/字节跳动.md", "updated": "2026-06-20", "tags": ["AI-Learning-OS", "company", "字节跳动", "豆包", "Coze"], "body": "# 字节跳动\n\n## 一句话定义\n\n字节跳动是依托内容分发、消费者产品、豆包模型、[[Coze]] 和火山引擎构建 AI 产品与企业服务生态的科技公司。\n\n## 定位\n\n在 AI 产业中同时覆盖模型、消费者入口、低代码 Agent 平台和企业云服务，核心优势是产品化与大规模分发。\n\n## 时间轴\n\n- 模型阶段：建设豆包大模型与多模态能力。\n- 产品阶段：通过 [[豆包]] 面向大众用户提供 AI 助手。\n- 平台阶段：通过 Coze 和火山引擎服务开发者与企业。\n\n## 产品矩阵\n\n| 层级 | 产品 | 定位 |\n|---|---|---|\n| 模型层 | 豆包模型 | 通用与多模态模型能力 |\n| 用户层 | [[豆包]] | 大众 AI 助手 |\n| 平台层 | [[Coze]] | 低代码 Agent Builder |\n| 企业层 | 火山引擎 / 方舟 | 模型 API 与企业 AI 服务 |\n\n## 商业模式\n\n通过消费者订阅与增值服务、模型 API、云平台、企业方案和内容生态效率提升实现商业价值。\n\n## 竞争格局\n\n与 OpenAI、Google、阿里、百度、腾讯及国内模型创业公司竞争，差异化优势是内容生态、用户分发和产品迭代能力。\n\n## 关联节点\n\n- [[Coze]]\n- [[豆包]]\n- [[Workflow产品地图]]\n- [[Agent]]\n- [[AI产业地图]]\n\n## 延伸阅读\n\n- [[Coze全景图]]\n- [[ChatGPT、Claude、Gemini、Kimi、豆包产品地图]]\n\n", "excerpt": "字节跳动 一句话定义 字节跳动是依托内容分发、消费者产品、豆包模型、Coze 和火山引擎构建 AI 产品与企业服务生态的科技公司。 定位 在 AI 产业中同时覆盖模型、消费者入口、低代码 Agent 平台和企业云服务，核心优势是产品化与大规模分发。 时间轴 模型阶段：建设豆包大模型与多模态能力。 产品阶段：通过 豆包 面向大众用户提供 AI 助手。 平台阶段...", "links": ["04-Platforms-Coze", "06-Products-豆包", "06-Products-Workflow产品地图", "10-Concepts-Agent", "00-MOC-AI产业地图", "04-Platforms-Coze全景图", "06-Products-ChatGPTClaudeGeminiKimi豆包产品地图"]}, {"id": "02-Model-Companies-智谱AI", "title": "智谱AI", "fileTitle": "智谱AI", "category": "02-Model-Companies", "categoryLabel": "模型公司", "path": "02-Model-Companies/智谱AI.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "model-companies", "智谱AI"], "body": "# 智谱AI\n\n## 概述\n\n智谱 AI 是以 GLM 模型 API 为商业起点，向 AutoGLM、GLM Coding 和 Agent 平台演进的中国模型公司。课程将其战略概括为：**从卖 Token 到卖开发者套餐**。\n\n- 核心能力：GLM 模型、GLM API、AutoGLM 和 GLM Coding。\n- 产品方向：从模型调用扩展到自主执行与 Coding Agent。\n- 收费转变：从 Token / API 计费，转向更容易理解的积分和开发额度。\n\n## 时间轴\n\n| 阶段 | 关键演进 | 影响 |\n|---|---|---|\n| 模型 API 阶段 | GLM API | 以最容易商业化的方式销售模型能力 |\n| Agent 执行阶段 | AutoGLM | 从语言输出扩展到自主操作能力 |\n| Coding Agent 阶段 | GLM Coding | 从卖 Token 转向卖编码额度 |\n| 平台阶段 | Agent 平台 | 组合模型、执行和开发者生态 |\n| 路线判断 | GLM → ChatGLM → API → AutoGLM → GLM Coding → 产业Agent | 以本地化和企业交付争夺产业 Agent 市场 |\n\n## 产品矩阵\n\n| 产品 / 能力 | 定位 | 主要用户 | 价值 |\n|---|---|---|---|\n| GLM API | 模型 API | 开发者、企业 | 按需调用 GLM 推理能力 |\n| [[AutoGLM]] | Computer Use / Agent | 个人与开发者 | 让 Agent 获得操作和执行能力 |\n| [[GLM Coding]] | Coding Agent 套餐 | 开发者 | 以开发额度包装底层 Token 消耗 |\n| Agent 平台 | Agent 构建与交付 | 开发者、企业 | 从单一模型转向任务执行 |\n| [[ChatGLM]] / [[智谱清言]] | 开放模型与用户产品 | 开发者、个人用户 | 建立开发者生态与终端入口 |\n\n## 商业模式\n\n- **API**：GLM API 按使用量销售模型推理。\n- **Credits / 积分**：以平台货币隐藏不同模型与 Token 的复杂定价。\n- **Coding Plan**：GLM Coding 以固定套餐销售开发额度与生产力。\n- **Agent 平台**：向任务交付和 Agent 生态扩展。\n- **路线侧重**：以产业场景和企业 ROI 牵引产品迭代，从模型能力转向任务交付。\n\n## 战略路线\n\n```text\nGLM → ChatGLM → API → AutoGLM → GLM Coding\n```\n\n核心信仰是“产业价值优先”。路线从开放模型和可编程能力，演进为销售自主执行、编码生产力和产业 Agent 平台。\n\n## 参考课程\n\n- [[智谱AI发展史（2019-2026）]]\n- [[OpenAI_Anthropic_智谱三条路线演化对比]]\n- [[OpenAI_Anthropic_智谱三条进化路线]]\n- [[AI商业模式全景图]]\n- [[API经济学]]\n- [[Coding Plan经济学]]\n\n## 关联节点\n\n- [[GLM]]\n- [[ChatGLM]]\n- [[智谱清言]]\n- [[OpenAI]]\n- [[Anthropic]]\n- [[AutoGLM]]\n- [[GLM Coding]]\n- [[API]]\n- [[Credits]]\n- [[Coding_Plan|Coding Plan]]\n- [[AI产业地图]]\n", "excerpt": "智谱AI 概述 智谱 AI 是以 GLM 模型 API 为商业起点，向 AutoGLM、GLM Coding 和 Agent 平台演进的中国模型公司。课程将其战略概括为：**从卖 Token 到卖开发者套餐**。 核心能力：GLM 模型、GLM API、AutoGLM 和 GLM Coding。 产品方向：从模型调用扩展到自主执行与 Coding Agent...", "links": ["05-Agent-Runners-AutoGLM", "05-Agent-Runners-GLM-Coding", "06-Products-ChatGLM", "06-Products-智谱清言", "02-Model-Companies-智谱AI发展史2019-2026", "02-Model-Companies-OpenAI_Anthropic_智谱三条路线演化对比", "02-Model-Companies-OpenAI_Anthropic_智谱三条进化路线", "07-Business-AI商业模式全景图", "07-Business-API经济学", "07-Business-Coding-Plan经济学", "10-Concepts-GLM", "02-Model-Companies-OpenAI", "02-Model-Companies-Anthropic", "07-Business-API", "07-Business-Credits", "07-Business-Coding_Plan", "00-MOC-AI产业地图"]}, {"id": "02-Model-Companies-智谱AI发展史2019-2026", "title": "智谱AI发展史（2019-2026）", "fileTitle": "智谱AI发展史（2019-2026）", "category": "02-Model-Companies", "categoryLabel": "模型公司", "path": "02-Model-Companies/智谱AI发展史（2019-2026）.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "智谱AI", "GLM", "Agent", "Commercialization"], "body": "# 智谱AI发展史（2019-2026）\n\n## 目录\n\n- [[#学习定位]]\n- [[#一句话定义]]\n- [[#核心问题]]\n- [[#发展时间轴]]\n- [[#产品矩阵]]\n- [[#商业模式演进]]\n- [[#战略对比]]\n- [[#当前判断（2026）]]\n- [[#知识图谱位置]]\n- [[#关联节点]]\n- [[#核心结论]]\n- [[#延伸阅读]]\n\n## 学习定位\n\n如果说 [[OpenAI]] 代表技术驱动，[[Anthropic]] 代表安全驱动，那么 [[智谱AI]] 代表产业落地驱动。\n\n理解智谱，本质上是在理解中国大模型公司如何商业化。\n\n## 一句话定义\n\n智谱 AI 是中国较早开展大模型产业化探索的公司之一，核心目标是让大模型成为产业工具。\n\n## 核心问题\n\n为什么智谱的发展路线和 OpenAI 不一样？\n\n答案是市场环境不同。相较于 AGI 叙事，中国企业客户更直接关注：\n\n- 业务落地\n- 产业应用\n- 投资回报率（ROI）\n- 企业级交付\n\n## 发展时间轴\n\n| 阶段 | 时间 | 关键事件 | 战略意义 |\n|---|---|---|---|\n| 技术积累期 | 2019-2021 | 延续清华大学知识工程实验室的研究积累 | 建立预训练模型、认知智能与中文语义理解能力 |\n| GLM 路线形成 | 2021-2023 | 形成 [[GLM]] 技术路线 | 强化中英双语与产业适配能力 |\n| ChatGLM 时代 | 2023 | 推出 [[ChatGLM]] | 通过开放模型扩大国产大模型开发者生态 |\n| API 商业化 | 2023-2024 | 开放 GLM API | 以 Token 计费销售模型能力 |\n| Agent 探索 | 2024-2025 | 推进 [[AutoGLM]] | 从模型输出走向自主任务执行 |\n| GLM-4 与 Agent 化 | 2024-2025 | 加强上下文、工具调用、Agent 与多模态能力 | 形成“模型 + Agent”路线 |\n| GLM Coding 路线 | 2025-2026 | 推出 [[GLM Coding]] | 从 Token 销售转向开发者套餐与编码生产力 |\n\n## 第一阶段：技术积累期（2019-2021）\n\n智谱源于清华大学知识工程实验室的技术积累，长期研究预训练模型、认知智能和中文语义理解。\n\n这一阶段以模型研究为主，商业化程度较弱，但为后续 GLM 路线和产业产品奠定了基础。\n\n## 第二阶段：GLM 路线形成（2021-2023）\n\n智谱形成以 [[GLM]] 为核心的技术路线。GLM 即 General Language Model，与 GPT 同属通用语言模型路线，但课程强调其更关注中英双语和产业适配。\n\n这一阶段，GLM 逐渐进入国内头部大模型序列。\n\n## 第三阶段：ChatGLM 时代（2023）\n\n[[ChatGLM]] 是智谱建立开发者影响力的重要产品，也是国产开放大模型生态中的代表节点。\n\n课程将两条路线概括为：\n\n- OpenAI：以闭源模型和 API 为主\n- 智谱：通过部分开放建立开发者生态\n\n大量企业和开发者由此开始接触国产大模型，这也成为智谱后续商业化的生态基础。\n\n## 第四阶段：API 商业化（2023-2024）\n\n随着模型成熟，智谱开始开放 API，以类似 OpenAI 的方式销售模型能力，主要收入逻辑是按 Token 使用量计费。\n\n这标志着智谱从模型研发正式进入规模化商业探索。\n\n## 第五阶段：Agent 探索（2024-2025）\n\n当聊天产品逐渐同质化，企业需求开始从“获得回答”转向“完成任务”。智谱由此探索 [[Agent]]，重点项目是 [[AutoGLM]]。\n\nAutoGLM 更接近 Agent 系统而非单一模型，目标包括：\n\n- 搜索信息\n- 浏览网页\n- 填写表单\n- 调用工具\n- 自主完成任务\n\n这是智谱从模型公司向 Agent 公司转型的重要信号。\n\n## 第六阶段：GLM-4 与 Agent 化（2024-2025）\n\nGLM 系列持续升级，重点能力扩展到：\n\n- 更长上下文\n- [[Tool_Use|Tool Use]]\n- Agent 能力\n- 多模态能力\n\n战略重点由单一模型演进为“模型 + Agent”。\n\n## 第七阶段：GLM Coding 路线（2025-2026）\n\n软件开发成为 Agent 较成熟的落地场景后，智谱推出 [[GLM Coding]]，形成面向国内开发者的编码 Agent 与套餐路线。\n\n传统 API 按 Token 收费，但 Agent 会在规划、读取、编码、测试和修复过程中消耗大量 Token。为降低用户理解和预算管理难度，产品转向 [[Coding Plan经济学|Coding Plan]]：从卖 Token 变为卖开发额度。\n\n## 产品矩阵\n\n| 层级 | 产品或能力 | 定位 |\n|---|---|---|\n| 模型层 | [[GLM]] 系列 | 通用模型与基础推理能力 |\n| 开放生态层 | [[ChatGLM]] | 开放模型与开发者生态入口 |\n| Chat 层 | [[智谱清言]] | 面向终端用户的 AI 助手 |\n| Agent 层 | [[AutoGLM]] | 自主操作与任务执行系统 |\n| Coding 层 | [[GLM Coding]] | 面向开发者的编码 Agent 与套餐 |\n| 企业层 | 企业 API、行业解决方案 | 企业集成、业务落地与产业交付 |\n\n## 商业模式演进\n\n```text\n科研 → 模型 → 开放生态 → API → Agent → Coding\n```\n\n- **科研阶段**：积累模型与认知智能能力\n- **模型阶段**：形成 GLM 技术资产\n- **开放生态阶段**：用 ChatGLM 建立开发者影响力\n- **API 阶段**：按 Token 销售可编程智能\n- **Agent 阶段**：从回答问题扩展到完成任务\n- **Coding 阶段**：用开发者套餐销售生产力\n\n## 战略对比\n\n### 智谱与 OpenAI\n\n课程将两者概括为：\n\n- OpenAI：先扩展能力，再推动应用\n- 智谱：以应用和产业需求牵引能力升级\n\n因此智谱更关注企业客户、行业场景和产业落地。\n\n### 智谱与 Anthropic\n\n- Anthropic 的核心叙事是安全与可控\n- 智谱的核心叙事是产业与商业落地\n\n二者分别回答了“如何安全扩展模型能力”和“如何让模型进入真实业务”的问题。\n\n## 当前判断（2026）\n\n课程判断智谱已不只是模型公司，而更接近 AI 产业平台。未来竞争重点将逐渐从模型参数转向 Agent 的落地与交付能力。\n\n其战略主线可以概括为：\n\n```text\n模型 → API → Agent → Coding → 产业平台\n```\n\n## 知识图谱位置\n\n```text\n智谱AI\n├── GLM\n├── ChatGLM\n├── 智谱清言\n├── AutoGLM\n├── GLM Coding\n├── API\n└── Agent\n```\n\n## 关联节点\n\n- [[OpenAI发展史（2015-2026）|OpenAI发展史]]\n- [[Anthropic为什么与OpenAI分裂]]\n- [[GLM]]\n- [[ChatGLM]]\n- [[AutoGLM]]\n- [[GLM Coding]]\n- [[Agent]]\n- [[API经济学]]\n- [[Coding Plan经济学]]\n\n## 核心结论\n\nOpenAI 代表能力创新，Anthropic 代表安全创新，智谱代表产业创新。\n\n理解智谱，本质上是在理解中国大模型的商业化路径，以及 Agent 如何进入真实产业。\n\n## 延伸阅读\n\n- [[智谱AI]]\n- [[OpenAI_Anthropic_智谱三条进化路线]]\n- [[Agent全景图]]\n- [[API经济学]]\n- [[Coding Plan经济学]]\n- [[AI产业地图]]\n\n", "excerpt": "智谱AI发展史（2019-2026） 目录 #学习定位 #一句话定义 #核心问题 #发展时间轴 #产品矩阵 #商业模式演进 #战略对比 #当前判断（2026） #知识图谱位置 #关联节点 #核心结论 #延伸阅读 学习定位 如果说 OpenAI 代表技术驱动，Anthropic 代表安全驱动，那么 智谱AI 代表产业落地驱动。 理解智谱，本质上是在理解中国大模...", "links": ["02-Model-Companies-OpenAI", "02-Model-Companies-Anthropic", "02-Model-Companies-智谱AI", "10-Concepts-GLM", "06-Products-ChatGLM", "05-Agent-Runners-AutoGLM", "05-Agent-Runners-GLM-Coding", "10-Concepts-Agent", "03-Agent-Tool_Use", "07-Business-Coding-Plan经济学", "06-Products-智谱清言", "02-Model-Companies-OpenAI发展史2015-2026", "02-Model-Companies-Anthropic为什么与OpenAI分裂", "07-Business-API经济学", "02-Model-Companies-OpenAI_Anthropic_智谱三条进化路线", "03-Agent-Agent全景图", "00-MOC-AI产业地图"]}, {"id": "02-Model-Companies-月之暗面_Kimi", "title": "月之暗面_Kimi", "fileTitle": "月之暗面_Kimi", "category": "02-Model-Companies", "categoryLabel": "模型公司", "path": "02-Model-Companies/月之暗面_Kimi.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "model-companies", "Moonshot", "Kimi"], "body": "# 月之暗面 / Kimi\n\n## 概述\n\n月之暗面（Moonshot AI）是以 Kimi 消费者 AI 助手、长上下文和开发者模型平台为核心的中国 AI 公司。其早期通过长文档理解建立产品差异，后续向推理、代码、Agent 和开放模型扩展。\n\n- 核心产品：[[Kimi]] 助手、Kimi 开放平台 / API、Moonshot 模型。\n- 早期差异化：长上下文、文件分析、搜索与中文体验。\n- 后续方向：深度推理、代码、工具调用与 Agentic 任务。\n\n## 时间轴\n\n| 时间 | 关键事件 | 影响 |\n|---|---|---|\n| 2023 | 月之暗面成立 | 聚焦通用大模型与长上下文产品 |\n| 2023-10 | Kimi 智能助手上线 | 以长文本、文件和中文交互建立市场认知 |\n| 2024 | Kimi 长上下文能力和用户规模扩展 | 长文档分析成为国内 AI 助手竞争焦点 |\n| 2025-01 | Kimi k1.5 推理路线公布 | 从长上下文扩展到复杂推理与多模态问题 |\n| 2025 | Kimi K2 等模型向代码、Agent 和开放生态扩展 | 从消费者长文本助手走向开发者和 Agent 平台 |\n\n## 产品矩阵\n\n| 产品 / 能力 | 定位 | 主要用户 | 关键价值 |\n|---|---|---|---|\n| [[Kimi]] | 通用 AI 助手 | 个人用户 | 长文档、搜索、阅读、创作和推理 |\n| Moonshot / Kimi API | 开发者模型平台 | 开发者、企业 | 长上下文、通用对话、推理和工具调用 |\n| Kimi k1.5 | 推理模型路线 | 复杂问题用户 | 数学、视觉、文本与长链路推理 |\n| Kimi K2 | MoE / Agentic 模型路线 | 开发者、Agent 构建者 | 代码、工具调用、任务规划和开放生态 |\n| Kimi 文件与搜索能力 | 知识工作入口 | 学生、研究者、知识工作者 | 长文档理解、资料聚合和信息压缩 |\n\n## 商业模式\n\n- **Consumer Subscription**：通过 Kimi 的高级功能、使用额度或会员体系销售访问权。\n- **API**：通过 Moonshot / Kimi 开放平台按 Token 销售模型推理能力。\n- **Developer Ecosystem**：代码、工具调用和开放模型路线扩大 Agent 开发者覆盖。\n- **Enterprise Knowledge Work**：长文档、搜索与知识工作能力可向企业研究、内容和文档场景扩展。\n\n## 战略演进\n\n```text\n长文本差异化 → Kimi 消费者入口 → 搜索 / 文件生产力 → 推理模型 → 代码与 Agentic 平台\n```\n\n核心路线是先用清晰的长上下文产品体验获取用户，再向更底层的模型 API、推理、代码和 Agent 生态演进。\n\n## 参考资料\n\n- [月之暗面官网](https://www.moonshot.cn/)\n- [Kimi 官网](https://www.kimi.com/)\n- [Moonshot AI 开放平台](https://platform.moonshot.cn/)\n- [[官网索引]]\n\n## 关联节点\n\n- [[Kimi]]\n- [[DeepSeek]]\n- [[智谱AI]]\n- [[阿里通义]]\n- [[百度文心]]\n- [[RAG]]\n- [[API]]\n- [[Agent基础|Agent]]\n- [[AI产业地图]]\n", "excerpt": "月之暗面 / Kimi 概述 月之暗面（Moonshot AI）是以 Kimi 消费者 AI 助手、长上下文和开发者模型平台为核心的中国 AI 公司。其早期通过长文档理解建立产品差异，后续向推理、代码、Agent 和开放模型扩展。 核心产品：Kimi 助手、Kimi 开放平台 / API、Moonshot 模型。 早期差异化：长上下文、文件分析、搜索与中文体...", "links": ["06-Products-Kimi", "99-Resources-官网索引", "02-Model-Companies-DeepSeek", "02-Model-Companies-智谱AI", "02-Model-Companies-阿里通义", "02-Model-Companies-百度文心", "03-Agent-RAG", "07-Business-API", "03-Agent-Agent基础", "00-MOC-AI产业地图"]}, {"id": "02-Model-Companies-百度文心", "title": "百度文心", "fileTitle": "百度文心", "category": "02-Model-Companies", "categoryLabel": "模型公司", "path": "02-Model-Companies/百度文心.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "model-companies", "Baidu", "ERNIE"], "body": "# 百度文心\n\n## 概述\n\n百度文心是百度围绕 ERNIE（文心）基础模型、文心一言 / 文小言消费产品和千帆大模型平台构建的 AI 体系。其优势来自搜索与知识增强、百度智能云、飞桨深度学习框架和企业客户基础。\n\n- 核心模型：ERNIE 通用模型、ERNIE X1 推理模型及多模态能力。\n- 消费者入口：文心一言 / 文小言、百度搜索与百度系产品。\n- 企业入口：百度智能云千帆大模型平台。\n\n## 时间轴\n\n| 时间 | 关键事件 | 影响 |\n|---|---|---|\n| 2019 | ERNIE 预训练模型体系成型 | 建立知识增强语言理解路线 |\n| 2023-03 | 文心一言公布 | 百度进入生成式 AI 消费产品与大模型市场 |\n| 2023-10 | ERNIE 4.0 公布 | 强化理解、生成、逻辑和记忆能力 |\n| 2024 | 文心产品与千帆平台持续升级 | 扩大消费者入口、模型 API 和企业应用构建 |\n| 2025-03 | ERNIE 4.5 与 ERNIE X1 公布 | 向原生多模态、推理与更高成本效率演进 |\n\n## 产品矩阵\n\n| 产品 / 能力 | 定位 | 主要用户 | 关键价值 |\n|---|---|---|---|\n| ERNIE 通用模型 | 基础模型 | 开发者、企业 | 语言、知识、多模态和工具调用 |\n| ERNIE X1 | 深度思考 / 推理模型 | 复杂任务用户 | 数学、代码、规划与复杂问题解决 |\n| 文心一言 / 文小言 | 消费者 AI 助手 | 个人用户 | 对话、搜索、创作、文档和多模态任务 |\n| 千帆大模型平台 | 企业 MaaS 与 Agent 平台 | 企业、开发者 | 模型 API、RAG、应用构建、评测与治理 |\n| 飞桨 PaddlePaddle | 深度学习框架 | 开发者、企业 | 模型训练、部署和产业生态 |\n| 百度搜索 AI | 搜索与 Agent 入口 | 消费者 | 把搜索、生成与任务执行结合 |\n\n## 商业模式\n\n- **Cloud API / MaaS**：通过千帆平台按 Token、调用量、应用或资源使用销售模型能力。\n- **Enterprise Solutions**：销售私有知识、Agent 应用、数据治理、安全与产业解决方案。\n- **Search and Advertising**：生成式 AI 提升搜索体验、用户交互与商业转化。\n- **Consumer Product**：通过文心消费应用获取用户，再与搜索、云和其他百度产品联动。\n\n## 战略演进\n\n```text\n知识增强预训练 → 文心大模型 → 文心消费产品 → 千帆企业平台 → 搜索 / Agent 新入口\n```\n\n核心路线是把搜索与知识优势、模型能力、智能云和企业服务结合，将 AI 变成百度产品与云平台的通用底层能力。\n\n## 参考资料\n\n- [文心一言 / 文小言官网](https://yiyan.baidu.com/)\n- [百度智能云千帆大模型平台](https://cloud.baidu.com/product/wenxinworkshop)\n- [PaddlePaddle 官方站](https://www.paddlepaddle.org.cn/)\n- [[官网索引]]\n\n## 关联节点\n\n- [[阿里通义]]\n- [[智谱AI]]\n- [[DeepSeek]]\n- [[月之暗面_Kimi]]\n- [[RAG]]\n- [[API]]\n- [[Agent基础|Agent]]\n- [[AI产业地图]]\n", "excerpt": "百度文心 概述 百度文心是百度围绕 ERNIE（文心）基础模型、文心一言 / 文小言消费产品和千帆大模型平台构建的 AI 体系。其优势来自搜索与知识增强、百度智能云、飞桨深度学习框架和企业客户基础。 核心模型：ERNIE 通用模型、ERNIE X1 推理模型及多模态能力。 消费者入口：文心一言 / 文小言、百度搜索与百度系产品。 企业入口：百度智能云千帆大模...", "links": ["99-Resources-官网索引", "02-Model-Companies-阿里通义", "02-Model-Companies-智谱AI", "02-Model-Companies-DeepSeek", "02-Model-Companies-月之暗面_Kimi", "03-Agent-RAG", "07-Business-API", "03-Agent-Agent基础", "00-MOC-AI产业地图"]}, {"id": "02-Model-Companies-阿里通义", "title": "阿里通义", "fileTitle": "阿里通义", "category": "02-Model-Companies", "categoryLabel": "模型公司", "path": "02-Model-Companies/阿里通义.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "model-companies", "Alibaba", "Qwen"], "body": "# 阿里通义\n\n## 概述\n\n阿里通义是阿里巴巴围绕 Qwen（通义千问）模型家族、通义应用和阿里云百炼构建的 AI 体系。其路线同时覆盖开源模型、云 API、企业 MaaS 以及电商、办公和内容生成场景。\n\n- 核心模型：Qwen 通用模型、Qwen-VL、Qwen-Coder、Qwen-Audio 及衍生模型。\n- 平台入口：阿里云百炼 / Model Studio。\n- 生态特征：开源模型扩大开发者覆盖，阿里云与产业应用承接商业化。\n\n## 时间轴\n\n| 时间 | 关键事件 | 影响 |\n|---|---|---|\n| 2023-04 | 通义千问公布 | 阿里巴巴正式进入通用大模型与企业服务竞争 |\n| 2023-08 | Qwen 系列开始开源 | 扩大开发者、私有部署与衍生模型生态 |\n| 2024-06 | Qwen2 发布 | 提升多语言、代码、长上下文和开源型号覆盖 |\n| 2024-09 | Qwen2.5 系列扩展 | 加强通用、编码、数学与多模态模型家族 |\n| 2025-04 | Qwen3 发布 | 向混合推理、MoE、Agent 和开源生态继续演进 |\n\n## 产品矩阵\n\n| 产品 / 能力 | 定位 | 主要用户 | 关键价值 |\n|---|---|---|---|\n| Qwen 通用模型 | 基础语言模型 | 开发者、企业、消费者 | 通用对话、推理、长上下文与工具调用 |\n| Qwen-VL / Audio | 多模态模型 | 开发者、内容和行业应用 | 图像、文档、视频和音频理解 |\n| Qwen-Coder | 编码模型 | 开发者 | 代码生成、理解、修复与 Agentic Coding |\n| 通义 / Qwen 应用 | 消费者 AI 助手 | 个人用户 | 对话、创作、文档和生产力任务 |\n| 阿里云百炼 | 企业模型服务与 Agent 平台 | 企业、开发者 | API、RAG、工具、应用构建和模型治理 |\n| Wan / 通义万相 | 视觉与视频生成 | 创作者、企业 | 图像与视频内容生成 |\n\n## 商业模式\n\n- **Cloud API / MaaS**：通过阿里云百炼按 Token、调用量或模型服务销售能力。\n- **Enterprise Platform**：销售企业知识库、Agent 应用构建、数据治理、安全与私有化服务。\n- **Open Source Ecosystem**：通过 Qwen 开源模型扩大开发者覆盖，带动云计算、工具和企业采用。\n- **Alibaba Synergy**：将 AI 集成到电商、办公、物流、客服和内容生成场景。\n\n## 战略演进\n\n```text\n通用闭源模型 → Qwen 开源家族 → 多模态 / Coder 专项模型 → 百炼 MaaS → 企业 Agent 平台\n```\n\n核心路线是以开源模型建立开发者生态，以阿里云承接 API 和企业商业化，再将能力渗透到阿里业务场景。\n\n## 参考资料\n\n- [Qwen 官方站](https://qwenlm.github.io/)\n- [Qwen 官方 GitHub](https://github.com/QwenLM)\n- [Alibaba Cloud Model Studio 文档](https://www.alibabacloud.com/help/en/model-studio/)\n- [[Github索引]]\n\n## 关联节点\n\n- [[DeepSeek]]\n- [[智谱AI]]\n- [[百度文心]]\n- [[Google_DeepMind|Google DeepMind]]\n- [[API]]\n- [[RAG]]\n- [[Agent基础|Agent]]\n- [[AI产业地图]]\n", "excerpt": "阿里通义 概述 阿里通义是阿里巴巴围绕 Qwen（通义千问）模型家族、通义应用和阿里云百炼构建的 AI 体系。其路线同时覆盖开源模型、云 API、企业 MaaS 以及电商、办公和内容生成场景。 核心模型：Qwen 通用模型、Qwen-VL、Qwen-Coder、Qwen-Audio 及衍生模型。 平台入口：阿里云百炼 / Model Studio。 生态特征...", "links": ["99-Resources-Github索引", "02-Model-Companies-DeepSeek", "02-Model-Companies-智谱AI", "02-Model-Companies-百度文心", "02-Model-Companies-Google_DeepMind", "07-Business-API", "03-Agent-RAG", "03-Agent-Agent基础", "00-MOC-AI产业地图"]}, {"id": "03-Agent-Agent_Economy", "title": "Agent_Economy", "fileTitle": "Agent_Economy", "category": "03-Agent", "categoryLabel": "Agent 核心", "path": "03-Agent/Agent_Economy.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "agent", "economics"], "body": "# Agent Economy\n\n## 概述\n\nAgent Economy 研究的是 Agent 从“回答问题”转向“执行工作”后，成本、收入、定价和价值交付方式的变化。\n\n```text\nChat：卖答案 → Agent：卖行动 → 未来：卖结果\n```\n\n## 时间轴\n\n| 阶段 | 出售的价值 | 代表计费 |\n|---|---|---|\n| 模型阶段 | 推理能力 | Token / API |\n| Chat 阶段 | 聊天访问权 | Subscription |\n| 生产力阶段 | Agent 工作额度 | Coding Plan / Quota |\n| 结果阶段 | 完成的任务 | Outcome Pricing |\n| 数字劳动力阶段 | Agent 团队与持续工作 | 企业服务 / 数字员工 |\n\n## 产品矩阵\n\n| 产品类型             | 代表                                 | 价值交付                         |       |\n| ---------------- | ---------------------------------- | ---------------------------- | ----- |\n| Coding Agent     | [[Claude_Code]]                    | Claude CodeGLM Coding、Cursor | 开发生产力 |\n| 通用 Agent         | [[Manus]]                          | 任务完成与执行结果                    |       |\n| Multi-Agent Team | Research / Writer / Reviewer Agent | 虚拟团队与数字外包                    |       |\n| Enterprise Agent | Agent 员工体系                         | 权限、审计、治理和结果交付                |       |\n\n## 商业模式\n\n```text\nAgent 成本 = 模型成本 + 工具成本 + 执行成本 + 管理成本\n```\n\n- 收入来源：订阅、任务额度、结果收费和企业 Agent 服务。\n- 边际成本：每个用户都会持续消耗 Token、工具和执行环境，更像人工服务而非传统 SaaS。\n- 核心矛盾：收入固定，成本浮动；重度用户可能让套餐亏损。\n- 价值指标：从回答质量转向任务完成率、节省时间和可替代人力成本。\n\n## 战略演进\n\n```text\n卖模型 → 卖聊天 → 卖生产力 → 卖结果 → 卖数字劳动力\n```\n\nAgent 的竞争对手不仅是软件，也可能是外包、咨询和人力成本。\n\n## 参考课程\n\n- [[Agent经济学]]\n- [[AI商业模式全景图]]\n- [[Coding Plan经济学]]\n- [[Agent全景图]]\n\n## 关联节点\n\n- [[Agent基础|Agent]]\n- [[Token经济学]]\n- [[Coding Plan经济学]]\n- [[Outcome Pricing]]\n- [[Multi_Agent|Multi-Agent]]\n- [[Manus]]\n- [[AI商业模式地图]]\n", "excerpt": "Agent Economy 概述 Agent Economy 研究的是 Agent 从“回答问题”转向“执行工作”后，成本、收入、定价和价值交付方式的变化。 时间轴 产品矩阵 商业模式 收入来源：订阅、任务额度、结果收费和企业 Agent 服务。 边际成本：每个用户都会持续消耗 Token、工具和执行环境，更像人工服务而非传统 SaaS。 核心矛盾：收入固定...", "links": ["05-Agent-Runners-Claude_Code", "05-Agent-Runners-Manus", "07-Business-Agent经济学", "07-Business-AI商业模式全景图", "07-Business-Coding-Plan经济学", "03-Agent-Agent全景图", "03-Agent-Agent基础", "07-Business-Token经济学", "10-Concepts-Outcome-Pricing", "03-Agent-Multi_Agent", "00-MOC-AI商业模式地图"]}, {"id": "03-Agent-Agent全景图", "title": "Agent全景图", "fileTitle": "Agent全景图", "category": "03-Agent", "categoryLabel": "Agent 核心", "path": "03-Agent/Agent全景图.md", "updated": "2026-06-17", "tags": ["AI", "Agent", "Overview"], "body": "# Agent全景图\n\n## 目录\n\n- [[#一、为什么 Agent 会出现|一、为什么 Agent 会出现]]\n- [[#二、Agent 的标准结构|二、Agent 的标准结构]]\n- [[#三、Workflow 是什么|三、Workflow 是什么]]\n- [[#四、Agent 是什么|四、Agent 是什么]]\n- [[#五、Tool Use 是什么|五、Tool Use 是什么]]\n- [[#六、Function Calling 是什么|六、Function Calling 是什么]]\n- [[#七、Computer Use 是什么|七、Computer Use 是什么]]\n- [[#八、MCP 是什么|八、MCP 是什么]]\n- [[#九、Multi-Agent 是什么|九、Multi-Agent 是什么]]\n- [[#十、产品定位图|十、产品定位图]]\n- [[#十一、Agent 时代的核心变化|十一、Agent 时代的核心变化]]\n- [[#关联节点|关联节点]]\n- [[#延伸阅读|延伸阅读]]\n- [[#待研究问题|待研究问题]]\n\n## 一、为什么 Agent 会出现\n\n### 一个本质问题\n\n[[ChatGPT]] 火了之后，用户发现一个问题：\n\n> 模型很聪明，但它不会干活。\n\n例如，用户说“帮我做一个网站”，[[ChatGPT]] 会回答“应该这样做……”，但不会：\n\n- 创建目录\n- 写代码\n- 运行程序\n- 修复 Bug\n\n它只是顾问，不是执行者。\n\n因此，AI 行业出现了一个新需求：\n\n> 不要告诉我怎么做，而是帮我做。\n\n这就是 [[Agent基础|Agent]] 诞生的根本原因。\n\n### Chat 时代\n\n```text\nQuestion\n   ↓\nAnswer\n```\n\n### Agent 时代\n\n```text\nGoal\n  ↓\nPlan\n  ↓\nAction\n  ↓\nReview\n  ↓\nIteration\n```\n\n即：\n\n```text\n目标\n ↓\n规划\n ↓\n执行\n ↓\n检查\n ↓\n修正\n```\n\n[[Agent基础|Agent]] 本质上是在 Chat 之上增加了：**行动能力**。\n\n## 二、Agent 的标准结构\n\n一个完整 Agent 通常由五部分组成：\n\n```text\nModel\n  ↓\nPlanner\n  ↓\nWorkflow\n  ↓\nExecutor\n  ↓\nTools\n```\n\n### Model\n\n模型负责：\n\n- 思考\n- 推理\n- 理解\n- 决策\n\n代表：\n\n- [[OpenAI|GPT]]\n- [[Claude]]\n- [[智谱AI|GLM]]\n- [[Gemini]]\n\n### Planner\n\n规划器负责任务拆解。\n\n例如，用户提出“帮我开发一个网站”，Planner 可以拆解为：\n\n1. 创建目录\n2. 设计数据库\n3. 开发接口\n4. 开发前端\n\n### Workflow\n\n[[Workflow]] 负责组织执行顺序。\n\n```text\n搜索\n ↓\n总结\n ↓\n写报告\n ↓\n发送邮件\n```\n\nWorkflow 类似业务流程图。\n\n### Executor\n\n执行器负责真正干活，例如：\n\n- 创建文件\n- 修改代码\n- 打开网页\n- 执行命令\n\n### Tools\n\n工具例如：\n\n- Browser\n- Search\n- [[Github索引|GitHub]]\n- Notion\n- Obsidian\n- Database\n\nAgent 通过工具与世界交互。\n\n## 三、Workflow 是什么\n\n[[Workflow]] 是 Agent 时代最容易被误解的概念。\n\nWorkflow 不是 AI，Workflow 是**预定义流程**。\n\n例如：\n\n```text\n用户提问\n   ↓\n搜索知识库\n   ↓\n调用 LLM\n   ↓\n输出结果\n```\n\n### 特点\n\n**优点**\n\n- 稳定\n- 可控\n- 成本低\n\n**缺点**\n\n- 不灵活\n- 不能自主规划\n\n**代表产品**\n\n- [[Coze]]\n- [[Dify]]\n- [[LangFlow]]\n- [[Flowise]]\n\n> [!summary] 一句话\n> Workflow = 固定流程机器人。\n\n## 四、Agent 是什么\n\nAgent 与 Workflow 最大的区别：\n\n| 类型 | 核心模式 |\n|---|---|\n| [[Workflow]] | 先设计流程，再执行 |\n| [[Agent基础|Agent]] | 根据目标，自己决定流程 |\n\n例如，目标是“帮我做一个竞品分析”，Agent 可能会：\n\n```text\n搜索官网\n   ↓\n搜索新闻\n   ↓\n搜索融资信息\n   ↓\n分析\n   ↓\n生成报告\n```\n\n下一次的执行流程可能完全不同。因此：\n\n- Workflow = 流程驱动\n- Agent = 目标驱动\n\n## 五、Tool Use 是什么\n\nAgent 为什么突然变强？因为 [[Tool_Use|Tool Use]] 出现了。\n\n过去，模型只能输出文字。现在，模型可以：\n\n- 调用搜索\n- 调用数据库\n- 调用浏览器\n- 调用 API\n\n例如，用户询问“今天上海天气”：\n\n```text\n模型调用天气工具\n        ↓\n      获得结果\n        ↓\n        回答\n```\n\n这就是 Tool Use。\n\n## 六、Function Calling 是什么\n\n[[Function Calling]] 是 Tool Use 的实现机制。\n\n例如，系统定义：\n\n```json\n{\n  \"name\": \"search_weather\",\n  \"parameters\": {\n    \"city\": \"string\"\n  }\n}\n```\n\n模型输出：\n\n```json\n{\n  \"city\": \"Shanghai\"\n}\n```\n\n程序执行：\n\n```text\nsearch_weather()\n```\n\n> [!summary] 一句话\n> Function Calling = 工具调用协议。\n\n## 七、Computer Use 是什么\n\n[[Computer_Use|Computer Use]] 是 2025 年之后最重要的趋势之一。\n\n过去，Agent 只能调用 API。现在，Agent 可以直接操作电脑，例如：\n\n- 点击按钮\n- 输入文字\n- 浏览网页\n- 上传文件\n\n代表：\n\n- [[Operator]]\n- [[Claude Computer Use]]\n- [[AutoGLM]]\n- [[Manus]]\n\n> [!summary] 一句话\n> Computer Use 的本质，是 Agent 获得鼠标和键盘。\n\n## 八、MCP 是什么\n\n[[MCP]] 的全称是 **Model Context Protocol**，由 [[Anthropic]] 提出。\n\n### 为什么需要 MCP\n\n没有 MCP 时：\n\n```text\nGPT    → GitHub\nClaude → GitHub\nGemini → GitHub\n```\n\n不同模型都要分别开发接入。\n\n有了 MCP 之后：\n\n```text\nGitHub\n  ↓\nMCP Server\n  ↓\n所有模型\n```\n\n它的意义类似：\n\n- USB 对于电脑\n- HTTP 对于互联网\n\nMCP 正在成为 Agent 时代的重要基础设施。\n\n## 九、Multi-Agent 是什么\n\n一个 Agent 往往能力有限，于是出现了多个 Agent 协作，即 [[Multi_Agent|Multi-Agent]]。\n\n例如：\n\n| Agent | 职责 |\n|---|---|\n| Research Agent | 负责搜索 |\n| Writer Agent | 负责写作 |\n| Reviewer Agent | 负责审查 |\n\n它们共同形成 Agent Team。\n\n代表：\n\n- [[CrewAI]]\n- [[AutoGen]]\n- [[LangGraph]]\n\n## 十、产品定位图\n\n| 层级 | 代表产品 | 核心职责 |\n|---|---|---|\n| 模型层 | [[OpenAI|GPT]]、[[Claude]]、[[智谱AI|GLM]]、[[Gemini]] | 思考 |\n| Workflow 层 | [[Coze]]、[[Dify]]、[[LangFlow]] | 编排 |\n| Agent 执行层 | [[Claude_Code|Claude Code]]、[[OpenClaw]]、[[Cline]]、[[Roo_Code|Roo Code]]、[[OpenHands]]、[[Manus]] | 执行 |\n| 应用层 | [[ChatGPT]]、[[Claude]]、[[Kimi]]、[[豆包]] | 最终用户体验 |\n\n## 十一、Agent 时代的核心变化\n\n互联网时代：\n\n```text\n人\n ↓\n软件\n ↓\n结果\n```\n\nAI 时代：\n\n```text\n人\n ↓\nAgent\n ↓\n软件\n ↓\n结果\n```\n\n因此，Agent 不是聊天机器人升级版。Agent 是：\n\n> **新的软件操作层**\n\n很多分析师认为，Agent 未来会像以下产品一样成为新的入口：\n\n- 浏览器\n- 搜索引擎\n- App Store\n\n## 关联节点\n\n- [[Agent基础|Agent]]\n- [[Workflow]]\n- [[Tool_Use|Tool Use]]\n- [[Function Calling]]\n- [[Computer_Use|Computer Use]]\n- [[MCP]]\n- [[Multi_Agent|Multi-Agent]]\n- [[Coze]]\n- [[Dify]]\n- [[Claude_Code|Claude Code]]\n- [[OpenClaw]]\n- [[Manus]]\n- [[OpenAI]]\n- [[Anthropic]]\n- [[智谱AI]]\n\n## 延伸阅读\n\n- [[Agent地图]]\n- [[MCP地图]]\n- [[从Chat到Agent]]\n- [[OpenAI_Anthropic_智谱三条进化路线]]\n- [[Agent_Economy|Agent Economy]]\n\n## 待研究问题\n\n1. MCP 生态如何形成网络效应？\n2. Workflow 与 Agent 最终会不会融合？\n3. Multi-Agent 是否会成为企业级 AI 的主流架构？\n4. Computer Use 是否会替代大量传统 RPA 系统？\n5. [[OpenAI]] 与 [[Anthropic]] 未来会不会在 MCP 标准上竞争？\n", "excerpt": "Agent全景图 目录 一、为什么 Agent 会出现 二、Agent 的标准结构 三、Workflow 是什么 四、Agent 是什么 五、Tool Use 是什么 六、Function Calling 是什么 七、Computer Use 是什么 八、MCP 是什么 九、Multi-Agent 是什么 十、产品定位图 十一、Agent 时代的核心变化 关...", "links": ["06-Products-ChatGPT", "03-Agent-Agent基础", "02-Model-Companies-OpenAI", "06-Products-Claude", "02-Model-Companies-智谱AI", "06-Products-Gemini", "03-Agent-Workflow", "99-Resources-Github索引", "04-Platforms-Coze", "04-Platforms-Dify", "04-Platforms-LangFlow", "04-Platforms-Flowise", "03-Agent-Tool_Use", "10-Concepts-Function-Calling", "03-Agent-Computer_Use", "06-Products-Operator", "05-Agent-Runners-AutoGLM", "05-Agent-Runners-Manus", "03-Agent-MCP", "02-Model-Companies-Anthropic", "03-Agent-Multi_Agent", "04-Platforms-CrewAI", "04-Platforms-AutoGen", "04-Platforms-LangGraph", "05-Agent-Runners-Claude_Code", "05-Agent-Runners-OpenClaw", "05-Agent-Runners-Cline", "05-Agent-Runners-Roo_Code", "05-Agent-Runners-OpenHands", "06-Products-Kimi", "06-Products-豆包", "00-MOC-Agent地图", "00-MOC-MCP地图", "01-Industry-从Chat到Agent", "02-Model-Companies-OpenAI_Anthropic_智谱三条进化路线", "03-Agent-Agent_Economy"]}, {"id": "03-Agent-Agent基础", "title": "Agent基础", "fileTitle": "Agent基础", "category": "03-Agent", "categoryLabel": "Agent 核心", "path": "03-Agent/Agent基础.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "agent"], "body": "# Agent基础\n\n## 概述\n\nAgent 是以目标为驱动，能够规划、调用工具、执行、检查并迭代修正的 AI 系统。它在 Chat 的语言能力之上增加了**行动能力**。\n\n```text\nGoal → Plan → Action → Review → Iteration\n```\n\n一个完整 Agent 通常包含 Model、Planner、Workflow、Executor 和 Tools。\n\n## 时间轴\n\n| 阶段 | 交互模式 | 核心变化 |\n|---|---|---|\n| Chat 时代 | Question → Answer | 模型提供建议，但不执行 |\n| Tool Use 阶段 | Model → Function / API | 模型能与外部系统交互 |\n| Agent 时代 | Goal → Plan → Act → Review | 从回答问题转向完成任务 |\n| Agentic Workflow | 固定框架 + 局部自主决策 | 稳定性与自主性融合 |\n| Multi-Agent | 多角色协作 | 研究、写作、审查等任务分工 |\n\n## 产品矩阵\n\n| 层级         | 代表                                     | 主要职责                                 |                                  |                |\n| ---------- | -------------------------------------- | ------------------------------------ | -------------------------------- | -------------- |\n| 模型层        | GPT、[[Claude]]、GLM、[[Gemini]]          | 思考、推理与决策                             |                                  |                |\n| Workflow 层 | [[Coze]]、[[Dify]]、[[LangGraph]]        | 编排与状态控制                              |                                  |                |\n| Agent 执行层  | [[Claude_Code]]                        | Claude Code]]、[[Cline]]、[[Roo_Code]] | Roo Code、[[OpenHands]]、[[Manus]] | 文件、代码、浏览器和命令执行 |\n| 应用层        | [[ChatGPT]]、[[Claude]]、[[Kimi]]、[[豆包]] | 最终用户体验                               |                                  |                |\n\n## 商业模式\n\n- Agent 从“卖回答”转向“卖行动”，并最终可能“卖结果”。\n- 成本由模型、工具、执行环境和管理共同构成，高于单轮 Chat。\n- 常见收费方式包括订阅、任务额度、Coding Plan、企业服务和 Outcome Pricing。\n- 核心矛盾是收入相对固定，但循环调用导致成本浮动。\n\n## 战略演进\n\n```text\n聊天助手 → Tool Use → Workflow → Agent → Agentic Workflow → Multi-Agent\n```\n\nAgent 并非只是聊天机器人升级版，而是人与软件之间的新操作层。\n\n## 参考课程\n\n- [[Agent全景图]]\n- [[Workflow全景图]]\n- [[MCP全景图]]\n- [[RAG全景图]]\n- [[Agent经济学]]\n\n## 关联节点\n\n- [[Workflow]]\n- [[Tool_Use|Tool Use]]\n- [[MCP]]\n- [[RAG]]\n- [[Computer_Use|Computer Use]]\n- [[Multi_Agent|Multi-Agent]]\n- [[Agent_Economy|Agent Economy]]\n- [[Agent地图]]\n", "excerpt": "Agent基础 概述 Agent 是以目标为驱动，能够规划、调用工具、执行、检查并迭代修正的 AI 系统。它在 Chat 的语言能力之上增加了**行动能力**。 一个完整 Agent 通常包含 Model、Planner、Workflow、Executor 和 Tools。 时间轴 产品矩阵 商业模式 Agent 从“卖回答”转向“卖行动”，并最终可能“卖结...", "links": ["06-Products-Claude", "06-Products-Gemini", "04-Platforms-Coze", "04-Platforms-Dify", "04-Platforms-LangGraph", "05-Agent-Runners-Claude_Code", "05-Agent-Runners-Cline", "05-Agent-Runners-Roo_Code", "05-Agent-Runners-OpenHands", "05-Agent-Runners-Manus", "06-Products-ChatGPT", "06-Products-Kimi", "06-Products-豆包", "03-Agent-Agent全景图", "03-Agent-Workflow全景图", "03-Agent-MCP全景图", "03-Agent-RAG全景图", "07-Business-Agent经济学", "03-Agent-Workflow", "03-Agent-Tool_Use", "03-Agent-MCP", "03-Agent-RAG", "03-Agent-Computer_Use", "03-Agent-Multi_Agent", "03-Agent-Agent_Economy", "00-MOC-Agent地图"]}, {"id": "03-Agent-Computer-Use全景图", "title": "Computer Use全景图", "fileTitle": "Computer Use全景图", "category": "03-Agent", "categoryLabel": "Agent 核心", "path": "03-Agent/Computer Use全景图.md", "updated": "2026-06-17", "tags": ["AI", "Agent", "ComputerUse"], "body": "# Computer Use全景图\n\n## 正文\n\n![[Computer_Use]]\n\n> [!summary] 核心观点\n> Computer Use 让 Agent 获得鼠标、键盘和屏幕理解能力，是 API Tool Use 之外的通用执行补充。结构化 API 更稳定，Computer Use 更适合无 API 或界面主导的任务。\n\n## 关联节点\n\n- [[Agent]]\n- [[Workflow]]\n- [[MCP]]\n- [[RAG]]\n- [[Operator]]\n- [[AutoGLM]]\n- [[Manus]]\n", "excerpt": "Computer Use全景图 正文 !Computer_Use [!summary] 核心观点 Computer Use 让 Agent 获得鼠标、键盘和屏幕理解能力，是 API Tool Use 之外的通用执行补充。结构化 API 更稳定，Computer Use 更适合无 API 或界面主导的任务。 关联节点 Agent Workflow MCP RA...", "links": ["03-Agent-Computer_Use", "10-Concepts-Agent", "03-Agent-Workflow", "03-Agent-MCP", "03-Agent-RAG", "06-Products-Operator", "05-Agent-Runners-AutoGLM", "05-Agent-Runners-Manus"]}, {"id": "03-Agent-Computer_Use", "title": "Computer_Use", "fileTitle": "Computer_Use", "category": "03-Agent", "categoryLabel": "Agent 核心", "path": "03-Agent/Computer_Use.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "agent", "computer-use"], "body": "# Computer Use\n\n## 概述\n\nComputer Use 是让 Agent 通过视觉、鼠标和键盘直接操作电脑界面的能力。它把 Agent 的执行范围从结构化 API 扩展到没有专用接口的图形软件。\n\n```text\n观察屏幕 → 理解状态 → 点击 / 输入 → 检查结果 → 修正\n```\n\n## 时间轴\n\n| 阶段 | 交互方式 | 变化 |\n|---|---|---|\n| API Agent | 调用预定义 API | 稳定，但仅限于已接入工具 |\n| Browser Agent | 读取和操作网页 | 扩展到网页工作流 |\n| Computer Use | 鼠标、键盘与视觉界面 | 可操作通用桌面和无 API 软件 |\n| 未来方向 | Computer Use + Workflow + MCP | 结合界面操作、标准工具与业务流程 |\n\n## 产品矩阵\n\n| 产品 / 能力 | 定位 | 主要能力 |\n|---|---|---|\n| [[Operator]] | 通用电脑操作 Agent | 网页点击、输入和任务执行 |\n| [[Claude Computer Use]] | 模型级电脑操作 | 屏幕理解与鼠标键盘动作 |\n| [[AutoGLM]] | 智谱 Agent 执行能力 | 从 GLM 模型扩展到操作任务 |\n| [[Manus]] | 通用任务 Agent | 组合规划、工具和执行环境交付结果 |\n\n## 商业模式\n\n- 可通过 Agent 订阅、任务额度、执行时长、企业自动化或按结果收费。\n- 主要成本包括视觉模型 Token、浏览器 / 虚拟机、沙箱、网络和失败重试。\n- 企业价值来自覆盖无 API 的存量系统，并可能替代部分传统 RPA。\n- 商业化的核心前提是可靠性、权限、审计和高风险动作确认。\n\n## 战略演进\n\n```text\nAPI Tool Use → Browser Use → Computer Use → 通用数字执行层\n```\n\nComputer Use 不会完全替代 API：结构化 API 更稳定，Computer Use 更适合无 API 或界面主导的任务。\n\n## 参考课程\n\n- [[Agent全景图]]\n- [[Computer Use全景图]]\n- [[Workflow全景图]]\n\n## 关联节点\n\n- [[Agent基础|Agent]]\n- [[Tool_Use|Tool Use]]\n- [[Workflow]]\n- [[MCP]]\n- [[Operator]]\n- [[AutoGLM]]\n- [[Manus]]\n- [[Agent地图]]\n", "excerpt": "Computer Use 概述 Computer Use 是让 Agent 通过视觉、鼠标和键盘直接操作电脑界面的能力。它把 Agent 的执行范围从结构化 API 扩展到没有专用接口的图形软件。 时间轴 产品矩阵 商业模式 可通过 Agent 订阅、任务额度、执行时长、企业自动化或按结果收费。 主要成本包括视觉模型 Token、浏览器 / 虚拟机、沙箱、网...", "links": ["06-Products-Operator", "05-Agent-Runners-AutoGLM", "05-Agent-Runners-Manus", "03-Agent-Agent全景图", "03-Agent-Computer-Use全景图", "03-Agent-Workflow全景图", "03-Agent-Agent基础", "03-Agent-Tool_Use", "03-Agent-Workflow", "03-Agent-MCP", "00-MOC-Agent地图"]}, {"id": "03-Agent-MCP", "title": "MCP", "fileTitle": "MCP", "category": "03-Agent", "categoryLabel": "Agent 核心", "path": "03-Agent/MCP.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "agent", "MCP"], "body": "# MCP\n\n## 概述\n\nMCP（Model Context Protocol，模型上下文协议）是 [[Anthropic]] 于 2024 年 11 月提出的开放协议，用于统一 AI 应用与工具、数据源的连接方式。其定位可理解为“AI 时代的 USB-C”。\n\n```text\nLLM → MCP Client → MCP Server → Tool / API\n```\n\nMCP 把模型与工具的 N × M 集成复杂度，转换为可复用的通用接口。\n\n## 时间轴\n\n| 时间 / 阶段 | 变化 | 意义 |\n|---|---|---|\n| MCP 之前 | 每个模型分别对接每个工具 | 形成 N × M 集成成本 |\n| 2024-11 | Anthropic 正式提出 MCP | 建立 Client / Server / Tool 标准结构 |\n| 2025 起 | GitHub、Atlassian、Cloudflare 等工具生态扩展 | MCP 开始从厂商协议走向行业基础设施 |\n| 未来推演 | MCP Server 生态与 MCP Store | Agent 可跨模型、跨系统复用工具 |\n\n## 产品矩阵\n\n| 层级 | 代表 | 职责 |\n|---|---|---|\n| MCP Client | Claude Desktop、[[Claude_Code|Claude Code]]、Cursor、Windsurf、[[OpenAI_Agents_SDK|OpenAI Agent SDK]]、[[Cline]] | 发起调用并管理与 Server 的连接 |\n| MCP Server | GitHub、Notion、Obsidian Server | 封装工具能力与原生 API |\n| Tool / API | GitHub API、Notion API、数据库 | 执行真实操作 |\n\n## 商业模式\n\n- MCP 本身是开放协议，商业价值来自生态位置，而非单次协议调用收费。\n- Client 可通过订阅、Coding Plan 和企业服务变现。\n- Server 提供方可通过 API 用量、企业连接器、托管和治理服务变现。\n- 网络效应来自“一次开发，多个 Client 复用”。\n\n## 战略演进\n\n```text\n厂商私有 Plugin → 开放 MCP 协议 → 跨模型工具生态 → MCP Store\n```\n\nMCP 不替代 API：API 是工具接口，MCP 是工具连接标准。MCP 也不替代 Function Calling，而是为函数发现、连接与管理提供统一方式。\n\n## 参考课程\n\n- [[MCP全景图]]\n- [[Agent全景图]]\n- [[RAG全景图]]\n- [Model Context Protocol 官方文档](https://modelcontextprotocol.io)\n\n## 关联节点\n\n- [[Anthropic]]\n- [[Agent基础|Agent]]\n- [[Tool_Use|Tool Use]]\n- [[Function Calling]]\n- [[RAG]]\n- [[Workflow]]\n- [[MCP地图]]\n", "excerpt": "MCP 概述 MCP（Model Context Protocol，模型上下文协议）是 Anthropic 于 2024 年 11 月提出的开放协议，用于统一 AI 应用与工具、数据源的连接方式。其定位可理解为“AI 时代的 USB-C”。 MCP 把模型与工具的 N × M 集成复杂度，转换为可复用的通用接口。 时间轴 产品矩阵 商业模式 MCP 本身是开...", "links": ["02-Model-Companies-Anthropic", "05-Agent-Runners-Claude_Code", "04-Platforms-OpenAI_Agents_SDK", "05-Agent-Runners-Cline", "03-Agent-MCP全景图", "03-Agent-Agent全景图", "03-Agent-RAG全景图", "03-Agent-Agent基础", "03-Agent-Tool_Use", "10-Concepts-Function-Calling", "03-Agent-RAG", "03-Agent-Workflow", "00-MOC-MCP地图"]}, {"id": "03-Agent-MCP全景图", "title": "MCP全景图", "fileTitle": "MCP全景图", "category": "03-Agent", "categoryLabel": "Agent 核心", "path": "03-Agent/MCP全景图.md", "updated": "2026-06-17", "tags": ["AI", "Agent", "MCP"], "body": "# MCP全景图\n\n## 目录\n\n- [[#一、MCP 是什么|一、MCP 是什么]]\n- [[#二、为什么 MCP 会出现|二、为什么 MCP 会出现]]\n- [[#三、Anthropic 发现的问题|三、Anthropic 发现的问题]]\n- [[#四、MCP 架构|四、MCP 架构]]\n- [[#五、MCP Client|五、MCP Client]]\n- [[#六、MCP Server|六、MCP Server]]\n- [[#七、MCP 解决了什么问题|七、MCP 解决了什么问题]]\n- [[#八、MCP 与 API 的区别|八、MCP 与 API 的区别]]\n- [[#九、MCP 与 Plugin 的区别|九、MCP 与 Plugin 的区别]]\n- [[#十、MCP 与 Function Calling 的区别|十、MCP 与 Function Calling 的区别]]\n- [[#十一、MCP 与 RAG 的区别|十一、MCP 与 RAG 的区别]]\n- [[#十二、MCP 生态爆发|十二、MCP 生态爆发]]\n- [[#十三、MCP 为什么重要|十三、MCP 为什么重要]]\n- [[#十四、未来推演|十四、未来推演]]\n- [[#十五、知识图谱位置|十五、知识图谱位置]]\n- [[#核心结论|核心结论]]\n- [[#关联节点|关联节点]]\n- [[#延伸阅读|延伸阅读]]\n- [[#待研究问题|待研究问题]]\n\n## 一、MCP 是什么\n\n[[MCP]] 的全称是 **Model Context Protocol**，中文为**模型上下文协议**。\n\nMCP 由 [[Anthropic]] 于 2024 年 11 月正式提出。官方定位为：\n\n> **The USB-C for AI**\n\n即：AI 时代的 USB 协议。\n\n### 官方资料\n\n- [Model Context Protocol 官网](https://modelcontextprotocol.io)\n- [Anthropic：Introducing the Model Context Protocol](https://www.anthropic.com/news/model-context-protocol)\n\n## 二、为什么 MCP 会出现\n\nMCP 出现之前，AI 世界有一个巨大问题。\n\n假设 [[Claude]]、[[OpenAI|GPT]] 和 [[Gemini]] 都要连接 GitHub：\n\n```text\nClaude → GitHub：开发一次\nGPT    → GitHub：再开发一次\nGemini → GitHub：还要开发一次\n```\n\n结果是：\n\n```text\nN 个模型 × M 个工具 = N × M 复杂度\n```\n\n例如，10 个模型和 100 个工具，需要 1,000 次开发。这是无法扩展的。\n\n## 三、Anthropic 发现的问题\n\n[[Anthropic]] 团队发现，未来 Agent 不会只连接 GitHub，而会连接：\n\n- Slack\n- Notion\n- Obsidian\n- Jira\n- Salesforce\n- Google Drive\n- 数据库\n- ERP\n\n工具数量会爆炸。于是，Anthropic 提出了**统一接口**：\n\n| 时代 | 协议 | 统一对象 |\n|---|---|---|\n| 互联网时代 | HTTP | 网页 |\n| 硬件设备 | USB | 硬件 |\n| AI 时代 | MCP | AI 工具 |\n\n## 四、MCP 架构\n\n标准结构：\n\n```text\nLLM\n ↓\nMCP Client\n ↓\nMCP Server\n ↓\nTool\n```\n\n例如：\n\n```text\nClaude\n  ↓\nMCP Client\n  ↓\nGitHub MCP Server\n  ↓\nGitHub API\n```\n\n模型无需理解 GitHub，只需要理解 MCP 即可。\n\n## 五、MCP Client\n\nClient 即客户端，作用是连接 Server。\n\n典型 Client：\n\n- [[Claude Desktop]]\n- [[Claude_Code|Claude Code]]\n- [[Cursor]]\n- [[Windsurf]]\n- [[OpenAI_Agents_SDK|OpenAI Agent SDK]]\n- [[Cline]]\n\n这些产品负责发起调用。\n\n## 六、MCP Server\n\nServer 即服务端，作用是包装工具。\n\n| MCP Server | 包装对象 |\n|---|---|\n| GitHub MCP Server | GitHub API |\n| Notion MCP Server | Notion API |\n| Obsidian MCP Server | Obsidian 能力 |\n\n模型不再直接面对 API，而是统一面对 MCP Server。\n\n## 七、MCP 解决了什么问题\n\n| 问题 | MCP 的解决方式 |\n|---|---|\n| 重复开发 | 一次开发，所有模型可用 |\n| 工具标准不统一 | 统一 Schema |\n| Agent 迁移困难 | 跨模型复用 |\n\n## 八、MCP 与 API 的区别\n\n很多人会混淆 API 和 MCP：\n\n- API：工具接口\n- MCP：工具标准\n\n例如，GitHub API 仍然存在，MCP 只是包装 GitHub API。\n\n> [!important]\n> API ≠ MCP\n\n两者的关系：\n\n```text\nAPI\n ↓\nMCP Server\n ↓\nLLM\n```\n\n## 九、MCP 与 Plugin 的区别\n\n[[OpenAI]] 曾经推出 Plugins 插件体系，但只能给 OpenAI 使用。\n\nAnthropic 提出 MCP，目标是成为全行业标准。\n\n| 方式 | 定位 |\n|---|---|\n| Plugin | 厂商私有 |\n| MCP | 开放协议 |\n\n## 十、MCP 与 Function Calling 的区别\n\n[[Function Calling]] 是模型调用函数，例如：\n\n```text\nsearch_weather(city)\n```\n\nMCP 则是函数管理系统。可以理解为：\n\n- Function Calling = 电话\n- MCP = 通讯录\n\n## 十一、MCP 与 RAG 的区别\n\n| 技术 | 核心问题 |\n|---|---|\n| [[RAG]] | 知识获取：知道什么 |\n| [[MCP]] | 工具连接：能做什么 |\n\n两者并不冲突。未来：\n\n```text\nAgent = RAG + MCP\n```\n\n## 十二、MCP 生态爆发\n\n2025 年开始，大量公司接入 MCP：\n\n- GitHub 支持 MCP\n- Atlassian 支持 MCP\n- Cloudflare 支持 MCP\n- [[OpenAI]] 开始兼容 MCP\n- [[Google_DeepMind|Google]] 开始支持 MCP\n\n越来越多工具开始：先做 MCP，再做 API。\n\n## 十三、MCP 为什么重要\n\n| 时代 | 协议 | 作用 |\n|---|---|---|\n| 互联网时代 | TCP/IP | 统一网络 |\n| Web 时代 | HTTP | 统一网页 |\n| PC 时代 | USB | 统一设备 |\n| AI 时代 | MCP | 可能统一 Agent 生态 |\n\n## 十四、未来推演\n\n未来可能形成 **MCP Store**，其中包含大量 MCP Server：\n\n- GitHub\n- Obsidian\n- Salesforce\n- 飞书\n- 企业微信\n\nAgent 通过 MCP 连接所有系统。届时，Agent 将不再依赖单一厂商，而是形成开放生态。\n\n## 十五、知识图谱位置\n\n```text\nAgent\n├── Workflow\n├── Tool Use\n├── Function Calling\n├── MCP\n├── Computer Use\n└── Multi-Agent\n```\n\nMCP 位于 **Agent 连接层**。\n\n## 核心结论\n\nAnthropic 真正想做的，不是最强模型，而是：\n\n> **AI 时代的 HTTP**\n\n如果 MCP 成为标准，未来所有 Agent 都会经过 MCP。\n\n## 关联节点\n\n- [[Agent基础|Agent]]\n- [[Workflow]]\n- [[Tool_Use|Tool Use]]\n- [[Function Calling]]\n- [[RAG]]\n- [[Computer_Use|Computer Use]]\n- [[Claude_Code|Claude Code]]\n- [[OpenAI]]\n- [[Anthropic]]\n\n## 延伸阅读\n\n- [[MCP地图]]\n- [[Agent全景图]]\n- [[OpenAI_Agents_SDK|OpenAI Agent SDK]]\n- [[Github索引|GitHub 索引]]\n- [Model Context Protocol 官方文档](https://modelcontextprotocol.io)\n\n## 待研究问题\n\n1. MCP 是否会成为 AI 行业标准？\n2. [[OpenAI]] 未来是否会推出自己的协议？\n3. MCP 与 Agent SDK 如何协作？\n4. 企业如何建设自己的 MCP Server？\n5. MCP Store 是否会成为新的应用商店？\n", "excerpt": "MCP全景图 目录 一、MCP 是什么 二、为什么 MCP 会出现 三、Anthropic 发现的问题 四、MCP 架构 五、MCP Client 六、MCP Server 七、MCP 解决了什么问题 八、MCP 与 API 的区别 九、MCP 与 Plugin 的区别 十、MCP 与 Function Calling 的区别 十一、MCP 与 RAG 的区...", "links": ["03-Agent-MCP", "02-Model-Companies-Anthropic", "06-Products-Claude", "02-Model-Companies-OpenAI", "06-Products-Gemini", "05-Agent-Runners-Claude_Code", "06-Products-Cursor", "06-Products-Windsurf", "04-Platforms-OpenAI_Agents_SDK", "05-Agent-Runners-Cline", "10-Concepts-Function-Calling", "03-Agent-RAG", "02-Model-Companies-Google_DeepMind", "03-Agent-Agent基础", "03-Agent-Workflow", "03-Agent-Tool_Use", "03-Agent-Computer_Use", "00-MOC-MCP地图", "03-Agent-Agent全景图", "99-Resources-Github索引"]}, {"id": "03-Agent-Multi_Agent", "title": "Multi_Agent", "fileTitle": "Multi_Agent", "category": "03-Agent", "categoryLabel": "Agent 核心", "path": "03-Agent/Multi_Agent.md", "updated": "2026-06-20", "tags": ["AI-Learning-OS", "agent", "multi-agent"], "body": "# Multi-Agent\n\n## 概述\n\nMulti-Agent 是让多个具有不同角色、工具和职责的 Agent 协作完成复杂任务的架构。例如，Research Agent 负责搜索，Writer Agent 负责写作，Reviewer Agent 负责审查。\n\n```text\n目标 → 角色分工 → Agent 协作 → 结果汇总 → 审查\n```\n\n## 时间轴\n\n| 阶段 | 架构 | 特征 |\n|---|---|---|\n| 单 Agent | 一个 Agent 完成全部任务 | 结构简单，但角色与上下文容易冲突 |\n| 角色化 Agent | 研究、写作、审查分工 | 专业化更强 |\n| Multi-Agent Workflow | 通过图或流程协调多 Agent | 支持交接、回退、重试和审核 |\n| Agent Team | 虚拟团队按结果交付 | 向数字外包和数字劳动力演进 |\n\n## 产品矩阵\n\n| 产品 | 定位 | 突出能力 |\n|---|---|---|\n| [[CrewAI]] | 角色化 Agent 团队 | 任务分工与协作 |\n| [[AutoGen]] | 多 Agent 对话与编排 | Agent 间消息交互 |\n| [[LangGraph]] | 图结构 Agent Workflow | 状态、循环、回退与人工审批 |\n\n## 商业模式\n\n- Multi-Agent 可以团队订阅、任务额度、企业项目或结果交付收费。\n- 价值在于用数字团队替代部分研究、内容、审查和外包流程。\n- 成本会随 Agent 数量、协作轮次和审查循环增长，需要设置预算、终止条件和观测机制。\n\n## 战略演进\n\n```text\n单 Agent → 角色分工 → Multi-Agent Workflow → Agent Team / 数字劳动力\n```\n\n成熟的 Multi-Agent 不只是让多个模型互相对话，而是需要清晰的角色、交付物、状态和质量门槛。\n\n## 参考课程\n\n- [[Multi-Agent]]\n- [[Agent全景图]]\n- [[Workflow全景图]]\n- [[Agent经济学]]\n\n## 关联节点\n\n- [[Digital Workforce]]\n- [[Agent Runtime]]\n- [[Agent基础|Agent]]\n- [[Workflow]]\n- [[CrewAI]]\n- [[AutoGen]]\n- [[LangGraph]]\n- [[Agent_Economy|Agent Economy]]\n- [[Agent地图]]\n", "excerpt": "Multi-Agent 概述 Multi-Agent 是让多个具有不同角色、工具和职责的 Agent 协作完成复杂任务的架构。例如，Research Agent 负责搜索，Writer Agent 负责写作，Reviewer Agent 负责审查。 时间轴 产品矩阵 商业模式 Multi-Agent 可以团队订阅、任务额度、企业项目或结果交付收费。 价值在于...", "links": ["04-Platforms-CrewAI", "04-Platforms-AutoGen", "04-Platforms-LangGraph", "10-Concepts-Multi-Agent", "03-Agent-Agent全景图", "03-Agent-Workflow全景图", "07-Business-Agent经济学", "10-Concepts-Digital-Workforce", "10-Concepts-Agent-Runtime", "03-Agent-Agent基础", "03-Agent-Workflow", "03-Agent-Agent_Economy", "00-MOC-Agent地图"]}, {"id": "03-Agent-RAG", "title": "RAG", "fileTitle": "RAG", "category": "03-Agent", "categoryLabel": "Agent 核心", "path": "03-Agent/RAG.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "agent", "RAG"], "body": "# RAG\n\n## 概述\n\nRAG（Retrieval Augmented Generation，检索增强生成）是把搜索系统与大模型组合，让模型在生成答案前检索外部知识的方法。它不改变模型本身，而是增强模型可见的上下文。\n\n```text\n用户问题 → Query → 检索 → 召回文档 → 拼接上下文 → LLM 生成\n```\n\nRAG 解决“知道什么”，MCP 解决“能做什么”。\n\n## 时间轴\n\n| 阶段 | 检索方式 | 能力变化 |\n|---|---|---|\n| 第一代 | 关键词搜索 | 依赖字面匹配 |\n| 第二代 | Embedding 检索 | 按语义相似度召回 |\n| 第三代 | Hybrid Search | 组合关键词与向量检索 |\n| 第四代 | Agentic RAG | Agent 自主决定查什么、查几次 |\n\n## 产品矩阵\n\n| 层级 | 代表 | 职责 |\n|---|---|---|\n| Embedding | [[Embedding]] | 把文字转换为语义向量 |\n| 向量数据库 | Pinecone、Weaviate、Milvus、Qdrant、Chroma | 存储向量并快速检索 |\n| RAG 平台 | [[Coze]]、[[Dify]]、FastGPT、MaxKB | 建设企业知识库与检索流程 |\n| Agentic RAG | Agent + RAG | 自主查询、多轮召回与结果验证 |\n\n## 商业模式\n\n- RAG 的主要商业价值是让通用模型连接企业制度、产品、客户和项目资料。\n- 可通过知识库 SaaS、向量数据库用量、企业部署、数据治理与实施服务变现。\n- 相比微调，RAG 通常更便宜、更快且更容易维护，适合知识补充。\n- 核心成本来自文档处理、Embedding、检索、重排和 LLM 生成。\n\n## 战略演进\n\n```text\n关键词搜索 → 向量检索 → Hybrid Search → Agentic RAG\n```\n\n在企业 Agent 架构中，RAG 负责企业记忆，MCP 负责企业行动，LLM 负责推理，Workflow 负责流程。\n\n## 参考课程\n\n- [[RAG全景图]]\n- [[MCP全景图]]\n- [[Workflow全景图]]\n\n## 关联节点\n\n- [[Agent基础|Agent]]\n- [[LLM]]\n- [[Embedding]]\n- [[Vector Database]]\n- [[MCP]]\n- [[Workflow]]\n- [[Coze]]\n- [[Dify]]\n- [[Agent地图]]\n", "excerpt": "RAG 概述 RAG（Retrieval Augmented Generation，检索增强生成）是把搜索系统与大模型组合，让模型在生成答案前检索外部知识的方法。它不改变模型本身，而是增强模型可见的上下文。 RAG 解决“知道什么”，MCP 解决“能做什么”。 时间轴 产品矩阵 商业模式 RAG 的主要商业价值是让通用模型连接企业制度、产品、客户和项目资料。...", "links": ["10-Concepts-Embedding", "04-Platforms-Coze", "04-Platforms-Dify", "03-Agent-RAG全景图", "03-Agent-MCP全景图", "03-Agent-Workflow全景图", "03-Agent-Agent基础", "10-Concepts-LLM", "10-Concepts-Vector-Database", "03-Agent-MCP", "03-Agent-Workflow", "00-MOC-Agent地图"]}, {"id": "03-Agent-RAG全景图", "title": "RAG全景图", "fileTitle": "RAG全景图", "category": "03-Agent", "categoryLabel": "Agent 核心", "path": "03-Agent/RAG全景图.md", "updated": "2026-06-17", "tags": ["AI", "Agent", "RAG"], "body": "# RAG全景图\n\n## 目录\n\n- [[#一、RAG 是什么|一、RAG 是什么]]\n- [[#二、为什么 RAG 会出现|二、为什么 RAG 会出现]]\n- [[#三、RAG 的核心思想|三、RAG 的核心思想]]\n- [[#四、RAG 工作流程|四、RAG 工作流程]]\n- [[#五、为什么叫 Augmented|五、为什么叫 Augmented]]\n- [[#六、Embedding 是什么|六、Embedding 是什么]]\n- [[#七、向量数据库是什么|七、向量数据库是什么]]\n- [[#八、RAG 与搜索引擎的区别|八、RAG 与搜索引擎的区别]]\n- [[#九、RAG 与微调的区别|九、RAG 与微调的区别]]\n- [[#十、RAG 与 MCP 的区别|十、RAG 与 MCP 的区别]]\n- [[#十一、RAG 与 Agent 的关系|十一、RAG 与 Agent 的关系]]\n- [[#十二、为什么 Coze 和 Dify 都强调 RAG|十二、为什么 Coze 和 Dify 都强调 RAG]]\n- [[#十三、RAG 发展阶段|十三、RAG 发展阶段]]\n- [[#十四、未来趋势|十四、未来趋势]]\n- [[#十五、知识图谱位置|十五、知识图谱位置]]\n- [[#核心结论|核心结论]]\n- [[#关联节点|关联节点]]\n- [[#延伸阅读|延伸阅读]]\n- [[#待研究问题|待研究问题]]\n\n## 一、RAG 是什么\n\n[[RAG全景图|RAG]] 的全称是 **Retrieval Augmented Generation**，中文为**检索增强生成**。\n\nRAG 是 2023 年以来 AI 行业最重要的概念之一。\n\n如果说：\n\n- [[MCP全景图|MCP]] 解决 Agent 连接世界\n- RAG 解决 Agent 获得知识\n\nRAG 出现之前，模型只能依赖训练时学到的知识。RAG 出现之后，模型开始能够：\n\n- 实时查资料\n- 实时读文档\n- 实时读知识库\n\n> [!summary] 一句话\n> RAG 的本质是给模型外挂大脑。\n\n## 二、为什么 RAG 会出现\n\n### LLM 的天然缺陷\n\n所有大模型都有一个问题：知识会过期。\n\n例如，用户询问“2026 年 [[OpenAI]] 最新产品是什么”，如果模型训练于 2025 年，那么它可能不知道。\n\n这就是 **Knowledge Cutoff**，即知识截止。\n\n### 企业私有知识\n\n第二个问题是企业私有知识。例如：\n\n- 公司规章制度\n- 客户资料\n- 项目文档\n- 内部知识库\n\n模型训练时不可能知道这些内容。于是出现了一个需求：\n\n> 不重新训练模型，但让模型知道新知识。\n\n这就是 RAG 诞生的背景。\n\n## 三、RAG 的核心思想\n\n传统方式：\n\n```text\n问题\n ↓\n模型\n ↓\n答案\n```\n\nRAG 方式：\n\n```text\n问题\n ↓\n搜索知识库\n ↓\n找到相关内容\n ↓\n交给模型\n ↓\n生成答案\n```\n\n其本质是：\n\n```text\nSearch + LLM\n```\n\n因此，RAG 不是新模型，而是**搜索系统与大模型的组合**。\n\n## 四、RAG 工作流程\n\n标准流程：\n\n```text\n用户提问\n   ↓\nQuery\n   ↓\n向量搜索\n   ↓\n召回文档\n   ↓\n拼接上下文\n   ↓\nLLM 生成答案\n```\n\n例如，用户询问“公司年假制度是什么？”系统会：\n\n1. 搜索《员工手册.pdf》。\n2. 找到年假规定章节。\n3. 把内容交给模型。\n4. 由模型生成回答。\n\n这就是 RAG。\n\n## 五、为什么叫 Augmented\n\nAugmented 的意思是“增强”。增强的是**上下文（Context）**。\n\n原来，模型只能看到问题。现在，模型能看到：\n\n```text\n问题 + 知识库内容\n```\n\n因此，模型的能力被增强。\n\n## 六、Embedding 是什么\n\nRAG 离不开 [[Embedding]]。\n\nEmbedding 即向量化，本质是**把文字变成坐标**。\n\n例如，“苹果手机”和“iPhone”意思接近。Embedding 之后，它们的坐标也接近。\n\n于是，搜索不再只依赖关键词，而可以依赖**语义相似度**。这是 RAG 能够工作的基础。\n\n## 七、向量数据库是什么\n\nEmbedding 会产生向量，向量需要存储，于是出现了 [[Vector Database]]，即向量数据库。\n\n代表产品：\n\n- [[Pinecone]]\n- [[Weaviate]]\n- [[Milvus]]\n- [[Qdrant]]\n- [[Chroma]]\n\n向量数据库的作用是：\n\n- 存储知识\n- 快速检索\n\n## 八、RAG 与搜索引擎的区别\n\n很多人误以为 RAG 就是搜索。实际上：\n\n| 方式 | 输出 |\n|---|---|\n| 搜索 | 返回文档 |\n| RAG | 返回答案 |\n\n例如：\n\n- Google 给你网页。\n- RAG 给你结论。\n\n因此：\n\n```text\nRAG = Search + Reasoning\n```\n\n## 九、RAG 与微调的区别\n\n很多企业会纠结选择微调还是 RAG。\n\n| 方式 | 是否改变模型 | 适合场景 |\n|---|---|---|\n| 微调 | 改变模型 | 能力提升 |\n| RAG | 不改变模型 | 知识补充 |\n\n现实中，90% 以上的企业项目使用 RAG，而不是微调。原因是：\n\n- 便宜\n- 快\n- 可维护\n\n## 十、RAG 与 MCP 的区别\n\n这是最容易混淆的两个概念。\n\n| 能力 | 解决的问题 | 层级 |\n|---|---|---|\n| RAG | 知道什么 | 知识层 |\n| [[MCP全景图|MCP]] | 能做什么 | 工具层 |\n\n例如，Agent 知道公司规章制度，知识来自 RAG；然后 Agent 调用企业微信，工具连接来自 MCP。\n\n## 十一、RAG 与 Agent 的关系\n\nAgent 需要的能力：\n\n| 能力 | 来源 |\n|---|---|\n| 思考 | [[LLM]] |\n| 知识 | RAG |\n| 工具 | [[MCP全景图|MCP]] |\n\n因此：\n\n```text\nAgent = LLM + RAG + MCP\n```\n\n## 十二、为什么 Coze 和 Dify 都强调 RAG\n\n因为企业最需要的不是通用知识，而是自己的知识。例如：\n\n- 企业制度\n- 产品资料\n- 客户资料\n- 项目资料\n\n这些都来自 RAG。所以，以下产品几乎全部建立在 RAG 基础上：\n\n- [[Coze]]\n- [[Dify]]\n- [[FastGPT]]\n- [[MaxKB]]\n\n## 十三、RAG 发展阶段\n\n| 阶段 | 主要方式 |\n|---|---|\n| 第一代 | 关键词搜索 |\n| 第二代 | Embedding 检索 |\n| 第三代 | Hybrid Search（混合检索） |\n| 第四代 | Agentic RAG |\n\nAgentic RAG 中，Agent 自主决定：\n\n- 查什么\n- 查几次\n\n这是 2025–2026 年的新趋势。\n\n## 十四、未来趋势\n\n未来企业 Agent 结构：\n\n```text\nLLM + RAG + MCP + Workflow\n```\n\n其中：\n\n| 组件 | 职责 |\n|---|---|\n| RAG | 企业记忆 |\n| MCP | 企业行动 |\n| LLM | 企业推理 |\n| Workflow | 企业流程 |\n\n## 十五、知识图谱位置\n\n```text\nAgent\n├── LLM\n├── RAG\n├── MCP\n├── Workflow\n└── Computer Use\n```\n\nRAG 位于**知识层**。\n\n## 核心结论\n\nChatGPT 时代：模型拥有知识。\n\nRAG 时代：模型连接知识。\n\n这是 AI 从**通用智能**走向**企业智能**的关键一步。\n\n## 关联节点\n\n- [[Agent基础|Agent]]\n- [[LLM]]\n- [[Embedding]]\n- [[Vector Database]]\n- [[MCP全景图|MCP]]\n- [[Workflow]]\n- [[Coze]]\n- [[Dify]]\n- [[FastGPT]]\n- [[MaxKB]]\n\n## 延伸阅读\n\n- [[Agent全景图]]\n- [[MCP全景图]]\n- [[Tool_Use|Tool Use]]\n- [[Computer_Use|Computer Use]]\n- [[Agent地图]]\n\n## 待研究问题\n\n1. Agentic RAG 会不会取代传统 RAG？\n2. [[GraphRAG]] 是什么？\n3. 企业应该如何建设知识库？\n4. RAG 与搜索引擎未来关系如何？\n5. RAG 是否会成为企业 Agent 的标配？\n", "excerpt": "RAG全景图 目录 一、RAG 是什么 二、为什么 RAG 会出现 三、RAG 的核心思想 四、RAG 工作流程 五、为什么叫 Augmented 六、Embedding 是什么 七、向量数据库是什么 八、RAG 与搜索引擎的区别 九、RAG 与微调的区别 十、RAG 与 MCP 的区别 十一、RAG 与 Agent 的关系 十二、为什么 Coze 和 Di...", "links": ["03-Agent-RAG全景图", "03-Agent-MCP全景图", "02-Model-Companies-OpenAI", "10-Concepts-Embedding", "10-Concepts-Vector-Database", "10-Concepts-LLM", "04-Platforms-Coze", "04-Platforms-Dify", "04-Platforms-FastGPT", "04-Platforms-MaxKB", "03-Agent-Agent基础", "03-Agent-Workflow", "03-Agent-Agent全景图", "03-Agent-Tool_Use", "03-Agent-Computer_Use", "00-MOC-Agent地图", "10-Concepts-GraphRAG"]}, {"id": "03-Agent-Tool_Use", "title": "Tool_Use", "fileTitle": "Tool_Use", "category": "03-Agent", "categoryLabel": "Agent 核心", "path": "03-Agent/Tool_Use.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "agent", "tool-use"], "body": "# Tool Use\n\n## 概述\n\nTool Use 是让模型从只输出文字，扩展到调用搜索、数据库、浏览器和 API 等外部工具的能力。它是 Agent 获得行动能力的基础。\n\n```text\n用户目标 → 模型决定工具 → 发起调用 → 获得结果 → 继续推理\n```\n\n## 时间轴\n\n| 阶段 | 能力 | 变化 |\n|---|---|---|\n| 纯文本模型 | 只生成文字 | 无法访问实时数据或执行操作 |\n| Function Calling | 以结构化参数调用函数 | 建立模型与程序的调用机制 |\n| MCP | 统一工具发现和连接 | 工具可在多个 Agent 客户端间复用 |\n| Computer Use | 直接操作图形界面 | 从 API 工具扩展到鼠标和键盘 |\n\n## 产品矩阵\n\n| 工具类型 | 代表
