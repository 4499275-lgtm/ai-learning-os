能力 | 用途 |\n|---|---|---|\n| 信息工具 | Search、Browser | 获取实时资料 |\n| 数据工具 | Database、File Search | 读写结构化数据与知识库 |\n| 开发工具 | GitHub、命令执行、文件系统 | 代码开发、测试与修复 |\n| 业务工具 | Notion、Slack、Jira、Salesforce | 连接企业工作系统 |\n\n## 商业模式\n\n- 工具调用可按 API 次数、数据量、执行时长或套餐收费。\n- Agent 平台可通过高级连接器、企业治理、托管执行环境和 Credits 变现。\n- 成本不仅包含 Token，还包含搜索 API、数据库、浏览器与沙箱执行成本。\n\n## 战略演进\n\n```text\n文本生成 → Function Calling → Tool Use → MCP 工具生态 → Computer Use\n```\n\n工具能力让模型从“知道”走向“能做”，并成为 Agent 的执行基础。\n\n## 参考课程\n\n- [[Agent全景图]]\n- [[MCP全景图]]\n- [[Workflow全景图]]\n\n## 关联节点\n\n- [[Agent基础|Agent]]\n- [[Function Calling]]\n- [[MCP]]\n- [[Computer_Use|Computer Use]]\n- [[Workflow]]\n- [[OpenAI_Agents_SDK|OpenAI Agent SDK]]\n- [[Agent地图]]\n", "excerpt": "Tool Use 概述 Tool Use 是让模型从只输出文字，扩展到调用搜索、数据库、浏览器和 API 等外部工具的能力。它是 Agent 获得行动能力的基础。 时间轴 产品矩阵 商业模式 工具调用可按 API 次数、数据量、执行时长或套餐收费。 Agent 平台可通过高级连接器、企业治理、托管执行环境和 Credits 变现。 成本不仅包含 Token，...", "links": ["03-Agent-Agent全景图", "03-Agent-MCP全景图", "03-Agent-Workflow全景图", "03-Agent-Agent基础", "10-Concepts-Function-Calling", "03-Agent-MCP", "03-Agent-Computer_Use", "03-Agent-Workflow", "04-Platforms-OpenAI_Agents_SDK", "00-MOC-Agent地图"]}, {"id": "03-Agent-Workflow", "title": "Workflow", "fileTitle": "Workflow", "category": "03-Agent", "categoryLabel": "Agent 核心", "path": "03-Agent/Workflow.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "agent", "workflow"], "body": "# Workflow\n\n## 概述\n\nWorkflow 是把复杂任务拆成多个节点，并按预先定义的顺序、条件和规则执行的工作流。其本质是**流程自动化**，不是完全自主决策。\n\n```text\nTrigger → Input → Process / LLM / Tool Steps → Output\n```\n\nWorkflow 是流程驱动，Agent 是目标驱动。\n\n## 时间轴\n\n| 阶段 | 主要特征 | 能力变化 |\n|---|---|---|\n| 第一代 | 固定流程 | 按预设顺序执行 |\n| 第二代 | 条件判断 | 引入分支与规则 |\n| 第三代 | LLM 节点 | 增加总结、分类、翻译和分析 |\n| 第四代 | Agentic Workflow | 固定框架中加入局部自主决策 |\n| 第五代 | Multi-Agent Workflow | 多角色分工与协作 |\n\n## 产品矩阵\n\n| 产品 | 定位 | 特点 |\n|---|---|---|\n| [[Coze]] | 低代码 Workflow Builder | 通过节点、条件和顺序编排 AI 能力 |\n| [[Dify]] | 低代码 AI 工作流 | 组合用户输入、RAG、LLM 和输出 |\n| [[LangGraph]] | 图结构 Agent Workflow | 支持回退、重试、循环和状态管理 |\n| [[n8n]] | 通用自动化平台 | 把 GPT、Claude 与业务系统连接起来 |\n\n## 商业模式\n\n- Workflow 平台通常通过 SaaS 订阅、执行次数、Credits、连接器和企业版收费。\n- 企业优先选择 Workflow，因为它相对稳定、便宜、可管理。\n- 成本来自 LLM、RAG、工具 API 和流程执行次数。\n- 平台的商业壁垒来自模板、连接器、治理能力和企业系统集成。\n\n## 战略演进\n\n```text\n规则自动化 → LLM Workflow → Agentic Workflow → Multi-Agent Workflow\n```\n\nWorkflow 与 Agent 更可能融合，而不是相互取代：固定框架提供稳定性，局部 Agent 提供灵活性。\n\n## 参考课程\n\n- [[Workflow全景图]]\n- [[Agent全景图]]\n- [[RAG全景图]]\n- [[MCP全景图]]\n\n## 关联节点\n\n- [[Agent基础|Agent]]\n- [[RAG]]\n- [[MCP]]\n- [[LangGraph]]\n- [[Coze]]\n- [[Dify]]\n- [[n8n]]\n- [[Multi_Agent|Multi-Agent]]\n- [[Agent地图]]\n", "excerpt": "Workflow 概述 Workflow 是把复杂任务拆成多个节点，并按预先定义的顺序、条件和规则执行的工作流。其本质是**流程自动化**，不是完全自主决策。 Workflow 是流程驱动，Agent 是目标驱动。 时间轴 产品矩阵 商业模式 Workflow 平台通常通过 SaaS 订阅、执行次数、Credits、连接器和企业版收费。 企业优先选择 Wor...", "links": ["04-Platforms-Coze", "04-Platforms-Dify", "04-Platforms-LangGraph", "04-Platforms-n8n", "03-Agent-Workflow全景图", "03-Agent-Agent全景图", "03-Agent-RAG全景图", "03-Agent-MCP全景图", "03-Agent-Agent基础", "03-Agent-RAG", "03-Agent-MCP", "03-Agent-Multi_Agent", "00-MOC-Agent地图"]}, {"id": "03-Agent-Workflow全景图", "title": "Workflow全景图", "fileTitle": "Workflow全景图", "category": "03-Agent", "categoryLabel": "Agent 核心", "path": "03-Agent/Workflow全景图.md", "updated": "2026-06-17", "tags": ["AI", "Agent", "Workflow"], "body": "# Workflow全景图\n\n## 目录\n\n- [[#一、Workflow 是什么|一、Workflow 是什么]]\n- [[#二、为什么 Workflow 会出现|二、为什么 Workflow 会出现]]\n- [[#三、Workflow 的标准结构|三、Workflow 的标准结构]]\n- [[#四、Workflow 与 Agent 的区别|四、Workflow 与 Agent 的区别]]\n- [[#五、为什么 Coze 和 Dify 本质是 Workflow 平台|五、为什么 Coze 和 Dify 本质是 Workflow 平台]]\n- [[#六、Workflow 为什么比 Agent 先落地|六、Workflow 为什么比 Agent 先落地]]\n- [[#七、Workflow 的四种节点|七、Workflow 的四种节点]]\n- [[#八、Workflow 与 RAG 的关系|八、Workflow 与 RAG 的关系]]\n- [[#九、Workflow 与 MCP 的关系|九、Workflow 与 MCP 的关系]]\n- [[#十、Workflow 与 Agent 的关系|十、Workflow 与 Agent 的关系]]\n- [[#十一、LangGraph 的重要性|十一、LangGraph 的重要性]]\n- [[#十二、n8n 为什么火|十二、n8n 为什么火]]\n- [[#十三、Workflow 发展阶段|十三、Workflow 发展阶段]]\n- [[#十四、Workflow 在 Agent 体系的位置|十四、Workflow 在 Agent 体系的位置]]\n- [[#十五、核心结论|十五、核心结论]]\n- [[#关联节点|关联节点]]\n- [[#延伸阅读|延伸阅读]]\n- [[#待研究问题|待研究问题]]\n\n## 一、Workflow 是什么\n\n[[Workflow]] 即工作流，字面意思是“工作流程”。\n\n在 AI 领域，Workflow 表示：\n\n> 把一个复杂任务拆解成多个步骤，并按照固定顺序执行。\n\n例如，用户提出“帮我生成行业周报”，Workflow 可以是：\n\n```text\n搜索新闻\n   ↓\n提取正文\n   ↓\n总结内容\n   ↓\n生成 Markdown\n   ↓\n发送邮件\n```\n\n这里的每一步都是预先设计好的。\n\n> [!summary] 一句话\n> Workflow 的本质是流程自动化，而不是自主决策。\n\n## 二、为什么 Workflow 会出现\n\n[[ChatGPT]] 爆火后，企业很快发现：模型虽然聪明，但不可控。\n\n例如，今天回答 A，明天可能回答 B。企业希望：\n\n- 固定输入\n- 固定流程\n- 固定输出\n\n于是 Workflow 出现。其本质是：**把 AI 放进业务流程**。\n\n## 三、Workflow 的标准结构\n\n典型结构：\n\n```text\nTrigger\n  ↓\nInput\n  ↓\nStep 1\n  ↓\nStep 2\n  ↓\nStep 3\n  ↓\nOutput\n```\n\n例如：\n\n```text\n收到邮件\n   ↓\n提取附件\n   ↓\n分析内容\n   ↓\n生成摘要\n   ↓\n发送结果\n```\n\n这就是 Workflow。\n\n## 四、Workflow 与 Agent 的区别\n\n这是最重要的问题。\n\n| 类型 | 工作方式 | 驱动方式 |\n|---|---|---|\n| Workflow | 先设计流程，后执行流程 | 流程驱动 |\n| [[Agent基础|Agent]] | 先给目标，Agent 自己设计流程 | 目标驱动 |\n\nWorkflow 的流程永远固定：\n\n```text\n搜索 → 总结 → 写报告\n```\n\nAgent 的目标可以是“做竞品分析”，但每次的流程可能不同：\n\n```text\n第一次：官网 → 新闻 → 融资\n第二次：GitHub → 社区 → 产品体验\n```\n\n## 五、为什么 Coze 和 Dify 本质是 Workflow 平台\n\n很多人说 [[Coze]] 是 Agent 平台。严格来说，早期 Coze 更像 **Workflow Builder**。\n\n使用者需要自己设计：\n\n- 节点\n- 条件\n- 顺序\n\n例如：\n\n```text\n用户输入\n   ↓\n知识库检索\n   ↓\nLLM\n   ↓\n输出\n```\n\n这是工作流，不是自主 Agent。[[Dify]] 同理，其本质是低代码工作流平台。\n\n## 六、Workflow 为什么比 Agent 先落地\n\n| 类型 | 优势 | 局限 |\n|---|---|---|\n| Agent | 能力强 | 成本高、风险高、不可预测 |\n| Workflow | 稳定、便宜、容易管理 | 能力弱 |\n\n因此，2023–2025 年的企业项目绝大多数采用：\n\n```text\nWorkflow + LLM\n```\n\n而不是纯 Agent。\n\n## 七、Workflow 的四种节点\n\n### 1. 输入节点（Input）\n\n来源：\n\n- 用户输入\n- 文件上传\n- API\n- 定时任务\n\n### 2. 处理节点（Process）\n\n例如：\n\n- 文本清洗\n- 格式转换\n- 数据处理\n\n### 3. LLM 节点\n\nAI 处理例如：\n\n- 总结\n- 分类\n- 翻译\n- 分析\n\n### 4. 输出节点（Output）\n\n例如：\n\n- Email\n- Notion\n- Slack\n- 企业微信\n- Obsidian\n\n## 八、Workflow 与 RAG 的关系\n\n[[RAG全景图|RAG]] 本身不是 Workflow，但 RAG 通常会成为 Workflow 中的一个节点。\n\n例如：\n\n```text\n用户提问\n   ↓\nRAG 检索\n   ↓\nLLM 总结\n   ↓\n返回结果\n```\n\n## 九、Workflow 与 MCP 的关系\n\n[[MCP全景图|MCP]] 也不是 Workflow。\n\n| 组件 | 职责 |\n|---|---|\n| MCP | 连接工具 |\n| Workflow | 安排工具的使用顺序 |\n\n例如：\n\n```text\n读取文件\n   ↓\n搜索知识库\n   ↓\n发送邮件\n```\n\n这些工具通过 MCP 接入，流程由 Workflow 控制。\n\n## 十、Workflow 与 Agent 的关系\n\n未来很多人认为 Workflow 会被 Agent 取代。实际上，更可能是两者融合，形成 **Agentic Workflow**。\n\nAgentic Workflow 是固定框架与局部 Agent 自主决策的结合。例如：\n\n```text\n固定流程\n   ↓\n搜索阶段交给 Agent\n   ↓\n固定流程\n```\n\n这是目前最主流的趋势。\n\n## 十一、LangGraph 的重要性\n\n[[LangGraph]] 出现后，行业开始意识到 Workflow 和 Agent 其实不是对立，而是可以融合：\n\n```text\nWorkflow + Agent\n```\n\nLangGraph 的核心思想是**图（Graph）**，而不是线性流程。因此，Agent 可以：\n\n- 回退\n- 重试\n- 循环\n\n这更加接近真实决策过程。\n\n## 十二、n8n 为什么火\n\n[[n8n]] 原本不是 AI 产品，而是自动化平台。后来接入 [[OpenAI|GPT]] 和 [[Claude]] 之后爆发。\n\n原因是：\n\n- AI 需要 Workflow。\n- Workflow 需要自动化。\n- n8n 天然适合。\n\n## 十三、Workflow 发展阶段\n\n| 阶段 | 主要特征 |\n|---|---|\n| 第一代 | 固定流程 |\n| 第二代 | 条件判断 |\n| 第三代 | LLM 节点 |\n| 第四代 | Agentic Workflow |\n| 第五代 | Multi-Agent Workflow |\n\n这是未来趋势。\n\n## 十四、Workflow 在 Agent 体系的位置\n\n```text\nAgent\n├── LLM\n├── RAG\n├── MCP\n├── Workflow\n└── Computer Use\n```\n\n| 组件 | 职责 |\n|---|---|\n| Workflow | 组织行动 |\n| RAG | 提供知识 |\n| MCP | 连接工具 |\n| LLM | 思考推理 |\n\n## 十五、核心结论\n\nWorkflow 不是 Agent。\n\n| 系统 | 解决的问题 |\n|---|---|\n| Workflow | 怎么执行 |\n| Agent | 执行什么 |\n\n未来主流架构：\n\n```text\nLLM + RAG + MCP + Workflow + Agent\n```\n\n而不是纯 Agent。\n\n## 关联节点\n\n- [[Agent基础|Agent]]\n- [[MCP全景图|MCP]]\n- [[RAG全景图|RAG]]\n- [[LangGraph]]\n- [[Coze]]\n- [[Dify]]\n- [[n8n]]\n- [[CrewAI]]\n\n## 延伸阅读\n\n- [[Agent全景图]]\n- [[MCP全景图]]\n- [[RAG全景图]]\n- [[Multi_Agent|Multi-Agent]]\n- [[Agent地图]]\n\n## 待研究问题\n\n1. Agent 是否会取代 Workflow？\n2. [[LangGraph]] 为什么越来越重要？\n3. Agentic Workflow 会成为主流吗？\n4. 企业如何选择 [[Coze]] 还是 [[Dify]]？\n5. Workflow 与 RPA 未来如何融合？\n", "excerpt": "Workflow全景图 目录 一、Workflow 是什么 二、为什么 Workflow 会出现 三、Workflow 的标准结构 四、Workflow 与 Agent 的区别 五、为什么 Coze 和 Dify 本质是 Workflow 平台 六、Workflow 为什么比 Agent 先落地 七、Workflow 的四种节点 八、Workflow 与 R...", "links": ["03-Agent-Workflow", "06-Products-ChatGPT", "03-Agent-Agent基础", "04-Platforms-Coze", "04-Platforms-Dify", "03-Agent-RAG全景图", "03-Agent-MCP全景图", "04-Platforms-LangGraph", "04-Platforms-n8n", "02-Model-Companies-OpenAI", "06-Products-Claude", "04-Platforms-CrewAI", "03-Agent-Agent全景图", "03-Agent-Multi_Agent", "00-MOC-Agent地图"]}, {"id": "04-Platforms-AutoGen", "title": "AutoGen", "fileTitle": "AutoGen", "category": "04-Platforms", "categoryLabel": "开发平台", "path": "04-Platforms/AutoGen.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "platform"], "body": "# AutoGen\n\n## 一句话定义\n\n> AutoGen 是 Microsoft 推动的多 Agent 应用框架，通过消息、对话和事件组织 Agent 协作。\n\n## 定位\n\n- 定位于研究与开发者导向的 Multi-Agent 框架。\n- 支持代码执行、工具、人类参与和分布式 Agent。\n\n## 时间轴\n\n| 阶段 | 关键变化 | 意义 |\n|---|---|---|\n| 起点 | 多 Agent 对话框架 | 用消息协调专门化 Agent |\n| 演进 | 分层架构与事件驱动核心 | 提升扩展性与组件化 |\n| 生态整合 | 与 Microsoft Agent 技术方向协同 | 向企业开发与云生态扩展 |\n\n## 产品矩阵\n\n| 产品 / 能力 | 定位 | 核心价值 |\n|---|---|---|\n| AgentChat | 高层对话 API | 快速构建多 Agent 应用 |\n| Core | 事件驱动运行时 | 组件、消息和分布式执行 |\n| Studio | 可视化试验 | 原型、调试与团队组装 |\n\n## 商业模式\n\n- 主要以开源和 Microsoft 开发者生态扩大影响，商业价值更多由云、企业平台和工具承接。\n- 成本取决于模型调用、Agent 轮次和代码执行环境。\n\n## 竞争格局\n\n- 与 CrewAI、LangGraph 和 OpenAI Agent SDK 竞争。\n- 优势是 Microsoft 生态与研究基础，挑战是 API 演进和开发者迁移成本。\n\n## 关联节点\n\n- [[Multi_Agent]]\n- [[CrewAI]]\n- [[LangGraph]]\n- [[Workflow]]\n- [[Agent]]\n\n## 延伸阅读\n\n- [[Multi-Agent]]\n- [AutoGen 官方文档](https://microsoft.github.io/autogen/)\n- [AutoGen GitHub](https://github.com/microsoft/autogen)\n- [[Agent地图]]\n", "excerpt": "AutoGen 一句话定义 AutoGen 是 Microsoft 推动的多 Agent 应用框架，通过消息、对话和事件组织 Agent 协作。 定位 定位于研究与开发者导向的 Multi-Agent 框架。 支持代码执行、工具、人类参与和分布式 Agent。 时间轴 产品矩阵 商业模式 主要以开源和 Microsoft 开发者生态扩大影响，商业价值更多由云...", "links": ["03-Agent-Multi_Agent", "04-Platforms-CrewAI", "04-Platforms-LangGraph", "03-Agent-Workflow", "10-Concepts-Agent", "10-Concepts-Multi-Agent", "00-MOC-Agent地图"]}, {"id": "04-Platforms-Coze", "title": "Coze", "fileTitle": "Coze", "category": "04-Platforms", "categoryLabel": "开发平台", "path": "04-Platforms/Coze.md", "updated": "2026-06-20", "tags": ["AI-Learning-OS", "platform"], "body": "# Coze\n\n## 一句话定义\n\n> Coze 是面向对话应用、Workflow 和 Agent 构建的低代码平台。\n\n## 定位\n\n- 可视化节点、插件、知识库和模型编排。\n- 适合快速原型、运营自动化和多渠道 Bot。\n\n## 时间轴\n\n| 阶段 | 关键变化 | 意义 |\n|---|---|---|\n| 早期 | Bot 与插件构建 | 降低对话应用门槛 |\n| 演进 | Workflow、知识库和多模型 | 从 Bot 走向完整 AI 应用平台 |\n| 当前方向 | Agent 与企业集成 | 强化任务编排与业务系统连接 |\n| 长期方向 | Multi-Agent 与 Marketplace | 从 Builder 演进为 Agent 应用平台 |\n\n## 产品矩阵\n\n| 产品 / 能力 | 定位 | 核心价值 |\n|---|---|---|\n| Bot Builder | 对话应用 | 提示词、记忆、插件与发布 |\n| Workflow | 可视化流程 | 固定节点、条件与 LLM 处理 |\n| 知识库 | RAG | 连接文档与私有知识 |\n| Plugin | 工具连接 | 接入搜索、业务系统和外部 API |\n| Multi-Agent | Agent 协作 | 组合多个专业角色完成复杂流程 |\n\n## 平台架构\n\n```text\n用户 → Bot → Workflow → Plugin / Knowledge → Model → 结果\n```\n\n- **Bot**：承载角色、交互和发布渠道。\n- **Workflow**：组织模型、检索和工具的执行顺序。\n- **Plugin**：连接外部系统与 API。\n- **Knowledge**：通过 [[RAG]] 提供私有知识。\n- **Model**：提供底层推理能力，Coze 本身不是模型。\n\n## 商业模式\n\n- Credits 、调用量、高级能力和企业版是常见收费方式。\n- 平台价值来自低代码体验、模型聚合与发布渠道。\n- 长期可通过 Agent Marketplace、模板、插件和企业生态扩大平台收入。\n\n## 与 Dify 的区别\n\n| 维度 | Coze | [[Dify]] |\n|---|---|---|\n| 主要用户 | 业务人员、产品与运营 | 开发者、AI 与企业平台团队 |\n| 核心侧重 | 易用、低代码、快速发布 | 开放、私有部署、API 与企业治理 |\n| 复杂场景 | 快速原型和业务应用 | 深度定制与企业集成 |\n| 能力边界 | 复杂状态与迁移控制相对有限 | 工程门槛较高但扩展空间更大 |\n\n## 竞争格局\n\n- 与 Dify、n8n 和公有云 Agent 平台竞争。\n- 优势在于低门槛和生态集成，风险是流程迁移与平台锁定。\n\n## 关联节点\n\n- [[Dify]]\n- [[字节跳动]]\n- [[Workflow]]\n- [[RAG]]\n- [[Agent]]\n- [[Credits]]\n\n## 延伸阅读\n\n- [[Coze全景图]]\n- [[Workflow产品地图]]\n- [Coze 官网](https://www.coze.com/)\n- [Coze 文档](https://www.coze.com/docs)\n- [[Agent地图]]\n", "excerpt": "Coze 一句话定义 Coze 是面向对话应用、Workflow 和 Agent 构建的低代码平台。 定位 可视化节点、插件、知识库和模型编排。 适合快速原型、运营自动化和多渠道 Bot。 时间轴 产品矩阵 平台架构 **Bot**：承载角色、交互和发布渠道。 **Workflow**：组织模型、检索和工具的执行顺序。 **Plugin**：连接外部系统与 ...", "links": ["03-Agent-RAG", "04-Platforms-Dify", "02-Model-Companies-字节跳动", "03-Agent-Workflow", "10-Concepts-Agent", "07-Business-Credits", "04-Platforms-Coze全景图", "06-Products-Workflow产品地图", "00-MOC-Agent地图"]}, {"id": "04-Platforms-Coze全景图", "title": "Coze全景图", "fileTitle": "Coze全景图", "category": "04-Platforms", "categoryLabel": "开发平台", "path": "04-Platforms/Coze全景图.md", "updated": "2026-06-20", "tags": ["AI", "Coze", "Workflow", "Agent", "LowCode"], "body": "# Coze全景图\n\n## 目录\n\n- [[#学习定位]]\n- [[#一句话定义]]\n- [[#为什么 Coze 出现]]\n- [[#Coze 的本质]]\n- [[#Coze 产品架构]]\n- [[#Coze 工作流程]]\n- [[#Coze 的核心能力]]\n- [[#Coze 与其他产品的区别]]\n- [[#Coze 商业模式]]\n- [[#优势与边界]]\n- [[#适合人群]]\n- [[#Coze 路线图]]\n- [[#关联节点]]\n- [[#核心结论]]\n\n## 学习定位\n\n如果说 [[ChatGPT]] 代表 AI 入口，[[Claude Code]] 代表 Agent 执行器，那么 [[Coze]] 代表 Agent 工厂。\n\n很多人第一次接触 Coze 时，会认为：\n\n```text\nCoze = Agent\n```\n\n更准确的理解是：\n\n```text\nCoze = Agent Builder\n```\n\n即用于制造、配置和发布 Agent 应用的平台。\n\n---\n\n# 一句话定义\n\nCoze 是 [[字节跳动]] 推出的低代码 Agent 开发平台，目标是让不会写代码的用户也能创建 AI 应用和 Agent。\n\n---\n\n# 为什么 Coze 出现\n\n2023 年大模型开始广泛普及，企业很快发现：\n\n```text\n会用 ChatGPT ≠ 会开发 AI 应用\n```\n\n模型和业务应用之间缺少易用的开发平台，因此出现了 [[Coze]]、[[Dify]]、[[Flowise]]、[[LangFlow]] 等产品。\n\nCoze 的差异化重点是面向业务人员和低代码用户，降低 AI 应用开发门槛。\n\n---\n\n# Coze 的本质\n\n传统软件开发：\n\n```text\n需求 → 程序员 → 代码 → 应用\n```\n\nCoze 的低代码方式：\n\n```text\n需求 → 拖拽配置 → Workflow → Bot / Agent 应用\n```\n\n因此，Coze 的核心价值是降低 AI 应用从需求到交付的门槛。\n\n---\n\n# Coze 产品架构\n\n整体结构可以抽象为：\n\n```text\n用户\n↓\nBot\n↓\nWorkflow\n↓\nPlugin / Knowledge\n↓\nModel\n↓\n结果\n```\n\n## 第一层：Bot\n\nBot 是用户直接看到和使用的应用形态，例如：\n\n- 销售助手\n- 客服助手\n- 研究助手\n- 知识库助手\n\nBot 负责承载角色、交互、记忆、渠道和发布配置。\n\n## 第二层：Workflow\n\n[[Workflow]] 负责流程编排，例如：\n\n```text\n用户提问 → 联网搜索 → 知识库查询 → 模型分析 → 输出答案\n```\n\nWorkflow 是 Coze 的核心能力之一，用于把模型、数据和工具组织成稳定流程。\n\n## 第三层：Plugin\n\n插件系统用于连接外部服务，例如：\n\n- 搜索\n- 飞书\n- 邮件\n- 数据库\n- 外部 API\n\n插件让 Agent 从生成文字扩展到读取数据和调用工具。\n\n## 第四层：Knowledge\n\n知识库可以接收 PDF、Word、Excel、Markdown 等资料，让 Bot 使用私有知识回答问题。\n\n其技术本质是 [[RAG]]：\n\n```text\n文档 → 检索 → 上下文增强 → 模型生成\n```\n\n## 第五层：Model\n\nCoze 底层可以根据产品版本、区域和配置接入不同模型，例如豆包以及其他第三方模型。\n\n因此，Coze 本身不是模型，而是模型、知识、工具和流程的编排平台。\n\n---\n\n# Coze 工作流程\n\n例如创建“物业收费助手”。\n\n用户提问：物业费怎么算？\n\nWorkflow 可以执行：\n\n```text\n读取知识库\n↓\n查询收费规则\n↓\n调用模型\n↓\n生成答案\n```\n\n最终用户接触的是 Bot，背后则由 Workflow、Knowledge、Plugin 和 Model 共同工作。\n\n---\n\n# Coze 的核心能力\n\n## 能力一：Bot\n\n创建、配置和发布机器人应用。\n\n## 能力二：Workflow\n\n通过节点、条件和数据流创建固定或半动态流程。\n\n## 能力三：Knowledge\n\n创建私有知识库并为模型提供检索上下文。\n\n## 能力四：Plugin\n\n连接搜索、业务系统和外部 API。\n\n## 能力五：Multi-Agent\n\n将不同角色或专业 Agent 组合为协作流程。\n\n---\n\n# Coze 与其他产品的区别\n\n## Coze 与 ChatGPT\n\n```text\nChatGPT = 直接使用 AI 助手\nCoze    = 搭建 AI 助手和业务应用\n```\n\nChatGPT 是面向最终用户的产品，Coze 是用于创建产品的平台。\n\n## Coze 与 Claude Code\n\n```text\nClaude Code = 执行软件开发任务\nCoze        = 制造和编排 Agent 应用\n```\n\n二者不处于同一产品层。\n\n## Coze 与 Dify\n\n| 维度 | [[Coze]] | [[Dify]] |\n|---|---|---|\n| 核心定位 | 低代码 Agent Builder | 企业 AI 应用平台 |\n| 主要用户 | 业务人员、产品、运营 | 开发者、AI 团队、企业平台团队 |\n| 体验侧重 | 简单、快速、渠道与生态 | 开放、部署、API 与企业治理 |\n| 部署方式 | 以平台服务为主 | 支持开源与私有部署 |\n| 复杂场景 | 适合快速业务应用 | 更适合深度定制与企业集成 |\n\n课程用类比概括：\n\n```text\nCoze = PowerPoint\nDify = Photoshop\n```\n\n该类比强调 Coze 更易上手，而 Dify 提供更多工程与企业控制能力。\n\n---\n\n# Coze 商业模式\n\n当前主要价值来源可以概括为：\n\n```text\n模型调用 + 平台服务 + 企业能力\n```\n\n- 模型与工具调用额度\n- 高级 Workflow、知识库和协作能力\n- 企业服务与生态集成\n- 平台分发与开发者生态\n\n未来可能进一步发展 Agent Marketplace，让开发者发布和交易 Agent、模板、插件与 Workflow。\n\n---\n\n# 优势与边界\n\n## 优势\n\n1. 学习门槛低\n2. 产品体验直观\n3. 字节生态与渠道支持\n4. 适合业务部门快速验证场景\n\n## 能力边界\n\n1. 复杂 Agent 的状态、循环和深度定制能力有限\n2. 企业权限、治理和私有化能力需要按具体版本评估\n3. 可扩展性和迁移自由度通常弱于开源工程平台\n4. 平台能力和可用模型会随地区与版本变化\n\n---\n\n# 适合人群\n\n适合：\n\n- 产品经理\n- 运营人员\n- 销售团队\n- 咨询顾问\n- 中小企业\n- 快速原型和业务验证团队\n\n不太适合直接承担：\n\n- 底层 AI 平台研发\n- 高度定制的大规模企业基础设施\n- 对运行时、数据和部署拥有完全控制要求的场景\n\n---\n\n# Coze 在产业链中的位置\n\n```text\n模型公司 → Coze → Agent 应用 → 企业业务\n```\n\n因此，Coze 位于 Agent 工厂层。\n\n---\n\n# Coze 路线图\n\n```text\nBot → Workflow → Knowledge → Multi-Agent → Agent Marketplace\n```\n\n长期方向是从低代码 Bot Builder 演进为更完整的 Agent 应用操作平台。\n\n---\n\n# Coze 与 AI 产业关系\n\n如果说 [[OpenAI]] 负责扩展能力边界，[[Anthropic]] 负责推动安全与协议，那么 Coze 的核心作用是降低 AI 应用的使用和开发门槛。\n\n---\n\n# 知识图谱位置\n\n```text\n04-Platforms\n├── Coze\n├── Dify\n├── n8n\n├── LangGraph\n├── Flowise\n└── LangFlow\n```\n\n---\n\n# 关联节点\n\n- [[Workflow产品地图]]\n- [[Agent产品地图]]\n- [[Dify|Dify全景图]]\n- [[RAG]]\n- [[MCP]]\n- [[Workflow]]\n- [[Agent]]\n- [[字节跳动]]\n- [[AI产品地图]]\n\n---\n\n# 核心结论\n\nCoze 不是单一 Agent，而是 Agent 制造工厂。\n\n它最大的价值不是直接替用户完成所有任务，而是让用户能够快速制造、配置和发布可以完成任务的 Agent 应用。\n\n因此，Coze 代表 AI 应用开发的民主化：让不会编程的人也能构建 AI 应用。\n\n", "excerpt": "Coze全景图 目录 #学习定位 #一句话定义 #为什么 Coze 出现 #Coze 的本质 #Coze 产品架构 #Coze 工作流程 #Coze 的核心能力 #Coze 与其他产品的区别 #Coze 商业模式 #优势与边界 #适合人群 #Coze 路线图 #关联节点 #核心结论 学习定位 如果说 ChatGPT 代表 AI 入口，Claude Code ...", "links": ["06-Products-ChatGPT", "04-Platforms-Coze", "02-Model-Companies-字节跳动", "04-Platforms-Dify", "04-Platforms-Flowise", "04-Platforms-LangFlow", "03-Agent-Workflow", "03-Agent-RAG", "02-Model-Companies-OpenAI", "02-Model-Companies-Anthropic", "06-Products-Workflow产品地图", "06-Products-Agent产品地图", "03-Agent-MCP", "10-Concepts-Agent", "00-MOC-AI产品地图"]}, {"id": "04-Platforms-CrewAI", "title": "CrewAI", "fileTitle": "CrewAI", "category": "04-Platforms", "categoryLabel": "开发平台", "path": "04-Platforms/CrewAI.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "platform"], "body": "# CrewAI\n\n## 一句话定义\n\n> CrewAI 是以角色、任务和 Crew 为核心构建多 Agent 协作流程的框架与平台。\n\n## 定位\n\n- 强调用类似团队分工的心智模型组织 Agent。\n- 适合研究、写作、审查和业务自动化。\n\n## 时间轴\n\n| 阶段 | 关键变化 | 意义 |\n|---|---|---|\n| 起点 | 开源角色化 Multi-Agent 框架 | 降低 Agent Team 构建门槛 |\n| 演进 | Crews 与 Flows 结合 | 把自主协作放入可控流程 |\n| 平台化 | 部署、观测与企业服务 | 支持生产级数字团队 |\n\n## 产品矩阵\n\n| 产品 / 能力 | 定位 | 核心价值 |\n|---|---|---|\n| Agents | 角色节点 | 目标、工具与背景定义 |\n| Crews | 多 Agent 团队 | 任务分工、委托与协作 |\n| Flows | 事件驱动流程 | 状态、条件与可控执行 |\n\n## 商业模式\n\n- 开源框架扩大采用，企业平台、部署和支持服务变现。\n- 价值指标是数字团队的任务完成率与可管理性。\n\n## 竞争格局\n\n- 与 AutoGen、LangGraph 和定制 Multi-Agent 架构竞争。\n- 优势是易理解的角色模型，风险是多 Agent 调用成本和协作不稳定。\n\n## 关联节点\n\n- [[Multi_Agent]]\n- [[Agent]]\n- [[Workflow]]\n- [[LangGraph]]\n- [[AutoGen]]\n\n## 延伸阅读\n\n- [[Multi-Agent]]\n- [CrewAI 官网](https://www.crewai.com/)\n- [CrewAI GitHub](https://github.com/crewAIInc/crewAI)\n- [[Agent地图]]\n", "excerpt": "CrewAI 一句话定义 CrewAI 是以角色、任务和 Crew 为核心构建多 Agent 协作流程的框架与平台。 定位 强调用类似团队分工的心智模型组织 Agent。 适合研究、写作、审查和业务自动化。 时间轴 产品矩阵 商业模式 开源框架扩大采用，企业平台、部署和支持服务变现。 价值指标是数字团队的任务完成率与可管理性。 竞争格局 与 AutoGen、...", "links": ["03-Agent-Multi_Agent", "10-Concepts-Agent", "03-Agent-Workflow", "04-Platforms-LangGraph", "04-Platforms-AutoGen", "10-Concepts-Multi-Agent", "00-MOC-Agent地图"]}, {"id": "04-Platforms-Dify", "title": "Dify", "fileTitle": "Dify", "category": "04-Platforms", "categoryLabel": "开发平台", "path": "04-Platforms/Dify.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "platform"], "body": "# Dify\n\n## 一句话定义\n\n> Dify 是面向生成式 AI 应用的开源 LLMOps、RAG、Workflow 和 Agent 平台。\n\n## 定位\n\n- 同时支持低代码构建、API 发布和自托管部署。\n- 适合企业知识库、工作流和 AI 应用后端。\n\n## 时间轴\n\n| 阶段 | 关键变化 | 意义 |\n|---|---|---|\n| 起点 | 开源 LLM 应用构建 | 统一模型、提示词与 API |\n| 演进 | RAG、Workflow、Agent 和观测 | 形成完整应用开发生命周期 |\n| 企业化 | 云服务、团队与私有部署 | 强化治理、安全与规模化 |\n\n## 产品矩阵\n\n| 产品 / 能力 | 定位 | 核心价值 |\n|---|---|---|\n| Studio | 低代码构建 | 聊天助手、Workflow 与 Agent |\n| Knowledge | RAG | 文档处理、检索与引用 |\n| LLMOps | 运营与观测 | 日志、数据集、评估与成本 |\n\n## 商业模式\n\n- 开源版带动采用，云托管、团队版和企业版承接商业化。\n- 企业价值来自模型中立、可私有化和完整 LLMOps。\n\n## 竞争格局\n\n- 与 Coze、LangFlow、Flowise 和云厂商 AI 平台竞争。\n- 开源与自托管是主要差异化。\n\n## 关联节点\n\n- [[Coze]]\n- [[Workflow]]\n- [[RAG]]\n- [[Agent]]\n- [[SaaS]]\n\n## 延伸阅读\n\n- [[Workflow产品地图]]\n- [Dify 官网](https://dify.ai/)\n- [Dify GitHub](https://github.com/langgenius/dify)\n- [[Agent地图]]\n", "excerpt": "Dify 一句话定义 Dify 是面向生成式 AI 应用的开源 LLMOps、RAG、Workflow 和 Agent 平台。 定位 同时支持低代码构建、API 发布和自托管部署。 适合企业知识库、工作流和 AI 应用后端。 时间轴 产品矩阵 商业模式 开源版带动采用，云托管、团队版和企业版承接商业化。 企业价值来自模型中立、可私有化和完整 LLMOps。 ...", "links": ["04-Platforms-Coze", "03-Agent-Workflow", "03-Agent-RAG", "10-Concepts-Agent", "07-Business-SaaS", "06-Products-Workflow产品地图", "00-MOC-Agent地图"]}, {"id": "04-Platforms-FastGPT", "title": "FastGPT", "fileTitle": "FastGPT", "category": "04-Platforms", "categoryLabel": "开发平台", "path": "04-Platforms/FastGPT.md", "updated": "2026-06-20", "tags": ["AI-Learning-OS", "platform", "RAG", "KnowledgeBase"], "body": "# FastGPT\n\n## 一句话定义\n\nFastGPT 是面向中文企业知识库、RAG 问答和可视化工作流的 AI 应用平台。\n\n## ngFlow", "fileTitle": "LangFlow", "category": "04-Platforms", "categoryLabel": "开发平台", "path": "04-Platforms/LangFlow.md", "updated": "2026-06-20", "tags": ["AI-Learning-OS", "platform", "LowCode", "Agent"], "body": "# LangFlow\n\n## 一句话定义\n\nLangFlow 是用于可视化设计、测试和部署 AI Flow 与 Agent 的开源平台。\n\n## 定位\n\n位于可视化 Agent Builder 层，适合学习、原型开发和组件化 AI 应用设计。\n\n## 时间轴\n\n- 设计器阶段：以可视化 Flow 简化 LLM 应用开发。\n- Agent 阶段：扩展工具、Agent、多模型和部署能力。\n\n## 产品矩阵\n\n- Flow 设计器\n- Agent 与工具组件\n- 多模型连接\n- API 与部署能力\n\n## 商业模式\n\n以开源社区获客，通过云服务、企业部署和生态服务承接商业价值。\n\n## 竞争格局\n\n与 [[Flowise]]、[[Dify]]、[[Coze]] 等可视化平台竞争，差异在开发体验、组件体系和运行治理。\n\n## 关联节点\n\n- [[Workflow产品地图]]\n- [[Flowise]]\n- [[LangGraph]]\n- [[Agent]]\n- [[Workflow]]\n\n## 延伸阅读\n\n- [[Workflow产品地图]]\n- [LangFlow](https://www.langflow.org/)\n\n", "excerpt": "LangFlow 一句话定义 LangFlow 是用于可视化设计、测试和部署 AI Flow 与 Agent 的开源平台。 定位 位于可视化 Agent Builder 层，适合学习、原型开发和组件化 AI 应用设计。 时间轴 设计器阶段：以可视化 Flow 简化 LLM 应用开发。 Agent 阶段：扩展工具、Agent、多模型和部署能力。 产品矩阵 Fl...", "links": ["04-Platforms-Flowise", "04-Platforms-Dify", "04-Platforms-Coze", "06-Products-Workflow产品地图", "04-Platforms-LangGraph", "10-Concepts-Agent", "03-Agent-Workflow"]}, {"id": "04-Platforms-LangGraph", "title": "LangGraph", "fileTitle": "LangGraph", "category": "04-Platforms", "categoryLabel": "开发平台", "path": "04-Platforms/LangGraph.md", "updated": "2026-06-20", "tags": ["AI-Learning-OS", "platform"], "body": "# LangGraph\n\n## 一句话定义\n\n> LangGraph 是用图和持久状态构建可循环、可中断 Agent Workflow 的开发框架。\n\n## 定位\n\n- 定位于代码优先的 Agent 编排层。\n- 适合需要回退、重试、人工审批和长时运行的流程。\n\n## 时间轴\n\n| 阶段 | 关键变化 | 意义 |\n|---|---|---|\n| 前身 | LangChain 链式编排 | 快速组合 LLM 与工具 |\n| 转折 | 以 Graph 表达 Agent 状态机 | 支持循环和非线性决策 |\n| 平台化 | 持久化、观测、部署与人在回路 | 面向生产级 Agent |\n\n## 产品矩阵\n\n| 产品 / 能力 | 定位 | 核心价值 |\n|---|---|---|\n| LangGraph SDK | 状态图框架 | 节点、边、循环与持久化 |\n| LangGraph Platform | 托管与部署 | 长任务、线程和观测 |\n| LangSmith | 调试与评估 | 追踪、数据集和质量管理 |\n\n## 核心架构\n\n```text\nState → Node → Edge → Execution\n```\n\n- **State**：保存任务上下文、进度和中间结果。\n- **Node**：执行搜索、分析、工具调用或人工审批等单一步骤。\n- **Edge**：依据状态决定下一节点，支持分支、循环和回退。\n- **Execution**：负责调度、检查点、中断恢复、重试和人在回路。\n\n## 商业模式\n\n- 开源 SDK 获取开发者，托管平台、观测和企业服务变现。\n- 其价值主要在 Agent 工程可靠性而非单一模型能力。\n\n## 平台边界\n\n| 对比对象 | 主要区别 |\n|---|---|\n| 线性 [[Workflow]] | LangGraph 更适合状态、动态分支、循环和恢复 |\n| [[Coze]] | Coze 是低代码 Agent Builder；LangGraph 是代码优先 Runtime |\n| [[Dify]] | Dify 是完整 AI 应用平台；LangGraph 聚焦 Agent 运行内核 |\n| [[Manus]] / [[Claude_Code|Claude Code]] | 它们是 Agent 产品；LangGraph 是构建类似运行逻辑的框架 |\n\n## 竞争格局\n\n- 与 AutoGen、CrewAI、OpenAI Agent SDK 和自建状态机竞争。\n- 优势是图结构和可观测生态，代价是学习和运维复杂度。\n\n## 关联节点\n\n- [[Workflow]]\n- [[Agent]]\n- [[Agent Runtime]]\n- [[Multi_Agent]]\n- [[AutoGen]]\n- [[CrewAI]]\n\n## 延伸阅读\n\n- [[LangGraph全景图]]\n- [[Workflow产品地图]]\n- [LangGraph 文档](https://langchain-ai.github.io/langgraph/)\n- [LangGraph GitHub](https://github.com/langchain-ai/langgraph)\n- [[Agent地图]]\n", "excerpt": "LangGraph 一句话定义 LangGraph 是用图和持久状态构建可循环、可中断 Agent Workflow 的开发框架。 定位 定位于代码优先的 Agent 编排层。 适合需要回退、重试、人工审批和长时运行的流程。 时间轴 产品矩阵 核心架构 **State**：保存任务上下文、进度和中间结果。 **Node**：执行搜索、分析、工具调用或人工审批...", "links": ["03-Agent-Workflow", "04-Platforms-Coze", "04-Platforms-Dify", "05-Agent-Runners-Manus", "05-Agent-Runners-Claude_Code", "10-Concepts-Agent", "10-Concepts-Agent-Runtime", "03-Agent-Multi_Agent", "04-Platforms-AutoGen", "04-Platforms-CrewAI", "04-Platforms-LangGraph全景图", "06-Products-Workflow产品地图", "00-MOC-Agent地图"]}, {"id": "04-Platforms-LangGraph全景图", "title": "LangGraph全景图", "fileTitle": "LangGraph全景图", "category": "04-Platforms", "categoryLabel": "开发平台", "path": "04-Platforms/LangGraph全景图.md", "updated": "2026-06-20", "tags": ["AI", "LangGraph", "Agent", "AgentRuntime", "Multi-Agent"], "body": "# LangGraph全景图\n\n## 目录\n\n- [[#学习定位]]\n- [[#一句话定义]]\n- [[#为什么 LangGraph 出现]]\n- [[#LangGraph 的本质]]\n- [[#为什么叫 Graph]]\n- [[#LangGraph 核心架构]]\n- [[#LangGraph 工作方式]]\n- [[#LangGraph 与其他产品的区别]]\n- [[#为什么 LangGraph 重要]]\n- [[#适用场景]]\n- [[#产业定位与未来路线]]\n- [[#关联节点]]\n- [[#核心结论]]\n\n## 学习定位\n\n学完 [[Coze]]、[[Dify]] 和 [[Workflow]] 后，一个关键问题是：为什么复杂 Agent 越来越像软件系统？\n\n[[Manus]]、[[Devin]]、[[Claude Code]]、[[OpenHands]] 已经不是“问一句、答一句”的聊天机器人，而是持续执行、持续思考和持续决策的软件系统。\n\n[[LangGraph]] 正是为这类有状态、长时间、可循环的 Agent 系统而出现。\n\n---\n\n# 一句话定义\n\nLangGraph 是 Agent 时代的运行时（[[Agent Runtime]]），也可以理解为 Agent 操作系统内核。\n\n---\n\n# 为什么 LangGraph 出现\n\n传统 LLM 应用：\n\n```text\n用户 → Prompt → 模型 → 答案\n```\n\nAgent 应用：\n\n```text\n目标 → 规划 → 执行 → 检查 → 修正 → 再次执行\n```\n\n这不再只是聊天，而更接近状态机。系统需要保存进度、决定下一步、处理失败并在必要时恢复执行，因此需要新的运行架构。\n\n---\n\n# LangGraph 是谁做的\n\nLangGraph 由 LangChain 团队开发。\n\n课程用下面的方式区分二者：\n\n```text\nLangChain 侧重组合模型、工具与检索\nLangGraph 侧重运行有状态 Agent\n```\n\n两者并非互斥；LangGraph 可以使用 LangChain 生态中的模型和工具组件。\n\n---\n\n# LangGraph 的本质\n\nLangGraph 不只是一个线性 Workflow 工具，更准确的定位是：\n\n```text\nStateful Agent Runtime\n```\n\n它负责：\n\n- 状态管理\n- 流程与分支管理\n- Agent 协作\n- 持久化和中断恢复\n- 错误处理与重试\n- 人工介入\n\n其作用类似传统软件中的运行时或工作流内核，而不是完整操作系统本身。\n\n---\n\n# 为什么叫 Graph\n\nGraph 即图。Agent 的运行过程通常不是单向线性流程，而是包含分支、循环和回退的网络结构。\n\n例如：\n\n```text\n任务\n├── 搜索\n├── 研究\n├── 分析\n└── 输出\n```\n\n传统 Workflow 常表示为：\n\n```text\nA → B → C → D\n```\n\nAgent Graph 则可能表示为：\n\n```text\nA → B → 判断\n        ├── 成功 → C\n        └── 失败 → A\n```\n\n当系统需要根据状态决定下一步并重复执行时，Graph 比线性流程更适合表达。\n\n---\n\n# LangGraph 核心架构\n\n整体结构：\n\n```text\nState → Node → Edge → Execution\n```\n\n## 第一层：State\n\nState 是 Agent 的共享状态和运行上下文。\n\n例如：\n\n```json\n{\n  \"任务\": \"行业分析\",\n  \"进度\": \"搜索完成\",\n  \"结果\": \"待输出\"\n}\n```\n\nAgent 每执行一步，都可以读取和更新状态。\n\n## 第二层：Node\n\nNode 是执行单元，例如：\n\n- 搜索节点\n- 分析节点\n- 总结节点\n- 工具调用节点\n- 人工审批节点\n\n每个节点完成一个明确任务，并返回状态更新。\n\n## 第三层：Edge\n\nEdge 定义节点之间的连接和路由关系，决定下一步执行位置。\n\n例如：\n\n```text\n搜索完成 → 进入分析\n搜索不足 → 返回搜索\n```\n\n条件边允许系统依据 State 动态选择分支。\n\n## 第四层：Execution\n\nExecution 是执行引擎，负责运行整个 Graph，包括：\n\n- 调度节点\n- 保存检查点\n- 处理中断\n- 恢复长任务\n- 执行重试\n- 支持人在回路\n\n---\n\n# LangGraph 工作方式\n\n例如用户提出：分析 AI 产业链。\n\nGraph 可以执行：\n\n```text\n开始 → 搜索 → 整理 → 分析 → 输出\n```\n\n如果搜索结果不足，条件判断会让流程返回搜索节点：\n\n```text\n搜索 → 质量检查\n       ├── 通过 → 分析\n       └── 不足 → 重新搜索\n```\n\n这个循环体现了 Agent 的动态决策和自我修正。\n\n---\n\n# LangGraph 与其他产品的区别\n\n## LangGraph 与 Workflow\n\n```text\n线性 Workflow = 固定流水线\nLangGraph       = 有状态、可分支和循环的执行图\n```\n\nWorkflow 和 LangGraph 并非绝对对立。LangGraph 本身也可以构建确定性流程，其差异在于更适合复杂状态、动态路由和循环执行。\n\n## LangGraph 与 Coze\n\n```text\nCoze      = 面向用户的 Agent Builder\nLangGraph = 面向开发者的 Agent Runtime\n```\n\nCoze 更像完整的低代码工厂，LangGraph 更像开发者用于构建运行逻辑的发动机。不同平台可能采用与 LangGraph 类似的状态图思想，但不一定直接使用 LangGraph。\n\n## LangGraph 与 Dify\n\n```text\nDify      = 企业 AI 应用平台\nLangGraph = Agent 运行内核\n```\n\nDify 覆盖应用创建、RAG、模型管理、API 和运营；LangGraph 聚焦代码层的状态图和 Agent 执行。\n\n## LangGraph 与 Manus\n\n通用 Agent 的难点不只在模型，还包括状态、任务、工具和错误恢复。LangGraph 解决的正是这类工程问题。\n\n这意味着先进 Agent 产品通常具有类似架构思想，但不能据此推断某个具体产品一定使用 LangGraph。\n\n## LangGraph 与 Claude Code\n\nClaude Code 作为 Coding Agent，需要管理任务状态、文件修改、命令执行、测试结果和错误恢复。这些能力与 LangGraph 所代表的有状态 Agent 架构高度一致。\n\n同样，这是一种架构类比，不表示其内部必然采用 LangGraph。\n\n---\n\n# 为什么 LangGraph 重要\n\n未来 Agent 会越来越复杂，简单 Prompt 和线性 Workflow 难以独立解决：\n\n- 长任务状态保存\n- 循环和动态分支\n- 失败恢复\n- 人工审批\n- 多 Agent 协作\n- 生产观测和调试\n\n因此，Agent Runtime 会成为模型与应用之间的重要基础设施层。\n\n---\n\n# 适用场景\n\n## 单 Agent\n\n例如研究 Agent，在搜索、评估、补充资料和报告生成之间循环。\n\n## Multi-Agent\n\n例如研究 Agent、分析 Agent、写作 Agent 和审核 Agent 共同完成任务。\n\n## 长任务\n\n例如运行数十分钟或数小时，需要持久状态、检查点、中断恢复和人工介入的流程。\n\n---\n\n# Multi-Agent 为什么需要运行时\n\n未来 Agent 越来越像团队：\n\n```text\n项目经理 Agent\n↓\n研究 Agent\n↓\n写作 Agent\n↓\n审核 Agent\n```\n\n这类系统需要共享状态、角色路由、任务交接和失败处理。LangGraph 的图和状态模型适合表达这种协作结构。\n\n---\n\n# 产业定位与未来路线\n\nLangGraph 位于 Agent Runtime 层：\n\n```text\n模型 → Agent Runtime → Agent → 应用\n```\n\nAgent 架构的演进路线可以概括为：\n\n```text\nPrompt → Workflow → Agent → Multi-Agent → Digital Workforce\n```\n\nLangGraph 代表其中从 Agent 到 Multi-Agent 所需要的运行时基础设施。\n\n---\n\n# 一张图理解\n\n```text\nChatGPT  = 使用 AI\nCoze     = 制造 Agent\nDify     = 构建与管理 AI 应用\nLangGraph = 运行有状态 Agent\n```\n\n---\n\n# 知识图谱位置\n\n```text\n04-Platforms\n├── Coze\n├── Dify\n├── LangGraph\n├── n8n\n├── Flowise\n└── LangFlow\n```\n\n---\n\n# 关联节点\n\n- [[Coze全景图]]\n- [[Dify|Dify全景图]]\n- [[Workflow产品地图]]\n- [[Agent产品地图]]\n- [[Multi-Agent]]\n- [[Claude Code]]\n- [[Manus]]\n- [[OpenHands]]\n- [[Agent Runtime]]\n- [[Workflow]]\n- [[Agent]]\n- [[AI产品地图]]\n\n---\n\n# 核心结论\n\n如果说 Workflow 解决流程自动化，那么 LangGraph 解决有状态 Agent 的自动化运行。\n\n未来复杂 Agent 几乎都需要状态管理、节点执行、错误恢复和多 Agent 协作。LangGraph 代表的正是 Agent 时代的软件架构思想。\n\n", "excerpt": "LangGraph全景图 目录 #学习定位 #一句话定义 #为什么 LangGraph 出现 #LangGraph 的本质 #为什么叫 Graph #LangGraph 核心架构 #LangGraph 工作方式 #LangGraph 与其他产品的区别 #为什么 LangGraph 重要 #适用场景 #产业定位与未来路线 #关联节点 #核心结论 学习定位 学完...", "links": ["04-Platforms-Coze", "04-Platforms-Dify", "03-Agent-Workflow", "05-Agent-Runners-Manus", "06-Products-Devin", "05-Agent-Runners-OpenHands", "04-Platforms-LangGraph", "10-Concepts-Agent-Runtime", "04-Platforms-Coze全景图", "06-Products-Workflow产品地图", "06-Products-Agent产品地图", "10-Concepts-Multi-Agent", "10-Concepts-Agent", "00-MOC-AI产品地图"]}, {"id": "04-Platforms-MaxKB", "title": "MaxKB", "fileTitle": "MaxKB", "category": "04-Platforms", "categoryLabel": "开发平台", "path": "04-Platforms/MaxKB.md", "updated": "2026-06-20", "tags": ["AI-Learning-OS", "platform", "RAG", "KnowledgeBase"], "body": "# MaxKB\n\n## 一句话定义\n\nMaxKB 是面向企业文档、知识库和 AI 问答场景的开源平台。\n\n## 定位\n\n位于企业知识中台和 RAG 应用层，强调快速部署、文档管理和知识问答。\n\n## 时间轴\n\n- 知识管理阶段：连接企业文档并构建问答能力。\n- 应用阶段：扩展模型接入、嵌入和企业部署。\n\n## 产品矩阵\n\n- 文档管理\n- 知识库\n- RAG 问答\n- 模型连接与应用嵌入\n\n## 商业模式\n\n通过开源生态、企业版本、私有部署和支持服务承接商业价值。\n\n## 竞争格局\n\n与 [[FastGPT]]、[[Dify]] 等知识库和 RAG 平台竞争，重点比较部署体验、权限治理和检索效果。\n\n## 关联节点\n\n- [[Workflow产品地图]]\n- [[FastGPT]]\n- [[RAG]]\n- [[Workflow]]\n- [[Dify]]\n\n## 延伸阅读\n\n- [[Workflow产品地图]]\n- [MaxKB](https://maxkb.cn/)\n\n", "excerpt": "MaxKB 一句话定义 MaxKB 是面向企业文档、知识库和 AI 问答场景的开源平台。 定位 位于企业知识中台和 RAG 应用层，强调快速部署、文档管理和知识问答。 时间轴 知识管理阶段：连接企业文档并构建问答能力。 应用阶段：扩展模型接入、嵌入和企业部署。 产品矩阵 文档管理 知识库 RAG 问答 模型连接与应用嵌入 商业模式 通过开源生态、企业版本、私...", "links": ["04-Platforms-FastGPT", "04-Platforms-Dify", "06-Products-Workflow产品地图", "03-Agent-RAG", "03-Agent-Workflow"]}, {"id": "04-Platforms-OpenAI_Agents_SDK", "title": "OpenAI_Agents_SDK", "fileTitle": "OpenAI_Agents_SDK" \n> Cline 是运行在 VS Code 中的开源 Coding Agent，可读写文件、执行终端命令、使用浏览器并由用户审批动作。\n\n## 定位\n\n- 定位于编辑器内的开源、模型中立 Agent。\n- 强调用户控制、自带 API Key 与 MCP 扩展。\n\n## 时间轴\n\n| 阶段 | 关键变化 | 意义 |\n|---|---|---|\n| 起点 | VS Code 内的自主编码扩展 | 结合编辑器、终端与用户审批 |\n| 演进 | 多模型、浏览器和 MCP | 扩大工具与模型选择 |\n| 生态 | 开源社区与团队功能 | 从个人插件走向团队工作流 |\n\n## 产品矩阵\n\n| 产品 / 能力 | 定位 | 核心价值 |\n|---|---|---|\n| VS Code Extension | 编辑器 Agent | 文件、终端、浏览器与计划 |\n| MCP | 工具扩展 | 连接外部系统和自定义工具 |\n| Model Providers | 多模型路由 | 在成本、能力和隐私之间选择 |\n\n## 商业模式\n\n- 开源插件扩大用户基础，云路由、团队、企业和合作服务可承接收入。\n- BYOK 模式将部分 Token 费用直接交给模型提供商。\n\n## 竞争格局\n\n- 与 Roo Code、Continue、Cursor、Claude Code 和 Codex 竞争。\n- 优势是开源、模型中立和用户审批机制。\n\n## 关联节点\n\n- [[Roo_Code]]\n- [[Claude_Code]]\n- [[Codex]]\n- [[MCP]]\n- [[Tool_Use]]\n\n## 延伸阅读\n\n- [[Coding产品地图]]\n- [Cline 官网](https://cline.bot/)\n- [Cline GitHub](https://github.com/cline/cline)\n", "excerpt": "Cline 一句话定义 Cline 是运行在 VS Code 中的开源 Coding Agent，可读写文件、执行终端命令、使用浏览器并由用户审批动作。 定位 定位于编辑器内的开源、模型中立 Agent。 强调用户控制、自带 API Key 与 MCP 扩展。 时间轴 产品矩阵 商业模式 开源插件扩大用户基础，云路由、团队、企业和合作服务可承接收入。 BYO...", "links": ["05-Agent-Runners-Roo_Code", "05-Agent-Runners-Claude_Code", "05-Agent-Runners-Codex", "03-Agent-MCP", "03-Agent-Tool_Use", "06-Products-Coding产品地图"]}, {"id": "05-Agent-Runners-Codex", "title": "Codex", "fileTitle": "Codex", "category": "05-Agent-Runners", "categoryLabel": "执行器", "path": "05-Agent-Runners/Codex.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "agent-runner"], "body": "# Codex\n\n## 一句话定义\n\n> Codex 是 OpenAI 的软件工程 Agent，用于在本地终端或隔离环境中理解代码库、修改代码和执行测试。\n\n## 定位\n\n- 定位于开发者的代码执行与任务委托层。\n- 强调代码库上下文、沙箱执行、补丁和验证。\n\n## 时间轴\n\n| 阶段 | 关键变化 | 意义 |\n|---|---|---|\n| 早期 | Codex 代码模型与 Copilot 时代 | 建立自然语言到代码的产品范式 |\n| 重启 | Codex CLI 与任务型 Coding Agent | 从代码补全走向端到端执行 |\n| 平台化 | ChatGPT / 云任务与本地工具协同 | 将开发任务并行委托给 Agent |\n\n## 产品矩阵\n\n| 产品 / 能力 | 定位 | 核心价值 |\n|---|---|---|\n| Codex CLI | 本地 Coding Agent | 编辑、命令、测试和审查 |\n| Cloud Tasks | 隔离任务执行 | 并行处理代码任务 |\n| SDK / Integrations | 开发者集成 | 把 Agent 能力接入工具链 |\n\n## 商业模式\n\n- 本知识库中作为开源 Agent Runner 研究节点，关注可自托管的工具调用、任务执行与开发者扩展。\n\n## 定位\n\n- 名称可能对应不同社区项目，具体仓库和维护方需在引入当时核验。\n- 本页不将未核验的发布时间或厂商归属写成事实。\n\n## 时间轴\n\n| 阶段 | 关键变化 | 意义 |\n|---|---|---|\n| 项目识别 | 确认官方仓库、许可证与维护方 | 避免同名项目混淆 |\n| 能力评估 | 检查模型、工具、沙箱与 MCP 支持 | 确定其 Agent Runner 定位 |\n| 生产评估 | 审查安全、观测、社区和更新频率 | 判断是否适合真实工作流 |\n\n## 产品矩阵\n\n| 产品 / 能力 | 定位 | 核心价值 |\n|---|---|---|\n| Runner Core | 任务执行 | 规划、工具调用与结果回传 |\n| Integrations | 外部连接 | 文件、终端、浏览器与 MCP |\n| Governance | 生产安全 | 权限、审计、沙箱和人工确认 |\n\n## 商业模式\n\n- 开源 Agent Runner 通常通过托管、团队、企业支持或集成服务变现。\n- 在官方项目身份确认前，不对具体商业方式作确定判断。\n\n## 竞争格局\n\n- 潜在竞争对手包括 OpenHands、Cline、Roo Code 和其他开源 Agent Runner。\n- 评估核心应是维护活跃度、执行可靠性、扩展性与安全。\n\n## 关联节点\n\n- [[OpenHands]]\n- [[Cline]]\n- [[Roo_Code]]\n- [[MCP]]\n- [[Computer_Use]]\n\n## 延伸阅读\n\n- [[Github索引]]\n- [[Agent地图]]\n", "excerpt": "OpenClaw 一句话定义 OpenClaw 在本知识库中作为开源 Agent Runner 研究节点，关注可自托管的工具调用、任务执行与开发者扩展。 定位 名称可能对应不同社区项目，具体仓库和维护方需在引入当时核验。 本页不将未核验的发布时间或厂商归属写成事实。 时间轴 产品矩阵 商业模式 开源 Agent Runner 通常通过托管、团队、企业支持或集...", "links": ["05-Agent-Runners-OpenHands", "05-Agent-Runners-Cline", "05-Agent-Runners-Roo_Code", "03-Agent-MCP", "03-Agent-Computer_Use", "99-Resources-Github索引", "00-MOC-Agent地图"]}, {"id": "05-Agent-Runners-OpenHands", "title": "OpenHands", "fileTitle": "OpenHands", "category": "05-Agent-Runners", "categoryLabel": "执行器", "path": "05-Agent-Runners/OpenHands.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "agent-runner"], "body": "# OpenHands\n\n## 一句话定义\n\n> OpenHands 是面向软件开发的开源 Agent 平台，通过代码、终端、浏览器和沙箱环境完成工程任务。\n\n## 定位\n\n- 定位于可自托管、可研究和可评测的 Coding Agent 运行时。\n- 适合代码库任务、软件工程基准和企业内部部署。\n\n## 时间轴\n\n| 阶段 | 关键变化 | 意义 |\n|---|---|---|\n| 起点 | OpenDevin 开源项目 | 复刻可自主解决软件任务的 Agent |\n| 更名 | OpenHands | 扩展到通用开发者 Agent 平台 |\n| 产品化 | 沙箱、集成、评测与托管 | 向团队和企业工作流演进 |\n\n## 产品矩阵\n\n| 产品 / 能力 | 定位 | 核心价值 |\n|---|---|---|\n| Agent Runtime | 软件工程执行 | 代码、命令、浏览器和沙箱 |\n| Self-hosting | 私有部署 | 代码隐私、模型选择与环境控制 |\n| Benchmarks | 研究与评估 | 度量软件任务完成率 |\n\n## 商业模式\n\n- 开源社区建立采用，托管、企业部署、支持和集成服务变现。\n- 主要成本是模型 Token、沙箱计算和失败重试。\n\n## 竞争格局\n\n- 与 Claude Code、Codex、Cline 和其他开源 Coding Agent 竞争。\n- 优势是自托管与研究透明性。\n\n## 关联节点\n\n- [[Claude_Code]]\n- [[Codex]]\n- [[Cline]]\n- [[Computer_Use]]\n- [[Agent]]\n\n## 延伸阅读\n\n- [[Agent产品地图]]\n- [[Coding产品地图]]\n- [OpenHands 官网](https://www.all-hands.dev/)\n- [OpenHands GitHub](https://github.com/All-Hands-AI/OpenHands)\n", "excerpt": "OpenHands 一句话定义 OpenHands 是面向软件开发的开源 Agent 平台，通过代码、终端、浏览器和沙箱环境完成工程任务。 定位 定位于可自托管、可研究和可评测的 Coding Agent 运行时。 适合代码库任务、软件工程基准和企业内部部署。 时间轴 产品矩阵 商业模式 开源社区建立采用，托管、企业部署、支持和集成服务变现。 主要成本是模型...", "links": ["05-Agent-Runners-Claude_Code", "05-Agent-Runners-Codex", "05-Agent-Runners-Cline", "03-Agent-Computer_Use", "10-Concepts-Agent", "06-Products-Agent产品地图", "06-Products-Coding产品地图"]}, {"id": "05-Agent-Runners-Roo_Code", "title": "Roo_Code", "fileTitle": "Roo_Code", "category": "05-Agent-Runners", "categoryLabel": "执行器", "path": "05-Agent-Runners/Roo_Code.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "agent-runner"], "body": "# Roo Code\n\n## 一句话定义\n\n> Roo Code 是以模式分工、工具使用和高可定制性为特征的 VS Code 开源 Coding Agent。\n\n## 定位\n\n- 面向需要自定义角色、工具权限和模型路由的高级用户。\n- 可使用文件、终端、浏览器与 MCP。\n\n## 时间轴\n\n| 阶段 | 关键变化 | 意义 |\n|---|---|---|\n| 来源 | Cline 生态的开源分支与独立演进 | 聚焦更强的可定制性 |\n| 演进 | Modes、Boomerang 任务分派与 MCP | 从单 Agent 走向多角色协作 |\n| 生态 | Community modes 与多模型 | 用开源社区扩展专业工作流 |\n\n## 产品矩阵\n\n| 产品 / 能力 | 定位 | 核心价值 |\n|---|---|---|\n| Code / Architect Modes | 角色化 Agent | 按开发阶段切换权限与行为 |\n| Boomerang | 任务分派 | 将复杂工作拆给专门模式 |\n| MCP / Browser | 工具扩展 | 连接外部系统并验证结果 |\n\n## 商业模式\n\n- 开源获客，团队、模型路由、云服务或企业能力可变现。\n- BYOK 使用户直接承担模型 Token 成本。\n\n## 竞争格局\n\n- 与 Cline、Cursor、Continue、Claude Code 和 Codex 竞争。\n- 差异化是 Modes 和深度定制，代价是配置复杂度。\n\n## 关联节点\n\n- [[Cline]]\n- [[Claude_Code]]\n- [[Codex]]\n- [[MCP]]\n- [[Multi_Agent]]\n\n## 延伸阅读\n\n- [[Coding产品地图]]\n- [Roo Code 文档](https://docs.roocode.com/)\n- [Roo Code GitHub](https://github.com/RooCodeInc/Roo-Code)\n", "excerpt": "Roo Code 一句话定义 Roo Code 是以模式分工、工具使用和高可定制性为特征的 VS Code 开源 Coding Agent。 定位 面向需要自定义角色、工具权限和模型路由的高级用户。 可使用文件、终端、浏览器与 MCP。 时间轴 产品矩阵 商业模式 开源获客，团队、模型路由、云服务或企业能力可变现。 BYOK 使用户直接承担模型 Token ...", "links": ["05-Agent-Runners-Cline", "05-Agent-Runners-Claude_Code", "05-Agent-Runners-Codex", "03-Agent-MCP", "03-Agent-Multi_Agent", "06-Products-Coding产品地图"]}, {"id": "06-Products-Agent产品地图", "title": "Agent产品地图", "fileTitle": "Agent产品地图", "category": "06-Products", "categoryLabel": "AI 产品", "path": "06-Products/Agent产品地图.md", "updated": "2026-06-20", "tags": ["AI", "Agent", "DigitalWorkforce", "ComputerUse"], "body": "# Agent产品地图\n\n## 目录\n\n- [[#学习定位]]\n- [[#一句话总结]]\n- [[#什么是真 Agent]]\n- [[#Agent 发展路线]]\n- [[#第一部分：OpenAI Operator]]\n- [[#第二部分：Deep Research]]\n- [[#第三部分：Devin]]\n- [[#第四部分：OpenHands]]\n- [[#第五部分：Manus]]\n- [[#第六部分：AutoGLM]]\n- [[#第七部分：Claude Code]]\n- [[#Agent 分类地图]]\n- [[#Agent 能力对比]]\n- [[#为什么 Agent 这么贵]]\n- [[#Agent 未来路线]]\n- [[#关联节点]]\n- [[#核心结论]]\n\n## 学习定位\n\n2025 年以后，Agent 成为 AI 行业的核心产品方向之一。但很多产品都自称 Agent，实际能力和解决的问题差异很大。\n\n例如 [[Manus]]、[[Devin]]、[[OpenHands]]、[[AutoGLM]]、[[Operator]]、[[Deep Research]] 都属于 Agent 产品，却分别面向通用任务、软件工程、产业流程、浏览器操作和研究。\n\n因此，理解 Agent 产品地图，本质上是在理解 AI 数字劳动力体系。\n\n---\n\n# 一句话总结\n\n- [[Operator]]：数字浏览器\n- [[Deep Research]]：数字研究员\n- [[Devin]]：数字软件工程师\n- [[OpenHands]]：开源软件工程师\n- [[Manus]]：通用任务 Agent\n- [[AutoGLM]]：产业与操作型 Agent\n- [[Claude Code]]：终端式 Coding Agent\n\n---\n\n# 什么是真 Agent\n\n普通聊天机器人主要完成：\n\n```text\n问 → 答\n```\n\n完整 Agent 更接近：\n\n```text\n目标 → 规划 → 执行 → 检查 → 修正 → 完成\n```\n\n核心能力包括：\n\n- Goal\n- Plan\n- Act\n- Reflect\n\n---\n\n# Agent 发展路线\n\n```text\nChatBot → Copilot → Agent → Multi-Agent → Digital Workforce\n```\n\n---\n\n# 第一部分：OpenAI Operator\n\n## 所属公司\n\n[[OpenAI]]。\n\n## 一句话定义\n\n数字浏览器。\n\n## 产品定位\n\n[[Computer_Use|Computer Use]] Agent。\n\n## 核心能力\n\n- 打开网页\n- 点击按钮\n- 填写表单\n- 浏览网站\n\n## 工作方式\n\n面对“帮我订酒店”等目标，Operator 可以打开网页、搜索酒店、填写信息，并在需要确认的关键步骤请求用户介入。\n\n## 本质\n\n```text\nBrowser Agent\n```\n\n## 优势\n\n- 能在网页真实环境中操作\n- 将自然语言目标转化为界面动作\n\n## 缺点\n\n- 任务范围受网站、权限和安全边界限制\n- 网页变化可能影响执行稳定性\n\n## 本质定位\n\n数字实习生。\n\n---\n\n# 第二部分：Deep Research\n\n## 所属公司\n\n[[OpenAI]]。\n\n## 一句话定义\n\n数字研究员。\n\n## 产品定位\n\nResearch Agent。\n\n## 核心能力\n\n- 搜索\n- 阅读\n- 分析\n- 汇总\n\n## 工作方式\n\n面对“分析 AI 行业竞争格局”等目标，Deep Research 会搜索、阅读、分析并生成带来源的报告。\n\n## 本质\n\n```text\nResearch Agent\n```\n\n## 优势\n\n- 适合多步骤研究\n- 报告和来源整理能力强\n\n## 缺点\n\n- 主要交付研究结果，现实世界操作能力有限\n\n## 本质定位\n\n数字咨询顾问。\n\n---\n\n# 第三部分：Devin\n\n## 所属公司\n\nCognition。\n\n## 一句话定义\n\n数字软件工程师。\n\n## 产品定位\n\nCoding Agent。\n\n## 核心能力\n\n- 编码\n- 调试\n- 测试\n- 修复 Bug\n\n## 工作方式\n\n面对“开发一个网站”等目标，Devin 可以分析需求、编写代码、测试、修复并推进部署。\n\n## 本质\n\n```text\nSoftware Engineer Agent\n```\n\n## 优势\n\n- 自动化程度高\n- 强调相对独立的任务执行\n\n## 缺点\n\n- 长任务成本较高\n- 任务成功率受需求清晰度、环境和项目复杂度影响\n\n## 本质定位\n\n数字工程师。\n\n---\n\n# 第四部分：OpenHands\n\n## 所属团队\n\n开源社区。\n\n## 一句话定义\n\n开源软件工程 Agent。\n\n## 产品定位\n\n可自托管和扩展的 Coding Agent。\n\n## 核心能力\n\n- Coding\n- Shell\n- Browser\n- Debug\n\n## 最大特点\n\n开源、可私有部署，并允许开发者调整模型和执行环境。\n\n## 本质\n\n```text\nOpen Source Software Engineering Agent\n```\n\n## 优势\n\n- 开源\n- 灵活\n- 可定制\n\n## 缺点\n\n- 稳定性依赖模型与部署配置\n- 需要技术维护能力\n\n---\n\n# 第五部分：Manus\n\n## 所属团队\n\nManus 团队。\n\n## 一句话定义\n\n通用任务 Agent。\n\n## 产品定位\n\nGeneral Agent。\n\n## 核心能力\n\n- 搜索\n- 研究\n- 浏览器\n- 工具调用\n- 报告生成\n\n## 工作方式\n\n面对“分析新能源汽车行业”等目标，Manus 可以搜索、研究、整理并输出结果。\n\n## 最大特点\n\n强调交付结果，而不只回答问题。\n\n## 本质\n\n```text\nGeneral Agent / Agent Team\n```\n\n## 优势\n\n- 任务完成感强\n- 覆盖多种工具与工作步骤\n\n## 缺点\n\n- 长任务成本较高\n- 执行速度和成功率取决于任务复杂度\n\n## 本质定位\n\n数字项目经理。\n\n---\n\n# 第六部分：AutoGLM\n\n## 所属公司\n\n[[智谱AI]]。\n\n## 一句话定义\n\n产业与操作型 Agent。\n\n## 产品定位\n\n面向中文环境和企业场景的 Agent 系统。\n\n## 核心能力\n\n- 搜索\n- 浏览器或界面操作\n- [[Tool_Use|Tool Use]]\n- 企业流程\n\n## 最大特点\n\n强调产业场景，例如金融、政务和企业服务。\n\n## 本质\n\n```text\nIndustry Agent\n```\n\n## 优势\n\n- 企业落地能力\n- 中文环境适配\n\n## 缺点\n\n- 全球开发生态相对较弱\n\n## 本质定位\n\n数字业务员。\n\n---\n\n# 第七部分：Claude Code\n\n## 所属公司\n\n[[Anthropic]]。\n\n## 一句话定义\n\nCoding Agent 执行器。\n\n## 产品定位\n\n开发 Agent。\n\n## 核心能力\n\n- 理解代码\n- 修改代码\n- 执行命令\n- 自动修复\n\n## 最大特点\n\n以终端和代码库为执行环境，形成规划、修改、测试与迭代闭环。\n\n## 本质\n\n```text\nCoding Agent\n```\n\n## 本质定位\n\n数字程序员。\n\n---\n\n# Agent 分类地图\n\n## 第一类：Research Agent\n\n代表：\n\n- [[Deep Research]]\n- [[Felo]]\n\n特点：研究、资料分析与报告交付。\n\n## 第二类：Browser Agent\n\n代表：\n\n- [[Operator]]\n- [[AutoGLM]]\n\n特点：网页与界面执行。\n\n## 第三类：Coding Agent\n\n代表：\n\n- [[Devin]]\n- [[Claude Code]]\n- [[OpenHands]]\n\n特点：软件开发与工程执行。\n\n## 第四类：General Agent\n\n代表：\n\n- [[Manus]]\n- [[AutoGLM]]\n\n特点：跨工具完成通用任务。\n\n## 第五类：Multi-Agent\n\n代表未来的 Agent 团队协作方向，多个专业 Agent 分工规划、执行与审查。\n\n---\n\n# Agent 能力对比\n\n| 产品 | 类型 | 核心定位 |\n|---|---|---|\n| [[Operator]] | Browser Agent | 数字浏览器 |\n| [[Deep Research]] | Research Agent | 数字研究员 |\n| [[Devin]] | Coding Agent | 数字工程师 |\n| [[OpenHands]] | Coding Agent | 开源工程师 |\n| [[Manus]] | General Agent | 数字项目经理 |\n| [[AutoGLM]] | Industry Agent | 数字业务员 |\n| [[Claude Code]] | Coding Agent | 数字程序员 |\n\n---\n\n# 用一张图理解\n\n```text\nOperator      = 会使用浏览器的人\nDeep Research = 咨询顾问\nDevin         = 软件工程师\nOpenHands     = 开源软件工程师\nClaude Code   = 高级程序员\nManus         = 项目经理\nAutoGLM       = 业务经理\n```\n\n---\n\n# 为什么 Agent 这么贵\n\nAgent 不是一次调用，而是多步骤循环：\n\n```text\n规划 + 执行 + 反思 + 重试\n```\n\n一次任务可能调用模型几十次甚至更多。因此，Agent 的模型、工具、执行环境和管理成本通常远高于单轮聊天。\n\n---\n\n# Agent 未来路线\n\n```text\nChat → Copilot → Agent → Multi-Agent → Digital Workforce\n```\n\n最终指向数字员工体系。\n\n---\n\n# 为什么 Agent 是 AI 产业下一阶段\n\n```text\nChatGPT 卖答案\nAgent 卖行动\n未来卖结果\n```\n\n因此，Agent 是 AI 商业化的重要第二增长曲线。\n\n---\n\n# 知识图谱位置\n\n```text\n06-Products\n├── Chat产品地图\n├── Coding产品地图\n├── Search产品地图\n├── Agent产品地图\n└── Workflow产品地图\n```\n\n---\n\n# 关联节点\n\n- [[Operator]]\n- [[Deep Research]]\n- [[Devin]]\n- [[OpenHands]]\n- [[Claude Code]]\n- [[Manus]]\n- [[AutoGLM]]\n- [[Agent经济学]]\n- [[Computer_Use|Computer Use]]\n- [[OpenAI_Anthropic_智谱三条路线演化对比#OpenAI 路线|OpenAI路线]]\n- [[OpenAI_Anthropic_智谱三条路线演化对比#Anthropic 路线|Anthropic路线]]\n- [[OpenAI_Anthropic_智谱三条路线演化对比#智谱路线|智谱路线]]\n- [[AI产品地图]]\n\n---\n\n# 核心结论\n\nAgent 不是聊天机器人的简单升级版，而是目标驱动的软件执行系统。\n\n未来竞争不再是谁回答问题更聪明，而是谁能够理解目标、制定计划、执行任务并最终交付结果。这也是 AI 产业从 Chat 时代进入 Agent 时代的核心变化。\n\n", "excerpt": "Agent产品地图 目录 #学习定位 #一句话总结 #什么是真 Agent #Agent 发展路线 #第一部分：OpenAI Operator #第二部分：Deep Research #第三部分：Devin #第四部分：OpenHands #第五部分：Manus #第六部分：AutoGLM #第七部分：Claude Code #Agent 分类地图 #Age...", "links": ["05-Agent-Runners-Manus", "06-Products-Devin", "05-Agent-Runners-OpenHands", "05-Agent-Runners-AutoGLM", "06-Products-Operator", "06-Products-Deep-Research", "02-Model-Companies-OpenAI", "03-Agent-Computer_Use", "02-Model-Companies-智谱AI", "03-Agent-Tool_Use", "02-Model-Companies-Anthropic", "06-Products-Felo", "07-Business-Agent经济学", "02-Model-Companies-OpenAI_Anthropic_智谱三条路线演化对比", "00-MOC-AI产品地图"]}, {"id": "06-Products-ChatGLM", "title": "ChatGLM", "fileTitle": "ChatGLM", "category": "06-Products", "categoryLabel": "AI 产品", "path": "06-Products/ChatGLM.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "product", "智谱AI", "GLM"], "body": "# ChatGLM\n\n## 一句话定义\n\nChatGLM 是 [[智谱AI]] 面向中英双语对话和开发者生态推出的开放模型系列。\n\n## 定位\n\n位于 GLM 技术路线的开放生态层，降低国产大模型研究、部署和应用开发门槛。\n\n## 时间轴\n\n- 2023：ChatGLM 获得广泛开发者关注。\n- 2023-2025：系列持续迭代，并与智谱 API 和应用生态协同。\n\n## 产品矩阵\n\n- 基础模型：[[GLM]]\n- 开放模型：ChatGLM\n- 用户产品：[[智谱清言]]\n- Agent 产品：[[AutoGLM]]\n\n## 商业模式\n\n开放模型本身承担生态获客作用，并为 API、企业部署和行业解决方案导流。\n\n## 竞争格局\n\n与国内外开放权重大模型竞争，重点比较中文能力、部署成本、许可证和产业支持。\n\n## 关联节点\n\n- [[智谱AI]]\n- [[GLM]]\n- [[智谱清言]]\n- [[智谱AI发展史（2019-2026）]]\n\n## 延伸阅读\n\n- [[智谱AI发展史（2019-2026）]]\n- [[AI产品地图]]\n\n", "excerpt": "ChatGLM 一句话定义 ChatGLM 是 智谱AI 面向中英双语对话和开发者生态推出的开放模型系列。 定位 位于 GLM 技术路线的开放生态层，降低国产大模型研究、部署和应用开发门槛。 时间轴 2023：ChatGLM 获得广泛开发者关注。 2023-2025：系列持续迭代，并与智谱 API 和应用生态协同。 产品矩阵 基础模型：GLM 开放模型：Ch...", "links": ["02-Model-Companies-智谱AI", "10-Concepts-GLM", "06-Products-智谱清言", "05-Agent-Runners-AutoGLM", "02-Model-Companies-智谱AI发展史2019-2026", "00-MOC-AI产品地图"]}, {"id": "06-Products-ChatGPT", "title": "ChatGPT", "fileTitle": "ChatGPT", "category": "06-Products", "categoryLabel": "AI 产品", "path": "06-Products/ChatGPT.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "product"], "body": "# ChatGPT\n\n## 一句话定义\n\n> ChatGPT 是 OpenAI 面向个人、团队和企业的通用 AI 助手与 Agent 产品。\n\n## 定位\n\n- 从对话入口扩展到文件、搜索、代码、图像、语音与任务执行。\n- 也是 OpenAI 模型与工具的主要消费者分发入口。\n\n## 时间轴\n\n| 阶段 | 关键变化 | 意义 |\n|---|---|---|\n| 2022 | 以对话产品公开发布 | 推动生成式 AI 进入大众市场 |\n| 2023–2024 | 插件、GPTs、多模态、文件与搜索 | 从聊天扩展到通用工作台 |\n| Agent 阶段 | 工具、深度研究、代码与任务执行 | 向数字助手与行动层演进 |\n\n## 产品矩阵\n\n| 产品 / 能力 | 定位 | 核心价值 |\n|---|---|---|\n| Free / Plus / Pro | 个人套餐 | 按能力、模型和额度分层 |\n| Team / Enterprise | 组织级产品 | 协作、安全、数据隔离与治理 |\n| GPTs / Tools | 平台扩展 | 自定义助手、搜索、代码和文件 |\n\n## 商业模式\n\n- Freemium 获客，Plus / Pro 订阅提升个人收入，Team / Enterprise 销售治理和组织生产力。\n- ChatGPT 也为 OpenAI API、Codex 和 Agent 平台带来分发。\n\n## 竞争格局\n\n- 与 Claude、Gemini、Copilot、Perplexity、Kimi 和国内通用助手竞争。\n- 核心壁垒是用户规模、模型能力、工具生态与品牌。\n\n## 关联节点\n\n- [[OpenAI]]\n- [[Codex]]\n- [[Agent]]\n- [[AI产品地图]]\n- [[AI订阅经济]]\n\n## 延伸阅读\n\n- [[Search产品地图]]\n- [[ChatGPT、Claude、Gemini、Kimi、豆包产品地图]]\n- [ChatGPT](https://chatgpt.com/)\n- [OpenAI 官网](https://openai.com/chatgpt/)\n", "excerpt": "ChatGPT 一句话定义 ChatGPT 是 OpenAI 面向个人、团队和企业的通用 AI 助手与 Agent 产品。 定位 从对话入口扩展到文件、搜索、代码、图像、语音与任务执行。 也是 OpenAI 模型与工具的主要消费者分发入口。 时间轴 产品矩阵 商业模式 Freemium 获客，Plus / Pro 订阅提升个人收入，Team / Enterp...", "links": ["02-Model-Companies-OpenAI", "05-Agent-Runners-Codex", "10-Concepts-Agent", "00-MOC-AI产品地图", "07-Business-AI订阅经济", "06-Products-Search产品地图", "06-Products-ChatGPTClaudeGeminiKimi豆包产品地图"]}, {"id": "06-Products-ChatGPTClaudeGeminiKimi豆包产品地图", "title": "ChatGPT、Claude、Gemini、Kimi、豆包产品地图", "fileTitle": "ChatGPT、Claude、Gemini、Kimi、豆包产品地图", "category": "06-Products", "categoryLabel": "AI 产品", "path": "06-Products/ChatGPT、Claude、Gemini、Kimi、豆包产品地图.md", "updated": "2026-06-20", "tags": ["AI", "Products", "ChatGPT", "Claude", "Gemini", "Kimi", "豆包"], "body": "# ChatGPT、Claude、Gemini、Kimi、豆包产品地图\n\n## 目录\n\n- [[#学习定位]]\n- [[#一句话总结]]\n- [[#为什么要研究产品地图]]\n- [[#第一部分：ChatGPT]]\n- [[#第二部分：Claude]]\n- [[#第三部分：Gemini]]\n- [[#第四部分：Kimi]]\n- [[#第五部分：豆包]]\n- [[#五大产品对比]]\n- [[#如何选择]]\n- [[#产品路线与公司路线对应关系]]\n- [[#关联节点]]\n- [[#核心结论]]\n\n## 学习定位\n\n很多人学习 AI 时，习惯按照公司学习：\n\n- [[OpenAI]]\n- [[Anthropic]]\n- [[Google_DeepMind|Google]]\n- [[月之暗面_Kimi|月之暗面]]\n- 字节跳动\n\n但在日常使用中，用户接触的是产品，例如 [[ChatGPT]]、[[Claude]]、[[Gemini]]、[[Kimi]] 和 [[豆包]]。\n\n因此，建立产品地图与研究公司同样重要。公司决定资源与战略，产品则决定用户真正获得的能力和体验。\n\n---\n\n# 一句话总结\n\n- [[ChatGPT]]：能力覆盖最全面的 AI 平台型产品\n- [[Claude]]：以 Agent、Coding 和长文本生产力见长的助手\n- [[Gemini]]：Google 生态的 AI 入口\n- [[Kimi]]：以长文本、阅读和搜索建立认知的助手\n- [[豆包]]：面向大众用户的 AI 助手\n\n---\n\n# 为什么要研究产品地图\n\n同样是聊天机器人，产品定位实际上可能完全不同。\n\n例如：\n\n- 写代码时，Claude 的 Coding 与 Agent 生态可能更适合\n- 处理 Google Docs 时，Gemini 的 Workspace 整合可能更方便\n- 阅读长 PDF 时，Kimi 的中文长文档体验可能更直接\n\n因此，产品选择通常比单独比较模型参数更有实际意义。\n\n---\n\n# 第一部分：ChatGPT\n\n## 所属公司\n\n[[OpenAI]]\n\n## 一句话定义\n\nAI 时代的超级入口。\n\n## 产品定位\n\n通用 AI 助手与平台型产品。\n\n## 核心能力\n\n- 对话\n- 写作\n- 编程\n- 搜索\n- 图像生成\n- 数据分析\n- [[Agent]]\n\n## 产品演进路线\n\n```text\nGPT → API → ChatGPT → Codex → Responses API → Agent SDK → 统一Agent Platform\n```\n\n## OpenAI 产品矩阵\n\nOpenAI 产品矩阵包括：\n\n- [[ChatGPT]]\n- [[Codex]]\n- [[Deep Research]]\n- [[Operator]]\n- Responses API\n- Agent SDK\n\n```text\nOpenAI\n├── GPT\n├── ChatGPT\n├── Codex\n├── Responses API\n├── Agent SDK\n├── Operator\n├── Deep Research\n└── Enterprise\n```\n\nChatGPT 负责人与 AI 协作。\n\nCodex 负责软件工程 Agent。\n\n## 核心优势\n\n- 能力覆盖全面\n- 产品与开发生态强\n- 开发者规模大\n\n## 核心缺点\n\n- 价格较高\n- 部分高级功能使用门槛较高\n\n## 适合人群\n\n- 普通用户\n- 企业用户\n- 开发者\n- 内容创作者\n\n## 本质定位\n\nAI 操作系统入口。\n\n---\n\n# 第二部分：Claude\n\n## 所属公司\n\n[[Anthropic]]\n\n## 一句话定义\n\nAgent 时代的生产力助手。\n\n## 产品定位\n\n推理、知识工作与执行助手。\n\n## 核心能力\n\n- 深度写作\n- 长文本分析\n- 编程\n- [[Agent]]\n- [[Tool_Use|Tool Use]]\n\n## 产品演进路线\n\n```text\nClaude → 长上下文 → Artifacts → MCP → Claude Code → Agent 生态\n```\n\n## 核心优势\n\n- 代码能力突出\n- 长文档处理能力强\n- Agent 与工具生态完善\n\n## 核心缺点\n\n- 生态规模弱于 ChatGPT\n- 部分地区存在访问限制\n\n## 适合人群\n\n- 开发者\n- 研究人员\n- 产品经理\n- AI 从业者\n\n## 本质定位\n\n数字员工与知识工作助手。\n\n---\n\n# 第三部分：Gemini\n\n## 所属公司\n\n[[Google_DeepMind|Google]]\n\n## 一句话定义\n\nGoogle 生态的 AI 入口。\n\n## 产品定位\n\nGoogle 产品体系中的通用 AI 助手。\n\n## 核心能力\n\n- 搜索\n- 文档\n- 邮件\n- 图片\n- 视频\n- Workspace\n\n## 产品演进路线\n\n```text\nBard → Gemini → Gemini Advanced → Workspace AI → Agent 生态\n```\n\n## 核心优势\n\n- Google 生态整合能力强\n- 搜索能力强\n- 多模态能力强\n\n## 核心缺点\n\n- 产品与品牌调整较多\n- 生态开放性相对有限\n\n## 适合人群\n\n- Google 用户\n- 企业办公用户\n- 海外团队\n\n## 本质定位\n\nGoogle Copilot。\n\n---\n\n# 第四部分：Kimi\n\n## 所属公司\n\n[[月之暗面_Kimi|月之暗面]]\n\n## 一句话定义\n\n长文本、阅读与搜索助手。\n\n## 产品定位\n\n面向中文知识工作的阅读与检索工具。\n\n## 核心能力\n\n- 超长上下文\n- PDF 阅读\n- 搜索\n- 总结\n- 知识整理\n\n## 产品演进路线\n\n```text\n长文本 → 搜索 → Agent 探索\n```\n\n## 核心优势\n\n- 阅读体验良好\n- 中文体验良好\n- 信息整合能力强\n\n## 核心缺点\n\n- Agent 能力仍需扩展\n- 开发生态相对较弱\n\n## 适合人群\n\n- 学生\n- 研究人员\n- 知识工作者\n\n## 本质定位\n\nAI 阅读器与研究助理。\n\n---\n\n# 第五部分：豆包\n\n## 所属公司\n\n字节跳动。\n\n## 一句话定义\n\n大众化 AI 助手。\n\n## 产品定位\n\n面向全民用户的 AI 入口。\n\n## 核心能力\n\n- 对话\n- 写作\n- 图片\n- 视频\n- 搜索\n- 娱乐\n\n## 产品演进路线\n\n```text\n豆包 → 豆包大模型 → 豆包 Agent → 字节 AI 生态\n```\n\n## 核心优势\n\n- 用户分发能力强\n- 产品体验简单\n- 内容与多模态生态资源丰富\n\n## 核心缺点\n\n- 专业知识工作能力需要继续强化\n- 开发者生态弱于 OpenAI\n\n## 适合人群\n\n- 普通用户\n- 内容创作者\n- 轻办公用户\n\n## 本质定位\n\n字节生态的大众 AI 入口。\n\n---\n\n# 五大产品对比\n\n| 产品 | 公司 | 定位 | 最大优势 |\n|---|---|---|---|\n| [[ChatGPT]] | [[OpenAI]] | AI 操作系统入口 | 能力全面 |\n| [[Claude]] | [[Anthropic]] | 数字员工 | Agent 与 Coding |\n| [[Gemini]] | [[Google_DeepMind|Google]] | Google 助手 | Workspace 生态 |\n| [[Kimi]] | [[月之暗面_Kimi|月之暗面]] | AI 阅读器 | 长文本 |\n| [[豆包]] | 字节跳动 | 全民 AI 入口 | 用户分发 |\n\n---\n\n# 用一张图理解\n\n```text\nChatGPT = 万能选手\nClaude  = 高级顾问\nGemini  = Google 秘书\nKimi    = 研究助理\n豆包    = 大众助手\n```\n\n---\n\n# 如何选择\n\n| 主要需求 | 优先考察的产品 |\n|---|---|\n| 尚不确定具体需求 | [[ChatGPT]] |\n| 编程与 Agent 工作 | [[Claude]] / [[Claude Code]] |\n| Google 办公生态 | [[Gemini]] |\n| 阅读和整理资料 | [[Kimi]] |\n| 日常对话与内容娱乐 | [[豆包]] |\n\n---\n\n# 产品路线与公司路线对应关系\n\n| 产品 | 对应路线 | 核心逻辑 |\n|---|---|---|\n| [[ChatGPT]] | OpenAI 路线 | 能力优先 |\n| [[Claude]] | Anthropic 路线 | 安全与 Agent 优先 |\n| [[Gemini]] | Google 路线 | 生态优先 |\n| [[Kimi]] | 长文本路线 | 阅读与知识工作 |\n| [[豆包]] | 流量入口路线 | 大众分发与内容生态 |\n\n---\n\n# 知识图谱位置\n\n```text\n06-Products\n├── ChatGPT\n├── Claude\n├── Gemini\n├── Kimi\n└── 豆包\n```\n\n---\n\n# 关联节点\n\n- [[OpenAI发展史]]\n- [[Codex]]\n- [[Software Engineering Agent]]\n- [[OpenAI Agent Platform]]\n- [[Anthropic为什么与OpenAI分裂]]\n- [[智谱AI发展史]]\n- [[Agent]]\n- [[MCP]]\n- [[Claude Code]]\n- [[AI商业模式全景图]]\n- [[AI产品地图]]\n\n---\n\n# 核心结论\n\n模型竞争只是表面，真正竞争的是谁能成为用户进入 AI 世界的入口。\n\n- ChatGPT 争夺 AI 操作系统入口\n- Claude 争夺数字员工入口\n- Gemini 争夺 Google 生态入口\n- Kimi 争夺知识工作入口\n- 豆包争夺大众用户入口\n\n未来多数 AI 产品，都可以放入这五种定位坐标系中进行分析。\n", "excerpt": "ChatGPT、Claude、Gemini、Kimi、豆包产品地图 目录 #学习定位 #一句话总结 #为什么要研究产品地图 #第一部分：ChatGPT #第二部分：Claude #第三部分：Gemini #第四部分：Kimi #第五部分：豆包 #五大产品对比 #如何选择 #产品路线与公司路线对应关系 #关联节点 #核心结论 学习定位 很多人学习 AI 时，习...", "links": ["02-Model-Companies-OpenAI", "02-Model-Companies-Anthropic", "02-Model-Companies-Google_DeepMind", "02-Model-Companies-月之暗面_Kimi", "06-Products-ChatGPT", "06-Products-Claude", "06-Products-Gemini", "06-Products-Kimi", "06-Products-豆包", "10-Concepts-Agent", "05-Agent-Runners-Codex", "06-Products-Deep-Research", "06-Products-Operator", "03-Agent-Tool_Use", "02-Model-Companies-Anthropic为什么与OpenAI分裂", "03-Agent-MCP", "07-Business-AI商业模式全景图", "00-MOC-AI产品地图"]}, {"id": "06-Products-Claude", "title": "Claude", "fileTitle": "Claude", "category": "06-Products", "categoryLabel": "AI 产品", "path": "06-Products/Claude.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "product"], "body": "# Claude\n\n## 一句话定义\n\n> Claude 是 Anthropic 的通用 AI 助手，聚焦长文本、文件、编码、推理与企业知识工作。\n\n## 定位\n\n- 是 Anthropic 模型能力的消费者与企业入口。\n- 与 Claude Code、Claude API 和 MCP 共同构成 Agent 生态。\n\n## 时间轴\n\n| 阶段 | 关键变化 | 意义 |\n|---|---|---|\n| 早期 | Claude 对话助手 | 以安全、长文本和文件理解差异化 |\n| 产品扩展 | Artifacts、Projects、多模态与团队功能 | 从聊天走向知识工作台 |\n| Agent 阶段 | Claude Code、Computer Use 与 MCP | 从建议走向执行和工具生态 |\n\n## 产品矩阵\n\n| 产品 / 能力 | 定位 | 核心价值 |\n|---|---|---|\n| Claude Free / Pro / Max | 个人套餐 | 按额度和 Agent 强度分层 |\n| Team / Enterprise | 组织产品 | 协作、数据安全与治理 |\n| Artifacts / Projects | 知识工作 | 长期上下文、创作与文档交付 |\n\n## 商业模式\n\n- Pro / Max 订阅销售个人访问和 Agent 额度，Team / Enterprise 销售组织生产力与治理。\n- Claude 产品与 API、Claude Code 共享模型和品牌投入。\n\n## 竞争格局\n\n- 与 ChatGPT、Gemini、Copilot 和 Perplexity 竞争。\n- 优势是长文本、编码、企业信任和 MCP / Claude Code 生态。\n\n## 关联节点\n\n- [[Anthropic]]\n- [[Claude_Code]]\n- [[MCP]]\n- [[Computer_Use]]\n- [[AI订阅经济]]\n\n## 延伸阅读\n\n- [[ChatGPT、Claude、Gemini、Kimi、豆包产品地图]]\n- [Claude 官网](https://claude.ai/)\n- [Anthropic](https://www.anthropic.com/claude)\n", "excerpt": "Claude 一句话定义 Claude 是 Anthropic 的通用 AI 助手，聚焦长文本、文件、编码、推理与企业知识工作。 定位 是 Anthropic 模型能力的消费者与企业入口。 与 Claude Code、Claude API 和 MCP 共同构成 Agent 生态。 时间轴 产品矩阵 商业模式 Pro / Max 订阅销售个人访问和 Agent...", "links": ["02-Model-Companies-Anthropic", "05-Agent-Runners-Claude_Code", "03-Agent-MCP", "03-Agent-Computer_Use", "07-Business-AI订阅经济", "06-Products-ChatGPTClaudeGeminiKimi豆包产品地图"]}, {"id": "06-Products-Codex全景图", "title": "Codex全景图", "fileTitle": "Codex全景图", "category": "06-Products", "categoryLabel": "AI 产品", "path": "06-Products/Codex全景图.md", "updated": "", "tags": [], "body": "# Codex全景图\n\n（后续课程补充）\n", "excerpt": "Codex全景图 （后续课程补充）", "links": []}, {"id": "06-Products-Coding产品地图", "title": "Coding产品地图", "fileTitle": "Coding产品地图", "category": "06-Products", "categoryLabel": "AI 产品", "path": "06-Products/Coding产品地图.md", "updated": "2026-06-20", "tags": ["AI", "Coding", "Agent", "DeveloperTools"], "body": "# Coding产品地图\n\n## 目录\n\n- [[#学习定位]]\n- [[#一句话总结]]\n- [[#为什么会出现这么多 Coding 产品]]\n- [[#第一部分：Cursor]]\n- [[#第二部分：Claude Code]]\n- [[#第三部分：Codex]]\n- [[#第四部分：Windsurf]]\n- [[#第五部分：OpenHands]]\n- [[#第六部分：Cline]]\n- [[#第七部分：Roo Code]]\n- [[#第八部分：GLM Coding]]\n- [[#产品分类地图]]\n- [[#产品能力对比]]\n- [[#Coding 产品未来路线]]\n- [[#关联节点]]\n- [[#核心结论]]\n\n## 学习定位\n\n进入 AI 编程领域后，常见产品包括：\n\n- [[Cursor]]\n- [[Claude Code]]\n- [[Codex]]\n- [[Windsurf]]\n- [[OpenHands]]\n- [[Cline]]\n- [[Roo Code]]\n- [[GLM Coding]]\n\n它们看起来都在“AI 写代码”，实际上属于不同产品层级。\n\n理解 Coding 产品，本质上是在理解 Agent 时代的软件开发体系。\n\n---\n\n# 一句话总结\n\n- [[Cursor]]：AI 原生 IDE\n- [[Claude Code]]：Agent 执行器\n- [[Codex]]：OpenAI 官方 [[Software Engineering Agent]]\n- [[Windsurf]]：Agent IDE\n- [[OpenHands]]：开源软件工程 Agent\n- [[Cline]]：VS Code 中的 Agent\n- [[Roo Code]]：可配置的 Agent 工作台\n- [[GLM Coding]]：国产 Coding Agent\n\n---\n\n# 为什么会出现这么多 Coding 产品\n\n传统开发模式：\n\n```text\n程序员 → IDE → 写代码\n```\n\nAI 时代：\n\n```text\n程序员 → Agent → IDE / Terminal → 代码与交付结果\n```\n\n因此，IDE、插件、Agent 执行器和开发平台等新产品层开始同时出现。\n\n---\n\n# 第一部分：Cursor\n\n## 所属公司\n\nAnysphere。\n\n## 一句话定义\n\nAI 原生 IDE。\n\n## 产品定位\n\n下一代开发环境。\n\n## 核心能力\n\n- AI 补全\n- Chat\n- Agent\n- 项目理解\n- 代码重构\n\n## 工作方式\n\n用户提出“实现登录模块”等目标后，Cursor 可以读取项目、分析结构、生成代码并修改文件。\n\n## 本质\n\n```text\nIDE + AI\n```\n\n## 优势\n\n- 开发体验完整\n- 编辑器生态成熟\n- 用户规模较大\n\n## 缺点\n\n- 工作方式仍以 IDE 为中心\n- 自主执行深度受产品边界和权限控制影响\n\n## 目标\n\n成为 AI 时代的开发环境入口。\n\n---\n\n# 第二部分：Claude Code\n\n## 所属公司\n\n[[Anthropic]]。\n\n## 一句话定义\n\n官方终端式 Coding Agent。\n\n## 产品定位\n\nAgent 执行器。\n\n## 核心能力\n\n- 理解项目\n- 修改代码\n- 执行命令\n- 调试\n- 测试\n\n## 工作方式\n\n面对“重构支付模块”等目标，Claude Code 可以分析、规划、修改、测试并持续修复。\n\n## 本质\n\n```text\nAgent + Terminal\n```\n\n它不是传统 IDE，而更接近数字工程师。\n\n## 优势\n\n- Agent 执行能力强\n- 项目理解深入\n- 适合多文件复杂任务\n\n## 缺点\n\n- 深度依赖 Claude 生态\n- 终端与权限管理存在学习成本\n\n## 目标\n\n成为数字程序员。\n\n---\n\n# 第三部分：Codex\n\n## 所属公司\n\n[[OpenAI]]。\n\n## 一句话定义\n\nOpenAI 官方 [[Software Engineering Agent]]。\n\n## 产品定位\n\nCodex 是 OpenAI 面向软件工程任务的官方 Agent，负责理解代码库、修改代码、执行命令、运行测试，并把软件开发任务接入 [[OpenAI Agent Platform]]。\n\n## 核心能力\n\n- 编码\n- 调试\n- 多文件修改\n- 自动执行\n\n## 演进路线\n\n```text\n早期Codex模型（2021） → 新版Codex（2025-2026）Software Engineering Agent → OpenAI Agent Platform\n```\n\n这里需要避免混淆两个时代：\n\n- 早期Codex模型（2021）：自然语言到代码的模型能力，曾影响 Copilot 一类产品。\n- 新版Codex（2025-2026）Software Engineering Agent：OpenAI 官方软件工程 Agent，面向端到端开发任务。\n\n## 本质\n\n```text\nSoftware Engineering Agent + OpenAI Agent Platform\n```\n\n## 与 ChatGPT 的区别\n\nChatGPT 负责人与 AI 协作，是通用 AI 助手和入口。\n\nCodex 负责软件工程 Agent，重点是代码库理解、文件修改、命令执行、测试验证和任务交付。\n\n## 与 Claude Code 的区别\n\nClaude Code 是 Anthropic 将“Claude + Claude Code”作为旗舰 Coding Agent 的路线。\n\nCodex 是 OpenAI 统一 Agent 平台路线的一部分：\n\n```text\nGPT\n↓\nAPI\n↓\nChatGPT\n↓\nCodex\n↓\nResponses API\n↓\nAgent SDK\n↓\n统一Agent Platform\n```\n\n## 与 Cursor 的区别\n\nCursor 是 AI 原生 IDE，核心是把 AI 融入开发环境。\n\nCodex 是 Software Engineering Agent，核心是把开发任务委托给 Agent 执行。\n\n## 与 Agent SDK 的关系\n\nCodex 是 OpenAI 官方软件工程 Agent 产品。\n\nAgent SDK 是开发者构建 Agent 应用的工具包。二者共同属于 [[OpenAI Agent Platform]]。\n\n## 优势\n\n- 与 OpenAI 模型和产品生态融合\n- 具备平台化扩展空间\n\n## 缺点\n\n- 产品形态和边界持续演进\n- 用户需要区分模型、Agent 产品和开发 API\n\n## 目标\n\n成为 OpenAI 在软件工程任务中的 Agent 入口。\n\n---\n\n# 第四部分：Windsurf\n\n## 所属公司\n\nCodeium 团队发起的 AI 开发环境产品。\n\n## 一句话定义\n\nAgent IDE。\n\n## 产品定位\n\nCursor 的主要同类竞争者之一。\n\n## 核心能力\n\n- Cascade Agent\n- 自动修改代码\n- 项目理解\n- 代码生成\n\n## 特点\n\n强调 Agent First，让 Agent 更主动地理解上下文和执行开发步骤。\n\n## 本质\n\n```text\nIDE + Agent\n```\n\n## 优势\n\n- Agent 体验突出\n- 自动化程度较高\n\n## 缺点\n\n- 生态与用户规模需要持续扩大\n\n---\n\n# 第五部分：OpenHands\n\n## 所属团队\n\n开源社区。\n\n## 一句话定义\n\n开源软件工程 Agent。\n\n## 产品定位\n\n可自行部署和扩展的数字工程师。\n\n## 核心能力\n\n- 编码\n- 调试\n- 浏览器操作\n- Shell 执行\n\n## 工作方式\n\n用户给出目标，Agent 在受控执行环境中自行规划并完成开发步骤。\n\n## 本质\n\n开源的软件工程 Agent 平台。\n\n## 优势\n\n- 开源\n- 可私有部署\n- 可扩展\n\n## 缺点\n\n- 稳定性和任务完成率取决于模型与环境配置\n- 部署和维护需要技术能力\n\n---\n\n# 第六部分：Cline\n\n## 所属团队\n\n开源社区。\n\n## 一句话定义\n\nVS Code 中的 Coding Agent。\n\n## 产品定位\n\nAgent 插件。\n\n## 核心能力\n\n- 文件修改\n- Shell 执行\n- [[MCP]] 支持\n- 多模型支持\n\n## 特点\n\n可连接 OpenAI、Claude、Gemini、GLM 等不同模型。\n\n## 本质\n\n```text\nVS Code Agent 控制台\n```\n\n## 优势\n\n- 开放\n- 灵活\n- 支持 MCP 与多模型\n\n## 缺点\n\n- 使用效果依赖用户配置、模型和权限设置\n\n---\n\n# 第七部分：Roo Code\n\n## 所属团队\n\n开源社区。\n\n## 一句话定义\n\n强调模式分工和可配置工作流的 VS Code Coding Agent。\n\n## 产品定位\n\n高级 Agent 插件与工作台。\n\n## 特点\n\n更强调：\n\n- 多模式或多角色协作\n- 工作流\n- 自动执行\n\n## 本质\n\n```text\nAgent 工作台\n```\n\n---\n\n# 第八部分：GLM Coding\n\n## 所属公司\n\n[[智谱AI]]。\n\n## 一句话定义\n\n国产 Coding Agent。\n\n## 产品定位\n\n开发者生产力产品。\n\n## 核心能力\n\n- 编码\n- Agent 执行\n- 项目理解\n- 自动修改\n\n## 商业模式\n\n采用 [[Coding Plan经济学|Coding Plan]] 思路，以开发额度套餐包装底层 Token 消耗。\n\n## 本质\n\n面向中文和国产模型生态的 Coding Agent。\n\n## 优势\n\n- 中文开发环境适配\n- 国产模型生态\n- 套餐定价便于预算管理\n\n## 缺点\n\n- 生态规模仍需扩大\n\n---\n\n# 产品分类地图\n\n## 第一类：AI IDE\n\n代表：\n\n- [[Cursor]]\n- [[Windsurf]]\n\n特点：IDE 增强与一体化开发体验。\n\n## 第二类：Coding Agent\n\n代表：\n\n- [[Claude Code]]\n- [[OpenHands]]\n- [[GLM Coding]]\n\n特点：Agent 自主执行。\n\n## 第三类：Agent 插件\n\n代表：\n\n- [[Cline]]\n- [[Roo Code]]\n\n特点：以 VS Code 扩展形式接入模型、工具和工作流。\n\n## 第四类：Agent 平台\n\n代表：\n\n- [[Codex]]\n- OpenAI Agent 体系\n\n特点：连接模型、执行环境、API 与平台能力。\n\n---\n\n# 产品能力对比\n\n| 产品 | 类型 | 核心定位 |\n|---|---|---|\n| [[Cursor]] | AI IDE | 下一代 IDE |\n| [[Claude Code]] | Coding Agent | 数字工程师 |\n| [[Codex]] | Software Engineering Agent | OpenAI 官方软件工程 Agent |\n| [[Windsurf]] | Agent IDE | Agent First IDE |\n| [[OpenHands]] | 开源 Agent | 开源工程师 |\n| [[Cline]] | Agent 插件 | VS Code Agent |\n| [[Roo Code]] | Agent 工作台 | 模式分工与工作流 |\n| [[GLM Coding]] | Coding Agent | 国产开发 Agent |\n\n---\n\n# 用一张图理解\n\n```text\nCursor      = AI 版开发环境\nClaude Code = 数字程序员\nCodex       = OpenAI 官方 Software Engineering Agent\nWindsurf    = Agent First IDE\nOpenHands   = 开源软件工程 Agent\nCline       = Agent 插件\nRoo Code    = Agent 工作台\nGLM Coding  = 国产 Coding Agent\n```\n\n---\n\n# 为什么 Claude Code 重要\n\n它代表软件开发交互中心从 IDE 向 Agent 迁移：\n\n```text\nIDE → Agent\n```\n\n过去主要由人直接写代码；未来人更多负责目标、约束和验收，Agent 负责分析与执行。\n\n---\n\n# Coding 产品未来路线\n\n```text\nCopilot → AI IDE → Coding Agent → Multi-Agent 开发 → AI 软件工程团队\n```\n\n---\n\n# 知识图谱位置\n\n```text\n06-Products\n├── Chat产品地图\n├── Coding产品地图\n├── Search产品地图\n├── Agent产品地图\n└── Workflow产品地图\n```\n\n---\n\n# 关联节点\n\n- [[Claude Code]]\n- [[Cursor]]\n- [[Codex]]\n- [[Software Engineering Agent]]\n- [[OpenAI Agent Platform]]\n- [[Windsurf]]\n- [[OpenHands]]\n- [[Cline]]\n- [[Roo Code]]\n- [[GLM Coding]]\n- [[Agent]]\n- [[Computer_Use|Computer Use]]\n- [[Coding Plan经济学]]\n- [[OpenAI_Anthropic_智谱三条路线演化对比#OpenAI 路线|OpenAI路线]]\n- [[OpenAI_Anthropic_智谱三条路线演化对比#Anthropic 路线|Anthropic路线]]\n- [[OpenAI_Anthropic_智谱三条路线演化对比#智谱路线|智谱路线]]\n\n---\n\n# 核心结论\n\nAI 编程产品正在经历：\n\n```text\nCopilot → AI IDE → Coding Agent → 数字工程师\n```\n\n未来竞争不再是谁补全代码更快，而是谁能够理解项目、规划任务、自主执行并最终交付结果。\n", "excerpt": "Coding产品地图 目录 #学习定位 #一句话总结 #为什么会出现这么多 Coding 产品 #第一部分：Cursor #第二部分：Claude Code #第三部分：Codex #第四部分：Windsurf #第五部分：OpenHands #第六部分：Cline #第七部分：Roo Code #第八部分：GLM Coding #产品分类地图 #产品能力对...", "links": ["06-Products-Cursor", "05-Agent-Runners-Codex", "06-Products-Windsurf", "05-Agent-Runners-OpenHands", "05-Agent-Runners-Cline", "05-Agent-Runners-GLM-Coding", "02-Model-Companies-Anthropic", "02-Model-Companies-OpenAI", "03-Agent-MCP", "02-Model-Companies-智谱AI", "07-Business-Coding-Plan经济学", "10-Concepts-Agent", "03-Agent-Computer_Use", "02-Model-Companies-OpenAI_Anthropic_智谱三条路线演化对比"]}, {"id": "06-Products-Copilot", "title": "Copilot", "fileTitle": "Copilot", "category": "06-Products", "categoryLabel": "AI 产品", "path": "06-Products/Copilot.md", "updated": "2026-06-19", "tags": ["AI-Learning-OS", "product"], "body": "# Copilot\n\n## 一句话定义\n\n> Copilot 是“嵌入现有软件工作流的 AI 助手”产品范式，在本页主要覆盖 Microsoft Copilot 与 GitHub Copilot。\n\n## 定位\n\n- Microsoft Copilot 将 AI 嵌入 Windows、Microsoft 365 与企业数据。\n- GitHub Copilot 将代码补全、对话和 Coding Agent 嵌入开发环境。\n\n## 时间轴\n\n| 阶段 | 关键变化 | 意义 |\n|---|---|---|\n| 2021 | GitHub Copilot 推出 | 建立 AI 编码助手产品类别 |\n| 2023 | Microsoft 365 Copilot 与通用 Copilot 扩展 | 把生成式 AI 嵌入办公软件 |\n| Agent 阶段 | 从补全 / 对话扩展到 Agent 和企业自动化 | 从建议走向执行流程 |\n\n## 产品矩阵\n\n| 产品 / 能力 | 定位 | 核心价值 |\n|---|---|---|\n| Microsoft Copilot | 通用与 Windows AI | 搜索、创作、系统与多模态交互 |\n| Microsoft 365 Copilot | 企业办公 AI | 邮件、文档、会议、数据和企业知识 |\n| GitHub Copilot | 开发者 AI | 补全、对话、审查、编辑和 Coding Agent |\n\n## 商业模式\n\n- Microsoft 365 Copilot 按企业席位收费，GitHub Copilot 通过个人、Business 和 Enterprise 订阅变现。\n- Copilot 的核心经济学是提升现有 SaaS 套件的 ARPU 和留存。\n\n## 竞争格局\n\n- 与 ChatGPT、Gemini for Workspace、Claude for Enterprise 及 Cursor / Claude Code 等开发工具竞争。\n- 优势是 Microsoft 365、Windows、Azure 和 GitHub 的企业分发。\n\n## 关联节点\n\n- [[ChatGPT]]\n- [[Claude]]\n- [[Gemini]]\n- [[Codex]]\n- [[SaaS]]\n\n## 延伸阅读\n\n- [Microsoft Copilot](https://copilot.microsoft.com/)\n- [GitHub Copilot](https://github.com/features/copilot)\n", "excerpt": "Copilot 一句话定义 Copilot 是“嵌入现有软件工作流的 AI 助手”产品范式，在本页主要覆盖 Microsoft Copilot 与 GitHub
